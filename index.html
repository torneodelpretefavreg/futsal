// PAGINA: PIANO DI AMMORTAMENTO
// ============================================================
function PageAmmortamenti({ cespiti, movimenti, conti, stagione, onToast }) {
  const annoCorrente = new Date().getFullYear();
  const [annoRiferimento, setAnnoRiferimento] = useState(2026);

  const contiMap = useMemo(() => {
    const m = {};
    (conti || []).forEach(c => { m[c.codice] = c; });
    return m;
  }, [conti]);

  // Esercizio corrente: chiude il 31/08/2026. I cespiti "di quest'anno"
  // (anno_inizio === 2026) si ammortizzano con ragguaglio ai giorni dalla data
  // di registrazione in contabilità fino al 31/08/2026. Gli anni precedenti
  // restano immutati (uso la quota_esercizio salvata).
  const ANNO_ESERCIZIO = 2026;
  const FINE_ESERCIZIO = useMemo(() => new Date(2026, 7, 31), []); // 31 agosto 2026
  const GIORNI_ANNO = 365;

  // Sottoscrivo i cespiti con la loro key, così posso salvare la data_inizio inline
  const [cespitiKeyed, setCespitiKeyed] = useState([]);
  useEffect(() => {
    if (!firebaseReady || !stagione) { setCespitiKeyed(cespiti.map((c, i) => ({...c, _key: c._key || `idx_${i}`}))); return; }
    const ref = db.ref(`stagioni/${stagione}/cespiti`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setCespitiKeyed(v ? Object.entries(v).map(([k, c]) => ({...c, _key: k})) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  const setDataInizio = async (key, val) => {
    if (!firebaseReady || !stagione || key.startsWith("idx_")) return;
    try {
      await db.ref(`stagioni/${stagione}/cespiti/${key}/data_inizio`).set(val || null);
      if (onToast) onToast("Data registrazione aggiornata");
    } catch (e) { alert("Errore: " + e.message); }
  };

  // Per ogni cespite cerco nel LIBRO GIORNALE il movimento di acquisto
  // (uscita su conto immobilizzazione con nome corrispondente) e ne pesco la data.
  // Priorità match: stesso nome conto + importo uguale → stesso nome → importo uguale.
  // Se più movimenti coincidono uso la data più vecchia (entrata in funzione del bene).
  const ledgerDates = useMemo(() => {
    const out = {};
    const movs = movimenti || [];
    cespitiKeyed.forEach(c => {
      const nameC = (c.conto || "").trim().toUpperCase();
      const costoC = Number(c.costo_storico) || 0;
      if (!nameC) return;

      const candidati = movs.filter(m => {
        if (m.tipo !== "uscita" || !m.data) return false;
        const conto = contiMap[m.contoPdC];
        const cat = (conto?.categoria || "").toUpperCase();
        if (!cat.includes("IMM")) return false;
        const nameM = (conto?.nome || "").trim().toUpperCase();
        return nameM && (nameM === nameC || nameM.includes(nameC) || nameC.includes(nameM));
      });
      if (candidati.length === 0) return;

      const importoOk = candidati.filter(m => Math.abs((m.importo || 0) - costoC) < 0.5);
      const pool = importoOk.length ? importoOk : candidati;
      const sorted = [...pool].sort((a, b) => (a.data || "").localeCompare(b.data || ""));
      out[c._key] = { data: sorted[0].data, count: pool.length, exact: importoOk.length > 0 };
    });
    return out;
  }, [cespitiKeyed, movimenti, contiMap]);

  // Calcolo piano ammortamento per ogni cespite
  const piano = useMemo(() => {
    return cespitiKeyed.map(c => {
      const costo = Number(c.costo_storico) || 0;
      const aliquota = Number(c.aliquota) || 0;
      const annoInizio = Number(c.anno_inizio) || annoCorrente;
      const fondoAttuale = Number(c.fondo_ammortamento) || 0;
      const quotaAnnua = costo * aliquota; // quota annua "piena" teorica
      const isCorrente = annoInizio === ANNO_ESERCIZIO;

      // Data di registrazione: prima dal LIBRO GIORNALE, poi eventuale data salvata manualmente
      const ledger = ledgerDates[c._key];
      const dataReg = (ledger && ledger.data) || c.data_inizio || null;
      const dataFromLedger = !!(ledger && ledger.data);

      // Pro-rata ai giorni SOLO per i cespiti dell'esercizio corrente
      let giorni = null, ragguaglio = null, dataMancante = false;
      let quotaEsercizio;
      if (isCorrente && aliquota > 0) {
        if (dataReg) {
          const d = new Date(dataReg + "T00:00:00");
          const diff = Math.round((FINE_ESERCIZIO - d) / 86400000) + 1; // giorni inclusivi
          giorni = Math.max(0, Math.min(GIORNI_ANNO, diff));
          ragguaglio = giorni / GIORNI_ANNO;
          quotaEsercizio = Math.min(Math.max(0, costo - fondoAttuale), quotaAnnua * ragguaglio);
        } else {
          dataMancante = true;
          quotaEsercizio = quotaAnnua; // senza data uso la quota piena, ma segnalo
        }
      } else {
        // Anni precedenti / senza aliquota: immutato → quota salvata
        quotaEsercizio = (c.quota_esercizio !== undefined && c.quota_esercizio !== null)
          ? Number(c.quota_esercizio) : quotaAnnua;
      }

      // Calcolo durata teorica in anni
      const durataTeorica = aliquota > 0 ? Math.ceil(1 / aliquota) : 0;
      // Anni già ammortizzati (a partire dall'anno di inizio)
      const anniDecorsi = annoRiferimento - annoInizio + 1;
      // Fondo teorico: per il corrente = quota d'esercizio ragguagliata; altrimenti come prima
      const fondoTeorico = isCorrente
        ? Math.min(costo, quotaEsercizio)
        : Math.min(costo, quotaAnnua * Math.max(0, anniDecorsi));
      // Valore residuo
      const valoreResiduo = Math.max(0, costo - fondoAttuale);
      // Anni residui (con fondo attuale)
      const anniResidui = quotaAnnua > 0 ? Math.ceil(valoreResiduo / quotaAnnua) : 0;
      // Anno ultimo ammortamento
      const annoUltimo = aliquota > 0 ? annoInizio + durataTeorica - 1 : null;
      // Stato ammortamento
      let stato = "—";
      if (aliquota === 0) stato = "Aliquota non impostata";
      else if (isCorrente && dataMancante) stato = "⚠ Imposta data registrazione";
      else if (valoreResiduo <= 0.01) stato = "Completamente ammortizzato";
      else if (anniDecorsi <= 0) stato = "Non ancora iniziato";
      else if (isCorrente) stato = "Primo anno (ragguaglio gg)";
      else if (annoRiferimento >= annoUltimo) stato = "Ultimo anno";
      else stato = `In ammortamento (${anniResidui} anni residui)`;

      return {
        ...c,
        quotaAnnua,
        quotaEsercizio,
        isCorrente,
        giorni,
        ragguaglio,
        dataMancante,
        dataReg,
        dataFromLedger,
        ledgerCount: ledger ? ledger.count : 0,
        durataTeorica,
        anniDecorsi,
        fondoTeorico,
        valoreResiduo,
        anniResidui,
        annoUltimo,
        stato,
        // Differenza tra fondo teorico e attuale (per evidenziare scostamenti)
        scostamento: fondoAttuale - fondoTeorico,
      };
    });
  }, [cespitiKeyed, annoRiferimento, FINE_ESERCIZIO, ledgerDates]);

  // Totali
  const tot = useMemo(() => {
    return {
      costo: piano.reduce((s,c) => s + (Number(c.costo_storico) || 0), 0),
      quotaAnnua: piano.reduce((s,c) => s + c.quotaAnnua, 0),
      quotaEsercizio: piano.reduce((s,c) => s + (c.quotaEsercizio || 0), 0),
      fondoAttuale: piano.reduce((s,c) => s + (Number(c.fondo_ammortamento) || 0), 0),
      fondoTeorico: piano.reduce((s,c) => s + c.fondoTeorico, 0),
      valoreResiduo: piano.reduce((s,c) => s + c.valoreResiduo, 0),
    };
  }, [piano]);

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Piano di Ammortamento</h2>
          <div className="sub">Calcolo automatico delle quote di ammortamento per ogni cespite</div>
        </div>
        <div className="filters" style={{marginLeft:"auto"}}>
          <span className="label">Anno riferimento:</span>
          <input type="number" value={annoRiferimento} onChange={e => setAnnoRiferimento(Number(e.target.value))}
                 style={{maxWidth:100, padding:"6px 10px", border:"1px solid var(--rule)", borderRadius:6}}/>
        </div>
      </div>

      {/* KPI */}
      <div className="kpi-grid" style={{marginBottom:20}}>
        <div className="kpi">
          <div className="label">Totale costo storico</div>
          <div className="value">{fmtEuro(tot.costo)}</div>
        </div>
        <div className="kpi">
          <div className="label">Quota esercizio (ragguagliata)</div>
          <div className="value" style={{color:"var(--accent-ink)"}}>{fmtEuro(tot.quotaEsercizio)}</div>
          <div className="hint">annua piena {fmtEuro(tot.quotaAnnua)}</div>
        </div>
        <div className="kpi">
          <div className="label">Fondo ammortamento attuale</div>
          <div className="value">{fmtEuro(tot.fondoAttuale)}</div>
          <div className="hint">accumulato in libro</div>
        </div>
        <div className="kpi">
          <div className="label">Valore residuo</div>
          <div className="value" style={{color:"var(--ok)"}}>{fmtEuro(tot.valoreResiduo)}</div>
          <div className="hint">costo − fondo</div>
        </div>
      </div>

      <div style={{padding:"12px 16px", background:"#fff8e7", border:"1px solid #f0d860", borderRadius:8, fontSize:13, marginBottom:16, color:"#7a5d00"}}>
        <strong>💡 Come leggere.</strong> La <em>quota annua</em> è costo × aliquota. Per i cespiti di <strong>quest'esercizio</strong> (anno {ANNO_ESERCIZIO}) la <em>quota d'esercizio</em> è ragguagliata ai giorni dalla data di registrazione in contabilità fino al <strong>31/08/2026</strong> (gg/365). La <strong>data reg.</strong> viene pescata automaticamente dal <strong>libro giornale</strong> (movimento di acquisto del cespite, icona 📖); se non trova un movimento corrispondente puoi inserirla a mano. I cespiti degli <strong>anni precedenti</strong> restano immutati (quota salvata). Lo <em>scostamento</em> è la differenza fra fondo teorico e fondo attuale.
      </div>

      <div className="tbl-wrap">
        <table className="tbl">
          <thead>
            <tr>
              <th>Cespite</th>
              <th className="num">Costo storico</th>
              <th className="num">Aliquota</th>
              <th className="num">Quota annua</th>
              <th className="num">Quota eserc.</th>
              <th className="num">Anno</th>
              <th style={{width:140}}>Data reg.</th>
              <th className="num">Durata</th>
              <th className="num">Fondo attuale</th>
              <th className="num">Fondo teorico</th>
              <th className="num">Scostamento</th>
              <th className="num">Valore residuo</th>
              <th>Stato</th>
            </tr>
          </thead>
          <tbody>
            {piano.map((c, i) => (
              <tr key={c._key || i}>
                <td style={{fontWeight:500}}>{c.conto}</td>
                <td className="num">{fmt(c.costo_storico)}</td>
                <td className="num">{c.aliquota ? (c.aliquota * 100).toFixed(0) + "%" : "—"}</td>
                <td className="num" style={{color:"var(--ink-3)"}}>{fmt(c.quotaAnnua)}</td>
                <td className="num" style={{fontWeight:600, color:"var(--accent-ink)"}}>
                  {fmt(c.quotaEsercizio)}
                  {c.isCorrente && c.ragguaglio !== null && (
                    <div style={{fontSize:10.5, color:"var(--ink-3)", fontWeight:400}}>{c.giorni} gg · {(c.ragguaglio*100).toFixed(1)}%</div>
                  )}
                </td>
                <td className="num">{c.anno_inizio || "—"}</td>
                <td>
                  {c.dataFromLedger ? (
                    <span title={"Data presa dal libro giornale" + (c.ledgerCount > 1 ? " (più movimenti, uso il più vecchio)" : "")}
                          style={{display:"inline-flex", alignItems:"center", gap:5, fontSize:12, color:"var(--accent-ink)", fontWeight:600}}>
                      📖 {fmtDate(c.dataReg)}
                    </span>
                  ) : c.isCorrente ? (
                    <input type="date" value={c.data_inizio || ""} max="2026-08-31"
                           onChange={e => setDataInizio(c._key, e.target.value)}
                           title="Nessun movimento trovato in libro giornale: inserisci manualmente"
                           style={{width:130, padding:"3px 6px", border:"1px solid var(--rule)", borderRadius:4, fontSize:12,
                                   background: c.dataMancante ? "var(--danger-soft)" : "var(--panel)"}}/>
                  ) : (
                    <span style={{color:"var(--ink-3)"}}>—</span>
                  )}
                </td>
                <td className="num">{c.durataTeorica > 0 ? c.durataTeorica + " anni" : "—"}</td>
                <td className="num">{fmt(c.fondo_ammortamento)}</td>
                <td className="num" style={{color:"var(--ink-3)"}}>{fmt(c.fondoTeorico)}</td>
                <td className="num" style={{color: Math.abs(c.scostamento) > 0.5 ? "var(--neg)" : "var(--ink-3)", fontWeight: Math.abs(c.scostamento) > 0.5 ? 600 : 400}}>
                  {c.scostamento > 0 ? "+" : ""}{fmt(c.scostamento)}
                </td>
                <td className="num" style={{fontWeight:600}}>{fmt(c.valoreResiduo)}</td>
                <td style={{fontSize:11.5}}>
                  <span className="pill" style={{
                    background: c.stato.includes("Completamente") ? "#e8f5e9" :
                                c.stato.includes("Imposta") ? "var(--danger-soft)" :
                                c.stato.includes("Ultimo") ? "#fff3e0" :
                                (c.stato.includes("In ammortamento") || c.stato.includes("Primo anno")) ? "var(--accent-soft)" : "var(--panel-2)",
                    color: c.stato.includes("Completamente") ? "#1b5e20" :
                           c.stato.includes("Imposta") ? "var(--danger)" :
                           c.stato.includes("Ultimo") ? "#e65100" :
                           (c.stato.includes("In ammortamento") || c.stato.includes("Primo anno")) ? "var(--accent-ink)" : "var(--ink-3)"
                  }}>{c.stato}</span>
                </td>
              </tr>
            ))}
            <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
              <td style={{fontFamily:"'Fraunces',serif"}}>TOTALI</td>
              <td className="num">{fmt(tot.costo)}</td>
              <td></td>
              <td className="num">{fmt(tot.quotaAnnua)}</td>
              <td className="num">{fmt(tot.quotaEsercizio)}</td>
              <td colSpan={3}></td>
              <td className="num">{fmt(tot.fondoAttuale)}</td>
              <td className="num">{fmt(tot.fondoTeorico)}</td>
              <td className="num" style={{color: Math.abs(tot.fondoAttuale - tot.fondoTeorico) > 0.5 ? "var(--neg)" : "var(--ink-3)"}}>
                {(tot.fondoAttuale - tot.fondoTeorico) > 0 ? "+" : ""}{fmt(tot.fondoAttuale - tot.fondoTeorico)}
              </td>
              <td className="num">{fmt(tot.valoreResiduo)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============================================================
// PAGINA: COMPOSIZIONE CASSA CONTANTI
// ============================================================
function PageCassa({ stagione, movimenti, saldiIniziali, onToast }) {
  // Tagli € (banconote + monete)
  const TAGLI = [
    { val: 500, tipo: "banconota" },
    { val: 200, tipo: "banconota" },
    { val: 100, tipo: "banconota" },
    { val: 50, tipo: "banconota" },
    { val: 20, tipo: "banconota" },
    { val: 10, tipo: "banconota" },
    { val: 5, tipo: "banconota" },
    { val: 2, tipo: "moneta" },
    { val: 1, tipo: "moneta" },
    { val: 0.50, tipo: "moneta" },
    { val: 0.20, tipo: "moneta" },
    { val: 0.10, tipo: "moneta" },
    { val: 0.05, tipo: "moneta" },
    { val: 0.02, tipo: "moneta" },
    { val: 0.01, tipo: "moneta" },
  ];

  // Stato locale: quanti pezzi per ogni taglio
  const [quantita, setQuantita] = useState({});
  const [savedComposizione, setSavedComposizione] = useState(null);
  const [dataConta, setDataConta] = useState(new Date().toISOString().slice(0, 10));
  const [storico, setStorico] = useState([]); // conte salvate nel tempo

  // Carico composizione salvata da Firebase (working set: tiene le q precedenti)
  useEffect(() => {
    if (!firebaseReady || !stagione) return;
    db.ref(`stagioni/${stagione}/composizioneCassa`).once("value").then(snap => {
      if (snap.exists()) {
        const v = snap.val();
        setQuantita(v.quantita || {});
        setDataConta(v.data || new Date().toISOString().slice(0, 10));
        setSavedComposizione(v);
      }
    });
  }, [stagione]);

  // Sottoscrivo lo storico delle conte salvate
  useEffect(() => {
    if (!firebaseReady || !stagione) return;
    const ref = db.ref(`stagioni/${stagione}/composizioneCassaStorico`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setStorico(v
        ? Object.entries(v).map(([k, s]) => ({ ...s, _key: k })).sort((a, b) => (b.salvatoIl || "").localeCompare(a.salvatoIl || ""))
        : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  // Calcolo saldo CASSA contabile (cod 3)
  const saldoCassaContabile = useMemo(() => {
    let s = saldiIniziali[3] || 0;
    movimenti.forEach(m => {
      if (m.contoLiquidita === 3) {
        if (m.tipo === "entrata") s += m.importo;
        else if (m.tipo === "uscita") s -= m.importo;
        else if (m.tipo === "giroconto") s -= m.importo;
      } else if (m.contoLiquiditaDest === 3 && m.tipo === "giroconto") {
        s += m.importo;
      }
      const eff = effettoLiquiditaNascosto(m);
      if (eff && eff.codice === 3) s += eff.delta;
    });
    return s;
  }, [movimenti, saldiIniziali]);

  // Totale composizione fisica
  const totaleFisico = useMemo(() => {
    return TAGLI.reduce((s, t) => s + (Number(quantita[t.val]) || 0) * t.val, 0);
  }, [quantita]);

  const totaleBanconote = useMemo(() => {
    return TAGLI.filter(t => t.tipo === "banconota").reduce((s, t) => s + (Number(quantita[t.val]) || 0) * t.val, 0);
  }, [quantita]);

  const totaleMonete = useMemo(() => {
    return TAGLI.filter(t => t.tipo === "moneta").reduce((s, t) => s + (Number(quantita[t.val]) || 0) * t.val, 0);
  }, [quantita]);

  const scostamento = totaleFisico - saldoCassaContabile;

  const setQ = (val, n) => {
    setQuantita(prev => ({...prev, [val]: n}));
  };

  const azzera = () => {
    if (!confirm("Azzerare tutti i conteggi?")) return;
    setQuantita({});
  };

  const salva = async () => {
    if (!firebaseReady) return alert("Firebase non disponibile");
    try {
      const data = {
        quantita,
        data: dataConta,
        totale: totaleFisico,
        saldoContabile: saldoCassaContabile,
        scostamento,
        salvatoIl: new Date().toISOString(),
      };
      // 1) Aggiorno la composizione corrente (così riapro con le stesse q)
      await db.ref(`stagioni/${stagione}/composizioneCassa`).set(data);
      // 2) Appendo uno snapshot allo storico (così ogni conta resta salvata)
      await db.ref(`stagioni/${stagione}/composizioneCassaStorico`).push(data);
      setSavedComposizione(data);
      onToast("Conta salvata nello storico");
    } catch (e) {
      alert("Errore: " + e.message);
    }
  };

  // Ricarica le quantità di una conta storica nell'editor (senza ricontare)
  const caricaConta = (s) => {
    setQuantita(s.quantita || {});
    setDataConta(s.data || dataConta);
    onToast("Conta caricata — modifica l'importo o salvane una nuova");
  };

  const eliminaConta = async (s) => {
    if (!confirm(`Eliminare la conta del ${s.data || "—"} (totale ${fmtEuro(s.totale || 0)})?`)) return;
    try {
      await db.ref(`stagioni/${stagione}/composizioneCassaStorico/${s._key}`).remove();
      onToast("Conta eliminata dallo storico");
    } catch (e) { alert("Errore: " + e.message); }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Composizione Cassa Contanti</h2>
          <div className="sub">Conta fisica del contante per quadrare con il saldo contabile CASSA</div>
        </div>
      </div>

      {/* KPI top */}
      <div className="kpi-grid" style={{marginBottom:20}}>
        <div className="kpi">
          <div className="label">Saldo CASSA contabile</div>
          <div className="value">{fmtEuro(saldoCassaContabile)}</div>
          <div className="hint">da app (conto 3)</div>
        </div>
        <div className="kpi">
          <div className="label">Totale conta fisica</div>
          <div className="value" style={{color:"var(--accent-ink)"}}>{fmtEuro(totaleFisico)}</div>
          <div className="hint">banconote + monete</div>
        </div>
        <div className="kpi">
          <div className="label">Scostamento</div>
          <div className="value" style={{color: Math.abs(scostamento) < 0.01 ? "var(--ok)" : "var(--neg)"}}>
            {scostamento > 0 ? "+" : ""}{fmtEuro(scostamento)}
          </div>
          <div className="hint">{Math.abs(scostamento) < 0.01 ? "✓ in quadratura" : "non quadra"}</div>
        </div>
        <div className="kpi">
          <div className="label">Data conta</div>
          <input type="date" value={dataConta} onChange={e => setDataConta(e.target.value)}
                 style={{width:"100%", padding:"6px 8px", border:"1px solid var(--rule)", borderRadius:6, fontSize:14, marginTop:4}}/>
        </div>
      </div>

      <div className="card-grid" style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:20}}>
        {/* BANCONOTE */}
        <div className="card">
          <h3 style={{margin:"0 0 12px"}}>💴 Banconote</h3>
          <table className="tbl" style={{margin:0}}>
            <thead>
              <tr>
                <th className="num" style={{width:90}}>Taglio</th>
                <th className="num" style={{width:90}}>Pezzi</th>
                <th className="num">Totale</th>
              </tr>
            </thead>
            <tbody>
              {TAGLI.filter(t => t.tipo === "banconota").map(t => {
                const n = Number(quantita[t.val]) || 0;
                const tot = n * t.val;
                return (
                  <tr key={t.val}>
                    <td className="num" style={{fontWeight:600}}>{fmtEuro(t.val)}</td>
                    <td className="num">
                      <input type="number" inputMode="numeric" min="0" value={n || ""}
                             onChange={e => setQ(t.val, Number(e.target.value))}
                             placeholder="0"
                             style={{width:70, padding:"4px 8px", border:"1px solid var(--rule)", borderRadius:4, textAlign:"right"}}/>
                    </td>
                    <td className="num" style={{color: tot > 0 ? "var(--accent-ink)" : "var(--ink-3)"}}>
                      {tot > 0 ? fmt(tot) : "—"}
                    </td>
                  </tr>
                );
              })}
              <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                <td colSpan={2} style={{fontFamily:"'Fraunces',serif"}}>SUBTOTALE</td>
                <td className="num">{fmt(totaleBanconote)}</td>
              </tr>
            </tbody>
          </table>
        </div>

        {/* MONETE */}
        <div className="card">
          <h3 style={{margin:"0 0 12px"}}>🪙 Monete</h3>
          <table className="tbl" style={{margin:0}}>
            <thead>
              <tr>
                <th className="num" style={{width:90}}>Taglio</th>
                <th className="num" style={{width:90}}>Pezzi</th>
                <th className="num">Totale</th>
              </tr>
            </thead>
            <tbody>
              {TAGLI.filter(t => t.tipo === "moneta").map(t => {
                const n = Number(quantita[t.val]) || 0;
                const tot = n * t.val;
                return (
                  <tr key={t.val}>
                    <td className="num" style={{fontWeight:600}}>{fmtEuro(t.val)}</td>
                    <td className="num">
                      <input type="number" inputMode="numeric" min="0" value={n || ""}
                             onChange={e => setQ(t.val, Number(e.target.value))}
                             placeholder="0"
                             style={{width:70, padding:"4px 8px", border:"1px solid var(--rule)", borderRadius:4, textAlign:"right"}}/>
                    </td>
                    <td className="num" style={{color: tot > 0 ? "var(--accent-ink)" : "var(--ink-3)"}}>
                      {tot > 0 ? fmt(tot) : "—"}
                    </td>
                  </tr>
                );
              })}
              <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                <td colSpan={2} style={{fontFamily:"'Fraunces',serif"}}>SUBTOTALE</td>
                <td className="num">{fmt(totaleMonete)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Azioni */}
      <div style={{marginTop:20, display:"flex", gap:10, justifyContent:"flex-end", flexWrap:"wrap"}}>
        <button className="btn ghost" onClick={azzera}>Azzera conteggi</button>
        <button className="btn accent" onClick={salva}>💾 Salva conta</button>
      </div>

      {savedComposizione && savedComposizione.salvatoIl && (
        <div style={{marginTop:16, padding:"10px 14px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12.5, color:"var(--ink-3)"}}>
          Ultima conta salvata: <strong>{new Date(savedComposizione.salvatoIl).toLocaleString("it-IT")}</strong> · data conta {savedComposizione.data} · totale {fmtEuro(savedComposizione.totale)}
        </div>
      )}

      {/* STORICO CONTE */}
      {storico.length > 0 && (
        <div className="card" style={{marginTop:20}}>
          <h3 style={{margin:"0 0 4px"}}>🗂 Storico conte salvate</h3>
          <div style={{fontSize:12, color:"var(--ink-3)", marginBottom:12}}>
            Ogni salvataggio resta qui. Lo scostamento di ogni riga è quello al momento del salvataggio; per confrontare una conta col saldo contabile <em>attuale</em>, caricala e guarda i KPI in alto.
          </div>
          <div className="tbl-wrap" style={{margin:0}}>
            <table className="tbl" style={{margin:0}}>
              <thead>
                <tr>
                  <th style={{width:110}}>Data conta</th>
                  <th className="num">Totale fisico</th>
                  <th className="num">Saldo contabile</th>
                  <th className="num">Scostamento</th>
                  <th>Salvata il</th>
                  <th style={{width:150}}></th>
                </tr>
              </thead>
              <tbody>
                {storico.map(s => {
                  const sc = Number(s.scostamento) || 0;
                  return (
                    <tr key={s._key}>
                      <td>{s.data || "—"}</td>
                      <td className="num" style={{fontWeight:600}}>{fmt(s.totale || 0)}</td>

                        {sc > 0 ? "+" : ""}{fmt(sc)}
                      </td>
                      <td style={{fontSize:12, color:"var(--ink-3)"}}>{s.salvatoIl ? new Date(s.salvatoIl).toLocaleString("it-IT") : "—"}</td>
                      <td>
                        <div style={{display:"flex", gap:4}}>
                          <button className="btn ghost sm" onClick={() => caricaConta(s)}>↺ Carica</button>
                          <button className="btn danger sm" onClick={() => eliminaConta(s)}>🗑</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {Math.abs(scostamento) > 0.01 && totaleFisico > 0 && (
        <div style={{marginTop:16, padding:"12px 16px", background:"#fee", border:"1px solid #fcc", borderRadius:8, fontSize:13}}>
          <strong style={{color:"var(--neg)"}}>⚠️ Scostamento di {fmtEuro(scostamento)}.</strong> Verifica:
          <ul style={{margin:"6px 0 0 18px", color:"var(--ink-2)"}}>
            <li>Hai contato tutti i tagli?</li>
            <li>Hai registrato tutte le entrate/uscite di cassa nell'app?</li>
            <li>Ci sono prelievi o versamenti tesoriere non registrati?</li>
          </ul>
        </div>
      )}
    </div>
  );
}

function PageCespiti({ cespiti, stagione, onToast }) {
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);

  const sorted = useMemo(() => [...cespiti].sort((a,b) => (a.conto || "").localeCompare(b.conto || "")), [cespiti]);

  const totCosto = sorted.reduce((s,c) => s + (c.costo_storico || 0), 0);
  const totFondo = sorted.reduce((s,c) => s + (c.fondo_ammortamento || 0), 0);
  const totQuota = sorted.reduce((s,c) => s + (c.quota_esercizio || 0), 0);
  const valoreNetto = totCosto - totFondo;

  const saveCespite = async (data, oldKey) => {
    try {
      const key = oldKey || `cesp_${Date.now().toString(36)}`;
      await db.ref(`stagioni/${stagione}/cespiti/${key}`).set(data);
      onToast("Cespite salvato");
      setEditing(null); setCreating(false);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const deleteCespite = async (key) => {
    if (!confirm("Eliminare questo cespite?")) return;
    try {
      await db.ref(`stagioni/${stagione}/cespiti/${key}`).remove();
      onToast("Cespite eliminato");
    } catch(e) { alert("Errore: " + e.message); }
  };

  // Per ottenere la key del cespite uso una scansione separata
  const [cespitiConKey, setCespitiConKey] = useState([]);
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`stagioni/${stagione}/cespiti`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setCespitiConKey(v ? Object.entries(v).map(([k, c]) => ({...c, _key: k})) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  const visibili = cespitiConKey.sort((a,b) => (a.conto || "").localeCompare(b.conto || ""));

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Cespiti & Ammortamenti</h2>
          <div className="sub">{cespiti.length} beni · Costo storico {fmtEuro(totCosto)} · Valore netto {fmtEuro(valoreNetto)}</div>
        </div>
        <button className="btn accent" onClick={() => setCreating(true)}>+ Nuovo cespite</button>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="label">Costo storico</div>
          <div className="value">{fmtEuro(totCosto)}</div>
          <div className="hint">Tutti i beni</div>
        </div>
        <div className="kpi">
          <div className="label">Fondo ammortamento</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(totFondo)}</div>
        </div>
        <div className="kpi accent">
          <div className="label">Valore netto</div>
          <div className="value">{fmtEuro(valoreNetto)}</div>
          <div className="hint">Costo − Fondo</div>
        </div>
        <div className="kpi">
          <div className="label">Quota esercizio</div>
          <div className="value">{fmtEuro(totQuota)}</div>
          <div className="hint">Ammortamento annuo</div>
        </div>
      </div>

      <div className="tbl-wrap" style={{marginTop:20}}>
        <table className="tbl">
          <thead>
            <tr>
              <th>Conto / Bene</th>
              <th>Classe</th>
              <th className="num" style={{width:60}}>N°</th>
              <th className="num" style={{width:90}}>Costo unit.</th>
              <th className="num" style={{width:80}}>Anno</th>
              <th className="num" style={{width:110}}>Costo storico</th>
              <th className="num" style={{width:80}}>Aliquota</th>
              <th className="num" style={{width:110}}>Quota esercizio</th>
              <th className="num" style={{width:120}}>Fondo amm.to</th>
              <th className="num" style={{width:110}}>Valore netto</th>
              <th style={{width:90}}></th>
            </tr>
          </thead>
          <tbody>
            {visibili.map(c => {
              const netto = (c.costo_storico || 0) - (c.fondo_ammortamento || 0);
              // Calcolo costo unitario: usa valore salvato o lo deriva da costo/n_beni
              const nBeni = Number(c.n_beni) || 1;
              const costoUnit = c.costo_unitario !== undefined ? c.costo_unitario : (nBeni > 0 ? (c.costo_storico || 0) / nBeni : 0);
              return (
                <tr key={c._key}>
                  <td style={{fontWeight:500}}>{c.conto}</td>
                  <td><span className="pill">{c.classe || "—"}</span></td>
                  <td className="num">{c.n_beni || "—"}</td>
                  <td className="num" style={{color:"var(--ink-3)"}}>{costoUnit > 0 ? fmt(costoUnit) : "—"}</td>
                  <td className="num">{c.anno_inizio || "—"}</td>
                  <td className="num">{fmt(c.costo_storico)}</td>
                  <td className="num">{c.aliquota ? (c.aliquota * 100).toFixed(0) + "%" : "—"}</td>
                  <td className="num">{fmt(c.quota_esercizio)}</td>
                  <td className="num neg">{fmt(c.fondo_ammortamento)}</td>
                  <td className="num" style={{fontWeight:600}}>{fmt(netto)}</td>
                  <td>
                    <div style={{display:"flex", gap:4}}>
                      <button className="btn ghost sm" onClick={() => setEditing(c)}>✎</button>
                      <button className="btn danger sm" onClick={() => deleteCespite(c._key)}>🗑</button>
                    </div>
                  </td>
                </tr>
              );
            })}
            <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
              <td colSpan={5} style={{fontFamily:"'Fraunces',serif"}}>TOTALI</td>
              <td className="num">{fmt(totCosto)}</td>
              <td></td>
              <td className="num">{fmt(totQuota)}</td>
              <td className="num neg">{fmt(totFondo)}</td>
              <td className="num">{fmt(valoreNetto)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>

      {(editing || creating) && (
        <CespiteForm
          cespite={editing}
          onSave={(data) => saveCespite(data, editing?._key)}
          onCancel={() => { setEditing(null); setCreating(false); }}
        />
      )}
    </div>
  );
}

function CespiteForm({ cespite, onSave, onCancel }) {
  const isNew = !cespite;
  const [conto, setConto] = useState(cespite?.conto || "");
  const [classe, setClasse] = useState(cespite?.classe || "IMMOBILIZZAZIONI MATERIALI");
  const [nBeni, setNBeni] = useState(cespite?.n_beni || 1);
  const [annoInizio, setAnnoInizio] = useState(cespite?.anno_inizio || new Date().getFullYear());
  const [costoUnit, setCostoUnit] = useState(() => {
    if (!cespite) return "";
    const n = Number(cespite.n_beni) || 1;
    return n > 0 ? ((cespite.costo_storico || 0) / n).toFixed(2) : (cespite.costo_storico || 0);
  });
  const [costo, setCosto] = useState(cespite?.costo_storico || "");
  const [aliquota, setAliquota] = useState(cespite ? (cespite.aliquota * 100) : "");
  const [quota, setQuota] = useState(cespite?.quota_esercizio || 0);
  const [fondo, setFondo] = useState(cespite?.fondo_ammortamento || 0);
  const [dataInizio, setDataInizio] = useState(cespite?.data_inizio || "");
  const [lastChange, setLastChange] = useState("totale"); // "totale" | "unit" | "n"

  // Auto-calcolo costo totale o unitario in base a cosa l'utente sta modificando
  useEffect(() => {
    const n = Number(nBeni) || 1;
    if (lastChange === "unit") {
      // modificato costo unitario → ricalcolo totale
      const t = Number(costoUnit) * n;
      setCosto(Math.round(t * 100) / 100);
    } else if (lastChange === "totale") {
      // modificato costo totale → ricalcolo unitario
      const u = Number(costo) / n;
      setCostoUnit(Math.round(u * 100) / 100);
    } else if (lastChange === "n") {
      // modificato numero beni: tengo il costo unitario, ricalcolo totale
      const t = Number(costoUnit) * n;
      setCosto(Math.round(t * 100) / 100);
    }
  }, [costoUnit, costo, nBeni, lastChange]);

  // Auto-calcolo quota se cambio costo o aliquota
  useEffect(() => {
    if (costo && aliquota) {
      const q = Number(costo) * (Number(aliquota) / 100);
      setQuota(Math.round(q * 100) / 100);
    }
  }, [costo, aliquota]);

  const submit = (e) => {
    e.preventDefault();
    if (!conto.trim()) return alert("Nome conto obbligatorio");
    onSave({
      conto: conto.trim(),
      classe,
      n_beni: Number(nBeni) || 1,
      costo_unitario: Number(costoUnit) || 0,
      anno_inizio: Number(annoInizio),
      costo_storico: Number(costo) || 0,
      aliquota: (Number(aliquota) || 0) / 100,
      quota_esercizio: Number(quota) || 0,
      fondo_ammortamento: Number(fondo) || 0,
      data_inizio: dataInizio || null,
    });
  };

  return (
    <div className="modal-bg" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{isNew ? "Nuovo cespite" : "Modifica cespite"}</h3>
          <button className="btn ghost sm" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          <form className="form-grid" onSubmit={submit}>
            <div className="form-row">
              <label>Nome bene <span className="req">*</span></label>
              <input type="text" value={conto} onChange={e => setConto(e.target.value)} required placeholder="es. PALLONI FUTSAL"/>
            </div>
            <div className="form-row">
              <label>Classe</label>
              <select value={classe} onChange={e => setClasse(e.target.value)}>
                <option>IMMOBILIZZAZIONI MATERIALI</option>
                <option>IMMOBILIZZAZIONI IMMATERIALI</option>
              </select>
            </div>
            <div className="form-row" style={{gridTemplateColumns:"1fr 1fr 1fr", gap:10}}>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>N° beni</label>
                <input type="number" inputMode="decimal" min="1" step="1" value={nBeni}
                  onChange={e => { setNBeni(e.target.value); setLastChange("n"); }}/>
              </div>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Costo unitario €</label>
                <input type="number" inputMode="decimal" step="0.01" value={costoUnit}
                  onChange={e => { setCostoUnit(e.target.value); setLastChange("unit"); }}/>
              </div>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Costo totale €</label>
                <input type="number" inputMode="decimal" step="0.01" value={costo}
                  onChange={e => { setCosto(e.target.value); setLastChange("totale"); }} style={{background:"var(--panel-2)", fontWeight:600}}/>
              </div>
            </div>
            <div style={{fontSize:11, color:"var(--ink-3)", padding:"2px 0 8px"}}>
              💡 Modifica liberamente N° beni, Costo unitario o Costo totale: i campi si aggiornano automaticamente in base a cosa cambi per ultimo.
            </div>
            <div className="form-row" style={{gridTemplateColumns:"1fr 1fr", gap:10}}>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Anno acquisto</label>
                <input type="number" inputMode="decimal" value={annoInizio} onChange={e => setAnnoInizio(e.target.value)} min="2000" max="2100"/>
              </div>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Aliquota %</label>
                <input type="number" inputMode="decimal" step="0.01" value={aliquota} onChange={e => setAliquota(e.target.value)} placeholder="es. 20 per 20%"/>
              </div>
            </div>
            <div className="form-row">
              <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Data registrazione in contabilità</label>
              <input type="date" value={dataInizio} onChange={e => setDataInizio(e.target.value)}/>
              <div style={{fontSize:11, color:"var(--ink-3)", marginTop:4}}>
                Per i cespiti di quest'esercizio serve a ragguagliare la quota ai giorni fino al 31/08/2026.
              </div>
            </div>
            <div className="form-row" style={{gridTemplateColumns:"1fr 1fr", gap:10}}>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Quota esercizio €</label>
                <input type="number" inputMode="decimal" step="0.01" value={quota} onChange={e => setQuota(e.target.value)}/>
              </div>
              <div>
                <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Fondo ammortam. €</label>
                <input type="number" inputMode="decimal" step="0.01" value={fondo} onChange={e => setFondo(e.target.value)}/>
              </div>
            </div>
            <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
              <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
              <button type="submit" className="btn accent">Salva</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PAGINA: ISCRIZIONI TdP (lette dal TdP Manager + pagamenti + contabilità)
// ============================================================
// Mappa metodo di pagamento → conto di liquidità (codice P.d.C.)
const METODI_TDP = [
  { val: "contanti", label: "Contanti", conto: 3 },
  { val: "bonifico", label: "Bonifico", conto: 1 },
  { val: "pos", label: "POS", conto: 5 },
  { val: "satispay", label: "Satispay", conto: 10 },
  { val: "paypal", label: "PayPal", conto: 9 },
];
// Conti P.d.C. di destinazione dei ricavi torneo
const CONTO_ISCRIZIONE = 6;   // ISCRIZIONI C/ENT.
const CONTO_ASSICURAZIONE = 7; // ASSICURAZIONI GIOCATORI
const CONTO_ENTRATE_SERATE = 41; // ENTRATE SERATE TORNEO

// Slug stabile per chiave squadra (sopravvive agli aggiornamenti del master)
function slugSquadra(nome) {
  return String(nome || "").trim().toUpperCase().replace(/[^A-Z0-9]+/g, "_").replace(/^_+|_+$/g, "") || "SQUADRA";
}
// Mappa il metodo di pagamento (testo libero del foglio) → conto di liquidità suggerito
function contoLiquiditaDaMetodo(metodo) {
  const m = String(metodo || "").toUpperCase();
  if (m.includes("PAYPAL")) return 9;
  if (m.includes("SATISPAY")) return 10;
  if (m.includes("SUMUP") || m.includes("POS")) return 5;
  if (m.includes("CONTO FUTSAL") || m.includes("BONIFICO") || m.includes("C/C")) return 1;
  return 3; // contanti / cash / delta cassa / default
}
// Interpreta le colonne RISCOSSI / DA RISCUOTERE (categoriche) → { iscr, ass } pagati
function parseStatoRiscossi(riscosso, daRiscuotere) {
  const r = String(riscosso || "").trim().toUpperCase();
  const d = String(daRiscuotere || "").trim().toUpperCase();
  if (r.includes("TUTTO")) return { iscr: true, ass: true };
  if (r.includes("ISCRIZIONE") || r.includes("ASSICURAZIONE")) {
    return { iscr: r.includes("ISCRIZIONE"), ass: r.includes("ASSICURAZIONE") };
  }
  // RISCOSSI vuoto → deduco da "da riscuotere" (complemento)
  if (!d || d.includes("TUTTO")) return { iscr: false, ass: false };
  return { iscr: !d.includes("ISCRIZIONE"), ass: !d.includes("ASSICURAZIONE") };
}

function PageIscrizioniTdP({ stagione, conti, onToast }) {
  const [data, setData] = useState(null);     // { filename, importedAt, squadre:{} }
  const [loading, setLoading] = useState(true);
  const [parsing, setParsing] = useState(false);
  const [regSlug, setRegSlug] = useState(null); // slug squadra in registrazione
  const fileRef = useRef(null);

  useEffect(() => {
    if (!firebaseReady) { setLoading(false); return; }
    const ref = db.ref(`stagioni/${stagione}/iscrizioniTdP`);
    const cb = ref.on("value", snap => { setData(snap.exists() ? snap.val() : null); setLoading(false); });
    return () => ref.off("value", cb);
  }, [stagione]);

  const squadre = useMemo(() => {
    const s = (data && data.squadre) || {};
    return Object.entries(s)
      .map(([slug, t]) => ({ ...t, slug }))
      .sort((a, b) => (a.nomeSquadra || "").localeCompare(b.nomeSquadra || ""));
  }, [data]);

  // ---- import / merge dal foglio "STATO SQUADRE" ----
  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (typeof XLSX === "undefined") { alert("Libreria Excel non caricata. Ricarica la pagina."); return; }
    setParsing(true);
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array" });
        const norm = (v) => String(v == null ? "" : v).trim().toUpperCase().replace(/\s+/g, " ");
        const sheetName = wb.SheetNames.find(n => norm(n) === "STATO SQUADRE")
          || wb.SheetNames.find(n => norm(n).includes("STATO SQUADR"));
        if (!sheetName) {
          alert('Nel file non c\'è un foglio "STATO SQUADRE".\nFogli trovati: ' + wb.SheetNames.join(", "));
          setParsing(false); return;
        }
        const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, raw: true, defval: "" });
        const hIdx = aoa.findIndex(r => Array.isArray(r) && r.some(c => norm(c) === "SQUADRA"));
        if (hIdx < 0) { alert('Intestazione "SQUADRA" non trovata nel foglio.'); setParsing(false); return; }
        const header = aoa[hIdx].map(norm);
        const exact = (label) => header.findIndex(h => h === label);
        const incl = (frag) => header.findIndex(h => h.includes(frag));
        const ci = {
          squadra: exact("SQUADRA"),
          resp: exact("RESPONSABILE") >= 0 ? exact("RESPONSABILE") : incl("RESPONSAB"),
          comp: incl("COMPONENT"),
          iscr: exact("ISCRIZIONE") >= 0 ? exact("ISCRIZIONE") : incl("ISCRIZION"),
          ass: incl("ASSICURAZ"),
          tot: exact("TOTALE") >= 0 ? exact("TOTALE") : incl("TOTALE"),
          risc: exact("RISCOSSI") >= 0 ? exact("RISCOSSI") : incl("RISCOSS"),
          dar: incl("DA RISCUOTERE"),
          met: incl("METODO"),
        };
        const parsed = {};
        for (let i = hIdx + 1; i < aoa.length; i++) {
          const row = aoa[i] || [];
          const nome = String(row[ci.squadra] == null ? "" : row[ci.squadra]).trim();
          if (!nome || norm(nome).startsWith("TOTAL")) continue;
          const comp = Number(row[ci.comp]) || 0;
          const quotaIscr = (ci.iscr >= 0 ? Number(row[ci.iscr]) : 0) || 0;
          const quotaAss = (ci.ass >= 0 ? Number(row[ci.ass]) : 0) || 0;
          const totale = (ci.tot >= 0 ? Number(row[ci.tot]) : 0) || (quotaIscr + quotaAss);
          const st = parseStatoRiscossi(ci.risc >= 0 ? row[ci.risc] : "", ci.dar >= 0 ? row[ci.dar] : "");
          const metodo = ci.met >= 0 ? String(row[ci.met] || "").trim() : "";
          const deltaCassa = row.some(c => norm(c).includes("DELTA CASSA")) || norm(metodo).includes("DELTA CASSA");
          const slug = slugSquadra(nome);
          parsed[slug] = {
            slug, nomeSquadra: nome, responsabile: String(row[ci.resp] || "").trim(),
            numeroComponenti: comp, quotaIscrizione: quotaIscr, quotaAssicurazione: quotaAss,
            totaleDovuto: totale, iscrRiscossa: st.iscr, assRiscossa: st.ass, metodo, deltaCassa,
          };
        }
        if (Object.keys(parsed).length === 0) { alert("Nessuna squadra leggibile nel foglio."); setParsing(false); return; }

        // MERGE: i numeri e lo stato arrivano dal foglio, ma preservo SEMPRE la
        // registrazione contabile (reg) e le note già presenti → niente duplicati.
        const prev = (data && data.squadre) || {};
        const squadreMerge = {};
        Object.entries(parsed).forEach(([slug, p]) => {
          const old = prev[slug] || {};
          squadreMerge[slug] = { ...p, reg: old.reg || null, note: old.note || "" };
        });
        // squadre già presenti ma sparite dal foglio: le tengo (con reg) e le segnalo
        Object.entries(prev).forEach(([slug, old]) => {
          if (!squadreMerge[slug]) squadreMerge[slug] = { ...old, assenteNelFoglio: true };
        });

        const payload = { filename: file.name, importedAt: new Date().toISOString(), squadre: squadreMerge };
        if (firebaseReady) await db.ref(`stagioni/${stagione}/iscrizioniTdP`).set(payload);
        else setData(payload);
        onToast(`STATO SQUADRE importato · ${Object.keys(parsed).length} squadre (reg. contabili preservate)`);
      } catch (err) {
        alert("Errore lettura file: " + err.message);
      } finally {
        setParsing(false);
        if (fileRef.current) fileRef.current.value = "";
      }
    };
    reader.onerror = () => { alert("Impossibile leggere il file."); setParsing(false); };
    reader.readAsArrayBuffer(file);
  };

  const svuota = async () => {
    if (!confirm("Rimuovere la copia locale delle iscrizioni? (i movimenti già registrati in contabilità NON vengono toccati)")) return;
    try { await db.ref(`stagioni/${stagione}/iscrizioniTdP`).remove(); onToast("Copia locale rimossa"); }
    catch (e) { alert("Errore: " + e.message); }
  };

  // ---- modifica stato in-app ----
  const patchSquadra = async (slug, patch) => {
    try { await db.ref(`stagioni/${stagione}/iscrizioniTdP/squadre/${slug}`).update(patch); }
    catch (e) { alert("Errore: " + e.message); }
  };

  // componenti riscossi ma non ancora a libro giornale
  const pendentiDi = (t) => {
    const out = []; const reg = t.reg || {};
    if (t.iscrRiscossa && !(reg.iscr && reg.iscr.posted) && (Number(t.quotaIscrizione) || 0) > 0)
      out.push({ tipo: "iscr", label: "Iscrizione", contoPdC: CONTO_ISCRIZIONE, importo: Number(t.quotaIscrizione) || 0 });
    if (t.assRiscossa && !(reg.ass && reg.ass.posted) && (Number(t.quotaAssicurazione) || 0) > 0)
      out.push({ tipo: "ass", label: "Assicurazione", contoPdC: CONTO_ASSICURAZIONE, importo: Number(t.quotaAssicurazione) || 0 });
    return out;
  };
  // componenti registrati ma non più riscossi → da stornare
  const daStornareDi = (t) => {
    const out = []; const reg = t.reg || {};
    if (reg.iscr && reg.iscr.posted && !t.iscrRiscossa) out.push({ tipo: "iscr", label: "Iscrizione" });
    if (reg.ass && reg.ass.posted && !t.assRiscossa) out.push({ tipo: "ass", label: "Assicurazione" });
    return out;
  };

  const nPendenti = useMemo(() => squadre.reduce((s, t) => s + pendentiDi(t).length, 0), [squadre]);

  // registra le righe scelte → crea movimenti + aggiorna reg (idempotente per componente)
  const registra = async (slug, righe, dataPag) => {
    const t = (data.squadre || {})[slug]; if (!t) return;
    try {
      const regUpd = { ...(t.reg || {}) };
      for (const r of righe) {
        const importo = Math.round((Number(r.importo) || 0) * 100) / 100;
        if (importo <= 0 || !r.conto) continue;
        const mov = {
          tipo: "entrata", data: dataPag, contoLiquidita: Number(r.conto), contoLiquiditaDest: null,
          contoPdC: r.contoPdC, categoria: "ISCRIZIONI TDP", bu: "TDP", mese: meseDaData(dataPag),
          nonMonetario: false, importo,
          descrizione: (r.tipo === "ass" ? "Assicurazione TdP — " : "Iscrizione TdP — ") + t.nomeSquadra,
          origineTdP: slug, creatoIl: new Date().toISOString(), modificatoIl: new Date().toISOString(),
        };
        const ref = db.ref(`stagioni/${stagione}/movimenti`).push();
        await ref.set(mov);
        regUpd[r.tipo] = { posted: true, importo, conto: Number(r.conto), movId: ref.key, registratoIl: mov.creatoIl };
      }
      await db.ref(`stagioni/${stagione}/iscrizioniTdP/squadre/${slug}/reg`).set(regUpd);
      onToast(`Scrittura registrata · ${t.nomeSquadra}`);
      setRegSlug(null);
    } catch (e) { alert("Errore: " + e.message); }
  };

  const annullaRegistrazione = async (t) => {
    const reg = t.reg || {};
    const ids = [reg.iscr && reg.iscr.movId, reg.ass && reg.ass.movId].filter(Boolean);
    const msg = ids.length > 0
      ? `Annullare la registrazione contabile di "${t.nomeSquadra}"?\nVerranno rimossi ${ids.length} movimento/i dal libro giornale.`
      : `Annullare la registrazione di "${t.nomeSquadra}"?\n(era segnata come "già registrata", nessun movimento da rimuovere)`;
    if (!confirm(msg)) return;
    try {
      for (const id of ids) await db.ref(`stagioni/${stagione}/movimenti/${id}`).remove();
      await db.ref(`stagioni/${stagione}/iscrizioniTdP/squadre/${t.slug}/reg`).set(null);
      onToast("Registrazione annullata");
    } catch (e) { alert("Errore: " + e.message); }
  };

  // marca le quote come GIÀ a libro giornale, senza creare movimenti
  const segnaGiaRegistrata = async (slug, righe) => {
    const t = (data.squadre || {})[slug]; if (!t || !righe || righe.length === 0) return;
    const lab = righe.map(r => r.label).join(" + ");
    if (!confirm(`Segnare ${lab} di "${t.nomeSquadra}" come GIÀ registrata in contabilità?\nNon verrà creato nessun movimento (utile se l'avevi già messa a libro giornale).`)) return;
    try {
      const regUpd = { ...(t.reg || {}) };
      righe.forEach(r => {
        regUpd[r.tipo] = { posted: true, manuale: true, importo: Math.round((Number(r.importo) || 0) * 100) / 100, conto: null, movId: null, registratoIl: new Date().toISOString() };
      });
      await db.ref(`stagioni/${stagione}/iscrizioniTdP/squadre/${slug}/reg`).set(regUpd);
      onToast(`Segnata come già registrata · ${t.nomeSquadra}`);
      setRegSlug(null);
    } catch (e) { alert("Errore: " + e.message); }
  };

  const kpi = useMemo(() => {
    let dovuto = 0, riscosso = 0, registrato = 0;
    squadre.forEach(t => {
      dovuto += Number(t.totaleDovuto) || 0;
      if (t.iscrRiscossa) riscosso += Number(t.quotaIscrizione) || 0;
      if (t.assRiscossa) riscosso += Number(t.quotaAssicurazione) || 0;
      const reg = t.reg || {};
      if (reg.iscr && reg.iscr.posted) registrato += Number(reg.iscr.importo) || 0;
      if (reg.ass && reg.ass.posted) registrato += Number(reg.ass.importo) || 0;
    });
    return { dovuto, riscosso, daRiscuotere: dovuto - riscosso, registrato, nSquadre: squadre.length };
  }, [squadre]);

  const badge = (t) => {
    const reg = t.reg || {};
    const iscrP = reg.iscr && reg.iscr.posted, assP = reg.ass && reg.ass.posted;
    if (daStornareDi(t).length > 0) return <span className="pill" style={{ background: "#fff3e0", borderColor: "#f0d6a8", color: "#e65100" }}>da stornare</span>;
    if (pendentiDi(t).length > 0) return <span className="pill" style={{ background: "var(--danger-soft)", borderColor: "#f1d6d6", color: "var(--danger)" }}>da registrare</span>;
    if (iscrP || assP) {
      const man = (iscrP && reg.iscr.manuale) || (assP && reg.ass.manuale);
      return <span className="pill" style={{ background: "var(--accent-soft)", borderColor: "#c8d8ce", color: "var(--accent-ink)" }} title={man ? "Segnata come già a libro giornale (nessun movimento creato)" : "Movimenti creati a libro giornale"}>{man ? "già registrata" : "registrato"}</span>;
    }
    return <span className="pill" style={{ color: "var(--ink-3)" }}>—</span>;
  };

  const regSquadra = regSlug ? squadre.find(s => s.slug === regSlug) : null;

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Iscrizioni TdP</h2>
          <div className="sub">Copia locale dal foglio <span className="mono">STATO SQUADRE</span> · {kpi.nSquadre} squadre · le scritture si registrano a mano</div>
        </div>
      </div>

      <div className="card" style={{ maxWidth: 820 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
          <div>
            <h3 className="card-title" style={{ margin: "0 0 4px" }}>Importa STATO SQUADRE</h3>
            <div style={{ fontSize: 12.5, color: "var(--ink-2)", maxWidth: 520 }}>
              Carica il file Excel del campo: leggo il foglio <span className="mono">STATO SQUADRE</span> e ne tengo una copia locale stabile.
              Re-importando aggiorno numeri e stato, ma le registrazioni contabili già fatte vengono <strong>sempre preservate</strong> (nessun duplicato).
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={onFile} style={{ display: "none" }} />
            <button className="btn accent" disabled={parsing} onClick={() => fileRef.current && fileRef.current.click()}>
              {parsing ? "Lettura…" : (data ? "Reimporta" : "Importa Excel")}
            </button>
            {data && <button className="btn ghost" onClick={svuota}>Svuota</button>}
          </div>
        </div>
        {data && (
          <div style={{ marginTop: 12, fontSize: 12, color: "var(--ink-3)" }}>
            <span className="mono">{data.filename}</span> · importato il {fmtDate(data.importedAt)}
          </div>
        )}
      </div>

      {kpi.nSquadre > 0 && (
        <div className="kpi-grid" style={{ marginTop: 20 }}>
          <div className="kpi">
            <div className="label">Totale dovuto</div>
            <div className="value">{fmtEuro(kpi.dovuto)}</div>
            <div className="hint">{kpi.nSquadre} squadre</div>
          </div>
          <div className="kpi accent">
            <div className="label">Riscosso (dichiarato)</div>
            <div className="value">{fmtEuro(kpi.riscosso)}</div>
            <div className="hint">stato dal foglio / app</div>

function RegistrazioneTdPModal({ squadra, pendenti, onConfirm, onGiaRegistrata, onClose }) {
  const contoGuess = contoLiquiditaDaMetodo(squadra.metodo);
  const [righe, setRighe] = useState(pendenti.map(p => ({ ...p, conto: contoGuess, importo: String(p.importo) })));
  const [dataPag, setDataPag] = useState(todayISO());
  const setRiga = (i, patch) => setRighe(rs => rs.map((r, idx) => idx === i ? { ...r, ...patch } : r));
  const totale = righe.reduce((s, r) => s + (Number(r.importo) || 0), 0);

  const submit = (e) => {
    e.preventDefault();
    const valide = righe
      .map(r => ({ ...r, importo: Number(r.importo) || 0, conto: Number(r.conto) }))
      .filter(r => r.importo > 0 && r.conto);
    if (valide.length === 0) return alert("Nessuna riga valida da registrare.");
    onConfirm(squadra.slug, valide, dataPag);
  };

  const giaRegistrata = () => {
    const valide = righe.map(r => ({ ...r, importo: Number(r.importo) || 0 })).filter(r => r.importo > 0);
    if (valide.length === 0) return alert("Nessuna riga valida.");
    onGiaRegistrata(squadra.slug, valide);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>Scrittura suggerita — {squadra.nomeSquadra}</h3>
          <button className="btn ghost sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{ fontSize: 12.5, color: "var(--ink-2)", marginBottom: 12 }}>
            Metodo dichiarato: <strong>{squadra.metodo || "—"}</strong>{squadra.deltaCassa ? " · Delta cassa" : ""}.
            Controlla conto di liquidità e importo, poi conferma. <strong>Niente viene scritto finché non premi Registra.</strong>
          </div>
          <form className="form-grid" onSubmit={submit}>
            {righe.map((r, i) => (
              <div key={i} style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span className="pill" style={{ flex: "0 0 96px" }}>{r.label}</span>
                <span style={{ flex: "0 0 60px", fontSize: 11.5, color: "var(--ink-3)" }}>→ conto {r.contoPdC}</span>
                <input type="number" inputMode="decimal" step="0.01" value={r.importo}
                       onChange={e => setRiga(i, { importo: e.target.value })} style={{ flex: "0 0 110px" }} />
                <select value={r.conto} onChange={e => setRiga(i, { conto: Number(e.target.value) })} style={{ flex: 1 }}>
                  {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{String(c.codice).padStart(2, "0")} · {c.nome.trim()}</option>)}
                </select>
              </div>
            ))}
            <div className="form-row">
              <label>Data registrazione</label>
              <input type="date" value={dataPag} onChange={e => setDataPag(e.target.value)} required />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 12px", background: "var(--panel-2)", border: "1px solid var(--rule)", borderRadius: 6, fontSize: 13 }}>
              <span>Totale da registrare:</span><strong className="mono">{fmtEuro(totale)}</strong>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12, paddingTop: 14, borderTop: "1px solid var(--rule)", flexWrap: "wrap" }}>
              <button type="button" className="btn ghost" onClick={onClose}>Annulla</button>
              <button type="button" className="btn ghost" title="Marca come già a libro giornale, senza creare movimenti" onClick={giaRegistrata}>Già registrata</button>
              <button type="submit" className="btn accent">Registra in contabilità</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}
