        <div className="kpi accent"><div className="label">Flusso netto</div><div className={"value " + (flussoNetto < 0 ? "neg" : "")}>{fmtEuro(flussoNetto)}</div><div className="hint">Disp. {fmt(rf.openingTot)} → {fmt(rf.closing)}</div></div>
      </div>

      <div className="tbl-wrap rf-compact" style={{overflowX:"auto", marginTop:8}}>
        <table className="tbl" style={{fontSize:11}}>
          <thead>
            <tr>
              <th style={{minWidth:150, position:"sticky", left:0, background:"var(--panel-2)", zIndex:2}}>Voce</th>
              {mostraMesi && mesiVis.map(m => <th key={m} className="num" style={{textTransform:"capitalize", minWidth:50}}>{m.slice(0,3)}</th>)}
              <th className="num" style={{minWidth:84, background:"var(--panel-2)"}}>Totale</th>
            </tr>
          </thead>
          <tbody>
            {/* DISP. INIZIALI */}
            <tr style={{fontWeight:700}}>
              <td style={{position:"sticky", left:0, background:"var(--panel)"}}>DISP. INIZIALI</td>
              {mostraMesi && mesiVis.map(m => <td key={m} className="num">{fmt(rf.dispIniz[m])}</td>)}
              <td className="num">{fmt(rf.openingTot)}</td>
            </tr>

            {/* ENTRATE */}
            <RigaHeader label="Riepilogo entrate" sezKey="entrate" />
            {!collapsed.entrate && (catEntrate.length === 0
              ? <RigaVuota label="nessuna entrata" />
              : catEntrate.map(cat => <RigaCat key={cat} sezione="entrate" cat={cat} mesi={rf.entrate[cat]} classCol="pos" />))}
            <RigaTotale label="TOTALE ENTRATE OPERATIVE (A)" perMese={rf.totEntrate} tot={rf.grandEntrate} classCol="pos" />

            {/* USCITE */}
            <RigaHeader label="Riepilogo uscite" sezKey="uscite" />
            {!collapsed.uscite && (catUscite.length === 0
              ? <RigaVuota label="nessuna uscita" />
              : catUscite.map(cat => <RigaCat key={cat} sezione="uscite" cat={cat} mesi={rf.usciteOp[cat]} classCol="neg" />))}
            <RigaTotale label="TOTALE USCITE OPERATIVE (B)" perMese={rf.totUsciteOp} tot={rf.grandUsciteOp} classCol="neg" />

            {/* SALDO OPERATIVO */}
            <RigaTotale label="SALDO OPERATIVO (A − B)" perMese={rf.saldoOp} tot={rf.grandSaldoOp} strong />

            {/* INVESTIMENTI */}
            <RigaHeader label="Riepilogo investimenti" sezKey="investimenti" />
            {!collapsed.investimenti && (catInvest.length === 0
              ? <RigaVuota label="nessun investimento" />
              : catInvest.map(cat => <RigaCat key={cat} sezione="investimenti" cat={cat} mesi={rf.investimenti[cat]} classCol="neg" />))}
            <RigaTotale label="TOTALE INVESTIMENTI" perMese={rf.totInvest} tot={rf.grandInvest} classCol="neg" />

            {/* DISP. FINALI */}
            <tr style={{fontWeight:700, background:"var(--panel-2)", borderTop:"2px solid var(--ink)"}}>
              <td style={{position:"sticky", left:0, background:"var(--panel-2)", fontFamily:"'Fraunces',serif"}}>DISP. FINALI</td>
              {mostraMesi && mesiVis.map(m => <td key={m} className="num">{fmt(rf.dispFin[m])}</td>)}
              <td className="num">{fmt(rf.closing)}</td>
            </tr>
            {/* VARIAZIONE % */}
            <tr style={{color:"var(--ink-2)", fontSize:11.5}}>
              <td style={{position:"sticky", left:0, background:"var(--panel)"}}>Variazione %</td>
              {mostraMesi && mesiVis.map(m => <td key={m} className="num" style={{color: rf.variaz[m] < 0 ? "var(--danger)" : "var(--accent-ink)"}}>{fmtPct(rf.variaz[m])}</td>)}
              <td className="num" style={{color: rf.variazTot < 0 ? "var(--danger)" : "var(--accent-ink)", fontWeight:600}}>{fmtPct(rf.variazTot)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style={{marginTop:14, fontSize:11.5, color:"var(--ink-3)"}}>
        Suggerimento: i mesi senza movimenti sono nascosti. Usa <strong>"Solo totali"</strong> per la vista più compatta, e clicca le intestazioni di sezione (o "Raggruppa tutto") per vedere solo i totali di riga. Gli <strong>investimenti</strong> sono le uscite su conti immobilizzazione; ammortamenti e giroconti sono esclusi perché non incidono sulla liquidità.
      </div>

      {drillDown && (
        <div className="modal-bg" onClick={() => setDrillDown(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:760}}>
            <div className="modal-head">
              <h3>
                {drillDown.sezione === "entrate" ? "↓ Entrate" : drillDown.sezione === "investimenti" ? "⚒ Investimenti" : "↑ Uscite"} · {drillDown.categoria} · <span style={{textTransform:"capitalize"}}>{drillDown.mese === "__tot__" ? "tutti i mesi" : drillDown.mese}</span>
              </h3>
              <button className="btn ghost sm" onClick={() => setDrillDown(null)}>✕</button>
            </div>
            <div className="modal-body">
              {drillDown.movs.length === 0 ? (
                <div className="empty-state">Nessun movimento</div>
              ) : (
                <table className="tbl">
                  <thead>
                    <tr>
                      <th style={{width:90}}>Data</th>
                      <th>Descrizione</th>
                      <th>BU</th>
                      <th className="num" style={{width:100}}>Importo</th>
                    </tr>
                  </thead>
                  <tbody>
                    {drillDown.movs.sort((a,b) => (a.data || "").localeCompare(b.data || "")).map((m,i) => (
                      <tr key={m._id || i}>
                        <td>{fmtDate(m.data)}</td>
                        <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>(senza descrizione)</span>}</td>
                        <td><span className="pill">{m.bu || "—"}</span></td>
                        <td className={"num " + (drillDown.sezione === "entrate" ? "pos" : "neg")}>{fmt(m.importo)}</td>
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                      <td colSpan={3}>TOTALE</td>
                      <td className="num">{fmt(drillDown.movs.reduce((s,m) => s + m.importo, 0))}</td>
                    </tr>
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// COMPONENTE: GESTIONE CATEGORIE (sotto-sezione del Rendiconto)
// ============================================================
function CategorieManager({ stagione, categorieRF, movimenti, aperto, onToggle, onToast }) {
  const [nuovaE, setNuovaE] = useState("");
  const [nuovaU, setNuovaU] = useState("");

  // Conteggio utilizzi per categoria, separato per tipo
  const usoConta = useMemo(() => {
    const e = {}, u = {};
    (movimenti || []).forEach(m => {
      const c = (m.categoria || "").trim();
      if (!c) return;
      if (m.tipo === "entrata") e[c] = (e[c] || 0) + 1;
      else if (m.tipo === "uscita") u[c] = (u[c] || 0) + 1;
    });
    return { entrate: e, uscite: u };
  }, [movimenti]);

  // Liste effettive = gestite ∪ rilevate dai movimenti
  const liste = useMemo(() => mergeCategorie(categorieRF, movimenti), [categorieRF, movimenti]);
  const gestite = {
    entrate: new Set((categorieRF && categorieRF.entrate) || []),
    uscite: new Set((categorieRF && categorieRF.uscite) || []),
  };
  const invManaged = (categorieRF && categorieRF.investimenti) || [];
  const invSet = new Set(invManaged);
  // Default: se nessuna categoria è marcata, "INVESTIMENTI" è considerata investimento
  const invEffettivo = (cat) => invSet.size ? invSet.has(cat) : ((cat || "").toUpperCase() === "INVESTIMENTI");

  const salvaInvest = async (lista) => {
    if (!firebaseReady || !stagione) return;
    const pulita = Array.from(new Set(lista.map(s => s.trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
    await db.ref(`stagioni/${stagione}/categorieRF/investimenti`).set(pulita);
  };

  const toggleInvest = async (nome) => {
    let base = invSet.size ? Array.from(invSet) : ((nome || "").toUpperCase() === "INVESTIMENTI" ? [] : ["INVESTIMENTI"]);
    // se parto dal default implicito e accendo una categoria diversa, mantengo anche INVESTIMENTI
    const next = base.includes(nome) ? base.filter(c => c !== nome) : [...base, nome];
    await salvaInvest(next);
    if (onToast) onToast(next.includes(nome) ? "Segnata come investimento" : "Tolta dagli investimenti");
  };

  const salva = async (tipo, lista) => {
    if (!firebaseReady || !stagione) return;
    const pulita = Array.from(new Set(lista.map(s => s.trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
    await db.ref(`stagioni/${stagione}/categorieRF/${tipo}`).set(pulita);
  };

  const aggiungi = async (tipo) => {
    const val = (tipo === "entrate" ? nuovaE : nuovaU).trim();
    if (!val) return;
    const attuali = Array.from(gestite[tipo]);
    if (attuali.some(c => c.toLowerCase() === val.toLowerCase())) { alert("Categoria già presente."); return; }
    await salva(tipo, [...attuali, val]);
    if (tipo === "entrate") setNuovaE(""); else setNuovaU("");
    if (onToast) onToast("Categoria aggiunta");
  };

  const rinomina = async (tipo, vecchio) => {
    const nuovo = prompt(`Rinomina categoria "${vecchio}" in:`, vecchio);
    if (!nuovo || nuovo.trim() === vecchio) return;
    const nome = nuovo.trim();
    // aggiorno la lista gestita
    const attuali = Array.from(gestite[tipo]).map(c => c === vecchio ? nome : c);
    await salva(tipo, attuali);
    // se era marcata come investimento, aggiorno anche quell'elenco
    if (invSet.has(vecchio)) await salvaInvest(Array.from(invSet).map(c => c === vecchio ? nome : c));
    // cascata sui movimenti che usano la vecchia categoria (dello stesso tipo)
    const tipoMov = tipo === "entrate" ? "entrata" : "uscita";
    const daAgg = (movimenti || []).filter(m => m.tipo === tipoMov && (m.categoria || "").trim() === vecchio);
    if (daAgg.length && confirm(`Aggiornare anche i ${daAgg.length} movimenti che usano "${vecchio}"?`)) {
      const updates = {};
      daAgg.forEach(m => { updates[`${m._id}/categoria`] = nome; });
      await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
    }
    if (onToast) onToast("Categoria rinominata");
  };

  const elimina = async (tipo, nome) => {
    const inUso = (usoConta[tipo][nome] || 0);
    if (inUso > 0) {
      alert(`Non posso eliminarla: è usata da ${inUso} movimenti. Rinominala o riassegna prima quei movimenti.`);
      return;
    }
    if (!confirm(`Eliminare la categoria "${nome}"?`)) return;
    await salva(tipo, Array.from(gestite[tipo]).filter(c => c !== nome));
    if (invSet.has(nome)) await salvaInvest(Array.from(invSet).filter(c => c !== nome));
    if (onToast) onToast("Categoria eliminata");
  };

  const colonna = (tipo, label, lista, nuova, setNuova) => (
    <div style={{flex:1, minWidth:240}}>
      <div style={{fontWeight:700, fontSize:12, textTransform:"uppercase", letterSpacing:".04em", color:"var(--ink-2)", marginBottom:8}}>{label}</div>
      <div style={{display:"flex", gap:6, marginBottom:10}}>
        <input type="text" value={nuova} onChange={e => setNuova(e.target.value)}
               onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); aggiungi(tipo); } }}
               placeholder="Nuova categoria…" style={{flex:1, padding:"5px 8px", border:"1px solid var(--rule)", borderRadius:5, fontSize:12.5}}/>
        <button className="btn accent sm" onClick={() => aggiungi(tipo)}>+ Aggiungi</button>
      </div>
      <div style={{display:"flex", flexDirection:"column", gap:4}}>
        {lista.length === 0 && <div style={{fontSize:12, color:"var(--ink-3)"}}>Nessuna categoria.</div>}
        {lista.map(c => {
          const inUso = usoConta[tipo][c] || 0;
          const soloRilevata = !gestite[tipo].has(c);
          const isInv = tipo === "uscite" && invEffettivo(c);
          return (
            <div key={c} style={{display:"flex", alignItems:"center", gap:8, padding:"4px 8px", border:"1px solid var(--rule)",
                 borderRadius:5, background: soloRilevata ? "var(--panel-2)" : "var(--panel)"}}>
              <span style={{flex:1, fontSize:12.5}}>{c}</span>
              {inUso > 0 && <span className="pill" style={{fontSize:9.5}}>{inUso} mov.</span>}
              {isInv && <span className="pill" style={{fontSize:9.5, background:"#e8eef0", color:"#345", borderColor:"#cdd8de"}}>investimento{!invSet.size ? " (default)" : ""}</span>}
              {soloRilevata && <span className="pill" style={{fontSize:9.5, background:"#fff3e0", color:"#e65100", borderColor:"#f0d6a8"}}>solo nei dati</span>}
              {tipo === "uscite" && (
                <button className="btn ghost sm" title={isInv ? "Togli dagli investimenti" : "Segna come investimento"}
                        onClick={() => toggleInvest(c)} style={{opacity: isInv ? 1 : 0.5}}>💰</button>
              )}
              {soloRilevata
                ? <button className="btn ghost sm" title="Aggiungi all'elenco gestito" onClick={() => salva(tipo, [...Array.from(gestite[tipo]), c]).then(()=>onToast && onToast("Categoria adottata"))}>adotta</button>
                : <>
                    <button className="btn ghost sm" title="Rinomina" onClick={() => rinomina(tipo, c)}>✎</button>
                    <button className="btn danger sm" title="Elimina" onClick={() => elimina(tipo, c)}>🗑</button>
                  </>}
            </div>
          );
        })}
      </div>
    </div>
  );

  return (
    <div className="card" style={{padding:0, overflow:"hidden"}}>
      <div onClick={onToggle} style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:12,
           padding:"12px 16px", cursor:"pointer", background:"var(--panel-2)"}}>
        <div>
          <strong style={{fontSize:14}}>⚙ Gestione categorie</strong>
          <span style={{fontSize:12, color:"var(--ink-3)", marginLeft:8}}>
            {liste.entrate.length} entrate · {liste.uscite.length} uscite — sono le opzioni selezionabili nei movimenti
          </span>
        </div>
        <span style={{fontSize:13, color:"var(--ink-2)"}}>{aperto ? "▾ chiudi" : "▸ apri"}</span>
      </div>
      {aperto && (
        <div style={{padding:16}}>
          <div style={{display:"flex", gap:24, flexWrap:"wrap"}}>
            {colonna("entrate", "Categorie entrate", liste.entrate, nuovaE, setNuovaE)}
            {colonna("uscite", "Categorie uscite", liste.uscite, nuovaU, setNuovaU)}
          </div>
          <div style={{marginTop:12, fontSize:11.5, color:"var(--ink-3)"}}>
            Le categorie qui elencate sono quelle proposte nel form dei movimenti (contabilità generale). Le uscite con 💰 attivo finiscono nella sezione <strong>Investimenti</strong> del rendiconto invece che nelle uscite operative (di default è solo la categoria "INVESTIMENTI"). Quelle marcate <span className="pill" style={{fontSize:9.5, background:"#fff3e0", color:"#e65100", borderColor:"#f0d6a8"}}>solo nei dati</span> esistono nei movimenti ma non nell'elenco gestito: premi <strong>adotta</strong> per renderle ufficiali. Rinominando una categoria puoi aggiornare anche i movimenti collegati.
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// PAGINA: PIVOT CONTI (analisi per conto del Piano dei Conti)
// ============================================================
function PagePivotConti({ conti, movimenti, saldiIniziali }) {
  const [vista, setVista] = useState("uscite"); // uscite | entrate | tutti
  const [layout, setLayout] = useState("saldo"); // saldo | mensile
  const [filterCategoria, setFilterCategoria] = useState("");
  const [drillDown, setDrillDown] = useState(null);
  const [sortBy, setSortBy] = useState("totale"); // totale | nome | impatto

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Categorie disponibili
  const categorie = useMemo(() => {
    const set = new Set();
    Object.values(contiMap).forEach(c => { if (c.categoria) set.add(c.categoria); });
    return [...set].sort();
  }, [contiMap]);

  // Matrice contoPdC × mese — calcolo saldo NETTO contabile (variazione partita doppia)
  // Per ogni movimento determino se il conto P.d.C. va in DARE o AVERE:
  //   Entrata + monetaria (liquidità):   DARE liquidità / AVERE PdC → PdC in AVERE
  //   Entrata + non monetaria (apertura): DARE PdC / AVERE 60        → PdC in DARE
  //   Uscita + monetaria (liquidità):    DARE PdC / AVERE liquidità  → PdC in DARE
  //   Uscita + non monetaria (apertura): DARE 60 / AVERE PdC          → PdC in AVERE
  // Poi visualizzo nel SEGNO NATURALE del conto (DARE per costi/imm/crediti, AVERE per ricavi/debiti/PN)
  const tabella = useMemo(() => {
    const matrice = {};
    const dettagli = {};

    movimenti.forEach(m => {
      if (!m.contoPdC) return;
      if (m.tipo !== "entrata" && m.tipo !== "uscita") return;

      // Filtro per vista
      if (vista === "uscite" && m.tipo !== "uscita") return;
      if (vista === "entrate" && m.tipo !== "entrata") return;

      const cod = m.contoPdC;
      const mese = m.mese || "?";
      const conto = contiMap[cod];
      if (!matrice[cod]) matrice[cod] = {};
      if (!dettagli[cod]) dettagli[cod] = {};
      if (!dettagli[cod][mese]) dettagli[cod][mese] = [];

      // 1) Determino se il PdC va in DARE o AVERE
      let inDare;
      if (m.scritturaComposta && (m.dare > 0 || m.avere > 0)) {
        // Per scritture composte uso direttamente i campi dare/avere espliciti
        inDare = (m.dare || 0) > 0;
      } else {
        const hasLiq = !!m.contoLiquidita;
        if (m.tipo === "entrata") {
          inDare = !hasLiq; // monetaria → AVERE, non monetaria → DARE
        } else {
          inDare = hasLiq;  // monetaria → DARE, non monetaria → AVERE
        }
      }

      // 2) Calcolo la variazione nel "segno naturale del conto"
      const ecc = (conto?.eccedenza || "DARE").toUpperCase();
      const isAvereNat = ecc.includes("AVERE") && !ecc.includes("DARE/AVERE");
      let variazione;
      if (isAvereNat) {
        // Conto AVERE naturale (debiti, ricavi, PN, fondi): in AVERE = positivo
        variazione = inDare ? -m.importo : m.importo;
      } else {
        // Conto DARE naturale (costi, immobilizzazioni, crediti): in DARE = positivo
        variazione = inDare ? m.importo : -m.importo;
      }

      matrice[cod][mese] = (matrice[cod][mese] || 0) + variazione;
      dettagli[cod][mese].push(m);
    });
    return { matrice, dettagli };
  }, [movimenti, vista, contiMap]);

  // Filtra per categoria (e nasconde conti con saldo netto zero)
  const contiFiltrati = useMemo(() => {
    return Object.entries(tabella.matrice)
      .filter(([cod]) => {
        if (!filterCategoria) return true;
        return contiMap[cod]?.categoria === filterCategoria;
      })
      .map(([cod, mesi]) => ({
        codice: Number(cod),
        nome: contiMap[cod]?.nome || `Conto ${cod}`,
        categoria: contiMap[cod]?.categoria || "",
        mesi,
        totale: Object.values(mesi).reduce((s,v) => s+v, 0),
      }))
      .filter(c => Math.abs(c.totale) > 0.01); // nascondo conti con saldo netto zero
  }, [tabella, filterCategoria, contiMap]);

  const totGenerale = contiFiltrati.reduce((s,c) => s + c.totale, 0);

  // Sort
  const contiOrdinati = useMemo(() => {
    const arr = [...contiFiltrati];
    if (sortBy === "totale") arr.sort((a,b) => Math.abs(b.totale) - Math.abs(a.totale));
    else if (sortBy === "nome") arr.sort((a,b) => a.nome.localeCompare(b.nome));
    else if (sortBy === "impatto") arr.sort((a,b) => Math.abs(b.totale) - Math.abs(a.totale));
    else arr.sort((a,b) => a.codice - b.codice);
    return arr;
  }, [contiFiltrati, sortBy]);

  // Totali per mese
  const totaliMese = useMemo(() => {
    const tot = {};
    MESI.forEach(m => tot[m] = 0);
    contiFiltrati.forEach(c => {
      Object.entries(c.mesi).forEach(([m, v]) => {
        if (tot[m] !== undefined) tot[m] += v;
      });
    });
    return tot;
  }, [contiFiltrati]);

  const apriDrill = (conto, mese) => {
    const movs = tabella.dettagli[conto.codice]?.[mese] || [];
    setDrillDown({ conto, mese, movs });
  };

  const apriDrillTutto = (conto) => {
    const perMese = tabella.dettagli[conto.codice] || {};
    const movs = Object.values(perMese).flat();
    setDrillDown({ conto, mese: "tutti i mesi", movs });
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Pivot Conti</h2>
          <div className="sub">Analisi per conto del Piano dei Conti · click su una cella per i dettagli</div>
        </div>
      </div>

      <div className="filters">
        <span className="label">Vista:</span>
        <select value={vista} onChange={e => setVista(e.target.value)}>
          <option value="uscite">Solo uscite</option>
          <option value="entrate">Solo entrate</option>
          <option value="tutti">Tutti i movimenti</option>
        </select>
        <span className="label">Dettaglio:</span>
        <select value={layout} onChange={e => setLayout(e.target.value)}>
          <option value="saldo">Solo saldo</option>
          <option value="mensile">Per mese</option>
        </select>
        <span className="label">Categoria:</span>
        <select value={filterCategoria} onChange={e => setFilterCategoria(e.target.value)}>
          <option value="">Tutte</option>
          {categorie.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <span className="label">Ordina per:</span>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
          <option value="totale">Totale (decrescente)</option>
          <option value="nome">Nome conto</option>
          <option value="codice">Codice</option>
        </select>
      </div>

      <div className="kpi-grid">
        <div className="kpi accent">
          <div className="label">Totale {vista === "entrate" ? "Entrate" : vista === "uscite" ? "Uscite" : "Movimenti"}</div>
          <div className="value">{fmtEuro(totGenerale)}</div>
          <div className="hint">{contiFiltrati.length} conti attivi</div>
        </div>
        {contiOrdinati.slice(0, 3).map((c, i) => (
          <div key={c.codice} className="kpi">
            <div className="label">{i === 0 ? "Top" : (i+1)+"°"} conto</div>
            <div className="value" style={{fontSize: 18, lineHeight: 1.2}}>{c.nome.trim().slice(0, 22)}</div>
            <div className="hint">{fmtEuro(c.totale)} · {totGenerale > 0 ? (c.totale / totGenerale * 100).toFixed(1) : 0}%</div>
          </div>
        ))}
      </div>

      <div className="tbl-wrap" style={{overflowX:"auto", marginTop:18}}>
        <table className="tbl" style={{fontSize:12}}>
          <thead>
            <tr>
              <th style={{minWidth:230, position:"sticky", left:0, background:"var(--panel-2)", zIndex:2}}>Conto</th>
              {layout === "mensile" && MESI.map(m => <th key={m} className="num" style={{textTransform:"capitalize", minWidth:75}}>{m.slice(0,3)}</th>)}
              <th className="num" style={{minWidth:95, background:"var(--panel-2)"}}>{layout === "mensile" ? "Totale" : "Saldo"}</th>
              <th className="num" style={{minWidth:65, background:"var(--panel-2)"}}>%</th>
            </tr>
          </thead>
          <tbody>
            {contiOrdinati.map(c => {
              const pct = totGenerale !== 0 ? Math.abs(c.totale / totGenerale * 100) : 0;
              // Determina colore in base alla natura del conto
              const ecc = (contiMap[c.codice]?.eccedenza || "DARE").toUpperCase();
              const isAvereNat = ecc.includes("AVERE") && !ecc.includes("DARE/AVERE");
              const naturaCol = isAvereNat ? "pos" : "neg"; // ricavi/debiti = verde, costi/imm = rosso
              return (
                <tr key={c.codice}>
                  <td style={{position:"sticky", left:0, background:"var(--panel)"}}>
                    <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                      <span className="mono" style={{fontSize:10.5, color:"var(--ink-3)"}}>{String(c.codice).padStart(2,"0")}</span>
                      <span style={{fontWeight:500}}>{c.nome.trim()}</span>
                    </div>
                    {c.categoria && <div style={{fontSize:10.5, color:"var(--ink-3)", marginTop:1}}>{c.categoria}</div>}
                  </td>
                  {layout === "mensile" && MESI.map(m => {
                    const v = c.mesi[m];
                    if (!v) return <td key={m} className="num"></td>;
                    // Mostro segno se valore negativo (= movimento contro natura del conto)
                    const cellClass = v < 0 ? "neg" : naturaCol;
                    return (
                      <td key={m} className={"num " + cellClass}
                          style={{cursor:"pointer", textDecoration:"underline dotted"}}
                          onClick={() => apriDrill(c, m)}
                          title="Click per dettagli">
                        {v < 0 ? "−" + fmt(Math.abs(v)) : fmt(v)}
                      </td>
                    );
                  })}
                  <td className={"num " + (c.totale < 0 ? "neg" : naturaCol)}
                      style={{fontWeight:700, cursor: layout === "saldo" ? "pointer" : "default", textDecoration: layout === "saldo" ? "underline dotted" : "none"}}
                      onClick={layout === "saldo" ? () => apriDrillTutto(c) : undefined}
                      title={layout === "saldo" ? "Click per dettagli" : undefined}>
                    {c.totale < 0 ? "−" + fmt(Math.abs(c.totale)) : fmt(c.totale)}
                  </td>
                  <td className="num" style={{fontWeight:600, color: pct > 20 ? "var(--accent-ink)" : "var(--ink-2)"}}>
                    {pct.toFixed(1)}%
                  </td>
                </tr>
              );
            })}
            <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
              <td style={{position:"sticky", left:0, background:"var(--panel-2)", fontFamily:"'Fraunces',serif"}}>TOTALE</td>
              {layout === "mensile" && MESI.map(m => <td key={m} className="num">{totaliMese[m] ? fmt(totaliMese[m]) : ""}</td>)}
              <td className="num">{fmt(totGenerale)}</td>
              <td className="num">100%</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style={{marginTop:18, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12, color:"var(--ink-2)"}}>
        <strong>💡 Come leggere.</strong> I valori mostrano il <strong>saldo contabile netto</strong> del conto (DARE − AVERE per costi/immobilizzazioni/crediti; AVERE − DARE per ricavi/debiti/PN). Un saldo zero significa che il conto si è chiuso (es. debito aperto e pagato nello stesso periodo). Filtra per categoria per concentrarti su un sottoinsieme. La percentuale è calcolata sul totale visibile. Click su una cella per vedere le singole transazioni che la compongono.
      </div>

      {drillDown && (
        <div className="modal-bg" onClick={() => setDrillDown(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:760}}>
            <div className="modal-head">
              <h3>
                {String(drillDown.conto.codice).padStart(2,"0")} {drillDown.conto.nome.trim()} · <span style={{textTransform:"capitalize"}}>{drillDown.mese}</span>
              </h3>
              <button className="btn ghost sm" onClick={() => setDrillDown(null)}>✕</button>
            </div>
            <div className="modal-body">
              {drillDown.movs.length === 0 ? (
                <div className="empty-state">Nessun movimento</div>
              ) : (
                <table className="tbl">
                  <thead>
                    <tr>
                      <th style={{width:90}}>Data</th>
                      <th>Descrizione</th>
                      <th>Categoria</th>
                      <th className="num" style={{width:100}}>Importo</th>
                    </tr>
                  </thead>
                  <tbody>
                    {drillDown.movs.sort((a,b) => (a.data || "").localeCompare(b.data || "")).map((m,i) => (
                      <tr key={m._id || i}>
                        <td>{fmtDate(m.data)}</td>
                        <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>(senza descrizione)</span>}</td>
                        <td><span className="pill">{m.categoria || "—"}</span></td>
                        <td className={"num " + (m.tipo === "entrata" ? "pos" : "neg")}>{m.tipo === "entrata" ? "+" : "−"}{fmt(m.importo)}</td>
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                      <td colSpan={3}>TOTALE</td>
                      <td className="num">{fmt(drillDown.movs.reduce((s,m) => s + m.importo, 0))}</td>
                    </tr>
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// PAGINA: CONTROLLER (contabilità analitica)
// ============================================================
function PageController({ conti, movimenti, saldiIniziali, stagione, onToast }) {
  const [tab, setTab] = useState("bu");
  const [budget, setBudget] = useState({});
  const [budgetEditing, setBudgetEditing] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Carica budget da Firebase
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`stagioni/${stagione}/budget`);
    const cb = ref.on("value", snap => setBudget(snap.val() || {}));
    return () => ref.off("value", cb);
  }, [stagione]);

  // ============== ANALISI PER BU ==============
  const analisiBU = useMemo(() => {
    const bu = {};
    BUSINESS_UNITS.forEach(b => { bu[b] = { ricavi: 0, costi: 0, n_mov: 0, ricaviCat: {}, costiCat: {} }; });
    movimenti.forEach(m => {
      const b = m.bu || "GENERAL";
      if (!bu[b]) bu[b] = { ricavi: 0, costi: 0, n_mov: 0, ricaviCat: {}, costiCat: {} };
      bu[b].n_mov++;
      const cat = m.categoria || "(senza categoria)";
      if (m.tipo === "entrata") {
        bu[b].ricavi += m.importo;
        bu[b].ricaviCat[cat] = (bu[b].ricaviCat[cat] || 0) + m.importo;
      } else if (m.tipo === "uscita") {
        bu[b].costi += m.importo;
        bu[b].costiCat[cat] = (bu[b].costiCat[cat] || 0) + m.importo;
      }
    });
    Object.values(bu).forEach(b => {
      b.margine = b.ricavi - b.costi;
      b.margineP = b.ricavi > 0 ? (b.margine / b.ricavi * 100) : 0;
    });
    return bu;
  }, [movimenti]);

  const totaleRicavi = Object.values(analisiBU).reduce((s,b) => s + b.ricavi, 0);
  const totaleCosti = Object.values(analisiBU).reduce((s,b) => s + b.costi, 0);

  // Chart BU
  const buChartRef = useRef(null);
  useEffect(() => {
    if (tab !== "bu" || !buChartRef.current) return;
    const ctx = buChartRef.current.getContext("2d");
    const chart = new window.Chart(ctx, {
      type: "bar",
      data: {
        labels: BUSINESS_UNITS,
        datasets: [
          { label: "Ricavi", data: BUSINESS_UNITS.map(b => analisiBU[b].ricavi), backgroundColor: "#2d5e3e", borderRadius: 4 },
          { label: "Costi", data: BUSINESS_UNITS.map(b => analisiBU[b].costi), backgroundColor: "#b54343", borderRadius: 4 },
          { label: "Margine", data: BUSINESS_UNITS.map(b => analisiBU[b].margine), backgroundColor: "#b8954b", borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: "bottom", labels: { font: { size: 11 } } } },
        scales: {
          y: { beginAtZero: true, ticks: { font: { size: 10 }, callback: v => "€ " + v.toLocaleString("it-IT") } },
          x: { ticks: { font: { size: 11 } } }
        }
      }
    });
    return () => chart.destroy();
  }, [tab, analisiBU]);

  // ============== BUDGET VS ACTUAL ==============
  const categorieUsate = useMemo(() => {
    const set = new Set();
    movimenti.forEach(m => { if (m.categoria) set.add(m.categoria); });
    Object.keys(budget).forEach(c => set.add(c));
    return [...set].sort();
  }, [movimenti, budget]);

  // Voci di budget = SOLO quelle inserite manualmente dall'utente.
  // Il budget parte vuoto: nessuna voce viene derivata in automatico dai movimenti.
  const vociBudget = useMemo(() => {
    return Object.entries(budget)
      .map(([key, b]) => ({
        key,
        descrizione: b.descrizione || b.categoria || key,
        categoria: b.categoria || "",
        bu: b.bu || "",
        ricavi: Number(b.ricavi) || 0,
        costi: Number(b.costi) || 0,
      }))
      .sort((a, b) => a.descrizione.localeCompare(b.descrizione));
  }, [budget]);

  // Business Unit disponibili per le voci di budget
  const buOptions = useMemo(() => {
    const set = new Set(typeof BUSINESS_UNITS_DEFAULT !== "undefined" ? BUSINESS_UNITS_DEFAULT : []);
    if (typeof BUSINESS_UNITS !== "undefined") (BUSINESS_UNITS || []).forEach(b => set.add(b));
    movimenti.forEach(m => { if (m.bu) set.add(m.bu); });
    return [...set].filter(Boolean).sort();
  }, [movimenti]);

  // Actual di una voce: somma i movimenti per categoria, filtrando per BU se impostata.
  // Senza categoria → nessun actual (target puro).
  const actualVoce = (voce) => {
    if (!voce.categoria) return { ricavi: 0, costi: 0, hasActual: false };
    let ricavi = 0, costi = 0;
    movimenti.forEach(m => {
      if ((m.categoria || "") !== voce.categoria) return;
      if (voce.bu && (m.bu || "") !== voce.bu) return;
      if (m.tipo === "entrata") ricavi += m.importo;
      else if (m.tipo === "uscita") costi += m.importo;
    });
    return { ricavi, costi, hasActual: true };
  };

  const actualPerCategoria = useMemo(() => {
    const r = {};
    movimenti.forEach(m => {
      const cat = m.categoria || "(senza categoria)";
      if (!r[cat]) r[cat] = { ricavi: 0, costi: 0 };
      if (m.tipo === "entrata") r[cat].ricavi += m.importo;
      else if (m.tipo === "uscita") r[cat].costi += m.importo;
    });
    return r;
  }, [movimenti]);

  // % avanzamento stagione (su 12 mesi sett-ago)
  const avanzamentoStagione = useMemo(() => {
    const ora = new Date();
    const annoStag = Number(stagione.split("-")[0]);
    const inizio = new Date(annoStag, 8, 1); // 1 settembre
    const fine = new Date(annoStag + 1, 7, 31); // 31 agosto
    const totMs = fine - inizio;
    const trascorsoMs = Math.max(0, Math.min(totMs, ora - inizio));
    return Math.round((trascorsoMs / totMs) * 100);
  }, [stagione]);

  const saveBudget = async (key, dati) => {
    try {
      const k = String(key || ("b_" + uid())).replace(/[.#$/\[\]]/g, '_');
      await db.ref(`stagioni/${stagione}/budget/${k}`).set({ ...dati, id: k });
      onToast("Budget salvato");
      setBudgetEditing(null);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const removeBudget = async (key, descr) => {
    if (!confirm(`Rimuovere la voce di budget "${descr || key}"?`)) return;
    await db.ref(`stagioni/${stagione}/budget/${String(key).replace(/[.#$/\[\]]/g, '_')}`).remove();
    onToast("Budget rimosso");
  };

  // ============== TREND TEMPORALE ==============
  const trendMensile = useMemo(() => {
    const m = {};
    MESI.forEach(me => { m[me] = { ricavi: 0, costi: 0 }; });
    movimenti.forEach(mov => {
      const me = mov.mese;
      if (!m[me]) return;
      if (mov.tipo === "entrata") m[me].ricavi += mov.importo;
      else if (mov.tipo === "uscita") m[me].costi += mov.importo;
    });
    // cumulato
    let cumR = 0, cumC = 0;
    const data = MESI.map(me => {
      cumR += m[me].ricavi;
      cumC += m[me].costi;
      return {
        mese: me,
        ricavi: m[me].ricavi,
        costi: m[me].costi,
        margine: m[me].ricavi - m[me].costi,
        cumRicavi: cumR,
        cumCosti: cumC,
        cumMargine: cumR - cumC,
      };
    });
    return data;
  }, [movimenti]);

  const trendChartRef = useRef(null);
  useEffect(() => {
    if (tab !== "trend" || !trendChartRef.current) return;
    const ctx = trendChartRef.current.getContext("2d");
    const chart = new window.Chart(ctx, {
      type: "line",
      data: {
        labels: MESI.map(m => m.slice(0,3)),
        datasets: [
          { label: "Ricavi cumulati", data: trendMensile.map(t => t.cumRicavi), borderColor: "#2d5e3e", backgroundColor: "rgba(45,94,62,0.1)", fill: true, tension: 0.3, borderWidth: 2 },
          { label: "Costi cumulati", data: trendMensile.map(t => t.cumCosti), borderColor: "#b54343", backgroundColor: "rgba(181,67,67,0.1)", fill: true, tension: 0.3, borderWidth: 2 },
          { label: "Margine cumulato", data: trendMensile.map(t => t.cumMargine), borderColor: "#b8954b", backgroundColor: "transparent", borderWidth: 2.5, borderDash: [4,4], tension: 0.3 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: "bottom", labels: { font: { size: 11 } } } },
        scales: {
          y: { ticks: { font: { size: 10 }, callback: v => "€ " + v.toLocaleString("it-IT") } },
          x: { ticks: { font: { size: 10 } } }
        }
      }
    });
    return () => chart.destroy();
  }, [tab, trendMensile]);

  // Variazione mese-su-mese
  const variazioni = useMemo(() => {
    return trendMensile.map((m, i) => {
      if (i === 0) return { ...m, varRicavi: null, varCosti: null };
      const prev = trendMensile[i-1];
      return {
        ...m,
        varRicavi: prev.ricavi > 0 ? ((m.ricavi - prev.ricavi) / prev.ricavi * 100) : null,
        varCosti: prev.costi > 0 ? ((m.costi - prev.costi) / prev.costi * 100) : null,
      };
    });
  }, [trendMensile]);

  // Proiezione fine stagione
  const proiezione = useMemo(() => {
    const mesiAttivi = trendMensile.filter(m => m.ricavi > 0 || m.costi > 0);
    if (mesiAttivi.length === 0) return { ricavi: 0, costi: 0, utile: 0, valido: false };
    const mediaR = mesiAttivi.reduce((s,m) => s + m.ricavi, 0) / mesiAttivi.length;
    const mediaC = mesiAttivi.reduce((s,m) => s + m.costi, 0) / mesiAttivi.length;
    const mesiRestanti = 12 - mesiAttivi.length;
    const cumR = trendMensile.reduce((s,m) => s + m.ricavi, 0);
    const cumC = trendMensile.reduce((s,m) => s + m.costi, 0);
    return {
      ricavi: cumR + mediaR * mesiRestanti,
      costi: cumC + mediaC * mesiRestanti,
      utile: (cumR + mediaR * mesiRestanti) - (cumC + mediaC * mesiRestanti),
      mesiAttivi: mesiAttivi.length,
      mesiRestanti,
      valido: true,
    };
  }, [trendMensile]);

  // ============== CASH FLOW FORECAST ==============
  const cashFlow = useMemo(() => {
    // Saldo attuale
    const saldoAttuale = Object.values(CONTI_LIQUIDITA).reduce((s,c) => {
      let saldo = saldiIniziali[c.codice] || 0;
      movimenti.forEach(m => {
        if (m.tipo === "entrata" && m.contoLiquidita === c.codice) saldo += m.importo;
        else if (m.tipo === "uscita" && m.contoLiquidita === c.codice) saldo -= m.importo;
        else if (m.tipo === "giroconto") {
          if (m.contoLiquidita === c.codice) saldo -= m.importo;
          if (m.contoLiquiditaDest === c.codice) saldo += m.importo;
        }
        const eff = effettoLiquiditaNascosto(m);
        if (eff && eff.codice === c.codice) saldo += eff.delta;
      });
      return s + saldo;
    }, 0);

    // Burn rate: media uscite ultimi 3 mesi non vuoti
    const mesiAttivi = trendMensile.filter(m => m.costi > 0);
    const ultimi3 = mesiAttivi.slice(-3);
    const burnRate = ultimi3.length > 0 ? ultimi3.reduce((s,m) => s + m.costi, 0) / ultimi3.length : 0;
    const inflowRate = ultimi3.length > 0 ? ultimi3.reduce((s,m) => s + m.ricavi, 0) / ultimi3.length : 0;

    // Forecast prossimi 3 mesi
    const oggi = new Date();
    const meseCorrente = oggi.getMonth();
    const forecast = [];
    let saldoProiez = saldoAttuale;
    for (let i = 1; i <= 3; i++) {
      const d = new Date(oggi.getFullYear(), meseCorrente + i, 1);
      const idx = (d.getMonth() + 4) % 12;
      saldoProiez += inflowRate - burnRate;
      forecast.push({
        mese: MESI[idx],
        anno: d.getFullYear(),
        ricaviStim: inflowRate,
        costiStim: burnRate,
        saldoStim: saldoProiez,
      });
    }

    // Mesi critici (sotto 1000€)
    const critici = forecast.filter(f => f.saldoStim < 1000);

    // Punto pareggio (mese in cui ricavi cumulati ≥ costi cumulati)
    let pareggio = null;
    for (let m of trendMensile) {
      if (m.cumRicavi >= m.cumCosti && m.cumRicavi > 0) {
        pareggio = m.mese;
        break;
      }
    }

    return { saldoAttuale, burnRate, inflowRate, forecast, critici, pareggio };
  }, [movimenti, saldiIniziali, trendMensile]);

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Controller</h2>
          <div className="sub">Analitica · Budget · Trend · Cash flow</div>
        </div>
      </div>

      <div className="tipo-switch" style={{maxWidth:680, marginBottom:20, gridTemplateColumns:"repeat(4, 1fr)"}}>
        <button type="button" className={tab === "bu" ? "active entrata" : ""} onClick={() => setTab("bu")}>📊 Centri costo</button>
        <button type="button" className={tab === "budget" ? "active entrata" : ""} onClick={() => setTab("budget")}>🎯 Budget</button>
        <button type="button" className={tab === "trend" ? "active entrata" : ""} onClick={() => setTab("trend")}>📈 Trend</button>
        <button type="button" className={tab === "cash" ? "active entrata" : ""} onClick={() => setTab("cash")}>💸 Cash Flow</button>
      </div>

      {/* ===== TAB 1: BU ===== */}
      {tab === "bu" && (
        <div>
          <div className="kpi-grid">
            {BUSINESS_UNITS.map(b => {
              const d = analisiBU[b];
              const peso = totaleRicavi > 0 ? (d.ricavi / totaleRicavi * 100) : 0;
              return (
                <div key={b} className="kpi">
                  <div className="label">{b}</div>
                  <div className="value" style={{fontSize:22}}>{fmtEuro(d.margine)}</div>
                  <div className="hint">
                    R {fmt(d.ricavi)} · C {fmt(d.costi)}<br/>
                    Margine {d.margineP.toFixed(1)}% · Peso {peso.toFixed(1)}%
                  </div>
                </div>
              );
            })}
          </div>

          <div className="card" style={{marginTop:18, padding:14}}>
            <h3 className="card-title">Confronto Ricavi/Costi/Margine per BU</h3>
            <div style={{height:260, position:"relative"}}>
              <canvas ref={buChartRef}></canvas>
            </div>
          </div>

          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"24px 0 12px"}}>Ripartizione per categoria</h3>
          {BUSINESS_UNITS.map(b => {
            const d = analisiBU[b];
            if (d.ricavi === 0 && d.costi === 0) return null;
            return (
              <div key={b} className="card" style={{marginBottom:14}}>
                <h3 className="card-title">{b} <span style={{color:"var(--ink-3)", fontSize:13, fontWeight:400}}>· margine {fmtEuro(d.margine)} ({d.margineP.toFixed(1)}%)</span></h3>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14}}>
                  <div>
                    <div style={{fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", color:"var(--ink-3)", fontWeight:600, marginBottom:6}}>Ricavi · {fmtEuro(d.ricavi)}</div>
                    <table className="tbl" style={{fontSize:12}}>
                      <tbody>
                        {Object.entries(d.ricaviCat).sort(([,a],[,b])=>b-a).map(([cat,v]) => (
                          <tr key={cat}><td>{cat}</td><td className="num pos">{fmt(v)}</td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div>
                    <div style={{fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", color:"var(--ink-3)", fontWeight:600, marginBottom:6}}>Costi · {fmtEuro(d.costi)}</div>
                    <table className="tbl" style={{fontSize:12}}>
                      <tbody>
                        {Object.entries(d.costiCat).sort(([,a],[,b])=>b-a).map(([cat,v]) => (
                          <tr key={cat}><td>{cat}</td><td className="num neg">{fmt(v)}</td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ===== TAB 2: BUDGET ===== */}
      {tab === "budget" && (
        <div>
          <div className="kpi-grid">
            <div className="kpi accent">
              <div className="label">Avanzamento stagione</div>
              <div className="value">{avanzamentoStagione}%</div>
              <div className="hint">su 12 mesi (set-ago)</div>
            </div>
            <div className="kpi">
              <div className="label">Voci a budget</div>
              <div className="value">{Object.keys(budget).length}</div>
              <div className="hint">monitorate</div>
            </div>
            <div className="kpi">
              <div className="label">Budget Ricavi tot.</div>
              <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(Object.values(budget).reduce((s,b) => s + (b.ricavi || 0), 0))}</div>
            </div>
            <div className="kpi">
              <div className="label">Budget Costi tot.</div>
              <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(Object.values(budget).reduce((s,b) => s + (b.costi || 0), 0))}</div>
            </div>
          </div>

          <div style={{marginTop:18, display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10}}>
            <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:0}}>Budget vs Actual</h3>
            <button className="btn accent sm" onClick={() => setBudgetEditing({ key: "", descrizione: "", categoria: "", bu: "", ricavi: "", costi: "", nuovo: true })}>+ Aggiungi voce budget</button>
          </div>

          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Descrizione</th>
                  <th>Categoria</th>
                  <th>BU</th>
                  <th>Tipo</th>
                  <th className="num">Budget</th>
                  <th className="num">Actual</th>
                  <th className="num">Δ assoluto</th>
                  <th className="num">Δ %</th>
                  <th style={{width:60}}>Stato</th>
                  <th style={{width:90}}></th>
                </tr>
              </thead>
              <tbody>
                {vociBudget.length === 0 && (
                  <tr>
                    <td colSpan={10} style={{textAlign:"center", padding:"32px 16px", color:"var(--ink-3)"}}>
                      Nessuna voce di budget. Usa <strong>+ Aggiungi voce budget</strong> per inserire le voci che vuoi monitorare.
                    </td>
                  </tr>
                )}
                {vociBudget.map(v => {
                  const b = { ricavi: v.ricavi, costi: v.costi };
                  const a = actualVoce(v);
                  const isRicavo = (b.ricavi || 0) > 0 || (!(b.costi > 0) && a.ricavi > 0);
                  const budVal = isRicavo ? (b.ricavi || 0) : (b.costi || 0);
                  const actVal = isRicavo ? a.ricavi : a.costi;
                  const delta = actVal - budVal;
                  const deltaP = budVal > 0 ? (delta / budVal * 100) : null;
                  const target = budVal * (avanzamentoStagione / 100);
                  let stato = "🟢";
                  if (budVal > 0 && a.hasActual) {
                    if (isRicavo) {
                      if (actVal < target * 0.7) stato = "🔴";
                      else if (actVal < target * 0.95) stato = "🟡";
                    } else {
                      if (actVal > budVal) stato = "🔴";
                      else if (actVal > budVal * 0.9) stato = "🟡";
                    }
                  } else {
                    stato = "—";
                  }
                  return (
                    <tr key={v.key}>
                      <td style={{fontWeight:600}}>{v.descrizione}</td>
                      <td style={{fontSize:12, color:"var(--ink-2)"}}>{v.categoria || <span style={{color:"var(--ink-3)"}}>—</span>}</td>
                      <td>{v.bu ? <span className="pill">{v.bu}</span> : <span style={{color:"var(--ink-3)"}}>—</span>}</td>
                      <td><span className={"pill " + (isRicavo ? "entrata" : "uscita")}>{isRicavo ? "Ricavo" : "Costo"}</span></td>
                      <td className="num">{budVal > 0 ? fmt(budVal) : <span style={{color:"var(--ink-3)"}}>—</span>}</td>
                      <td className="num">{a.hasActual ? fmt(actVal) : <span style={{color:"var(--ink-3)"}} title="Voce senza categoria: target puro">—</span>}</td>
                      <td className={"num " + (delta > 0 ? (isRicavo ? "pos" : "neg") : (isRicavo ? "neg" : "pos"))}>
                        {budVal > 0 && a.hasActual ? (delta > 0 ? "+" : "") + fmt(delta) : "—"}
                      </td>
                      <td className="num">{deltaP !== null && a.hasActual ? (deltaP > 0 ? "+" : "") + deltaP.toFixed(1) + "%" : "—"}</td>
                      <td style={{fontSize:18, textAlign:"center"}}>{stato}</td>
                      <td>
                        <div style={{display:"flex", gap:4}}>
                          <button className="btn ghost sm" onClick={() => setBudgetEditing({ key: v.key, descrizione: v.descrizione, categoria: v.categoria, bu: v.bu, ricavi: v.ricavi || "", costi: v.costi || "" })}>✎</button>
                          <button className="btn danger sm" onClick={() => removeBudget(v.key, v.descrizione)}>🗑</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{marginTop:14, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12, color:"var(--ink-2)"}}>
            <strong>💡 Come leggere lo stato.</strong> Il semaforo confronta l'actual con il <em>target proporzionato all'avanzamento stagione</em> ({avanzamentoStagione}%). Per i <strong>ricavi</strong>: 🟢 in linea o sopra · 🟡 leggermente sotto · 🔴 sotto del 30%+. Per i <strong>costi</strong>: 🟢 entro budget · 🟡 vicino al limite · 🔴 sforato.
          </div>

          {budgetEditing && (
            <div className="modal-bg" onClick={() => setBudgetEditing(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-head">
                  <h3>{budgetEditing.nuovo ? "Nuova voce budget" : "Modifica voce budget"}</h3>
                  <button className="btn ghost sm" onClick={() => setBudgetEditing(null)}>✕</button>
                </div>
                <div className="modal-body">
                  <form className="form-grid" onSubmit={e => {
                    e.preventDefault();
                    if (!String(budgetEditing.descrizione || "").trim()) return alert("La descrizione è obbligatoria");
                    saveBudget(budgetEditing.key, {
                      descrizione: String(budgetEditing.descrizione).trim(),
                      categoria: String(budgetEditing.categoria || "").trim(),
                      bu: String(budgetEditing.bu || "").trim(),
                      ricavi: Number(budgetEditing.ricavi) || 0,
                      costi: Number(budgetEditing.costi) || 0,
                    });
                  }}>
                    <div className="form-row">
                      <label>Descrizione <span className="req">*</span></label>
                      <input type="text" value={budgetEditing.descrizione} autoFocus
                             onChange={e => setBudgetEditing({...budgetEditing, descrizione: e.target.value})}
                             placeholder="es. Incassi serate, Sponsor, Arbitri…" required/>
                    </div>
                    <div className="form-row">
                      <label>Categoria (opzionale)</label>
                      <input type="text" value={budgetEditing.categoria}
                             onChange={e => setBudgetEditing({...budgetEditing, categoria: e.target.value})}
                             placeholder="serve per confrontare l'actual" list="cat-suggestions"/>
                      <datalist id="cat-suggestions">
                        {categorieUsate.map(c => <option key={c} value={c}/>)}
                      </datalist>
                    </div>
                    <div className="form-row">
                      <label>Business Unit (opzionale)</label>
                      <select value={budgetEditing.bu || ""} onChange={e => setBudgetEditing({...budgetEditing, bu: e.target.value})}>
                        <option value="">— tutte —</option>
                        {buOptions.map(b => <option key={b} value={b}>{b}</option>)}
                      </select>
                    </div>
                    <div className="form-row">
                      <label>Budget Ricavi €</label>
                      <input type="number" inputMode="decimal" step="0.01" min="0" value={budgetEditing.ricavi} onChange={e => setBudgetEditing({...budgetEditing, ricavi: e.target.value})} placeholder="0"/>
                    </div>
                    <div className="form-row">
                      <label>Budget Costi €</label>
                      <input type="number" inputMode="decimal" step="0.01" min="0" value={budgetEditing.costi} onChange={e => setBudgetEditing({...budgetEditing, costi: e.target.value})} placeholder="0"/>
                    </div>
                    <div style={{fontSize:11.5, color:"var(--ink-3)", padding:"8px 0"}}>
                      Lascia a 0 il campo che non si applica. Con una <strong>categoria</strong> l'actual viene confrontato (filtrato per BU se impostata); <strong>senza categoria</strong> la voce resta un target puro.
                    </div>
                    <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
                      <button type="button" className="btn ghost" onClick={() => setBudgetEditing(null)}>Annulla</button>
                      <button type="submit" className="btn accent">Salva</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ===== TAB 3: TREND ===== */}
      {tab === "trend" && (
        <div>
          <div className="kpi-grid">
            <div className="kpi accent">
              <div className="label">Proiezione fine stagione</div>
              <div className="value">{proiezione.valido ? fmtEuro(proiezione.utile) : "—"}</div>
              <div className="hint">{proiezione.valido ? `utile/perdita stimato (media ${proiezione.mesiAttivi} mesi)` : "dati insufficienti"}</div>
            </div>
            <div className="kpi">
              <div className="label">Ricavi proiez.</div>
              <div className="value" style={{color:"var(--accent)", fontSize:22}}>{proiezione.valido ? fmtEuro(proiezione.ricavi) : "—"}</div>
            </div>
            <div className="kpi">
              <div className="label">Costi proiez.</div>
              <div className="value" style={{color:"var(--danger)", fontSize:22}}>{proiezione.valido ? fmtEuro(proiezione.costi) : "—"}</div>
            </div>
            <div className="kpi">
              <div className="label">Mesi rimanenti</div>
              <div className="value">{proiezione.valido ? proiezione.mesiRestanti : "—"}</div>
              <div className="hint">su 12</div>
            </div>
          </div>

          <div className="card" style={{marginTop:18, padding:14}}>
            <h3 className="card-title">Trend cumulato stagione</h3>
            <div style={{height:280, position:"relative"}}>
              <canvas ref={trendChartRef}></canvas>
            </div>
          </div>

          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"24px 0 12px"}}>Dettaglio mensile</h3>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Mese</th>
                  <th className="num">Ricavi</th>
                  <th className="num">Δ %</th>
                  <th className="num">Costi</th>
                  <th className="num">Δ %</th>
                  <th className="num">Margine</th>
                  <th className="num">Cum. Ricavi</th>
                  <th className="num">Cum. Costi</th>
                  <th className="num">Cum. Margine</th>
                </tr>
              </thead>
              <tbody>
                {variazioni.map(m => (
                  <tr key={m.mese}>
                    <td style={{textTransform:"capitalize", fontWeight:500}}>{m.mese}</td>
                    <td className="num pos">{m.ricavi > 0 ? fmt(m.ricavi) : "—"}</td>
                    <td className={"num " + (m.varRicavi > 0 ? "pos" : m.varRicavi < 0 ? "neg" : "")}>
                      {m.varRicavi !== null ? (m.varRicavi > 0 ? "+" : "") + m.varRicavi.toFixed(0) + "%" : "—"}
                    </td>
                    <td className="num neg">{m.costi > 0 ? fmt(m.costi) : "—"}</td>
                    <td className={"num " + (m.varCosti > 0 ? "neg" : m.varCosti < 0 ? "pos" : "")}>
                      {m.varCosti !== null ? (m.varCosti > 0 ? "+" : "") + m.varCosti.toFixed(0) + "%" : "—"}
                    </td>
                    <td className={"num " + (m.margine < 0 ? "neg" : m.margine > 0 ? "pos" : "")} style={{fontWeight:600}}>
                      {m.margine !== 0 ? fmt(m.margine) : "—"}
                    </td>
                    <td className="num">{fmt(m.cumRicavi)}</td>
                    <td className="num">{fmt(m.cumCosti)}</td>
                    <td className={"num " + (m.cumMargine < 0 ? "neg" : "pos")} style={{fontWeight:600}}>{fmt(m.cumMargine)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ===== TAB 4: CASH FLOW ===== */}
      {tab === "cash" && (
        <div>
          <div className="kpi-grid">
            <div className="kpi accent">
              <div className="label">Liquidità attuale</div>
              <div className="value">{fmtEuro(cashFlow.saldoAttuale)}</div>
              <div className="hint">Totale tutti i conti</div>
            </div>
            <div className="kpi">
              <div className="label">Burn rate mensile</div>
              <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(cashFlow.burnRate)}</div>
              <div className="hint">Media uscite ultimi 3 mesi</div>
            </div>
            <div className="kpi">
              <div className="label">Inflow rate mensile</div>
              <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(cashFlow.inflowRate)}</div>
              <div className="hint">Media entrate ultimi 3 mesi</div>
            </div>
            <div className="kpi">
              <div className="label">Punto di pareggio</div>
              <div className="value" style={{fontSize:20, textTransform:"capitalize"}}>{cashFlow.pareggio || "non raggiunto"}</div>
              <div className="hint">mese in cui ricavi ≥ costi cum.</div>
            </div>
          </div>

          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"24px 0 12px"}}>Forecast prossimi 3 mesi</h3>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Mese</th>
                  <th className="num">Ricavi stimati</th>
                  <th className="num">Costi stimati</th>
                  <th className="num">Variazione netta</th>
                  <th className="num">Saldo previsto</th>
                  <th style={{width:80}}>Rischio</th>
                </tr>
              </thead>
              <tbody>
                {cashFlow.forecast.map((f, i) => {
                  const rischio = f.saldoStim < 500 ? "🔴 Alto" : f.saldoStim < 2000 ? "🟡 Medio" : "🟢 Basso";
                  return (
                    <tr key={i}>
                      <td style={{textTransform:"capitalize", fontWeight:500}}>{f.mese} {f.anno}</td>
                      <td className="num pos">{fmt(f.ricaviStim)}</td>
                      <td className="num neg">{fmt(f.costiStim)}</td>
                      <td className={"num " + (f.ricaviStim - f.costiStim < 0 ? "neg" : "pos")} style={{fontWeight:500}}>
                        {(f.ricaviStim - f.costiStim >= 0 ? "+" : "") + fmt(f.ricaviStim - f.costiStim)}
                      </td>
                      <td className={"num " + (f.saldoStim < 0 ? "neg" : "")} style={{fontWeight:600}}>{fmt(f.saldoStim)}</td>
                      <td style={{fontSize:11}}>{rischio}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {cashFlow.critici.length > 0 && (
            <div style={{marginTop:18, padding:"14px 18px", background:"#fbecec", border:"1px solid #f1d6d6", borderRadius:8, fontSize:13, color:"var(--danger)"}}>
              <strong>⚠️ Attenzione liquidità.</strong> In {cashFlow.critici.length} {cashFlow.critici.length === 1 ? "mese" : "mesi"} dei prossimi 3 la liquidità prevista scenderebbe sotto i 1.000 €. Pianifica entrate aggiuntive o riduci spese discrezionali.
            </div>
          )}

          <div style={{marginTop:18, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12, color:"var(--ink-2)"}}>
            <strong>💡 Come funziona il forecast.</strong> Si basa sulla media dei <strong>ricavi/costi degli ultimi 3 mesi non vuoti</strong>. Non considera la stagionalità (es. iscrizioni concentrate in autunno), quindi è più affidabile a metà stagione che a inizio/fine. Per una previsione più precisa, registra costantemente i movimenti e usa gli snapshot mensili.
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// PAGINA: EXPORT
// ============================================================
function PageExport({ conti, movimenti, cespiti, saldiIniziali, stagione, categorieRF }) {
  const [busy, setBusy] = useState(false);
  const [lastAction, setLastAction] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // === UTILITY DI CALCOLO (condivisi tra export) ===
  const dati = useMemo(() => {
    const scritture = generaLibroGiornale(movimenti, saldiIniziali, contiMap);
    const mastrini = calcolaMastrini(scritture).map(x => ({
      ...x,
      categoria: contiMap[x.codice]?.categoria || "",
      prospetto: contiMap[x.codice]?.prospetto || "",
    })).sort((a,b) => a.codice - b.codice);

    const totD = mastrini.reduce((s,m) => s + m.dare, 0);
    const totA = mastrini.reduce((s,m) => s + m.avere, 0);

    const spVoci = mastrini.filter(m => (m.prospetto === "SP" || m.prospetto === "SP/CE") && m.saldo !== 0);
    const ceVoci = mastrini.filter(m => (m.prospetto === "CE" || m.prospetto === "SP/CE") && m.saldo !== 0);
    const ricavi = mastrini.filter(m => m.categoria === "RICAVI").reduce((s,m)=> s + m.avere - m.dare, 0);
    const costi = mastrini.filter(m => ["COSTI","COSTI/RICAVI"].includes(m.categoria)).reduce((s,m)=> s + m.dare - m.avere, 0);
    const utile = ricavi - costi;
    const attivo = spVoci.filter(m => m.saldo > 0).reduce((s,m) => s+m.saldo, 0);
    const passivo = spVoci.filter(m => m.saldo < 0).reduce((s,m) => s-m.saldo, 0);

    // RF — schema unico (stesso prospetto della pagina Rendiconto)
    const rf = buildRendiconto(movimenti, conti, saldiIniziali, new Set((categorieRF && categorieRF.investimenti) || []));

    return { scritture, mastrini, totD, totA, spVoci, ceVoci, ricavi, costi, utile, attivo, passivo, rf };
  }, [movimenti, saldiIniziali, contiMap, conti, categorieRF]);

  // === HELPER: header pagina PDF ===
  const addHeader = (doc, titoloDoc, pageNum, totPages) => {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text("FUTSAL FABBRICO ASD", 14, 12);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(titoloDoc, 14, 17);
    doc.text(`Stagione ${stagione}`, doc.internal.pageSize.width - 14, 12, { align: "right" });
    doc.text(`pag. ${pageNum}/${totPages}`, doc.internal.pageSize.width - 14, 17, { align: "right" });
    doc.setDrawColor(180);
    doc.line(14, 20, doc.internal.pageSize.width - 14, 20);
    doc.setTextColor(0);
  };

  // === EXPORT: BILANCIO DI VERIFICA (PDF) ===
  const exportBilancioPDF = () => {
    setBusy(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text("FUTSAL FABBRICO ASD", 105, 18, { align: "center" });
      doc.setFontSize(11);
      doc.setFont("helvetica", "normal");
      doc.text(`Bilancio di Verifica · Stagione ${stagione}`, 105, 25, { align: "center" });
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text(`Generato il ${new Date().toLocaleDateString("it-IT")} alle ${new Date().toLocaleTimeString("it-IT")}`, 105, 31, { align: "center" });
      doc.setTextColor(0);

      const mastriniAttivi = dati.mastrini.filter(m => m.dare > 0 || m.avere > 0);
      const rows = mastriniAttivi.map(m => [
        String(m.codice).padStart(2,"0"),
        m.nome.trim(),
        m.categoria,
        m.dare > 0 ? m.dare.toFixed(2) : "",
        m.avere > 0 ? m.avere.toFixed(2) : "",
        Math.abs(m.saldo).toFixed(2) + (m.saldo < 0 ? " A" : m.saldo > 0 ? " D" : "")
      ]);
      rows.push([
        "", { content: "TOTALI", styles: { fontStyle: "bold" } }, "",
        { content: dati.totD.toFixed(2), styles: { fontStyle: "bold" } },
        { content: dati.totA.toFixed(2), styles: { fontStyle: "bold" } },
        Math.abs(dati.totD - dati.totA) < 0.01 ? "✓" : (dati.totD - dati.totA).toFixed(2),
      ]);

      doc.autoTable({
        startY: 38,
        head: [["Cod.", "Conto", "Categoria", "Dare", "Avere", "Saldo"]],
        body: rows,
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [26, 26, 26], textColor: 240, fontStyle: "bold" },
        columnStyles: { 0: { cellWidth: 12, halign: "center" }, 3: { cellWidth: 24, halign: "right" }, 4: { cellWidth: 24, halign: "right" }, 5: { cellWidth: 26, halign: "right" } },
      });

      doc.save(`Bilancio_Verifica_${stagione}.pdf`);
      setLastAction("Bilancio di Verifica esportato");
    } catch(e) { alert("Errore: " + e.message); }
    finally { setBusy(false); }
  };

  // === EXPORT: CONTO ECONOMICO (PDF) ===
  const exportCEPDF = () => {
    setBusy(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

      doc.setFont("helvetica", "bold"); doc.setFontSize(16);
      doc.text("FUTSAL FABBRICO ASD", 105, 18, { align: "center" });
      doc.setFontSize(11); doc.setFont("helvetica", "normal");
      doc.text(`Conto Economico · Stagione ${stagione}`, 105, 25, { align: "center" });
      doc.setFontSize(9); doc.setTextColor(100);
      doc.text(`Al ${new Date().toLocaleDateString("it-IT")}`, 105, 31, { align: "center" });
      doc.setTextColor(0);

      const ricaviRows = dati.ceVoci.filter(m => m.categoria === "RICAVI").map(m => [
        String(m.codice).padStart(2,"0"), m.nome.trim(), (m.avere - m.dare).toFixed(2)
      ]);
      const costiRows = dati.ceVoci.filter(m => ["COSTI","COSTI/RICAVI"].includes(m.categoria)).map(m => [
        String(m.codice).padStart(2,"0"), m.nome.trim(), (m.dare - m.avere).toFixed(2)
      ]);

      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text("RICAVI", 14, 40);
      doc.autoTable({
        startY: 43,
        head: [["Cod.", "Voce", "Importo"]],
        body: [...ricaviRows, [{content:"Totale Ricavi", colSpan:2, styles:{fontStyle:"bold"}}, {content: dati.ricavi.toFixed(2), styles:{fontStyle:"bold", fillColor:[230,240,232]}}]],
        styles: { fontSize: 9, cellPadding: 2 },
        headStyles: { fillColor: [45, 94, 62], textColor: 240, fontStyle: "bold" },
        columnStyles: { 0: { cellWidth: 14, halign: "center" }, 2: { cellWidth: 32, halign: "right" } },
      });

      let y2 = doc.lastAutoTable.finalY + 10;
      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text("COSTI", 14, y2);
      doc.autoTable({
        startY: y2 + 3,
        head: [["Cod.", "Voce", "Importo"]],
        body: [...costiRows, [{content:"Totale Costi", colSpan:2, styles:{fontStyle:"bold"}}, {content: dati.costi.toFixed(2), styles:{fontStyle:"bold", fillColor:[251,236,236]}}]],
        styles: { fontSize: 9, cellPadding: 2 },
        headStyles: { fillColor: [181, 67, 67], textColor: 240, fontStyle: "bold" },
        columnStyles: { 0: { cellWidth: 14, halign: "center" }, 2: { cellWidth: 32, halign: "right" } },
      });

      let y3 = doc.lastAutoTable.finalY + 12;
      doc.setFontSize(13); doc.setFont("helvetica","bold");
      doc.setFillColor(26, 26, 26); doc.rect(14, y3 - 5, doc.internal.pageSize.width - 28, 10, "F");
      doc.setTextColor(255);
      doc.text("RISULTATO D'ESERCIZIO", 16, y3 + 2);
      doc.text(`€ ${dati.utile.toFixed(2)}  (${dati.utile >= 0 ? "Utile" : "Perdita"})`, doc.internal.pageSize.width - 16, y3 + 2, { align: "right" });
      doc.setTextColor(0);

      doc.save(`Conto_Economico_${stagione}.pdf`);
      setLastAction("Conto Economico esportato");
    } catch(e) { alert("Errore: " + e.message); }
    finally { setBusy(false); }
  };

  // === EXPORT: STATO PATRIMONIALE (PDF) ===
  const exportSPPDF = () => {
    setBusy(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

      doc.setFont("helvetica", "bold"); doc.setFontSize(16);
      doc.text("FUTSAL FABBRICO ASD", 105, 18, { align: "center" });
      doc.setFontSize(11); doc.setFont("helvetica", "normal");
      doc.text(`Stato Patrimoniale · Stagione ${stagione}`, 105, 25, { align: "center" });
      doc.setFontSize(9); doc.setTextColor(100);
      doc.text(`Al ${new Date().toLocaleDateString("it-IT")}`, 105, 31, { align: "center" });
      doc.setTextColor(0);

      const attive = dati.spVoci.filter(m => m.saldo > 0).map(m => [
        String(m.codice).padStart(2,"0"), m.nome.trim(), m.categoria, m.saldo.toFixed(2)
      ]);
      const passive = dati.spVoci.filter(m => m.saldo < 0).map(m => [
        String(m.codice).padStart(2,"0"), m.nome.trim(), m.categoria, (-m.saldo).toFixed(2)
      ]);

      doc.setFontSize(11); doc.setFont("helvetica","bold");
      doc.text("ATTIVITÀ", 14, 40);
      doc.autoTable({

        "Conto liquidità": (m.contoLiquidita && contiMap[m.contoLiquidita]?.nome.trim()) || "",
        "Conto destinazione": m.contoLiquiditaDest ? contiMap[m.contoLiquiditaDest]?.nome.trim() : "",
        "Conto P.d.C.": m.contoPdC ? `${m.contoPdC} ${contiMap[m.contoPdC]?.nome.trim() || ""}` : "",
        Categoria: m.categoria, BU: m.bu, Importo: m.importo,
        Descrizione: m.descrizione, Importato: m.importato ? "Sì" : "",
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(movRows), "Movimenti");

      // 2. Libro Giornale
      const lgRows = [];
      dati.scritture.forEach(s => {
        s.righe.forEach((r, ri) => {
          lgRows.push({
            Data: ri === 0 ? s.data : "",
            Codice: r.codice, Conto: r.nome.trim(),
            Descrizione: ri === 0 ? s.descrizione : "",
            Dare: r.dare > 0 ? r.dare : "",
            Avere: r.avere > 0 ? r.avere : "",
          });
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lgRows), "Libro Giornale");

      // 3. Bilancio Verifica
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
        dati.mastrini.filter(m => m.dare > 0 || m.avere > 0).map(x => ({
          Codice: x.codice, Conto: x.nome.trim(), Categoria: x.categoria, Prospetto: x.prospetto,
          Dare: x.dare, Avere: x.avere, Saldo: x.saldo,
        }))
      ), "Bilancio Verifica");

      // 4. Rendiconto Finanziario — prospetto unico
      const meseCap = (m) => m.charAt(0).toUpperCase() + m.slice(1);
      const rfSheetRows = rendicontoMatrix(dati.rf).map(r => {
        const row = { Voce: r.type === "header" ? r.label.toUpperCase() : r.label };
        if (r.type === "header") {
          MESI.forEach(m => { row[meseCap(m)] = ""; });
          row["Totale"] = "";
        } else if (r.type === "pct") {
          MESI.forEach((m, i) => { row[meseCap(m)] = Math.round(r.values[i] * 1000) / 10 + "%"; });
          row["Totale"] = Math.round(r.tot * 1000) / 10 + "%";
        } else {
          MESI.forEach((m, i) => { row[meseCap(m)] = Math.round(r.values[i] * 100) / 100; });
          row["Totale"] = Math.round(r.tot * 100) / 100;
        }
        return row;
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rfSheetRows), "Rendiconto Finanziario");

      // 5. Cespiti
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
        cespiti.map(c => ({
          Conto: c.conto, Classe: c.classe, "N. beni": c.n_beni, "Anno acquisto": c.anno_inizio,
          "Costo storico": c.costo_storico, "Aliquota": c.aliquota, "Quota esercizio": c.quota_esercizio,
          "Fondo amm.to": c.fondo_ammortamento, "Valore netto": (c.costo_storico || 0) - (c.fondo_ammortamento || 0),
        }))
      ), "Cespiti");

      // 6. Piano dei Conti
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
        conti.sort((a,b)=>a.codice-b.codice).map(c => ({
          Codice: c.codice, Nome: c.nome.trim(), Eccedenza: c.eccedenza, Prospetto: c.prospetto, Categoria: c.categoria
        }))
      ), "Piano dei Conti");

      // 7. SP/CE riepilogo
      const speceRows = [
        { Sezione: "RICAVI", Voce: "Totale Ricavi", Importo: dati.ricavi },
        { Sezione: "COSTI", Voce: "Totale Costi", Importo: dati.costi },
        { Sezione: "RISULTATO", Voce: "Utile/Perdita", Importo: dati.utile },
        { Sezione: "SP", Voce: "Totale Attivo", Importo: dati.attivo },
        { Sezione: "SP", Voce: "Totale Passivo", Importo: dati.passivo },
        { Sezione: "SP", Voce: "Attivo Netto", Importo: dati.attivo - dati.passivo },
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(speceRows), "Sintesi SP-CE");

      XLSX.writeFile(wb, `Contabilita_FutsalFabbrico_${stagione}.xlsx`);
      setLastAction("Excel completo esportato");
    } catch(e) { alert("Errore: " + e.message); }
    finally { setBusy(false); }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Export</h2>
          <div className="sub">Esporta dati e bilanci in Excel o PDF</div>
        </div>
      </div>

      {/* PACCHETTO COMPLETO in evidenza */}
      <div className="card" style={{marginBottom:20, border:"2px solid var(--accent)", background:"linear-gradient(135deg, var(--accent-soft) 0%, var(--panel) 100%)"}}>
        <div style={{display:"flex", alignItems:"baseline", gap:10, marginBottom:6}}>
          <h3 className="card-title" style={{margin:0, fontSize:18}}>📦 Pacchetto completo PDF</h3>
          <span className="pill" style={{background:"var(--accent)", borderColor:"var(--accent)", color:"#fff", fontSize:10}}>CONSIGLIATO</span>
        </div>
        <p style={{fontSize:13, color:"var(--ink-2)", margin:"0 0 14px"}}>
          Un unico PDF con frontespizio, indice, e tutti i prospetti contabili: Bilancio di Verifica, Stato Patrimoniale, Conto Economico, Rendiconto Finanziario, Cespiti, Elenco Movimenti.
          <br/>
          <strong>Ideale per la chiusura annuale e la presentazione al direttivo.</strong>
        </p>
        <button className="btn accent" onClick={exportPacchettoCompleto} disabled={busy}>{busy ? "Generando…" : "Scarica pacchetto completo"}</button>
      </div>

      <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"24px 0 12px"}}>Documenti singoli</h3>

      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))", gap:14}}>
        <div className="card">
          <h3 className="card-title">⚖ Bilancio di Verifica</h3>
          <p style={{fontSize:12.5, color:"var(--ink-2)", margin:"0 0 12px"}}>
            Tutti i conti con DARE, AVERE e saldo. Verifica della quadratura.
          </p>
          <button className="btn" onClick={exportBilancioPDF} disabled={busy}>PDF</button>
        </div>
        <div className="card">
          <h3 className="card-title">📊 Conto Economico</h3>
          <p style={{fontSize:12.5, color:"var(--ink-2)", margin:"0 0 12px"}}>
            Ricavi, Costi e Risultato d'esercizio della stagione.
          </p>
          <button className="btn" onClick={exportCEPDF} disabled={busy}>PDF</button>

        <div className="card">
          <h3 className="card-title">🏛 Stato Patrimoniale</h3>
          <p style={{fontSize:12.5, color:"var(--ink-2)", margin:"0 0 12px"}}>

        <div className="card">
          <h3 className="card-title">💧 Rendiconto Finanziario</h3>

        <div className="card">

        <div className="card">

      {lastAction && (
        <div style={{marginTop:18, padding:"10px 14px", background:"var(--accent-soft)", border:"1px solid #c8d8ce", borderRadius:8, fontSize:13, color:"var(--accent-ink)"}}>

  );
