      <div style={{ fontSize: 11.5, color: "var(--ink-2)", background: "var(--panel-2)", padding: "8px 10px", borderRadius: 6 }}>
        Scrittura generata: <b>DARE</b> {contiMap[liq]?.nome?.trim()} · <b>AVERE</b> {nomeContro}
        {!credito.rilevato && <div style={{ marginTop: 4, color: "var(--ink-3)" }}>Il credito non è stato rilevato: l'incasso va direttamente al conto di ricavo.</div>}
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12, paddingTop: 14, borderTop: "1px solid var(--rule)" }}>
        <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
        <button type="submit" className="btn accent">Registra incasso</button>
      </div>
    </form>
  );
}


// ============================================================
// PAGINA: BUDGET
// Più budget salvabili (come le conte di cassa), ciascuno con:
//  - filtro Business Unit (o tutte)
//  - voci libere, ognuna agganciabile a uno o più conti del PdC
//    di natura ECONOMICA (costo/ricavo) o PATRIMONIALE/FINANZIARIA (SP)
//  - confronto Budget vs Consuntivo (dati reali dal libro giornale)
//  - scenari: si duplica un budget e si cambiano i valori
// ============================================================
function PageBudget({ conti, movimenti, saldiIniziali, bu, stagione, onToast }) {
  const [budgets, setBudgets] = useState([]);       // tutti i budget salvati
  const [attivoKey, setAttivoKey] = useState(null); // budget in editing
  const [draft, setDraft] = useState(null);         // copia locale modificabile
  const [dirty, setDirty] = useState(false);
  const [filtroConti, setFiltroConti] = useState("movimentati"); // movimentati | ce | sp | tutti
  const [ipotesi, setIpotesi] = useState({});       // { codice: valore } valori a mano nel pannello
  const [selConti, setSelConti] = useState([]);     // conti spuntati nel pannello Stato conti

  const contiMap = useMemo(() => {
    const m = {};
    (conti || []).forEach(c => { m[c.codice] = c; });
    return m;
  }, [conti]);

  const buList = useMemo(() => {
    const set = new Set(bu && bu.length ? bu : BUSINESS_UNITS_DEFAULT);
    movimenti.forEach(m => { if (m.bu) set.add(m.bu); });
    return [...set].filter(Boolean).sort();
  }, [bu, movimenti]);

  // conti economici e patrimoniali per l'aggancio delle voci
  const contiEconomici = useMemo(() => (conti || []).filter(c => c.prospetto === "CE" || c.prospetto === "SP/CE").sort((a, b) => a.codice - b.codice), [conti]);
  const contiPatrimoniali = useMemo(() => (conti || []).filter(c => c.prospetto === "SP" && c.prospetto !== "SP/CE").sort((a, b) => a.codice - b.codice), [conti]);

  // --- Firebase: elenco budget ---
  useEffect(() => {
    if (!firebaseReady || !stagione) return;
    const ref = db.ref(`stagioni/${stagione}/budgets`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setBudgets(v ? Object.entries(v).map(([k, b]) => ({ ...b, _key: k })).sort((a, b) => (a.nome || "").localeCompare(b.nome || "")) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  const attivo = draft;

  // === CONSUNTIVO dal libro giornale (partita doppia) ===
  // Per ogni conto e per ogni BU calcolo dare/avere reali.
  const consuntivo = useMemo(() => {
    const scr = generaLibroGiornale(movimenti, saldiIniziali || {}, contiMap);
    const perContoBU = {}; // key `${cod}|${bu}` -> {dare, avere}
    const perConto = {};   // key cod -> {dare, avere}
    scr.forEach(s => {
      const b = s.bu || "(senza BU)";
      (s.righe || []).forEach(r => {
        const kBU = `${r.codice}|${b}`;
        if (!perContoBU[kBU]) perContoBU[kBU] = { dare: 0, avere: 0 };
        perContoBU[kBU].dare += r.dare || 0; perContoBU[kBU].avere += r.avere || 0;
        if (!perConto[r.codice]) perConto[r.codice] = { dare: 0, avere: 0 };
        perConto[r.codice].dare += r.dare || 0; perConto[r.codice].avere += r.avere || 0;
      });
    });
    return { perContoBU, perConto };
  }, [movimenti, saldiIniziali, contiMap]);

  // Consuntivo di un singolo conto (con segno per natura). I conti patrimoniali (banche, cassa,
  // crediti, debiti, fondi…) NON si dividono per BU: saldo totale, apertura inclusa. Gli economici sì.
  const contoActual = (cod, natura, budgetBU) => {
    if (!contiMap[cod]) return 0;
    const isPatr = natura === "patrimoniale";
    let dare, avere;
    if (!isPatr && budgetBU && budgetBU !== "ALL") {
      const k = `${cod}|${budgetBU}`;
      dare = consuntivo.perContoBU[k]?.dare || 0;
      avere = consuntivo.perContoBU[k]?.avere || 0;
    } else {
      dare = consuntivo.perConto[cod]?.dare || 0;
      avere = consuntivo.perConto[cod]?.avere || 0;
    }
    return natura === "ricavo" ? (avere - dare) : (dare - avere);
  };

  // Consuntivo per voce con ATTRIBUZIONE UNICA del conto: se più voci agganciano lo stesso conto
  // (es. due fornitori sullo stesso "MATERIALE C/ACQUISTI"), il consuntivo di quel conto viene
  // assegnato solo alla PRIMA voce che lo aggancia, così non viene contato più volte.
  const actualPerVoce = useMemo(() => {
    const map = {};
    if (!attivo) return map;
    const bBU = attivo.bu || "ALL";
    const claimed = new Set();
    (attivo.voci || []).forEach(v => {
      let val = 0;
      (v.conti || []).forEach(cod => {
        if (claimed.has(cod)) return;
        claimed.add(cod);
        val += contoActual(cod, v.natura, bBU);
      });
      map[v.id] = val;
    });
    return map;
  }, [attivo, consuntivo, contiMap]);

  // consuntivo di una voce (attribuzione unica per conto — vedi actualPerVoce)
  const actualVoce = (voce) => actualPerVoce[voce.id] || 0;

  // Stato conti reale (dal libro giornale) filtrato per la BU del budget attivo.
  // Serve come riferimento mentre imposti i target.
  const statoConti = useMemo(() => {
    if (!attivo) return null;
    const bBU = attivo.bu || "ALL";
    const isSP = (cod) => contiMap[cod] && contiMap[cod].prospetto === "SP";

    // Valore {dare,avere} di un conto:
    //  - patrimoniale (SP, es. banche/cassa): saldo TOTALE (non si divide per BU, include l'apertura)
    //  - economico (costo/ricavo): fetta della BU selezionata (o totale se BU = tutte)
    const valDareAvere = (cod) => {
      if ((bBU && bBU !== "ALL") && !isSP(cod)) {
        return consuntivo.perContoBU[`${cod}|${bBU}`] || { dare: 0, avere: 0 };
      }
      return consuntivo.perConto[cod] || { dare: 0, avere: 0 };
    };

    // Universo dei conti da mostrare.
    // Con una BU selezionata mostro SOLO i conti che riguardano quella BU (che hanno movimenti in quella BU),
    // poi filtro per categoria. Con BU = Tutte lavoro sul piano dei conti completo.
    const bUsel = bBU && bBU !== "ALL";
    const isLiq = (cod) => CONTI_LIQUIDITA.some(l => l.codice === cod);
    let universo = [];
    if (bUsel) {
      // conti con movimenti nella BU selezionata
      const set = new Set();
      Object.keys(consuntivo.perContoBU).forEach(k => {
        const [codStr, b] = k.split("|");
        if (b === bBU) set.add(Number(codStr));
      });
      let arr = [...set];
      if (filtroConti === "ce") arr = arr.filter(cod => { const p = (contiMap[cod] || {}).prospetto; return p === "CE" || p === "SP/CE" || isLiq(cod); });
      else if (filtroConti === "sp") arr = arr.filter(cod => (contiMap[cod] || {}).prospetto === "SP");
      universo = arr; // "movimentati" e "tutti": tutti i conti della BU
    } else {
      if (filtroConti === "ce") {
        universo = (conti || []).filter(c => c.prospetto === "CE" || c.prospetto === "SP/CE").map(c => c.codice);
        CONTI_LIQUIDITA.forEach(c => { if (!universo.includes(c.codice)) universo.push(c.codice); });
      } else if (filtroConti === "sp") {
        universo = (conti || []).filter(c => c.prospetto === "SP").map(c => c.codice);
      } else if (filtroConti === "tutti") {
        universo = (conti || []).map(c => c.codice);
        Object.keys(consuntivo.perConto).forEach(k => { const n = Number(k); if (!universo.includes(n)) universo.push(n); });
      } else {
        universo = Object.keys(consuntivo.perConto).map(Number);
      }
    }
    const righe = universo.map(cod => {
      const v = valDareAvere(cod);
      const c = contiMap[cod] || {};
      const cat = c.categoria || "";
      const isRic = cat === "RICAVI";
      const isCos = cat === "COSTI" || cat === "COSTI/RICAVI";
      const naturaVoce = isRic ? "ricavo" : isCos ? "costo" : "patrimoniale";
      const valore = isRic ? v.avere - v.dare : v.dare - v.avere;
      return {
        codice: cod, nome: (c.nome || `Conto ${cod}`).trim(), categoria: cat,
        prospetto: c.prospetto || "", dare: v.dare, avere: v.avere,
        saldo: v.dare - v.avere, valore, naturaVoce,
        movimentato: Math.abs(valore) > 0.005,
      };
    }).filter(r => {
      if (filtroConti === "movimentati") return r.movimentato;
      if (bUsel) return r.movimentato; // con BU: niente conti a zero
      return true;
    }).sort((a, b) => a.codice - b.codice);
    const tot = {
      ricavi: righe.filter(r => r.naturaVoce === "ricavo").reduce((s, r) => s + r.valore, 0),
      costi: righe.filter(r => r.naturaVoce === "costo").reduce((s, r) => s + r.valore, 0),
    };
    return { righe, tot, bBU };
  }, [attivo, consuntivo, contiMap, filtroConti, conti]);

  // conti già usati nelle voci del budget (per il pulsante "aggiungi come voce")
  const contiGiaUsati = useMemo(() => {
    const s = new Set();
    (attivo?.voci || []).forEach(v => (v.conti || []).forEach(c => s.add(Number(c))));
    return s;
  }, [attivo]);

  const aggiungiVoceDaConto = (r) => {
    const val = valDiRiga(r);
    patch(d => {
      d.voci = d.voci || [];
      d.voci.push({
        id: "v_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
        descrizione: r.nome, natura: r.naturaVoce, conti: [r.codice],
        importo: Math.round(val * 100) / 100, note: "",
      });
    });
  };

  // valore di riga: ipotesi se presente, altrimenti consuntivo.
  // Se "Somma consuntivo" è attiva il consuntivo viene già sommato all'importo,
  // quindi l'importo di partenza è 0 (l'utente ci scrive solo l'EXTRA da aggiungere).
  const valDiRiga = (r) => {
    const ip = ipotesi[r.codice];
    if (ip !== undefined && ip !== "") return Number(ip);
    return (attivo && attivo.sommaConsuntivo === true) ? 0 : r.valore;
  };
  const toggleSel = (cod) => setSelConti(s => s.includes(cod) ? s.filter(x => x !== cod) : [...s, cod]);
  const selezionaMostrati = () => {
    if (!statoConti) return;
    const mostrati = statoConti.righe.map(r => r.codice);
    const tuttiSel = mostrati.every(c => selConti.includes(c));
    setSelConti(tuttiSel ? [] : mostrati);
  };

  // aggiunge i conti selezionati come VOCI SEPARATE (una per conto)
  const aggiungiSelezionatiSeparati = () => {
    if (!statoConti || !selConti.length) return;
    const righe = statoConti.righe.filter(r => selConti.includes(r.codice) && !contiGiaUsati.has(r.codice));
    if (!righe.length) { onToast("I conti selezionati sono già a budget"); return; }
    patch(d => {
      d.voci = d.voci || [];
      righe.forEach(r => d.voci.push({
        id: "v_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        descrizione: r.nome, natura: r.naturaVoce, conti: [r.codice],
        importo: Math.round(valDiRiga(r) * 100) / 100, note: "",
      }));
    });
    setSelConti([]);
    onToast(`${righe.length} voci aggiunte`);
  };

  // aggiunge i conti selezionati come UNA SOLA voce che li raggruppa
  const aggiungiSelezionatiRaggruppati = () => {
    if (!statoConti || !selConti.length) return;
    const righe = statoConti.righe.filter(r => selConti.includes(r.codice));
    if (!righe.length) return;
    const nat = righe.every(r => r.naturaVoce === righe[0].naturaVoce) ? righe[0].naturaVoce
      : (righe.some(r => r.naturaVoce === "ricavo") ? "ricavo" : "costo");
    const nome = prompt("Nome della voce che raggruppa i conti selezionati:", righe.map(r => r.nome).slice(0, 2).join(" + ") + (righe.length > 2 ? " …" : ""));
    if (!nome) return;
    const importo = righe.reduce((s, r) => s + valDiRiga(r), 0);
    patch(d => {
      d.voci = d.voci || [];
      d.voci.push({
        id: "v_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        descrizione: nome.trim(), natura: nat, conti: righe.map(r => r.codice),
        importo: Math.round(importo * 100) / 100, note: "",
      });
    });
    setSelConti([]);
    onToast("Voce raggruppata aggiunta");
  };

  // aggiunge in blocco tutti i conti filtrati che non sono già a budget (usa l'ipotesi se presente)
  const aggiungiTuttiConti = () => {
    if (!statoConti) return;
    const daAgg = statoConti.righe.filter(r => !contiGiaUsati.has(r.codice));
    if (!daAgg.length) { onToast("Tutti i conti mostrati sono già a budget"); return; }
    if (!confirm(`Aggiungere ${daAgg.length} conti come voci di budget?`)) return;
    patch(d => {
      d.voci = d.voci || [];
      daAgg.forEach(r => {
        const val = valDiRiga(r);
        d.voci.push({
          id: "v_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          descrizione: r.nome, natura: r.naturaVoce, conti: [r.codice],
          importo: Math.round(val * 100) / 100, note: "",
        });
      });
    });
  };

  // Modalità "Confronto consuntivo = No": il consuntivo viene già sommato all'importo.
  // Se una voce ha l'importo inserito UGUALE al proprio consuntivo, verrebbe contata due volte.
  // Questo azzera l'importo di quelle voci (restano solo consuntivo + eventuale extra),
  // lasciando invariate le voci con un extra reale diverso dal consuntivo.
  const scorporaConsuntivoDaImporti = () => {
    if (!attivo) return;
    const bBU = attivo.bu || "ALL";
    const daAzzerare = new Set();
    (attivo.voci || []).forEach(v => {
      const act = actualVoce(v, bBU);
      const bud = Number(v.importo) || 0;
      if (Math.abs(act) > 0.005 && Math.abs(bud - act) < 0.005) daAzzerare.add(v.id);
    });
    if (!daAzzerare.size) { onToast("Nessun importo coincide col consuntivo"); return; }
    patch(d => { (d.voci || []).forEach(v => { if (daAzzerare.has(v.id)) v.importo = 0; }); });
    onToast(`${daAzzerare.size} importi azzerati: ora contano consuntivo + eventuale extra`);
  };

  // Piano di cassa (cash flow plan): parte dal SALDO REALE attuale di ogni conto liquidità
  // (che già contiene tutti i movimenti passati) e proietta in avanti solo i flussi PREVISTI
  // (budget) associati a quel conto. Così i pagamenti già usciti non vengono contati due volte.
  const cashflow = useMemo(() => {
    if (!attivo) return null;
    const perLiq = {};
    CONTI_LIQUIDITA.forEach(c => {
      const cc = consuntivo.perConto[c.codice] || { dare: 0, avere: 0 };
      perLiq[c.codice] = { codice: c.codice, nome: c.nome, saldo: cc.dare - cc.avere, inBud: 0, outBud: 0 };
    });
    let senzaCassa = 0;
    (attivo.voci || []).forEach(v => {
      if (v.natura === "patrimoniale") return;
      const cod = v.contoLiquidita ? Number(v.contoLiquidita) : null;
      const bud = Number(v.importo) || 0;
      if (!cod || !perLiq[cod]) { if (bud) senzaCassa += bud; return; }
      if (v.natura === "ricavo") perLiq[cod].inBud += bud; else perLiq[cod].outBud += bud;
    });
    const righe = Object.values(perLiq)
      .map(r => ({ ...r, netto: r.inBud - r.outBud, saldoPrev: r.saldo + r.inBud - r.outBud }))
      .filter(r => Math.abs(r.saldo) > 0.005 || Math.abs(r.inBud) > 0.005 || Math.abs(r.outBud) > 0.005);
    const tot = righe.reduce((a, r) => ({
      saldo: a.saldo + r.saldo, inBud: a.inBud + r.inBud, outBud: a.outBud + r.outBud, saldoPrev: a.saldoPrev + r.saldoPrev,
    }), { saldo: 0, inBud: 0, outBud: 0, saldoPrev: 0 });
    return { righe, tot, senzaCassa, netto: tot.inBud - tot.outBud };
  }, [attivo, consuntivo]);

  const totali = useMemo(() => {
    if (!attivo) return null;
    const bBU = attivo.bu || "ALL";
    let budRic = 0, budCos = 0, actRic = 0, actCos = 0, budFin = 0, actFin = 0;
    (attivo.voci || []).forEach(v => {
      const act = actualVoce(v, bBU);
      const bud = Number(v.importo) || 0;
      if (v.natura === "ricavo") { budRic += bud; actRic += act; }
      else if (v.natura === "costo") { budCos += bud; actCos += act; }
      else { budFin += bud; actFin += act; } // patrimoniale/finanziario
    });
    return {
      budRic, budCos, budRis: budRic - budCos, budFin,
      actRic, actCos, actRis: actRic - actCos, actFin,
      // "budget effettivo" = importo inserito a mano + saldo già in contabilità (modalità senza confronto)
      effRic: budRic + actRic, effCos: budCos + actCos, effRis: (budRic + actRic) - (budCos + actCos), effFin: budFin + actFin,
    };
  }, [attivo, consuntivo]);

  // === Azioni ===
  const nuovoBudget = () => {
    const nome = prompt("Nome del nuovo budget:", `Budget ${stagione}`);
    if (!nome) return;
    setDraft({ nome: nome.trim(), bu: "ALL", note: "", voci: [], confrontaConsuntivo: true, sommaConsuntivo: false, _key: null });
    setAttivoKey(null);
    setDirty(true);
  };

  const apri = (b) => {
    setDraft(JSON.parse(JSON.stringify(b)));
    setAttivoKey(b._key);
    setDirty(false);
  };

  const duplica = (b) => {
    const nome = prompt("Nome del nuovo scenario:", `${b.nome} — scenario`);
    if (!nome) return;
    const copia = JSON.parse(JSON.stringify(b));
    setDraft({ ...copia, nome: nome.trim(), _key: null });
    setAttivoKey(null);
    setDirty(true);
    onToast("Scenario duplicato — modifica i valori e salva");
  };

  const salva = async () => {
    if (!draft) return;
    if (!draft.nome || !draft.nome.trim()) return alert("Dai un nome al budget");
    try {
      const payload = {
        nome: draft.nome.trim(),
        bu: draft.bu || "ALL",
        note: draft.note || "",
        confrontaConsuntivo: draft.confrontaConsuntivo !== false,
        sommaConsuntivo: draft.sommaConsuntivo === true,
        voci: (draft.voci || []).map(v => ({
          id: v.id, descrizione: v.descrizione || "", natura: v.natura || "costo",
          conti: (v.conti || []).map(Number), importo: Number(v.importo) || 0, note: v.note || "",
          contoLiquidita: v.contoLiquidita ? Number(v.contoLiquidita) : null,
        })),
        modificatoIl: new Date().toISOString(),
        creatoIl: draft.creatoIl || new Date().toISOString(),
      };
      let key = attivoKey;
      if (key) await db.ref(`stagioni/${stagione}/budgets/${key}`).update(payload);
      else { const ref = db.ref(`stagioni/${stagione}/budgets`).push(); await ref.set(payload); key = ref.key; }
      setAttivoKey(key);
      setDirty(false);
      onToast("Budget salvato");
    } catch (e) { onToast("Errore: " + e.message); }
  };

  const elimina = async (b) => {
    if (!confirm(`Eliminare il budget "${b.nome}"?`)) return;
    await db.ref(`stagioni/${stagione}/budgets/${b._key}`).remove();
    if (attivoKey === b._key) { setDraft(null); setAttivoKey(null); }
    onToast("Budget eliminato");
  };

  // Editing voci nel draft
  const patch = (fn) => { setDraft(d => { const n = JSON.parse(JSON.stringify(d)); fn(n); return n; }); setDirty(true); };
  const addVoce = () => patch(d => { d.voci = d.voci || []; d.voci.push({ id: "v_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), descrizione: "", natura: "costo", conti: [], importo: 0, note: "" }); });
  const setVoce = (id, k, val) => patch(d => { const v = (d.voci || []).find(x => x.id === id); if (v) v[k] = val; });
  const delVoce = (id) => patch(d => { d.voci = (d.voci || []).filter(x => x.id !== id); });
  const toggleConto = (id, cod) => patch(d => {
    const v = (d.voci || []).find(x => x.id === id); if (!v) return;
    v.conti = v.conti || [];
    const i = v.conti.indexOf(cod);
    if (i >= 0) v.conti.splice(i, 1); else v.conti.push(cod);
  });

  function exportExcel() {
    if (typeof XLSX === "undefined" || !attivo) { onToast("Nessun budget aperto"); return; }
    const bBU = attivo.bu || "ALL";
    const addA = attivo.sommaConsuntivo === true;
    const pctFrac = (dAbs, cons) => Math.abs(cons) > 0.005 ? dAbs / Math.abs(cons) : null;

    const headers = ["Voce", "Natura", "Conti collegati", "Cassa", "Note", "Consuntivo", "Forecast", "Δ (forecast − cons.)", "Δ %"];
    const aoa = [
      [`Budget: ${attivo.nome}`],
      [`Stagione ${stagione} · BU: ${bBU === "ALL" ? "Tutte" : bBU}${addA ? " · Forecast = consuntivo + extra a mano" : " · Forecast = budget inserito"}`],
      [],
      headers,
    ];
    const naturaLbl = { ricavo: "Ricavo", costo: "Costo", patrimoniale: "Patrim." };
    (attivo.voci || []).forEach(v => {
      const cons = actualVoce(v);
      const bud = Number(v.importo) || 0;
      const forecast = addA ? (bud + cons) : bud;
      const dAbs = forecast - cons;
      const pf = pctFrac(dAbs, cons);
      const conti = (v.conti || []).map(c => contiMap[c]?.nome?.trim() || c).join(", ");
      const cassa = v.contoLiquidita && v.natura !== "patrimoniale" ? (contiMap[Number(v.contoLiquidita)]?.nome?.trim() || "") : "";
      aoa.push([v.descrizione || "", naturaLbl[v.natura] || v.natura, conti, cassa, v.note || "", cons, forecast, dAbs, pf === null ? "n/d" : pf]);
    });
    let totRowsIdx = [];
    if (totali) {
      aoa.push([]);
      const mk = (label, cons, forecast) => { const dAbs = forecast - cons; const pf = pctFrac(dAbs, cons); return [label, "", "", "", "", cons, forecast, dAbs, pf === null ? "n/d" : pf]; };
      const base = aoa.length;
      aoa.push(mk("TOTALE RICAVI", totali.actRic, addA ? totali.effRic : totali.budRic));
      aoa.push(mk("TOTALE COSTI", totali.actCos, addA ? totali.effCos : totali.budCos));
      aoa.push(mk("RISULTATO (ricavi − costi)", totali.actRis, addA ? totali.effRis : totali.budRis));
      totRowsIdx = [base, base + 1, base + 2];
    }
    aoa.push([], ["Legenda: verde = variazione favorevole (ricavo in aumento, costo in calo) · rosso = sfavorevole. Natura: Ricavo (verde), Costo (rosso), Patrim. (grigio)."]);
    const legendRow = aoa.length - 1;

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"] = [{ wch: 26 }, { wch: 10 }, { wch: 30 }, { wch: 13 }, { wch: 26 }, { wch: 13 }, { wch: 13 }, { wch: 17 }, { wch: 9 }];
    const nData = (attivo.voci || []).length;
    const money = "#,##0.00", pct = "+0.0%;-0.0%;0.0%";
    const border = { style: "thin", color: { rgb: "D9D6CE" } };
    const cell = (r, c) => { const ref = XLSX.utils.encode_cell({ r, c }); if (!ws[ref]) ws[ref] = { t: "s", v: "" }; return ws[ref]; };
    // colore "favorevole/sfavorevole" della Δ in base alla natura (verde = favorevole, rosso = sfavorevole)
    const GREEN = "1E7A46", RED = "B03A2E", GREY = "777777";
    const favRgb = (natura, dAbs) => {
      if (Math.abs(dAbs) < 0.005) return GREY;
      if (natura === "ricavo" || natura === "ris") return dAbs > 0 ? GREEN : RED;
      if (natura === "costo") return dAbs < 0 ? GREEN : RED;
      return GREY; // patrimoniale: neutro
    };
    const natRgb = (natura) => natura === "ricavo" ? GREEN : natura === "costo" ? RED : GREY;
    const natFrom = (lbl) => lbl === "Ricavo" ? "ricavo" : lbl === "Costo" ? "costo" : "patrimoniale";
    // Titolo e sottotitolo
    Object.assign(cell(0, 0), { s: { font: { bold: true, sz: 14 } } });
    Object.assign(cell(1, 0), { s: { font: { italic: true, sz: 9, color: { rgb: "8A8578" } } } });
    // Intestazione (riga 3): scura; Consuntivo (grigio) e Forecast (blu) con tinte NEUTRE, non verdi
    for (let c = 0; c < headers.length; c++) {
      const fill = c === 5 ? "6B6B6B" : c === 6 ? "3B4A5A" : "1A1A1A";
      Object.assign(cell(3, c), { s: { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 10 }, fill: { fgColor: { rgb: fill } }, alignment: { horizontal: c >= 5 ? "right" : "left", vertical: "center", wrapText: true } } });
    }
    // Righe dati
    for (let i = 0; i < nData; i++) {
      const r = 4 + i;
      const nat = natFrom(cell(r, 1).v);
      for (let c = 5; c <= 8; c++) { const cc = cell(r, c); cc.z = c === 8 ? pct : money; }
      // Natura colorata: Ricavo verde, Costo rosso, Patrim. grigio → si riconosce a colpo d'occhio
      cell(r, 1).s = { font: { bold: true, color: { rgb: natRgb(nat) } } };
      // Note in corsivo grigio
      cell(r, 4).s = { alignment: { horizontal: "left", wrapText: true }, font: { italic: true, color: { rgb: "6B6B6B" } } };
      // Consuntivo (grigio neutro) e Forecast (azzurro neutro) — NON verdi
      cell(r, 5).s = { alignment: { horizontal: "right" }, fill: { fgColor: { rgb: "F1F1EC" } } };
      cell(r, 6).s = { alignment: { horizontal: "right" }, fill: { fgColor: { rgb: "EAF0F5" } }, font: { bold: true } };
      // Δ e Δ% colorate per FAVOREVOLE/SFAVOREVOLE secondo la natura
      const dv = cell(r, 7).v;
      const col = typeof dv === "number" ? favRgb(nat, dv) : GREY;
      cell(r, 7).s = { alignment: { horizontal: "right" }, font: { color: { rgb: col } } };
      cell(r, 8).s = { alignment: { horizontal: "right" }, font: { color: { rgb: col } } };
    }
    // Righe totali
    totRowsIdx.forEach(r => {
      const lbl = String(cell(r, 0).v);
      const natTot = lbl.startsWith("TOTALE RICAVI") ? "ricavo" : lbl.startsWith("TOTALE COSTI") ? "costo" : "ris";
      const isRis = lbl.startsWith("RISULTATO");
      const dv = cell(r, 7).v;
      for (let c = 0; c < headers.length; c++) {
        const cc = cell(r, c);
        cc.s = { font: { bold: true, color: { rgb: isRis ? "FFFFFF" : "1A1A1A" } }, fill: { fgColor: { rgb: isRis ? "1A1A1A" : "F0EFEA" } }, border: { top: border, bottom: border }, alignment: { horizontal: c >= 5 ? "right" : "left" } };
        if (c >= 5) cc.z = c === 8 ? pct : money;
        if ((c === 7 || c === 8) && typeof dv === "number") cc.s.font = { bold: true, color: { rgb: favRgb(natTot, dv) } };
      }
    });
    Object.assign(cell(legendRow, 0), { s: { font: { italic: true, sz: 9, color: { rgb: "8A8578" } } } });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Budget");
    if (cashflow && cashflow.righe.length) {
      const cf = [
        ["Piano di cassa (cash flow plan)"],
        [`BU: ${bBU === "ALL" ? "Tutte" : bBU}`],
        [],
        ["Conto liquidità", "Saldo attuale", "Entrate previste", "Uscite previste", "Netto previsto", "Saldo previsto"],
      ];
      cashflow.righe.forEach(r => cf.push([r.nome.trim(), r.saldo, r.inBud, r.outBud, r.netto, r.saldoPrev]));
      cf.push(["TOTALE", cashflow.tot.saldo, cashflow.tot.inBud, cashflow.tot.outBud, cashflow.netto, cashflow.tot.saldoPrev]);
      if (cashflow.senzaCassa > 0.005) cf.push([], [`Budget senza conto di cassa associato: ${cashflow.senzaCassa}`]);
      const wcf = XLSX.utils.aoa_to_sheet(cf);
      wcf["!cols"] = [{ wch: 22 }, { wch: 14 }, { wch: 15 }, { wch: 15 }, { wch: 13 }, { wch: 14 }];
      const cfCell = (r, c) => { const ref = XLSX.utils.encode_cell({ r, c }); if (!wcf[ref]) wcf[ref] = { t: "s", v: "" }; return wcf[ref]; };
      Object.assign(cfCell(0, 0), { s: { font: { bold: true, sz: 13 } } });
      for (let c = 0; c < 6; c++) Object.assign(cfCell(3, c), { s: { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "2D5E3E" } }, alignment: { horizontal: c ? "right" : "left" } } });
      for (let r = 4; r < 4 + cashflow.righe.length + 1; r++) for (let c = 1; c < 6; c++) { cfCell(r, c).z = money; cfCell(r, c).s = { alignment: { horizontal: "right" } }; }
      XLSX.utils.book_append_sheet(wb, wcf, "Piano di cassa");
    }
    XLSX.writeFile(wb, `Budget_${attivo.nome.replace(/[^A-Za-z0-9]+/g, "-")}_${stagione}.xlsx`);
    onToast("Budget esportato");
  }

  function exportPDF() {
    if (!window.jspdf || !attivo) { onToast("Nessun budget aperto"); return; }
    const bBU = attivo.bu || "ALL";
    const addA = attivo.sommaConsuntivo === true;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    const W = doc.internal.pageSize.width;
    doc.setFont("helvetica", "bold"); doc.setFontSize(15);
    doc.text("FUTSAL FABBRICO ASD", W / 2, 14, { align: "center" });
    doc.setFontSize(11); doc.setFont("helvetica", "normal");
    doc.text(`Budget · ${attivo.nome}`, W / 2, 20, { align: "center" });
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text(`Stagione ${stagione} · BU: ${bBU === "ALL" ? "Tutte" : bBU} · Forecast = ${addA ? "consuntivo + extra a mano" : "budget inserito"} · ${new Date().toLocaleDateString("it-IT")}`, W / 2, 25, { align: "center" });
    doc.setFontSize(7.5); doc.setTextColor(130);
    doc.text("Colori — Natura: Ricavo verde / Costo rosso.  Δ: verde = favorevole (ricavo in aumento o costo in calo), rosso = sfavorevole.", W / 2, 29.5, { align: "center" });
    doc.setTextColor(0);

    const naturaLbl = { ricavo: "Ricavo", costo: "Costo", patrimoniale: "Patrim." };
    const n0 = (n) => Math.round(n).toLocaleString("it-IT");
    const sign = (n) => { const r = Math.round(n); return (r > 0 ? "+" : "") + r.toLocaleString("it-IT"); };
    const pctTxt = (dAbs, cons) => { if (Math.abs(cons) <= 0.005) return "n/d"; const p = Math.round((dAbs / Math.abs(cons)) * 100); return (p > 0 ? "+" : "") + p + "%"; };
    const body = (attivo.voci || []).map(v => {
      const cons = actualVoce(v);
      const bud = Number(v.importo) || 0;
      const forecast = addA ? (bud + cons) : bud;
      const dAbs = forecast - cons;
      const cassa = v.contoLiquidita && v.natura !== "patrimoniale" ? (contiMap[Number(v.contoLiquidita)]?.nome?.trim() || "") : "—";
      return [v.descrizione || "—", naturaLbl[v.natura] || v.natura, cassa, v.note || "", n0(cons), n0(forecast), sign(dAbs), pctTxt(dAbs, cons)];
    });
    if (totali) {
      const mkTot = (label, cons, forecast) => {
        const dAbs = forecast - cons;
        return [
          { content: label, colSpan: 4, styles: { fontStyle: "bold" } },
          { content: n0(cons), styles: { fontStyle: "bold", halign: "right" } },
          { content: n0(forecast), styles: { fontStyle: "bold", halign: "right" } },
          { content: sign(dAbs), styles: { fontStyle: "bold", halign: "right" } },
          { content: pctTxt(dAbs, cons), styles: { fontStyle: "bold", halign: "right" } },
        ];
      };
      body.push(mkTot("TOTALE RICAVI", totali.actRic, addA ? totali.effRic : totali.budRic));
      body.push(mkTot("TOTALE COSTI", totali.actCos, addA ? totali.effCos : totali.budCos));
      body.push(mkTot("RISULTATO (ricavi − costi)", totali.actRis, addA ? totali.effRis : totali.budRis));
    }
    const nVoci = (attivo.voci || []).length;
    const rowMeta = (attivo.voci || []).map(v => v.natura);
    if (totali) rowMeta.push("ricavo", "costo", "ris");
    const favRgb = (natura, txt) => {
      const pos = txt.startsWith("+"), neg = txt.startsWith("-");
      if (!pos && !neg) return [120, 120, 120];
      if (natura === "ricavo" || natura === "ris") return pos ? [30, 122, 70] : [176, 58, 46];
      if (natura === "costo") return neg ? [30, 122, 70] : [176, 58, 46];
      return [120, 120, 120];
    };
    const natRgb = (natura) => natura === "ricavo" ? [30, 122, 70] : natura === "costo" ? [176, 58, 46] : [120, 120, 120];
    doc.autoTable({
      startY: 34,
      head: [["Voce", "Natura", "Cassa", "Note", "Consuntivo", "Forecast", "Δ", "Δ %"]],
      body,
      styles: { fontSize: 8, cellPadding: 1.5 },
      headStyles: { fillColor: [26, 26, 26], textColor: 240, fontStyle: "bold" },
      columnStyles: {
        0: { cellWidth: 44 }, 1: { cellWidth: 18 }, 2: { cellWidth: 24 }, 3: { cellWidth: 48, textColor: [110, 110, 110], fontStyle: "italic" },
        4: { cellWidth: 26, halign: "right" }, 5: { cellWidth: 26, halign: "right", fontStyle: "bold" }, 6: { cellWidth: 22, halign: "right" }, 7: { cellWidth: 18, halign: "right" },
      },
      didParseCell: (data) => {
        const ci = data.column.index;
        if (data.section === "head") {
          if (ci === 4) data.cell.styles.fillColor = [107, 107, 107];
          if (ci === 5) data.cell.styles.fillColor = [59, 74, 90];
          return;
        }
        if (data.section !== "body") return;
        const nat = rowMeta[data.row.index] || "patrimoniale";
        const isTot = data.row.index >= nVoci;
        const txt = (data.cell.text && data.cell.text[0]) || "";
        if (isTot) {
          data.cell.styles.fontStyle = "bold";
          if (nat === "ris") {
            // RISULTATO finale: barra scura, testo bianco, più grande
            data.cell.styles.fillColor = [26, 26, 26];
            data.cell.styles.textColor = [255, 255, 255];
            data.cell.styles.fontSize = 10;
            data.cell.styles.minCellHeight = 9;
            if (ci === 6 || ci === 7) data.cell.styles.textColor = txt.startsWith("+") ? [120, 220, 150] : txt.startsWith("-") ? [240, 140, 130] : [220, 220, 220];
          } else {
            // TOTALE RICAVI / COSTI: fascia chiara
            data.cell.styles.fillColor = [235, 234, 228];
            data.cell.styles.fontSize = 9;
            if (ci === 6 || ci === 7) data.cell.styles.textColor = favRgb(nat, txt);
          }
          return;
        }
        // Righe normali
        if (ci === 4) data.cell.styles.fillColor = [241, 241, 236];
        if (ci === 5) data.cell.styles.fillColor = [234, 240, 245];
        if (ci === 1) data.cell.styles.textColor = natRgb(nat);
        if (ci === 6 || ci === 7) data.cell.styles.textColor = favRgb(nat, txt);
      },
    });

    if (cashflow && cashflow.righe.length) {
      let y = doc.lastAutoTable.finalY + 10;
      doc.setFont("helvetica", "bold"); doc.setFontSize(12); doc.text("Piano di cassa (cash flow plan)", 14, y);
      const cfBody = cashflow.righe.map(r => [
        r.nome.trim(), n0(r.saldo), n0(r.inBud), n0(r.outBud), n0(r.netto), n0(r.saldoPrev),
      ]);
      cfBody.push([
        { content: "TOTALE", styles: { fontStyle: "bold" } },
        { content: n0(cashflow.tot.saldo), styles: { fontStyle: "bold" } },
        { content: n0(cashflow.tot.inBud), styles: { fontStyle: "bold" } },
        { content: n0(cashflow.tot.outBud), styles: { fontStyle: "bold" } },
        { content: n0(cashflow.netto), styles: { fontStyle: "bold" } },
        { content: n0(cashflow.tot.saldoPrev), styles: { fontStyle: "bold" } },
      ]);
      doc.autoTable({
        startY: y + 3,
        head: [["Conto", "Saldo attuale", "Entrate prev.", "Uscite prev.", "Netto prev.", "Saldo previsto"]],
        body: cfBody,
        styles: { fontSize: 8, cellPadding: 1.4, halign: "right" },
        columnStyles: { 0: { halign: "left" } },
        headStyles: { fillColor: [45, 94, 62], textColor: 240, halign: "right" },
      });
      if (cashflow.senzaCassa > 0.005) {
        doc.setFontSize(8.5); doc.setTextColor(120);
        doc.text(`Nota: ${fmtEuro(cashflow.senzaCassa)} di budget senza conto di cassa associato (non nel piano).`, 14, doc.lastAutoTable.finalY + 5);
      }
    }
    doc.save(`Budget_${attivo.nome.replace(/[^A-Za-z0-9]+/g, "-")}_${stagione}.pdf`);
    onToast("Budget esportato in PDF");
  }

  const naturaLabel = { ricavo: "Ricavo", costo: "Costo", patrimoniale: "Patrimoniale/Fin." };
  const contiPerNatura = (nat) => {
    if (nat === "patrimoniale") return contiPatrimoniali;
    // Per costo/ricavo: prima i conti coerenti con la natura, poi gli altri, con separatore.
    const isRicavo = (c) => c.categoria === "RICAVI";
    const isCosto = (c) => c.categoria === "COSTI" || c.categoria === "COSTI/RICAVI";
    const coerente = (c) => nat === "ricavo" ? isRicavo(c) : isCosto(c);
    const primari = contiEconomici.filter(coerente);
    const altri = contiEconomici.filter(c => !coerente(c));
    return [...primari, ...(altri.length ? [{ _sep: true }] : []), ...altri];
  };

  // "Confronto consuntivo": se ON mostra le colonne Consuntivo e Scostamento. Per singolo budget.
  const showAct = attivo ? (attivo.confrontaConsuntivo !== false) : true;
  // "Somma consuntivo": interruttore indipendente. Se ON, il consuntivo congelato
  // viene sommato all'importo inserito → budget = consuntivo + importo a mano.
  const addAct = attivo ? (attivo.sommaConsuntivo === true) : false;

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Budget</h2>
          <div className="sub">Budget per Business Unit, voci libere agganciate ai conti, scenari e confronto col consuntivo</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {attivo && <button className="btn ghost" onClick={exportExcel}>↧ Excel</button>}
          {attivo && <button className="btn ghost" onClick={exportPDF}>↧ PDF</button>}
          <button className="btn accent" onClick={nuovoBudget}>+ Nuovo budget</button>
        </div>
      </div>

      {/* Elenco budget salvati */}
      <div className="card" style={{ marginBottom: 16 }}>
        <h3 className="card-title">Budget e scenari salvati</h3>
        {budgets.length === 0 ? (
          <p style={{ fontSize: 13, color: "var(--ink-3)", margin: 0 }}>Nessun budget salvato. Creane uno con “+ Nuovo budget”.</p>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {budgets.map(b => (
              <div key={b._key} style={{
                border: "1px solid " + (attivoKey === b._key ? "var(--accent)" : "var(--line)"),
                borderRadius: 8, padding: "8px 12px", display: "flex", alignItems: "center", gap: 10,
                background: attivoKey === b._key ? "var(--accent-soft)" : "var(--panel)",
              }}>
                <button style={{ fontWeight: 600, background: "none", border: "none", cursor: "pointer", color: "var(--ink)", padding: 0, font: "inherit" }} onClick={() => apri(b)}>{b.nome}</button>
                <span className="pill" style={{ fontSize: 10 }}>{b.bu && b.bu !== "ALL" ? b.bu : "Tutte BU"}</span>
                <span style={{ fontSize: 11, color: "var(--ink-3)" }}>{(b.voci || []).length} voci</span>
                <button className="btn ghost sm" title="Duplica come scenario" onClick={() => duplica(b)}>⧉ copia</button>
                <button className="btn danger sm" onClick={() => elimina(b)}>🗑</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {!attivo ? (
        <div className="empty-state">Apri un budget dall'elenco o creane uno nuovo per iniziare.</div>
      ) : (
        <>
          {/* Intestazione budget attivo */}
          <div className="card" style={{ marginBottom: 16, display: "flex", gap: 18, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div style={{ flex: "1 1 220px" }}>
              <label style={{ display: "block", fontSize: 11, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--ink-3)", marginBottom: 5 }}>Nome budget</label>
              <input type="text" value={attivo.nome} onChange={e => { setDraft(d => ({ ...d, nome: e.target.value })); setDirty(true); }} style={{ width: "100%" }} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--ink-3)", marginBottom: 5 }}>Business Unit</label>
              <select value={attivo.bu || "ALL"} onChange={e => { setDraft(d => ({ ...d, bu: e.target.value })); setDirty(true); }}>
                <option value="ALL">Tutte le BU</option>
                {buList.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--ink-3)", marginBottom: 5 }} title="Sì: mostra le colonne Consuntivo e Scostamento accanto al budget.">Confronto consuntivo</label>
              <div style={{ display: "flex", gap: 6 }}>
                <button type="button" className={"btn " + (showAct ? "accent" : "ghost")} style={{ padding: "6px 16px" }}
                  onClick={() => { setDraft(d => ({ ...d, confrontaConsuntivo: true })); setDirty(true); }}>Sì</button>
                <button type="button" className={"btn " + (!showAct ? "accent" : "ghost")} style={{ padding: "6px 16px" }}
                  onClick={() => { setDraft(d => ({ ...d, confrontaConsuntivo: false })); setDirty(true); }}>No</button>
              </div>
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--ink-3)", marginBottom: 5 }} title="Sì: il consuntivo (congelato) viene sommato all'importo che scrivi tu → budget = consuntivo + extra a mano. Utile a torneo finito, per prendere i costi/ricavi già sostenuti e aggiungerci quelli nuovi.">Somma consuntivo</label>
              <div style={{ display: "flex", gap: 6 }}>
                <button type="button" className={"btn " + (addAct ? "accent" : "ghost")} style={{ padding: "6px 16px" }}
                  onClick={() => { setDraft(d => ({ ...d, sommaConsuntivo: true })); setDirty(true); }}>Sì</button>
                <button type="button" className={"btn " + (!addAct ? "accent" : "ghost")} style={{ padding: "6px 16px" }}
                  onClick={() => { setDraft(d => ({ ...d, sommaConsuntivo: false })); setDirty(true); }}>No</button>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn accent" onClick={salva} disabled={!dirty}>{dirty ? "Salva" : "Salvato"}</button>
              <button className="btn ghost" onClick={() => duplica(attivo)}>Duplica scenario</button>
            </div>
          </div>

          {/* KPI Budget vs Consuntivo */}
          {totali && (
            <div className="kpi-grid" style={{ marginBottom: 16 }}>
              <div className="kpi">
                <div className="label">Ricavi — Budget</div>
                <div className="value" style={{ color: "var(--accent)" }}>{fmtEuro(addAct ? totali.effRic : totali.budRic)}</div>
                <div className="hint">{showAct ? `Consuntivo ${fmtEuro(totali.actRic)}` : addAct ? `di cui ${fmtEuro(totali.actRic)} già in contab.` : "budget a mano"}</div>
              </div>
              <div className="kpi">
                <div className="label">Costi — Budget</div>
                <div className="value" style={{ color: "var(--danger)" }}>{fmtEuro(addAct ? totali.effCos : totali.budCos)}</div>
                <div className="hint">{showAct ? `Consuntivo ${fmtEuro(totali.actCos)}` : addAct ? `di cui ${fmtEuro(totali.actCos)} già in contab.` : "budget a mano"}</div>
              </div>
              <div className="kpi accent">
                <div className="label">Risultato — Budget</div>
                <div className={"value" + ((addAct ? totali.effRis : totali.budRis) < 0 ? " neg" : "")}>{fmtEuro(addAct ? totali.effRis : totali.budRis)}</div>
                <div className="hint">{showAct ? `Consuntivo ${fmtEuro(totali.actRis)}` : addAct ? `di cui ${fmtEuro(totali.actRis)} già in contab.` : "budget a mano"}</div>
              </div>
              {showAct ? (
                <div className="kpi">
                  <div className="label">Scostamento risultato</div>
                  <div className={"value" + ((totali.actRis - totali.budRis) < 0 ? " neg" : "")}>{fmtEuro(totali.actRis - totali.budRis)}</div>
                  <div className="hint">consuntivo − budget</div>
                </div>
              ) : addAct ? (
                <div className="kpi">
                  <div className="label">Da aggiungere</div>
                  <div className={"value" + (totali.budRis < 0 ? " neg" : "")}>{fmtEuro(totali.budRis)}</div>
                  <div className="hint">extra inserito a mano</div>
                </div>
              ) : (
                <div className="kpi">
                  <div className="label">Risultato consuntivo</div>
                  <div className={"value" + (totali.actRis < 0 ? " neg" : "")}>{fmtEuro(totali.actRis)}</div>
                  <div className="hint">riferimento</div>
                </div>
              )}
            </div>
          )}

          {/* Stato conti reale della BU (riferimento) */}
          {statoConti && (
            <details style={{ marginBottom: 16 }} open={(attivo.voci || []).length === 0}>
              <summary style={{ cursor: "pointer", fontWeight: 600, color: "var(--ink-2)", padding: "8px 0" }}>
                Stato conti · {statoConti.bBU === "ALL" ? "tutte le BU" : "BU " + statoConti.bBU} — {statoConti.righe.length} conti
              </summary>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", margin: "2px 0 10px" }}>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {[["movimentati", "Solo movimentati"], ["ce", "Costi/Ricavi + liquidità"], ["sp", "Patrimoniali"], ["tutti", "Tutti i conti"]].map(([k, label]) => (
                    <button key={k} className={"btn " + (filtroConti === k ? "accent" : "ghost")} style={{ padding: "4px 10px", fontSize: 12 }} onClick={() => setFiltroConti(k)}>{label}</button>
                  ))}
                </div>
                <button className="btn ghost sm" onClick={aggiungiTuttiConti}>+ aggiungi tutti</button>
              </div>
              {selConti.length > 0 && (
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", margin: "0 0 10px", padding: "8px 12px", background: "var(--accent-soft)", border: "1px solid #c8d8ce", borderRadius: 8 }}>
                  <b style={{ fontSize: 13 }}>{selConti.length} conti selezionati</b>
                  <button className="btn accent sm" onClick={aggiungiSelezionatiSeparati}>+ come voci separate</button>
                  <button className="btn ghost sm" onClick={aggiungiSelezionatiRaggruppati}>+ come voce unica</button>
                  <button className="btn ghost sm" onClick={() => setSelConti([])}>deseleziona</button>
                </div>
              )}
              <div style={{ fontSize: 12, color: "var(--ink-3)", margin: "0 0 10px" }}>
                Spunta più conti e aggiungili in blocco. “Valore” è il consuntivo reale; nella colonna “Ipotesi” scrivi un valore a mano che ha la precedenza quando aggiungi la voce.
              </div>
              <div className="tbl-wrap" style={{ maxHeight: 380, overflowY: "auto" }}>
                <table className="tbl">
                  <thead>
                    <tr>
                      <th style={{ width: 34 }}>
                        <input type="checkbox" title="Seleziona/deseleziona i conti mostrati"
                          checked={statoConti.righe.length > 0 && statoConti.righe.every(r => selConti.includes(r.codice))}
                          onChange={selezionaMostrati} />
                      </th>
                      <th style={{ width: 50 }}>Cod.</th>
                      <th>Conto</th>
                      <th>Categoria</th>
                      <th style={{ width: 45 }}>Prosp.</th>
                      <th className="num">Valore</th>
                      <th className="num" style={{ width: 110 }}>Ipotesi</th>
                      <th style={{ width: 70 }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {statoConti.righe.map(r => (
                      <tr key={r.codice} style={{ ...(r.movimentato ? {} : { opacity: 0.7 }), ...(selConti.includes(r.codice) ? { background: "var(--accent-soft)" } : {}) }}>
                        <td><input type="checkbox" checked={selConti.includes(r.codice)} onChange={() => toggleSel(r.codice)} /></td>
                        <td className="mono" style={{ fontWeight: 600 }}>{String(r.codice).padStart(2, "0")}</td>
                        <td>{r.nome}</td>
                        <td><span className="pill" style={{ fontSize: 10 }}>{r.categoria || "—"}</span></td>
                        <td style={{ fontSize: 11 }}>{r.prospetto || "—"}</td>
                        <td className={"num " + (r.naturaVoce === "ricavo" ? "pos" : r.naturaVoce === "costo" ? "neg" : "")} style={{ fontWeight: 600 }}>{r.movimentato ? fmt(r.valore) : "—"}</td>
                        <td className="num">
                          <input type="number" step="0.01" value={ipotesi[r.codice] ?? ""} placeholder="—"
                            onChange={e => setIpotesi(p => ({ ...p, [r.codice]: e.target.value }))}
                            style={{ width: 95, textAlign: "right" }} />
                        </td>
                        <td>
                          {contiGiaUsati.has(r.codice)
                            ? <span style={{ fontSize: 10.5, color: "var(--ink-3)" }}>già a budget</span>
                            : <button className="btn ghost sm" title="Aggiungi come voce di budget" onClick={() => aggiungiVoceDaConto(r)}>+ voce</button>}
                        </td>
                      </tr>
                    ))}
                    <tr style={{ borderTop: "2px solid var(--ink)", fontWeight: 700, background: "var(--panel-2)" }}>
                      <td colSpan={5}>Totali · Ricavi {fmtEuro(statoConti.tot.ricavi)} · Costi {fmtEuro(statoConti.tot.costi)}</td>
                      <td className={"num " + ((statoConti.tot.ricavi - statoConti.tot.costi) < 0 ? "neg" : "pos")}>{fmt(statoConti.tot.ricavi - statoConti.tot.costi)}</td>
                      <td colSpan={2}></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </details>
          )}

          {/* Tabella voci */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "8px 0 10px" }}>
            <h3 className="serif" style={{ fontWeight: 500, fontSize: 18, margin: 0 }}>Voci di budget</h3>
            <div style={{ display: "flex", gap: 8 }}>
              {addAct && <button className="btn ghost sm" title="Azzera gli importi che coincidono col consuntivo (venivano contati due volte). Le voci con un extra reale restano invariate." onClick={scorporaConsuntivoDaImporti}>⇊ scorpora consuntivo</button>}
              <button className="btn accent sm" onClick={addVoce}>+ Aggiungi voce</button>
            </div>
          </div>

          {(attivo.voci || []).length === 0 ? (
            <div className="empty-state">Nessuna voce. Aggiungine una: scrivi la descrizione, scegli la natura e aggancia uno o più conti.</div>
          ) : (
            <div className="tbl-wrap">
              <table className="tbl">
                <thead>
                  <tr>
                    <th style={{ minWidth: 160 }}>Voce</th>
                    <th style={{ width: 130 }}>Natura</th>
                    <th style={{ minWidth: 200 }}>Conti collegati</th>
                    <th style={{ width: 130 }} title="Conto di liquidità impattato: serve per il piano di cassa">Cassa</th>
                    <th className="num" style={{ width: 150 }}>Budget</th>
                    {showAct && <th className="num" style={{ width: 120 }}>Consuntivo</th>}
                    {showAct && <th className="num" style={{ width: 120 }} title="Scostamento favorevole: positivo = va bene (ricavo sopra target o costo sotto budget)">Scostam.</th>}
                    <th style={{ width: 40 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {(attivo.voci || []).map(v => {
                    const act = actualVoce(v, attivo.bu || "ALL");
                    const bud = Number(v.importo) || 0;
                    // scostamento FAVOREVOLE: + = va bene (ricavo sopra target / costo sotto budget)
                    const scost = v.natura === "costo" ? (bud - act) : (act - bud);
                    const hasAct = Math.abs(act) > 0.005;
                    return (
                      <tr key={v.id}>
                        <td>
                          <input type="text" value={v.descrizione} placeholder="es. Ricavi iscrizioni"
                            onChange={e => setVoce(v.id, "descrizione", e.target.value)} style={{ width: "100%" }} />
                          {v.note !== undefined && <input type="text" value={v.note || ""} placeholder="note"
                            onChange={e => setVoce(v.id, "note", e.target.value)} style={{ width: "100%", marginTop: 4, fontSize: 11 }} />}
                        </td>
                        <td>
                          <select value={v.natura} onChange={e => { setVoce(v.id, "natura", e.target.value); }}>
                            <option value="ricavo">Ricavo</option>
                            <option value="costo">Costo</option>
                            <option value="patrimoniale">Patrimoniale/Fin.</option>
                          </select>
                        </td>
                        <td>
                          <details>
                            <summary style={{ cursor: "pointer", fontSize: 12 }}>
                              {(v.conti || []).length === 0 ? <span style={{ color: "var(--ink-3)" }}>nessun conto</span> :
                                (v.conti || []).map(c => contiMap[c]?.nome?.trim() || c).join(", ")}
                            </summary>
                            <div style={{ maxHeight: 180, overflowY: "auto", marginTop: 6, border: "1px solid var(--line)", borderRadius: 6, padding: 6 }}>
                              {contiPerNatura(v.natura).map(c => (
                                c._sep
                                  ? <div key="sep" style={{ borderTop: "1px solid var(--line)", margin: "6px 0 4px", paddingTop: 4, fontSize: 10, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--ink-3)" }}>Altri conti</div>
                                  : <label key={c.codice} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, padding: "2px 0" }}>
                                      <input type="checkbox" checked={(v.conti || []).includes(c.codice)} onChange={() => toggleConto(v.id, c.codice)} />
                                      <span className="mono" style={{ fontSize: 11 }}>{String(c.codice).padStart(2, "0")}</span> {c.nome.trim()}
                                      <span style={{ color: "var(--ink-3)", fontSize: 10 }}>{c.categoria}</span>
                                    </label>
                              ))}
                            </div>
                          </details>
                        </td>
                        <td>
                          {v.natura === "patrimoniale"
                            ? <span style={{ fontSize: 11, color: "var(--ink-3)" }}>—</span>
                            : <select value={v.contoLiquidita || ""} onChange={e => setVoce(v.id, "contoLiquidita", e.target.value === "" ? "" : Number(e.target.value))} style={{ fontSize: 12 }}>
                                <option value="">— nessuna —</option>
                                {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{c.nome.trim()}</option>)}
                              </select>}
                        </td>
                        <td className="num">
                          {addAct ? (
                            <div>
                              <div style={{ fontWeight: 700, fontSize: 15 }}>{fmt(bud + act)}</div>
                              <div style={{ fontSize: 10.5, color: "var(--ink-3)", marginTop: 3, display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 4, whiteSpace: "nowrap" }}>
                                cons. {fmt(act)} +
                                <input type="number" step="0.01" value={v.importo} title="Extra a mano da aggiungere al consuntivo"
                                  onChange={e => setVoce(v.id, "importo", e.target.value)} style={{ width: 72, textAlign: "right" }} />
                              </div>
                            </div>
                          ) : (
                            <input type="number" step="0.01" value={v.importo} onChange={e => setVoce(v.id, "importo", e.target.value)} style={{ width: 100, textAlign: "right" }} />
                          )}
                        </td>
                        {showAct && <td className="num" style={{ fontWeight: 600 }}>{fmt(act)}</td>}
                        {showAct && <td className={"num " + (!hasAct ? "" : scost < -0.005 ? "neg" : scost > 0.005 ? "pos" : "")}>{hasAct ? fmt(scost) : "—"}</td>}
                        <td><button className="btn ghost sm" onClick={() => delVoce(v.id)}>✕</button></td>
                      </tr>
                    );
                  })}
                  {totali && (
                    <tr style={{ borderTop: "2px solid var(--ink)", fontWeight: 700, background: "var(--panel-2)" }}>
                      <td colSpan={4} style={{ fontFamily: "'Fraunces',serif" }}>RISULTATO (ricavi − costi)</td>
                      <td className="num">{fmt(addAct ? totali.effRis : totali.budRis)}</td>
                      {showAct && <td className="num">{fmt(totali.actRis)}</td>}
                      {showAct && <td className={"num " + ((totali.actRis - totali.budRis) < 0 ? "neg" : "pos")}>{fmt(totali.actRis - totali.budRis)}</td>}
                      <td></td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          )}

          {/* PIANO DI CASSA (cash flow plan) */}
          {cashflow && (
            <div style={{ marginTop: 26 }}>
              <h3 className="serif" style={{ fontWeight: 500, fontSize: 18, margin: "0 0 4px" }}>Piano di cassa</h3>
              <div style={{ fontSize: 12, color: "var(--ink-3)", margin: "0 0 12px" }}>
                Parte dal saldo reale attuale di ogni conto (che già include i movimenti passati) e proietta in avanti i flussi previsti dal budget associati a quel conto.
              </div>
              {cashflow.righe.length === 0 ? (
                <div className="empty-state">Associa un conto di liquidità (colonna “Cassa”) alle voci per costruire il piano.</div>
              ) : (
                <div className="tbl-wrap">
                  <table className="tbl">
                    <thead>
                      <tr>
                        <th>Conto liquidità</th>
                        <th className="num">Saldo attuale</th>
                        <th className="num">Entrate previste</th>
                        <th className="num">Uscite previste</th>
                        <th className="num">Netto previsto</th>
                        <th className="num">Saldo previsto</th>
                      </tr>
                    </thead>
                    <tbody>
                      {cashflow.righe.map(r => (
                        <tr key={r.codice}>
                          <td style={{ fontWeight: 600 }}>{r.nome.trim()}</td>
                          <td className="num">{fmt(r.saldo)}</td>
                          <td className="num pos">{r.inBud ? fmt(r.inBud) : ""}</td>
                          <td className="num neg">{r.outBud ? fmt(r.outBud) : ""}</td>
                          <td className={"num " + (r.netto < 0 ? "neg" : "pos")}>{fmt(r.netto)}</td>
                          <td className={"num " + (r.saldoPrev < 0 ? "neg" : "")} style={{ fontWeight: 700 }}>{fmt(r.saldoPrev)}</td>
                        </tr>
                      ))}
                      <tr style={{ borderTop: "2px solid var(--ink)", fontWeight: 700, background: "var(--panel-2)" }}>
                        <td style={{ fontFamily: "'Fraunces',serif" }}>TOTALE</td>
                        <td className="num">{fmt(cashflow.tot.saldo)}</td>
                        <td className="num">{fmt(cashflow.tot.inBud)}</td>
                        <td className="num">{fmt(cashflow.tot.outBud)}</td>
                        <td className={"num " + (cashflow.netto < 0 ? "neg" : "pos")}>{fmt(cashflow.netto)}</td>
                        <td className={"num " + (cashflow.tot.saldoPrev < 0 ? "neg" : "")}>{fmt(cashflow.tot.saldoPrev)}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              )}
              {cashflow.senzaCassa > 0.005 && (
                <div style={{ fontSize: 12, color: "#7a5a1d", marginTop: 8 }}>
                  ⚠ {fmtEuro(cashflow.senzaCassa)} di budget senza conto di cassa associato: non rientrano nel piano finché non assegni la colonna “Cassa”.
                </div>
              )}
            </div>
          )}

          <div style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 10, fontStyle: "italic" }}>
            <b>Due interruttori indipendenti.</b> <b>Confronto consuntivo</b>: se Sì, accanto al Budget vedi le colonne Consuntivo e Scostamento (favorevole: positivo quando un ricavo supera il target o un costo resta sotto budget). <b>Somma consuntivo</b>: se Sì, il consuntivo congelato viene sommato all'importo che scrivi tu → <b>Budget = consuntivo + extra a mano</b> (utile a torneo finito: prendi i costi/ricavi già sostenuti e ci aggiungi quelli nuovi); in questa modalità l'importo parte da 0 ed è solo l'extra, e con “⇊ scorpora consuntivo” azzeri gli importi che coincidono col consuntivo (per non contarli due volte).
            {" "}Il Consuntivo è calcolato dal libro giornale in partita doppia sui conti agganciati{attivo.bu && attivo.bu !== "ALL" ? `; per i conti economici solo BU ${attivo.bu}, mentre i conti patrimoniali usano il saldo totale` : " (tutte le BU)"}.
          </div>
        </>
      )}
    </div>
  );
}

function App() {
  const [logged, setLogged] = useState(sessionStorage.getItem(SESSION_KEY) === "1");
  const [stagione, setStagione] = useState(STAGIONE_DEFAULT);
  const [stagioniDisponibili, setStagioniDisponibili] = useState([STAGIONE_DEFAULT]);
  const [page, setPage] = useState("dashboard");
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const { conti, movimenti, cespiti, saldiIniziali, categorieRF, bu, loading, seedStagione } = useFirebaseData(stagione);
  const categorieOpzioni = useMemo(() => mergeCategorie(categorieRF, movimenti), [categorieRF, movimenti]);

  // Carica lista stagioni esistenti su Firebase
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref("stagioni");
    const cb = ref.on("value", snap => {
      const v = snap.val();
      const keys = v ? Object.keys(v) : [];
      const all = [...new Set([STAGIONE_DEFAULT, ...keys])].sort().reverse();
      setStagioniDisponibili(all);
    });
    return () => ref.off("value", cb);
  }, []);

  // Auto-seed quando si seleziona una stagione vuota
  // O auto-reset se trova la vecchia struttura
  useEffect(() => {
    if (!firebaseReady) return;
    (async () => {
      const oldSeedSnap = await db.ref(`stagioni/${stagione}/scrittureSeed`).once("value");
      if (oldSeedSnap.exists()) {
        if (confirm("Rilevati dati della Release 1.0. Aggiornare alla nuova versione con saldi corretti e Libro Giornale? I dati saranno reimportati da zero dallo sheet.")) {
          await db.ref(`stagioni/${stagione}`).remove();
          await seedStagione();
        }
        return;
      }

      // Auto-discovery BU: se non esistono, le seedo (default + qualunque BU usata nei movimenti)
      const buSnap = await db.ref(`stagioni/${stagione}/businessUnits`).once("value");
      if (!buSnap.exists()) {
        const movsSnap = await db.ref(`stagioni/${stagione}/movimenti`).once("value");
        const buInUso = new Set(BUSINESS_UNITS_DEFAULT);
        if (movsSnap.exists()) {
          Object.values(movsSnap.val()).forEach(m => {
            if (m.bu && m.bu.trim()) buInUso.add(m.bu.trim().toUpperCase());
          });
        }
        const buArr = [...buInUso].sort();
        const buObj = {};
        buArr.forEach((b, i) => { buObj[`bu_${i}`] = { nome: b, ordine: i }; });
        await db.ref(`stagioni/${stagione}/businessUnits`).set(buObj);
      }
      // Controlla se i movimenti hanno il campo contoPdC (introdotto in Release 2)
      const movsSnap = await db.ref(`stagioni/${stagione}/movimenti`).once("value");
      if (movsSnap.exists()) {
        const movs = Object.values(movsSnap.val() || {});
        const importati = movs.filter(m => m.importato);
        const senzaPdC = importati.filter(m => m.tipo !== "giroconto" && !m.contoPdC);

        // Trigger per Release 3.2: i movimenti importati hanno una vecchia versione (entrata 4350 IDEA VERDE + 7 prelievi POS al conto 20)
        // Riconosco da: c'è un'entrata con descrizione che contiene "PRELIEVO DA POS PER PAGAMENTI IDEA VERDE"
        const hasOldImport = importati.some(m => m.tipo === "entrata" && (m.descrizione || "").includes("PRELIEVO DA POS PER PAGAMENTI IDEA VERDE"));

        if (importati.length > 0 && senzaPdC.length > 0) {
          if (confirm(`Rilevati ${senzaPdC.length} movimenti importati senza conto P.d.C. (Release 1.1). Aggiornare alla Release 2 con auto-mapping al Piano dei Conti? I movimenti importati verranno ricaricati.`)) {
            const updates = {};
            Object.entries(movsSnap.val() || {}).forEach(([k, m]) => {
              if (m.importato) updates[k] = null;
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
            const movsObj = {};
            SEED_MOVIMENTI.forEach((m, i) => {
              movsObj[`seed_${String(i).padStart(4,'0')}`] = {
                ...m, importato: true, creatoIl: new Date().toISOString()
              };
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(movsObj);
          }
          return;
        }

        if (hasOldImport) {
          if (confirm("Rilevata vecchia versione dei movimenti importati (Release 2/3.0/3.1). Aggiornare alla Release 3.2 con i prelievi POS riclassificati correttamente? I movimenti importati verranno ricaricati (i movimenti che hai creato tu rimangono invariati).")) {
            const updates = {};
            Object.entries(movsSnap.val() || {}).forEach(([k, m]) => {
              if (m.importato) updates[k] = null;
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
            const movsObj = {};
            SEED_MOVIMENTI.forEach((m, i) => {
              movsObj[`seed_${String(i).padStart(4,'0')}`] = {
                ...m, importato: true, creatoIl: new Date().toISOString()
              };
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(movsObj);
          }
        }

        // Migration v3.10: inserisci scrittura di apertura completa
        const hasApertura = importati.some(m => m.apertura === true);
        if (!hasApertura) {
          if (confirm("Vuoi inserire la scrittura completa di APERTURA al 01/09/2025 (immobilizzazioni + fondi amm.to + crediti + debiti + patrimonio netto)?\n\nVerrà aggiunta come 25 movimenti datati 01/09/2025, e i saldi iniziali (FUTSAL/CASSA/POS) verranno trasferiti nella scrittura di apertura.\n\nQuesta operazione è raccomandata per una contabilità formalmente completa.")) {
            // Azzero i saldi iniziali (ora vengono dalla scrittura di apertura)
            await db.ref(`stagioni/${stagione}/saldiIniziali`).set({
              1: 0, 3: 0, 4: 0, 5: 0, 9: 0, 10: 0
            });
            // Inserisco i movimenti di apertura
            const apertureObj = {};
            APERTURA_MOVIMENTI.forEach((m, i) => {
              apertureObj[`apertura_${String(i).padStart(4,'0')}`] = m;
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(apertureObj);
            alert("Scrittura di apertura inserita correttamente. I saldi liquidità sono ora generati dai movimenti di apertura del 01/09/2025.");
          }
        }

        // Migration v3.13: aggiungi conto 80 + sistema cespiti + riclassifica rimborsi
        const contiSnapMig = await db.ref(`stagioni/${stagione}/conti`).once("value");
        const contiVal = contiSnapMig.val() || {};
        const has80 = Object.values(contiVal).some(c => c.codice === 80);
        const hasStampante = Object.values(contiVal).some(c => c.codice === 78);
        const hasTreppiede = Object.values(contiVal).some(c => c.codice === 79);

        const cespitiSnap = await db.ref(`stagioni/${stagione}/cespiti`).once("value");
        const cespitiVal = cespitiSnap.val() || {};
        const cespitiList = Object.entries(cespitiVal).map(([k,c]) => ({...c, _key: k}));

        const hasSpeakerNuovo = cespitiList.some(c =>
          (c.conto || "").toUpperCase().includes("SPEAKER") && Math.abs((c.costo_storico || 0) - 2338.83) < 0.5
        );
        const hasMaterialeAggiornato = cespitiList.some(c =>
          (c.conto || "").toUpperCase().includes("MATERIALE ALLENAMENTO") && Math.abs((c.costo_storico || 0) - 137.95) < 0.5
        );
        const hasStampanteCespite = cespitiList.some(c =>
          (c.conto || "").toUpperCase().includes("STAMPANTE")
        );
        const hasTreppiedeCespite = cespitiList.some(c =>
          (c.conto || "").toUpperCase().includes("TREPPIEDE")
        );
        const oldLavagnetta = cespitiList.find(c => (c.conto || "").trim().toUpperCase() === "LAVAGNETTA");
        const oldTelecamera = cespitiList.find(c => (c.conto || "").trim().toUpperCase() === "TELECAMERA PER FUTSAL");
        const oldCostiImpianto = cespitiList.find(c => (c.conto || "").trim().toUpperCase() === "COSTI IMPIANTO");

        // Check rimborsi spese su conto 36 da spostare
        const rimborsiDaSpostare = Object.entries(movsSnap.val() || {}).filter(([k, m]) => {
          if (m.contoPdC !== 36) return false;
          if (m.tipo !== "uscita") return false;
          const cat = (m.categoria || "").toUpperCase();
          const desc = (m.descrizione || "").toUpperCase();
          return cat.includes("RIMBORSO") || desc.includes("RIMBORSO") || desc.includes("RIMBORSI");
        });

        const needsMigration = !has80 || !hasSpeakerNuovo || !hasMaterialeAggiornato ||
                               (hasStampante && !hasStampanteCespite) ||
                               (hasTreppiede && !hasTreppiedeCespite) ||
                               oldLavagnetta || oldTelecamera || oldCostiImpianto ||
                               rimborsiDaSpostare.length > 0;

        if (needsMigration) {
          const lines = ["Rilevati disallineamenti da sistemare:\n"];
          if (!has80) lines.push("• Aggiungere conto 80 RIMBORSI SPESE SOCI");
          if (!hasSpeakerNuovo) lines.push("• Aggiungere SPEAKER nuovo 2.338,83 € (Altoparlanti Thomann)");
          if (!hasMaterialeAggiornato) lines.push("• Aggiornare MATERIALE ALLENAMENTO FUTSAL: 65,95 → 137,95 € (aggiunti palloni Tuttocampo)");
          if (hasStampante && !hasStampanteCespite) lines.push("• Aggiungere cespite STAMPANTE SCONTRINI 70 €");
          if (hasTreppiede && !hasTreppiedeCespite) lines.push("• Aggiungere cespite TREPPIEDE 35 €");
          if (oldLavagnetta) lines.push("• Rinominare LAVAGNETTA → LAVAGNETTA FUTSAL");
          if (oldTelecamera) lines.push("• Rinominare TELECAMERA PER FUTSAL → TELECAMERA FUTSAL");
          if (oldCostiImpianto) lines.push("• Rinominare COSTI IMPIANTO → COSTI DI IMPIANTO");
          if (rimborsiDaSpostare.length > 0) lines.push(`• Riclassificare ${rimborsiDaSpostare.length} rimborsi spese da conto 36 a conto 80 (€${rimborsiDaSpostare.reduce((s,[,m])=>s+(m.importo||0),0).toFixed(2)})`);
          lines.push("\nProcedere con la migration?");

          if (confirm(lines.join("\n"))) {
            // Conto 80
            if (!has80) {
              await db.ref(`stagioni/${stagione}/conti/c80`).set({
                codice: 80,
                nome: "RIMBORSI SPESE SOCI",
                eccedenza: "DARE",
                prospetto: "CE",
                categoria: "COSTI"
              });
            }

            // Speaker nuovo
            if (!hasSpeakerNuovo) {
              await db.ref(`stagioni/${stagione}/cespiti`).push({
                conto: "SPEAKER",
                classe: "IMMOBILIZZAZIONI MATERIALI",
                n_beni: 1,
                costo_unitario: 2338.83,
                anno_inizio: 2026,
                costo_storico: 2338.83,
                aliquota: 0,
                quota_esercizio: 0,
                fondo_ammortamento: 0,
              });
            }

            // Stampante scontrini cespite
            if (hasStampante && !hasStampanteCespite) {
              await db.ref(`stagioni/${stagione}/cespiti`).push({
                conto: "STAMPANTE SCONTRINI",
                classe: "IMMOBILIZZAZIONI MATERIALI",
                n_beni: 1,
                costo_unitario: 70,
                anno_inizio: 2026,
                costo_storico: 70,
                aliquota: 0,
                quota_esercizio: 0,
                fondo_ammortamento: 0,
              });
            }

            // Treppiede cespite
            if (hasTreppiede && !hasTreppiedeCespite) {
              await db.ref(`stagioni/${stagione}/cespiti`).push({
                conto: "TREPPIEDE",
                classe: "IMMOBILIZZAZIONI MATERIALI",
                n_beni: 1,
                costo_unitario: 35,
                anno_inizio: 2026,
                costo_storico: 35,
                aliquota: 0,
                quota_esercizio: 0,
                fondo_ammortamento: 0,
              });
            }

            // Materiale allenamento aggiornato
            if (!hasMaterialeAggiornato) {
              const matCesp = cespitiList.find(c => (c.conto || "").toUpperCase().includes("MATERIALE ALLENAMENTO"));
              if (matCesp) {
                await db.ref(`stagioni/${stagione}/cespiti/${matCesp._key}`).update({
                  costo_storico: 137.95,
                  costo_unitario: 137.95,
                  n_beni: 1,
                });
              }
            }

            // Rinomine
            if (oldLavagnetta) {
              await db.ref(`stagioni/${stagione}/cespiti/${oldLavagnetta._key}`).update({ conto: "LAVAGNETTA FUTSAL" });
            }
            if (oldTelecamera) {
              await db.ref(`stagioni/${stagione}/cespiti/${oldTelecamera._key}`).update({ conto: "TELECAMERA FUTSAL" });
            }
            if (oldCostiImpianto) {
              await db.ref(`stagioni/${stagione}/cespiti/${oldCostiImpianto._key}`).update({ conto: "COSTI DI IMPIANTO" });
            }

            // Riclassifica rimborsi: 36 → 80
            for (const [movKey, m] of rimborsiDaSpostare) {
              await db.ref(`stagioni/${stagione}/movimenti/${movKey}`).update({
                contoPdC: 80,
                modificatoIl: new Date().toISOString()
              });
            }

            alert("Migration completata.\n\nNota: la discrepanza PALLONI FUTSAL (cespite 227 vs movimento 199, +28€) non è stata sistemata: verifica manualmente.\n\nPer i nuovi cespiti (Speaker, Stampante, Treppiede) l'aliquota è a 0%: impostala tu dalla matita ✎ in Cespiti.");
          }
        }
        return;
      }
      const contiSnap = await db.ref(`stagioni/${stagione}/conti`).once("value");
      if (!contiSnap.exists() && stagione === STAGIONE_DEFAULT) {
        await seedStagione();
      }
    })();
  }, [stagione]);

  const showToast = (msg, type="success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2400);
  };

  const newStagione = async () => {
    const next = prompt("Nuova stagione (formato YY-YY, es. 26-27):");
    if (!next || !/^\d{2}-\d{2}$/.test(next)) return alert("Formato non valido");
    const key = `20${next.split("-")[0]}-${next.split("-")[1]}`;
    const annoY1 = `20${next.split("-")[0]}`;
    try {
      const esiste = await db.ref(`stagioni/${key}/meta`).once("value");
      if (esiste.exists()) {
        if (confirm(`La stagione ${key} esiste già. Vuoi solo aprirla (senza modificarla)?`)) setStagione(key);
        return;
      }
      // Calcola la riapertura dai saldi finali della stagione corrente
      const { aperture, utile, totAttivo, totPassivo, nConti, residuo60 } = generaRiapertura(movimenti, saldiIniziali, conti, annoY1);
      let msg = `RIAPERTURA  ${stagione}  →  ${key}\n\n`;
      msg += `• Risultato d'esercizio ${stagione} portato a Riserva: ${fmtEuro(utile)}\n`;
      msg += `• Conti patrimoniali riportati: ${nConti}\n`;
      msg += `• Totale attivo di apertura: ${fmtEuro(totAttivo)}\n`;
      msg += `• Totale passivo e netto: ${fmtEuro(totPassivo)}\n`;
      msg += `• Movimenti di apertura creati al ${annoY1}-09-01: ${aperture.length}\n\n`;
      if (Math.abs(totAttivo - totPassivo) > 0.01) msg += `⚠ Attivo e Passivo non coincidono (diff. ${fmtEuro(totAttivo - totPassivo)}). Controlla i prospetti dei conti.\n`;
      if (Math.abs(residuo60) > 0.01) msg += `⚠ Il conto Bilancio di Apertura della stagione ${stagione} non è a zero (${fmtEuro(residuo60)}): la chiusura precedente potrebbe non quadrare.\n`;
      msg += `\nVengono copiati piano dei conti, business unit e categorie del Rendiconto.\n`;
      msg += `I cespiti NON vengono copiati (i fondi ammortamento sono già riportati come saldi).\n\nProcedere con la riapertura?`;
      if (!confirm(msg)) return;

      const contiObj = {}; conti.forEach(c => { contiObj[`c${c.codice}`] = c; });
      const movsObj = {}; aperture.forEach((m, i) => { movsObj[`apertura_${String(i).padStart(4, "0")}`] = m; });
      const buObj = (bu && bu.length ? bu : BUSINESS_UNITS_DEFAULT).reduce((acc, b, i) => { acc[`bu_${i}`] = { nome: b, ordine: i }; return acc; }, {});
      const upd = {
        meta: { stagione: key, creataIl: new Date().toISOString(), version: APP_VERSION, riapertaDa: stagione },
        conti: contiObj,
        movimenti: movsObj,
        saldiIniziali: { 1: 0, 3: 0, 4: 0, 5: 0, 9: 0, 10: 0 },
        businessUnits: buObj,
      };
      if (categorieRF && Object.keys(categorieRF).length) upd.categorieRF = categorieRF;
      await db.ref(`stagioni/${key}`).update(upd);
      setStagione(key);
      showToast(`Stagione ${key} riaperta da ${stagione} · utile a riserva ${fmtEuro(utile)}`);
    } catch(e) { alert("Errore: " + e.message); }
  };

  if (!logged) return <Login onLogin={() => setLogged(true)} />;

  if (!firebaseReady) {
    return (
      <div className="login-shell">
        <div className="login-card">
          <div className="logo">Configurazione richiesta</div>
          <div className="tag" style={{marginBottom:20}}>Firebase non è ancora configurato.</div>
          <p style={{fontSize:13, lineHeight:1.6, color:"var(--ink-2)"}}>
            Apri il file <span className="mono">index.html</span> e incolla la configurazione Firebase del progetto <span className="mono">contabilita-ffabbrico</span> nel blocco <span className="mono">FIREBASE_CONFIG</span> (è ai primissimi righi dello script). Poi ricarica.
          </p>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="topbar">
        <button className="menu-btn" onClick={() => setSidebarOpen(!sidebarOpen)} aria-label="Menu">☰</button>
        <h1>Futsal Fabbrico ASD <span className="sub">— Contabilità</span></h1>
        <span className="badge desktop-only">Stagione</span>
        <select value={stagione} onChange={e => setStagione(e.target.value)}>
          {stagioniDisponibili.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <button className="icon-btn desktop-only" onClick={newStagione}>+ Nuova stagione</button>
        <button className="icon-btn" onClick={() => { sessionStorage.removeItem(SESSION_KEY); setLogged(false); }}>Esci</button>
      </div>

      <div className="layout">
        <nav className={"sidebar " + (sidebarOpen ? "open" : "")} onClick={(e) => {
