// ---------- Sottosezione: Incassi serate (composizione fondo cassa per serata) ----------
const TAGLI_TDP = [
  { val: 500, tipo: "banconota" }, { val: 200, tipo: "banconota" }, { val: 100, tipo: "banconota" },
  { val: 50, tipo: "banconota" }, { val: 20, tipo: "banconota" }, { val: 10, tipo: "banconota" },
  { val: 5, tipo: "banconota" },
  { val: 2, tipo: "moneta" }, { val: 1, tipo: "moneta" }, { val: 0.50, tipo: "moneta" },
  { val: 0.20, tipo: "moneta" }, { val: 0.10, tipo: "moneta" }, { val: 0.05, tipo: "moneta" },
  { val: 0.02, tipo: "moneta" }, { val: 0.01, tipo: "moneta" },
];
const totaleTagli = (q) => TAGLI_TDP.reduce((s, t) => s + (Number(q && q[t.val]) || 0) * t.val, 0);
const totFondoSerata = (s) => { const c = totaleTagli(s.fondo); return c > 0 ? c : (Number(s.fondoIniziale) || 0); };
const totContaSerata = (s) => { const c = totaleTagli(s.conta); return c > 0 ? c : (Number(s.fondoFinale) || 0); };
const posSerata = (s) => Number(s.pos) || 0;

function GrigliaTagli({ titolo, emoji, quantita, onSet, onAzzera, accentColor }) {
  const subtot = (tipo) => TAGLI_TDP.filter(t => t.tipo === tipo).reduce((s, t) => s + (Number(quantita && quantita[t.val]) || 0) * t.val, 0);
  const tot = subtot("banconota") + subtot("moneta");
  const renderTabella = (tipo, intestazione) => (
    <table className="tbl" style={{ margin: 0 }}>
      <thead>
        <tr>
          <th className="num" style={{ width: 66 }}>{intestazione}</th>
          <th className="num" style={{ width: 60 }}>Pezzi</th>
          <th className="num">Totale</th>
        </tr>
      </thead>
      <tbody>
        {TAGLI_TDP.filter(t => t.tipo === tipo).map(t => {
          const n = Number(quantita && quantita[t.val]) || 0;
          const r = n * t.val;
          return (
            <tr key={t.val}>
              <td className="num" style={{ fontWeight: 600 }}>{fmtEuro(t.val)}</td>
              <td className="num">
                <input type="number" inputMode="numeric" min="0" value={n || ""} placeholder="0"
                       onChange={e => onSet(t.val, Number(e.target.value))}
                       style={{ width: 54, padding: "3px 6px", border: "1px solid var(--rule)", borderRadius: 4, textAlign: "right" }} />
              </td>
              <td className="num" style={{ color: r > 0 ? "var(--accent-ink)" : "var(--ink-3)" }}>{r > 0 ? fmt(r) : "—"}</td>
            </tr>
          );
        })}
        <tr style={{ borderTop: "1px solid var(--rule-2)", fontWeight: 600, background: "var(--panel-2)" }}>
          <td colSpan={2} style={{ fontSize: 11.5, color: "var(--ink-3)" }}>SUBTOT.</td>
          <td className="num">{fmt(subtot(tipo))}</td>
        </tr>
      </tbody>
    </table>
  );
  return (
    <div style={{ flex: "1 1 320px", border: "1px solid var(--rule)", borderRadius: 8, padding: 14, background: "var(--panel)" }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 10, gap: 8 }}>
        <h4 style={{ margin: 0, fontSize: 14 }}>{emoji} {titolo}</h4>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span className="mono" style={{ fontSize: 13.5, fontWeight: 700, color: accentColor || "var(--accent-ink)" }}>{fmtEuro(tot)}</span>
          <button className="btn ghost sm" onClick={onAzzera} title="Azzera questa composizione">↺</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {renderTabella("banconota", "Banconote")}
        {renderTabella("moneta", "Monete")}
      </div>
    </div>
  );
}

function TorneoIncassiSerate({ stagione, onToast }) {
  const [serate, setSerate] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!firebaseReady) { setLoading(false); return; }
    const ref = db.ref(`stagioni/${stagione}/torneo/serate`);
    const cb = ref.on("value", snap => { setSerate(snap.val() || {}); setLoading(false); });
    return () => ref.off("value", cb);
  }, [stagione]);

  const lista = useMemo(() =>
    Object.entries(serate).map(([id, s]) => ({ ...s, id }))
      .sort((a, b) => (a.data || "").localeCompare(b.data || "")), [serate]);

  const tot = useMemo(() => {
    let f = 0, c = 0, p = 0, reg = 0;
    lista.forEach(s => {
      f += totFondoSerata(s);
      c += totContaSerata(s);
      p += posSerata(s);
      if (s.reg && s.reg.totale) reg += Number(s.reg.totale) || 0;
    });
    return { fondo: f, conta: c, pos: p, netto: c - f, registrato: reg, n: lista.length };
  }, [lista]);

  const aggiungiSerata = async () => {
    const id = "s_" + uid();
    try {
      await db.ref(`stagioni/${stagione}/torneo/serate/${id}`).set({
        id, etichetta: `Serata ${lista.length + 1}`, data: todayISO(),
        fondo: {}, conta: {}, reg: null,
      });
      onToast("Serata aggiunta");
    } catch (e) { alert("Errore: " + e.message); }
  };

  return (
    <div>
      {/* Complessivo finale */}
      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <div className="kpi">
          <div className="label">Serate</div>
          <div className="value">{tot.n}</div>
          <div className="hint">registrate nel torneo</div>
        </div>
        <div className="kpi">
          <div className="label">Totale fondi cassa</div>
          <div className="value" style={{ color: "var(--ink-2)" }}>{fmtEuro(tot.fondo)}</div>
          <div className="hint">somma fondi iniziali</div>
        </div>
        <div className="kpi">
          <div className="label">Totale contato a fine</div>
          <div className="value" style={{ color: "var(--ink-2)" }}>{fmtEuro(tot.conta)}</div>
          <div className="hint">somma conte finali</div>
        </div>
        <div className="kpi accent">
          <div className="label">Netto incassato complessivo</div>
          <div className="value">{fmtEuro(tot.netto)}</div>
          <div className="hint">contante: contato − fondo</div>
        </div>
        <div className="kpi">
          <div className="label">POS incassato</div>
          <div className="value" style={{ color: "var(--ink-2)" }}>{fmtEuro(tot.pos)}</div>
          <div className="hint">va su POS C/C · {fmtEuro(tot.registrato)} in contabilità</div>
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, gap: 12, flexWrap: "wrap" }}>
        <div style={{ fontSize: 13, color: "var(--ink-2)" }}>
          Una scheda per serata: <strong>composizione del fondo cassa iniziale</strong> e <strong>conta di fine serata</strong>. Il <strong>netto incassato</strong> è la differenza, registrabile in contabilità (conto {CONTO_ENTRATE_SERATE} ENTRATE SERATE TORNEO).
        </div>
        <button className="btn accent sm" onClick={aggiungiSerata}>+ Aggiungi serata</button>
      </div>

      {loading ? (
        <div className="empty-state">Caricamento…</div>
      ) : lista.length === 0 ? (
        <div className="card" style={{ textAlign: "center" }}>
          <h3 className="card-title">Nessuna serata</h3>
          <p style={{ fontSize: 13, color: "var(--ink-2)" }}>Usa <strong>+ Aggiungi serata</strong> per registrare la prima.</p>
        </div>
      ) : (
        lista.map(s => <SerataCard key={s.id} serata={s} stagione={stagione} onToast={onToast} />)
      )}

      {lista.length > 0 && (
        <div className="card" style={{ marginTop: 20 }}>
          <h3 style={{ margin: "0 0 12px" }}>📊 Riepilogo serate</h3>
          <div className="tbl-wrap" style={{ margin: 0 }}>
            <table className="tbl" style={{ margin: 0 }}>
              <thead>
                <tr>
                  <th>Serata</th>
                  <th style={{ width: 110 }}>Data</th>
                  <th className="num">Fondo cassa</th>
                  <th className="num">Contato fine</th>
                  <th className="num">Netto contante</th>
                  <th className="num">POS</th>
                  <th className="num">Totale</th>
                  <th style={{ width: 120 }}>Contabilità</th>
                </tr>
              </thead>
              <tbody>
                {lista.map(s => {
                  const f = totFondoSerata(s), c = totContaSerata(s), p = posSerata(s);
                  const netto = Math.round((c - f) * 100) / 100;
                  const totSer = Math.round((netto + p) * 100) / 100;
                  const posted = s.reg && Array.isArray(s.reg.movimentiIds) && s.reg.movimentiIds.length > 0;
                  return (
                    <tr key={s.id}>
                      <td style={{ fontWeight: 600 }}>{s.etichetta || "—"}</td>
                      <td style={{ fontSize: 12, color: "var(--ink-2)" }}>{fmtDate(s.data)}</td>
                      <td className="num">{fmt(f)}</td>
                      <td className="num">{fmt(c)}</td>
                      <td className="num" style={{ fontWeight: 600, color: netto >= 0 ? "var(--accent-ink)" : "var(--danger)" }}>{fmt(netto)}</td>
                      <td className="num" style={{ color: p > 0 ? "var(--ink-2)" : "var(--ink-3)" }}>{p > 0 ? fmt(p) : "—"}</td>
                      <td className="num" style={{ fontWeight: 700, color: totSer >= 0 ? "var(--accent-ink)" : "var(--danger)" }}>{fmt(totSer)}</td>
                      <td>{posted
                        ? <span className="pill" style={{ background: "var(--accent-soft)", borderColor: "#c8d8ce", color: "var(--accent-ink)" }}>✓ {fmt(s.reg.totale || 0)}</span>
                        : <span className="pill" style={{ background: "var(--danger-soft)", borderColor: "#f1d6d6", color: "var(--danger)" }}>da reg.</span>}</td>
                    </tr>
                  );
                })}
                <tr style={{ borderTop: "2px solid var(--ink)", fontWeight: 700, background: "var(--panel-2)" }}>
                  <td colSpan={2} style={{ fontFamily: "'Fraunces',serif" }}>COMPLESSIVO</td>
                  <td className="num">{fmt(tot.fondo)}</td>
                  <td className="num">{fmt(tot.conta)}</td>
                  <td className="num" style={{ color: tot.netto >= 0 ? "var(--accent-ink)" : "var(--danger)" }}>{fmt(tot.netto)}</td>
                  <td className="num">{fmt(tot.pos)}</td>
                  <td className="num" style={{ color: "var(--accent-ink)" }}>{fmt(tot.netto + tot.pos)}</td>
                  <td className="num" style={{ fontSize: 12, color: "var(--ink-3)" }}>{fmt(tot.registrato)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function SerataCard({ serata, stagione, onToast }) {
  const path = `stagioni/${stagione}/torneo/serate/${serata.id}`;
  const patch = (p) => db.ref(path).update(p);

  const [fondo, setFondo] = useState(serata.fondo || {});
  const [conta, setConta] = useState(serata.conta || {});
  const [pos, setPos] = useState(serata.pos != null ? String(serata.pos) : "");
  const [righe, setRighe] = useState(null);
  const [dataPag, setDataPag] = useState(serata.data || todayISO());
  const [aperta, setAperta] = useState(true);

  // Persisto le composizioni (e la voce POS) con un piccolo debounce: evita scatti del cursore mentre si digita.
  const skipFirst = useRef(true);
  useEffect(() => {
    if (skipFirst.current) { skipFirst.current = false; return; }
    const t = setTimeout(() => { patch({ fondo, conta, pos: Number(pos) || 0 }); }, 600);
    return () => clearTimeout(t);
  }, [fondo, conta, pos]);

  const totFondo = useMemo(() => { const c = totaleTagli(fondo); return c > 0 ? c : (Number(serata.fondoIniziale) || 0); }, [fondo, serata.fondoIniziale]);
  const totConta = useMemo(() => { const c = totaleTagli(conta); return c > 0 ? c : (Number(serata.fondoFinale) || 0); }, [conta, serata.fondoFinale]);
  const netto = Math.round((totConta - totFondo) * 100) / 100;
  const posVal = Math.round((Number(pos) || 0) * 100) / 100;

  const reg = serata.reg || null;
  const posted = reg && Array.isArray(reg.movimentiIds) && reg.movimentiIds.length > 0;

  const setQ = (which, val, n) => {
    if (which === "fondo") setFondo(prev => ({ ...prev, [val]: n }));
    else setConta(prev => ({ ...prev, [val]: n }));
  };
  const azzera = (which) => {
    if (!confirm(`Azzerare la composizione ${which === "fondo" ? "del fondo cassa iniziale" : "della conta finale"}?`)) return;
    if (which === "fondo") setFondo({}); else setConta({});
  };

  const eliminaSerata = async () => {
    if (!confirm(`Eliminare "${serata.etichetta || "serata"}"?` + (posted ? " I movimenti registrati verranno rimossi." : ""))) return;
    try {
      if (posted) for (const id of reg.movimentiIds) await db.ref(`stagioni/${stagione}/movimenti/${id}`).remove();
      await db.ref(path).remove();
      onToast("Serata eliminata");
    } catch (e) { alert("Errore: " + e.message); }
  };

  const proponiRighe = () => {
    const r = [];
    if (netto > 0) r.push({ conto: 3, importo: String(netto) });
    if (posVal > 0) r.push({ conto: 5, importo: String(posVal) });
    return r.length ? r : [{ conto: 3, importo: "" }];
  };
  const apriScrittura = () => setRighe(proponiRighe());
  const setRiga = (i, p) => setRighe(rs => rs.map((r, idx) => idx === i ? { ...r, ...p } : r));
  const addRiga = () => setRighe(rs => [...rs, { conto: 5, importo: "" }]);
  const removeRiga = (i) => setRighe(rs => rs.length > 1 ? rs.filter((_, idx) => idx !== i) : rs);
  const totScrittura = (righe || []).reduce((s, r) => s + (Number(r.importo) || 0), 0);

  const registra = async () => {
    const valide = (righe || [])
      .map(r => ({ conto: Number(r.conto), importo: Math.round((Number(r.importo) || 0) * 100) / 100 }))
      .filter(r => r.importo > 0 && r.conto);
    if (valide.length === 0) return alert("Inserisci almeno una riga con importo e conto.");
    try {
      await patch({ fondo, conta, pos: posVal }); // salvo eventuali modifiche pendenti
      const ids = [];
      for (const r of valide) {
        const mov = {
          tipo: "entrata", data: dataPag, contoLiquidita: r.conto, contoLiquiditaDest: null,
          contoPdC: CONTO_ENTRATE_SERATE, categoria: "INCASSI SERATE TDP", bu: "TDP", mese: meseDaData(dataPag),
          nonMonetario: false, importo: r.importo,
          descrizione: "Incasso serata " + (serata.etichetta || fmtDate(serata.data)),
          origineSerata: serata.id, creatoIl: new Date().toISOString(), modificatoIl: new Date().toISOString(),
        };
        const ref = db.ref(`stagioni/${stagione}/movimenti`).push();
        await ref.set(mov);
        ids.push(ref.key);
      }
      await patch({ reg: { movimentiIds: ids, righe: valide, registratoIl: new Date().toISOString(), totale: Math.round(totScrittura * 100) / 100 } });
      setRighe(null);
      onToast(`Serata registrata · ${valide.length} movimento/i`);
    } catch (e) { alert("Errore: " + e.message); }
  };

  const annullaRegistrazione = async () => {
    if (!posted) return;
    if (!confirm("Annullare la registrazione di questa serata? I movimenti collegati verranno rimossi.")) return;
    try {
      for (const id of reg.movimentiIds) await db.ref(`stagioni/${stagione}/movimenti/${id}`).remove();
      await patch({ reg: null });
      onToast("Registrazione serata annullata");
    } catch (e) { alert("Errore: " + e.message); }
  };

  return (
    <div className="card" style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
        <button className="btn ghost sm" onClick={() => setAperta(a => !a)} title={aperta ? "Comprimi" : "Espandi"}>{aperta ? "▾" : "▸"}</button>
        <input type="text" value={serata.etichetta || ""} onChange={e => patch({ etichetta: e.target.value })}
               placeholder="Etichetta serata" style={{ flex: "1 1 200px", fontWeight: 600 }} />
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <label style={{ fontSize: 12, color: "var(--ink-3)" }}>Data</label>
          <input type="date" value={serata.data || ""} onChange={e => { patch({ data: e.target.value }); setDataPag(e.target.value); }} />
        </div>
        {posted
          ? <span className="pill" style={{ background: "var(--accent-soft)", borderColor: "#c8d8ce", color: "var(--accent-ink)" }}>registrata · {fmtEuro(reg.totale || 0)}</span>
          : <span className="pill" style={{ background: "var(--danger-soft)", borderColor: "#f1d6d6", color: "var(--danger)" }}>da registrare</span>}
        <button className="btn danger sm" onClick={eliminaSerata} style={{ marginLeft: "auto" }}>🗑 Elimina</button>
      </div>

      {/* KPI della serata: fondo, conta, netto */}
      <div className="kpi-grid" style={{ marginBottom: aperta ? 16 : 0 }}>
        <div className="kpi">
          <div className="label">Fondo cassa iniziale</div>
          <div className="value" style={{ fontSize: 20, color: "var(--ink-2)" }}>{fmtEuro(totFondo)}</div>
          <div className="hint">composizione di partenza</div>
        </div>
        <div className="kpi">
          <div className="label">Contato a fine serata</div>
          <div className="value" style={{ fontSize: 20, color: "var(--ink-2)" }}>{fmtEuro(totConta)}</div>
          <div className="hint">conta fisica finale</div>
        </div>
        <div className="kpi accent">
          <div className="label">Netto incassato</div>
          <div className="value" style={{ fontSize: 20, color: netto >= 0 ? undefined : "var(--danger)" }}>{fmtEuro(netto)}</div>
          <div className="hint">contato − fondo</div>
        </div>
      </div>

      {aperta && (
        <>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 14 }}>
            <GrigliaTagli titolo="Composizione fondo cassa" emoji="🏦" quantita={fondo}
                          onSet={(v, n) => setQ("fondo", v, n)} onAzzera={() => azzera("fondo")} accentColor="var(--ink-2)" />
            <GrigliaTagli titolo="Conta di fine serata" emoji="🧮" quantita={conta}
                          onSet={(v, n) => setQ("conta", v, n)} onAzzera={() => azzera("conta")} accentColor="var(--accent-ink)" />
          </div>

          {/* Voce POS della serata → andrà su POS C/C in registrazione */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 14, padding: "10px 14px", background: "var(--panel-2)", border: "1px solid var(--rule)", borderRadius: 8 }}>
            <label style={{ fontSize: 13, fontWeight: 600 }}>💳 Incasso POS</label>
            <input type="number" inputMode="decimal" step="0.01" min="0" placeholder="0,00" value={pos}
                   onChange={e => setPos(e.target.value)}
                   style={{ width: 130, padding: "5px 8px", border: "1px solid var(--rule)", borderRadius: 4, textAlign: "right" }} />
            <span style={{ fontSize: 11.5, color: "var(--ink-3)" }}>€ · in registrazione va su <strong>POS C/C</strong> (conto 5), separato dal netto contante</span>
            {posVal > 0 && (
              <span className="mono" style={{ marginLeft: "auto", fontSize: 13 }}>
                Totale serata: <strong style={{ color: "var(--accent-ink)" }}>{fmtEuro(netto + posVal)}</strong>
                <span style={{ color: "var(--ink-3)", fontWeight: 400 }}> (contante {fmtEuro(netto)} + POS {fmtEuro(posVal)})</span>
              </span>
            )}
          </div>
          {posted ? (
            <div style={{ padding: "10px 14px", background: "var(--accent-soft)", border: "1px solid #c8d8ce", borderRadius: 8, fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <span>Registrata in contabilità: {(reg.righe || []).map((r, i) => {
                const c = CONTI_LIQUIDITA.find(x => x.codice === r.conto);
                return <span key={i} className="pill" style={{ marginLeft: 4 }}>{(c ? c.nome.trim() : "conto " + r.conto)}: {fmt(r.importo)}</span>;
              })}</span>
              <button className="btn danger sm" onClick={annullaRegistrazione}>Annulla registrazione</button>
            </div>
          ) : righe === null ? (
            <button className="btn accent sm" onClick={apriScrittura} disabled={netto <= 0 && posVal <= 0}>
              {(netto > 0 || posVal > 0) ? "Proponi scrittura (contante + POS)" : "Nulla da registrare"}
            </button>
          ) : (
            <div style={{ padding: "12px 14px", background: "var(--panel-2)", border: "1px solid var(--rule)", borderRadius: 8 }}>
              <div style={{ fontSize: 12.5, color: "var(--ink-2)", marginBottom: 10 }}>
                Scrittura suggerita: incasso serata in avere su <strong>{CONTO_ENTRATE_SERATE} ENTRATE SERATE TORNEO</strong>, ripartito per conto di liquidità (BU TDP). Netto contante su <strong>CASSA</strong>, POS su <strong>POS C/C</strong>. Modifica liberamente, poi registra.
              </div>
              {righe.map((r, i) => (
                <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                  <input type="number" inputMode="decimal" step="0.01" placeholder="Importo €" value={r.importo}
                         onChange={e => setRiga(i, { importo: e.target.value })} style={{ flex: "0 0 130px" }} />
                  <select value={r.conto} onChange={e => setRiga(i, { conto: Number(e.target.value) })} style={{ flex: 1 }}>
                    {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{String(c.codice).padStart(2, "0")} · {c.nome.trim()}</option>)}
                  </select>
                  <button className="btn danger sm" onClick={() => removeRiga(i)} disabled={righe.length <= 1}>🗑</button>
                </div>
              ))}
              <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "space-between", flexWrap: "wrap" }}>
                <div style={{ display: "flex", gap: 8 }}>
                  <button className="btn ghost sm" onClick={addRiga}>+ Aggiungi conto</button>
                  <button className="btn ghost sm" onClick={() => setRighe(proponiRighe())}>↻ ricalcola</button>
                </div>
                <span style={{ fontSize: 13 }}>Totale: <strong className="mono">{fmtEuro(totScrittura)}</strong></span>
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--rule)" }}>
                <button className="btn ghost" onClick={() => setRighe(null)}>Ignora</button>
                <button className="btn accent" onClick={registra}>Registra in contabilità</button>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ---------- Sottosezione: Resoconto CassaPro generale (import unico, come prima) ----------
function TorneoResocontoGenerale({ stagione, onToast }) {
  const [imp, setImp] = useState(null);
  const [loading, setLoading] = useState(true);
  const [parsing, setParsing] = useState(false);
  const fileRef = useRef(null);

  useEffect(() => {
    if (!firebaseReady) { setLoading(false); return; }
    const ref = db.ref(`stagioni/${stagione}/torneo/cassapro`);
    const cb = ref.on("value", snap => { setImp(snap.exists() ? snap.val() : null); setLoading(false); });
    return () => ref.off("value", cb);
  }, [stagione]);

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (typeof XLSX === "undefined") { alert("Libreria Excel non caricata. Ricarica la pagina."); return; }
    setParsing(true);
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array" });
        const sheets = wb.SheetNames.map(name => {
          const ws = wb.Sheets[name];
          const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: "" });
          const nonEmpty = aoa.filter(r => Array.isArray(r) && r.some(c => c !== "" && c !== null && c !== undefined));
          const header = (nonEmpty[0] || []).map(h => (h === "" || h == null) ? "" : String(h));
          return { name, header, rows: nonEmpty.slice(1) };
        }).filter(s => s.header.length > 0 || s.rows.length > 0);
        if (sheets.length === 0) { alert("Il file non contiene dati leggibili."); setParsing(false); return; }
        const payload = { filename: file.name, importedAt: new Date().toISOString(), sheets };
        if (firebaseReady) await db.ref(`stagioni/${stagione}/torneo/cassapro`).set(payload);
        else setImp(payload);
        if (onToast) onToast("Resoconto CassaPro importato");
      } catch (err) { alert("Errore lettura file: " + err.message); }
      finally { setParsing(false); if (fileRef.current) fileRef.current.value = ""; }
    };
    reader.onerror = () => { alert("Impossibile leggere il file."); setParsing(false); };
    reader.readAsArrayBuffer(file);
  };

  const clearImport = async () => {
    if (!confirm("Rimuovere il resoconto CassaPro importato?")) return;
    try {
      if (firebaseReady) await db.ref(`stagioni/${stagione}/torneo/cassapro`).remove();
      else setImp(null);
      if (onToast) onToast("Import rimosso");
    } catch (e) { alert("Errore: " + e.message); }
  };

  const totaliColonne = (sheet) => {
    const tot = {}; let any = false;
    (sheet.rows || []).forEach(r => (sheet.header || []).forEach((h, i) => {
      const v = r[i];
      if (typeof v === "number" && !isNaN(v)) { tot[i] = (tot[i] || 0) + v; any = true; }
    }));
    return any ? tot : null;
  };

  return (
    <div>
      <div className="card" style={{ maxWidth: 760 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
          <div>
            <h3 className="card-title" style={{ margin: "0 0 4px" }}>Resoconto CassaPro (generale)</h3>
            <div style={{ fontSize: 12.5, color: "var(--ink-2)" }}>
              Import unico di tutto il torneo, solo consultazione. Per gli incassi da contabilizzare usa la scheda <strong>Incassi serate</strong>.
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{ display: "none" }} />
            <button className="btn accent" disabled={parsing} onClick={() => fileRef.current && fileRef.current.click()}>
              {parsing ? "Lettura…" : (imp ? "Sostituisci file" : "Importa Excel")}
            </button>
            {imp && <button className="btn ghost" onClick={clearImport}>Rimuovi</button>}
          </div>
        </div>
        {imp && (
          <div style={{ marginTop: 12, fontSize: 12, color: "var(--ink-3)" }}>
            <span className="mono">{imp.filename}</span> · importato il {fmtDate(imp.importedAt)} · {imp.sheets ? imp.sheets.length : 0} foglio/i
          </div>
        )}
      </div>

      {loading ? (
        <div className="empty-state" style={{ marginTop: 24 }}>Caricamento…</div>
      ) : !imp ? (
        <div className="card" style={{ marginTop: 20, textAlign: "center" }}>
          <h3 className="card-title">Nessun resoconto importato</h3>
          <p style={{ fontSize: 13, color: "var(--ink-2)" }}>Usa <strong>Importa Excel</strong> per caricare l'esportazione di CassaPro.</p>
        </div>
      ) : (
        (imp.sheets || []).map((sheet, si) => {
          const tot = totaliColonne(sheet);
          return (
            <div key={si} style={{ marginTop: 24 }}>
              <h3 className="serif" style={{ fontWeight: 500, fontSize: 17, margin: "0 0 10px" }}>
                {sheet.name} <span style={{ color: "var(--ink-3)", fontSize: 13, fontWeight: 400 }}>· {sheet.rows.length} righe</span>
              </h3>
              <div className="tbl-wrap" style={{ overflowX: "auto" }}>
                <table className="tbl" style={{ fontSize: 12.5 }}>
                  <thead><tr>{sheet.header.map((h, i) => <th key={i} className={typeof (sheet.rows[0] || [])[i] === "number" ? "num" : ""}>{h || <span style={{ color: "var(--ink-3)" }}>col {i + 1}</span>}</th>)}</tr></thead>
                  <tbody>
                    {sheet.rows.map((r, ri) => (
                      <tr key={ri}>{sheet.header.map((_, ci) => {
                        const v = r[ci]; const isNum = typeof v === "number";
                        return <td key={ci} className={isNum ? "num" : ""}>{v === "" || v == null ? "" : (isNum ? fmt(v) : String(v))}</td>;
                      })}</tr>
                    ))}
                    {tot && (
                      <tr style={{ borderTop: "2px solid var(--ink)", fontWeight: 700, background: "var(--panel-2)" }}>
                        {sheet.header.map((_, ci) => <td key={ci} className={tot[ci] !== undefined ? "num" : ""}>{ci === 0 ? "TOTALI" : (tot[ci] !== undefined ? fmt(tot[ci]) : "")}</td>)}
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// PAGINA: BUSINESS UNITS
// ============================================================
function PageBU({ bu, conti, movimenti, saldiIniziali, stagione, onToast }) {
  const [buData, setBuData] = useState([]);
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);
  const [drillDown, setDrillDown] = useState(null); // nome BU espansa

  const contiMap = useMemo(() => {
    const m = {};
    (conti || []).forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Carica BU complete (con chiavi)
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`stagioni/${stagione}/businessUnits`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setBuData(v ? Object.entries(v).map(([k,b]) => ({...b, _key: k})).sort((a,b) => (a.ordine || 0) - (b.ordine || 0)) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  // Libro giornale (partita doppia): ogni scrittura porta la sua BU e i suoi righi Dare/Avere.
  const ledgerBU = useMemo(
    () => generaLibroGiornale(movimenti, saldiIniziali || {}, contiMap),
    [movimenti, saldiIniziali, contiMap]
  );

  // Aggregazione corretta per BU usando Dare/Avere (così apertura e pagamento si compensano)
  const buAgg = useMemo(() => {
    // conteggio movimenti per BU e per (BU, conto)
    const counts = {};
    const countCC = {};
    movimenti.forEach(m => {
      const b = m.bu || "(senza BU)";
      counts[b] = (counts[b] || 0) + 1;
      [m.contoPdC, m.contoLiquidita, m.contoLiquiditaDest, m.contoContropartita].forEach(cod => {
        if (cod == null) return;
        countCC[`${b}|${cod}`] = (countCC[`${b}|${cod}`] || 0) + 1;
      });
    });

    // Dare/Avere per (BU, conto) dai righi del libro giornale
    const acc = {};
    ledgerBU.forEach(scr => {
      const b = scr.bu || "(senza BU)";
      if (!acc[b]) acc[b] = {};
      (scr.righe || []).forEach(r => {
        if (!acc[b][r.codice]) acc[b][r.codice] = { codice: r.codice, dare: 0, avere: 0 };
        acc[b][r.codice].dare += r.dare || 0;
        acc[b][r.codice].avere += r.avere || 0;
      });
    });

    const usoBU = {};
    const contiPerBU = {};
    const tutteBU = new Set([...Object.keys(acc), ...Object.keys(counts)]);
    tutteBU.forEach(b => {
      let ricaviTot = 0, costiTot = 0;
      const list = Object.values(acc[b] || {}).map(c => {
        const cat = contiMap[c.codice]?.categoria || "";
        const isRic = cat === "RICAVI";
        const isCos = cat === "COSTI" || cat === "COSTI/RICAVI";
        const netto = c.avere - c.dare; // >0 = eccedenza avere (ricavo), <0 = eccedenza dare (costo)
        if (isRic) ricaviTot += netto;         // ricavi netti (avere-dare)
        if (isCos) costiTot += (c.dare - c.avere); // costi netti (dare-avere)
        return {
          codice: c.codice,
          nome: contiMap[c.codice]?.nome?.trim() || `Conto ${c.codice}`,
          categoria: cat,
          count: countCC[`${b}|${c.codice}`] || 0,
          dare: c.dare, avere: c.avere,
          ricavi: isRic ? Math.max(0, netto) : 0,
          costi: isCos ? Math.max(0, c.dare - c.avere) : 0,
          netto: isRic ? netto : isCos ? -(c.dare - c.avere) : netto,
          patrimoniale: !isRic && !isCos,
        };
      })
        .filter(c => {
          const attivo = Math.abs(c.dare) > 0.005 || Math.abs(c.avere) > 0.005;
          if (!attivo) return false;
          if (c.patrimoniale) {
            // nascondo liquidità e conto transitorio 60; gli altri patrimoniali solo se ancora aperti
            if (c.categoria === "DISP. LIQUIDE" || c.codice === 60) return false;
            return Math.abs(c.netto) > 0.005;
          }
          return true; // ricavi/costi sempre
        })
        .sort((a, b2) => Math.abs(b2.netto) - Math.abs(a.netto));
      usoBU[b] = { count: counts[b] || 0, ricavi: ricaviTot, costi: costiTot };
      contiPerBU[b] = list;
    });
    return { usoBU, contiPerBU };
  }, [ledgerBU, movimenti, contiMap]);

  const usoBU = buAgg.usoBU;
  const contiPerBU = buAgg.contiPerBU;

  const save = async (data, oldKey) => {
    try {
      const key = oldKey || `bu_${Date.now().toString(36)}`;
      const ordine = oldKey ? data.ordine : buData.length;
      await db.ref(`stagioni/${stagione}/businessUnits/${key}`).set({
        nome: data.nome.trim().toUpperCase(),
        ordine,
      });
      onToast("Business Unit salvata");
      setEditing(null); setCreating(false);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const remove = async (b) => {
    const uso = usoBU[b.nome];
    if (uso && uso.count > 0) {
      if (!confirm(`⚠️ La BU "${b.nome}" è usata in ${uso.count} movimenti. Eliminarla farà perdere il collegamento (i movimenti resteranno ma con BU "(senza BU)"). Procedere?`)) return;
    } else {
      if (!confirm(`Eliminare la BU "${b.nome}"?`)) return;
    }
    await db.ref(`stagioni/${stagione}/businessUnits/${b._key}`).remove();
    onToast("BU eliminata");
  };
