const DOC_VUOTO = { tipo:"Visita medica", membroId:"", titolo:"", scadenza:"", note:"", modo:"file", link:"", file:null, nomeFile:"", mime:"", peso:0 };

function Documenti({documenti, membri, toast}){
  const [modale,setModale] = useState(null);
  const [caricando,setCaricando] = useState(false);
  const [fTipo,setFTipo] = useState("Tutti");
  const nome = id => { const m = membri.find(x=>x.id===id); return m ? `${m.cognome} ${m.nome}` : "Società"; };

  const lista = useMemo(()=>documenti
    .filter(d=>fTipo==="Tutti"||d.tipo===fTipo)
    .sort((a,b)=>(b.creatoIl||"").localeCompare(a.creatoIl||"")),[documenti,fTipo]);

  const scegli = async e => {
    const file = e.target.files[0];
    if(!file) return;
    setCaricando(true);
    try{
      const {b64,mime,peso} = await preparaFile(file);
      setModale(m=>({...m, file:b64, mime, peso, nomeFile:file.name, titolo: m.titolo || file.name.replace(/\.[^.]+$/,"")}));
    }catch(err){ toast(err.message); }
    setCaricando(false);
  };

  const conferma = async () => {
    const d = modale;
    if(d.modo==="file" && !d.file && !d.id) return toast("Scegli un file oppure passa al link Drive");
    if(d.modo==="link" && !d.link.trim()) return toast("Incolla il link al documento");
    if(!d.titolo.trim()) return toast("Dai un titolo al documento");
    const {id, ...dati} = d;
    if(dati.modo==="link"){ dati.file=null; dati.nomeFile=""; dati.peso=0; }
    await salva(COL.documenti, id, dati);

    // Se è una visita medica con scadenza, allineo l'anagrafica: un dato solo, una fonte.
    if(dati.tipo==="Visita medica" && dati.membroId && dati.scadenza){
      await salva(COL.membri, dati.membroId, {scadenzaVisita: dati.scadenza});
    }
    setModale(null);
    toast("Documento salvato");
  };

  const apri = d => {
    if(d.modo==="link"){ window.open(d.link,"_blank","noopener"); return; }
    const w = window.open();
    if(d.mime==="application/pdf") w.document.write(`<iframe src="${d.file}" style="border:0;width:100%;height:100vh"></iframe>`);
    else w.document.write(`<img src="${d.file}" style="max-width:100%">`);
  };

  const rimuovi = async d => { if(confirm(`Elimini "${d.titolo}"?`)){ await elimina(COL.documenti,d.id); toast("Documento eliminato"); } };
  const set = (k,v)=>setModale(m=>({...m,[k]:v}));

  return (
    <div className="section">
      <div className="card">
        <div className="card-h">
          <h3>Documenti — {lista.length}</h3>
          <div style={{display:"flex",gap:8}}>
            <select style={{width:180}} value={fTipo} onChange={e=>setFTipo(e.target.value)}>
              <option>Tutti</option>{TIPI_DOC.map(t=><option key={t}>{t}</option>)}
            </select>
            <button className="btn sm" onClick={()=>setModale({...DOC_VUOTO})}>+ Carica</button>
          </div>
        </div>
        {lista.length===0
          ? <Vuoto titolo="Nessun documento" testo="Carica visite mediche, documenti d'identità e moduli di tesseramento." />
          : <div className="tw"><table>
              <thead><tr><th>Documento</th><th>Tipo</th><th>Intestatario</th><th>Scadenza</th><th className="num">Peso</th><th></th></tr></thead>
              <tbody>{lista.map(d=>{
                const g = giorniA(d.scadenza);
                return (
                  <tr key={d.id}>
                    <td>
                      <strong>{d.titolo}</strong>
                      <div style={{fontSize:11,color:"var(--muted)"}}>{d.modo==="link" ? "Link esterno" : d.nomeFile}</div>
                    </td>
                    <td>{d.tipo}</td>
                    <td>{nome(d.membroId)}</td>
                    <td>{d.scadenza
                      ? <span className={"pill "+(g<0?"p-bad":g<=30?"p-warn":"p-ok")}>{dataIT(d.scadenza)}</span>
                      : "—"}</td>
                    <td className="num" style={{fontSize:11,color:"var(--muted)"}}>{d.peso ? Math.round(d.peso/1024)+" KB" : "—"}</td>
                    <td style={{whiteSpace:"nowrap"}}>
                      <button className="btn ghost sm" onClick={()=>apri(d)}>Apri</button>{" "}
                      <button className="btn ghost sm" onClick={()=>setModale({...DOC_VUOTO,...d})}>Modifica</button>{" "}
                      <button className="btn danger sm" onClick={()=>rimuovi(d)}>×</button>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table></div>}
      </div>

      {modale && (
        <Modale titolo={modale.id?"Modifica documento":"Carica documento"} onChiudi={()=>setModale(null)} onSalva={caricando?null:conferma} salvaLabel="Salva documento">
          <div className="row g2">
            <Campo label="Tipo"><select value={modale.tipo} onChange={e=>set("tipo",e.target.value)}>{TIPI_DOC.map(t=><option key={t}>{t}</option>)}</select></Campo>
            <Campo label="Intestatario">
              <select value={modale.membroId} onChange={e=>set("membroId",e.target.value)}>
                <option value="">Società (nessuna persona)</option>
                {membri.map(m=><option key={m.id} value={m.id}>{m.cognome} {m.nome}</option>)}
              </select>
            </Campo>
          </div>
          <div className="row g2">
            <Campo label="Titolo"><input value={modale.titolo} onChange={e=>set("titolo",e.target.value)} /></Campo>
            <Campo label="Scadenza (opzionale)"><input type="date" value={modale.scadenza} onChange={e=>set("scadenza",e.target.value)} /></Campo>
          </div>
          {modale.tipo==="Visita medica" && modale.membroId && modale.scadenza &&
            <div className="hint" style={{marginTop:-6,marginBottom:12}}>La scadenza aggiorna anche l'anagrafica in rosa.</div>}

          <div className="divider"></div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button className={"btn "+(modale.modo==="file"?"":"ghost")+" sm"} onClick={()=>set("modo","file")}>Carica file</button>
            <button className={"btn "+(modale.modo==="link"?"":"ghost")+" sm"} onClick={()=>set("modo","link")}>Link Google Drive</button>
          </div>

          {modale.modo==="file" ? (
            <Campo label="File (PDF o immagine, max 700 KB)">
              <input type="file" accept="image/*,application/pdf" onChange={scegli} />
              {caricando && <div className="hint">Preparazione del file…</div>}
              {modale.file && <div className="hint" style={{color:"var(--mint)"}}>Pronto: {modale.nomeFile} · {Math.round(modale.peso/1024)} KB</div>}
              <div className="hint">Le foto vengono compresse in automatico. I PDF oltre 700 KB vanno su Drive.</div>
            </Campo>
          ) : (
            <Campo label="Link al file">
              <input placeholder="https://drive.google.com/…" value={modale.link} onChange={e=>set("link",e.target.value)} />
              <div className="hint">Imposta la condivisione su "chiunque abbia il link" prima di incollarlo.</div>
            </Campo>
          )}
          <Campo label="Note"><textarea rows="2" value={modale.note} onChange={e=>set("note",e.target.value)} /></Campo>
        </Modale>
      )}
    </div>
  );
}

/* ==================================================================
   8. TESSERAMENTI
   ================================================================== */
function Tesseramenti({membri, documenti, toast}){
  const attivi = membri.filter(m=>m.attivo!==false);

  const checklist = m => {
    const suoi = documenti.filter(d=>d.membroId===m.id);
    const ha = t => suoi.some(d=>d.tipo===t);
    return [
      {k:"Anagrafica completa", ok: !!(m.dataNascita && m.luogoNascita && cfValido(m.codiceFiscale))},
      {k:"Documento identità",  ok: ha("Documento identità")},
      {k:"Visita medica",       ok: m.tipoVisita==="Non richiesta" || (!!m.scadenzaVisita && giorniA(m.scadenzaVisita) >= 0)},
      {k:"Modulo firmato",      ok: ha("Modulo tesseramento")},
      {k:"Liberatoria immagini",ok: ha("Liberatoria immagini")}
    ];
  };

  const righe = attivi.map(m=>{
    const c = checklist(m);
    const fatti = c.filter(x=>x.ok).length;
    return {m, c, fatti, pronto: fatti===c.length};
  }).sort((a,b)=>a.fatti-b.fatti || (a.m.cognome||"").localeCompare(b.m.cognome||""));

  const pronti = righe.filter(r=>r.pronto).length;
  const tesserati = attivi.filter(m=>m.statoTesseramento==="Tesserato").length;

  const avanza = async (m, stato) => { await salva(COL.membri,m.id,{statoTesseramento:stato}); toast(`${m.cognome}: ${stato.toLowerCase()}`); };

  const esportaFederazione = () => {
    const sel = righe.filter(r=>r.m.statoTesseramento!=="Tesserato");
    if(!sel.length) return toast("Sono già tutti tesserati");
    scaricaCSV([
      ["Cognome","Nome","Data nascita","Comune nascita","Prov. nascita","Codice fiscale","Indirizzo","CAP","Comune","Prov.","Telefono","Email","Ruolo","Qualifica","Scadenza visita"],
      ...sel.map(({m})=>[m.cognome,m.nome,dataIT(m.dataNascita),m.luogoNascita,m.provinciaNascita,m.codiceFiscale,m.indirizzo,m.cap,m.comune,m.provincia,m.telefono,m.email,m.ruolo,m.tipo,dataIT(m.scadenzaVisita)])
    ], "distinta_tesseramento.csv");
  };

  return (
    <div className="section">
      <div className="grid g3" style={{marginBottom:14}}>
        <Stat k="Tesserati" v={`${tesserati}/${attivi.length}`} s="sul totale in rosa" tono={tesserati===attivi.length?"mint":null} />
        <Stat k="Pratiche complete" v={pronti} s="pronte da inviare" tono={pronti?"mint":null} />
        <Stat k="Da completare" v={attivi.length-pronti} s="documenti mancanti" tono={attivi.length-pronti?"amber":null} />
      </div>

      <div className="card">
        <div className="card-h">
          <h3>Pratiche di tesseramento</h3>
          <button className="btn ghost sm" onClick={esportaFederazione}>Esporta distinta CSV</button>
        </div>
        {righe.length===0
          ? <Vuoto titolo="Rosa vuota" testo="Aggiungi prima i membri della squadra." />
          : <div className="tw"><table>
              <thead><tr><th>Nominativo</th><th style={{width:190}}>Documenti</th><th>Mancanti</th><th>Stato</th><th></th></tr></thead>
              <tbody>{righe.map(({m,c,fatti,pronto})=>(
                <tr key={m.id}>
                  <td><strong>{m.cognome} {m.nome}</strong><div style={{fontSize:11,color:"var(--muted)"}}>{m.tipo} · {m.ruolo}</div></td>
                  <td>
                    <div className="bar"><i style={{width:(fatti/c.length*100)+"%", background: pronto?"var(--mint)":"var(--amber)"}}></i></div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:4}} className="mono">{fatti}/{c.length}</div>
                  </td>
                  <td style={{fontSize:12,color:"var(--muted)"}}>
                    {pronto ? <span style={{color:"var(--mint)",fontWeight:600}}>Tutto a posto</span> : c.filter(x=>!x.ok).map(x=>x.k).join(" · ")}
                  </td>
                  <td>
                    <span className={"pill "+(m.statoTesseramento==="Tesserato"?"p-ok":m.statoTesseramento==="Inviato"?"p-warn":m.statoTesseramento==="Respinto"?"p-bad":"p-neutral")}>
                      {m.statoTesseramento}
                    </span>
                    {m.numeroTessera && <div className="mono" style={{fontSize:11,color:"var(--muted)",marginTop:3}}>{m.numeroTessera}</div>}
                  </td>
                  <td style={{whiteSpace:"nowrap"}}>
                    {m.statoTesseramento!=="Inviato" && m.statoTesseramento!=="Tesserato" &&
                      <button className="btn ghost sm" disabled={!pronto} onClick={()=>avanza(m,"Inviato")}>Segna inviato</button>}
                    {m.statoTesseramento==="Inviato" &&
                      <button className="btn sm" onClick={()=>avanza(m,"Tesserato")}>Segna tesserato</button>}
                  </td>
                </tr>
              ))}</tbody>
            </table></div>}
      </div>
    </div>
  );
}

/* ==================================================================
   9. ALLENAMENTI
   ================================================================== */
const SESS_VUOTA = { data:oggi(), ora:"21:00", tipo:"Allenamento", luogo:"Palestra comunale — Fabbrico", note:"", presenti:[], esercizi:[] };

function Allenamenti({allenamenti, membri, toast}){
  const [modale,setModale] = useState(null);
  const [presenze,setPresenze] = useState(null);

  const giocatori = membri.filter(m=>m.attivo!==false && m.tipo==="Giocatore")
    .sort((a,b)=>(a.cognome||"").localeCompare(b.cognome||""));

  // Solo allenamenti veri (partite e amichevoli stanno in Calendario/Risultati)
  const lista = useMemo(()=>[...allenamenti]
    .filter(s=>s.tipo==="Allenamento" || s.tipo==="Riunione")
    .sort((a,b)=>(b.data+b.ora).localeCompare(a.data+a.ora)),[allenamenti]);
  const passate = lista.filter(s=>s.data <= oggi());

  const stats = useMemo(()=>{
    const tot = passate.filter(s=>s.tipo==="Allenamento").length;
    return giocatori.map(g=>{
      const p = passate.filter(s=>s.tipo==="Allenamento" && (s.presenti||[]).includes(g.id)).length;
      return {g, p, tot, pct: tot ? Math.round(p/tot*100) : 0};
    }).sort((a,b)=>b.pct-a.pct);
  },[passate,giocatori]);

  const totMin = (modale?.esercizi||[]).reduce((s,e)=>s+(Number(e.durata)||0),0);

  const conferma = async () => {
    const {id, ...dati} = modale;
    if(!dati.data) return toast("Serve la data");
    await salva(COL.allenamenti, id, dati);
    setModale(null); toast("Sessione salvata");
  };
  const rimuovi = async s => { if(confirm(`Elimini la sessione del ${dataIT(s.data)}?`)){ await elimina(COL.allenamenti,s.id); toast("Sessione eliminata"); } };

  const toggle = async gid => {
    const presenti = (presenze.presenti||[]).includes(gid)
      ? presenze.presenti.filter(x=>x!==gid)
      : [...(presenze.presenti||[]), gid];
    setPresenze(p=>({...p,presenti}));
    await salva(COL.allenamenti, presenze.id, {presenti});
  };

  // builder esercizi
  const aggiungiEs = () => setModale(m=>({...m, esercizi:[...(m.esercizi||[]), {id:uid(), nome:"", durata:"", note:""}]}));
  const setEs = (id,k,v) => setModale(m=>({...m, esercizi:(m.esercizi||[]).map(e=>e.id===id?{...e,[k]:v}:e)}));
  const rimuoviEs = id => setModale(m=>({...m, esercizi:(m.esercizi||[]).filter(e=>e.id!==id)}));
  const spostaEs = (i,dir) => setModale(m=>{
    const arr=[...(m.esercizi||[])]; const j=i+dir;
    if(j<0||j>=arr.length) return m;
    [arr[i],arr[j]]=[arr[j],arr[i]]; return {...m,esercizi:arr};
  });

  const nomiPresenti = s => (s.presenti||[]).map(id=>{const m=membri.find(x=>x.id===id);return m?`${m.cognome} ${m.nome}`:null;}).filter(Boolean);

  const esportaPDF = s => {
    const es = s.esercizi||[];
    const tot = es.reduce((a,e)=>a+(Number(e.durata)||0),0);
    const rows = es.map((e,i)=>`<tr><td>${i+1}</td><td>${esc(e.nome)||"—"}</td><td class="r">${e.durata?esc(e.durata)+"'":"—"}</td><td>${esc(e.note)}</td></tr>`).join("");
    const pres = nomiPresenti(s);
    const html =
      `<h1>${esc(s.tipo)} — ${dataIT(s.data)}</h1>`+
      `<div class="meta">${esc(s.ora)||""}${s.luogo?" · "+esc(s.luogo):""}</div>`+
      `<h2>Programma esercizi</h2>`+
      `<table><thead><tr><th>#</th><th>Esercizio</th><th class="r">Durata</th><th>Note</th></tr></thead><tbody>`+
      (rows||'<tr><td colspan="4">Nessun esercizio inserito</td></tr>')+
      `<tr class="tot"><td colspan="2">Totale stimato</td><td class="r">${tot}'</td><td></td></tr></tbody></table>`+
      (s.note?`<h2>Note della seduta</h2><p>${esc(s.note)}</p>`:"")+
      `<h2>Presenti (${pres.length})</h2><p>${pres.map(esc).join(" · ")||"—"}</p>`;
    stampaPDF(`Allenamento ${dataIT(s.data)}`, html);
  };

  const esportaExcel = s => {
    const es = s.esercizi||[];
    const righe = [
      [`${s.tipo} — ${dataIT(s.data)}`],
      ["Ora", s.ora||"", "Luogo", s.luogo||""],
      [],
      ["#","Esercizio","Durata (min)","Note"],
      ...es.map((e,i)=>[i+1, e.nome||"", Number(e.durata)||0, e.note||""]),
      ["","Totale", es.reduce((a,e)=>a+(Number(e.durata)||0),0), ""],
      [],
      [`Presenti (${nomiPresenti(s).length})`],
      ...nomiPresenti(s).map(n=>[n])
    ];
    scaricaExcel([{nome:"Allenamento", righe}], `allenamento_${s.data}.xlsx`);
  };

  return (
    <div className="section">
      <div className="grid" style={{gridTemplateColumns:"1.6fr 1fr"}}>
        <div className="card">
          <div className="card-h">
            <h3>Allenamenti — {lista.length}</h3>
            <button className="btn sm" onClick={()=>setModale({...SESS_VUOTA})}>+ Nuovo allenamento</button>
          </div>
          {lista.length===0
            ? <Vuoto titolo="Nessun allenamento" testo="Crea una seduta, costruisci gli esercizi e registra le presenze." />
            : <div className="tw"><table>
                <thead><tr><th>Data</th><th>Programma</th><th className="num">Presenti</th><th></th></tr></thead>
                <tbody>{lista.map(s=>{
                  const futura = s.data > oggi();
                  const n = (s.presenti||[]).length;
                  const es = s.esercizi||[];
                  const min = es.reduce((a,e)=>a+(Number(e.durata)||0),0);
                  return (
                    <tr key={s.id}>
                      <td>
                        <strong className="mono">{dataIT(s.data)}</strong>
                        <div style={{fontSize:11,color:"var(--muted)"}} className="mono">{s.ora}</div>
                        {s.tipo==="Riunione" && <span className="pill p-neutral" style={{marginTop:3}}>Riunione</span>}
                        {futura && <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>in programma</div>}
                      </td>
                      <td style={{fontSize:12}}>
                        {es.length ? <span>{es.length} eserc. · <span className="mono">{min}'</span></span> : <span style={{color:"var(--muted)"}}>—</span>}
                        {s.luogo && <div style={{color:"var(--muted)",fontSize:11}}>{s.luogo}</div>}
                      </td>
                      <td className="num"><strong>{n}</strong><span style={{color:"var(--muted)"}}>/{giocatori.length}</span></td>
                      <td style={{whiteSpace:"nowrap"}}>
                        <button className="btn ghost sm" onClick={()=>setPresenze(s)}>Presenze</button>{" "}
                        <button className="btn ghost sm" onClick={()=>setModale({...SESS_VUOTA,...s})}>Piano</button>{" "}
                        <button className="btn ghost sm" title="Esporta PDF" onClick={()=>esportaPDF(s)}>PDF</button>{" "}
                        <button className="btn ghost sm" title="Esporta Excel" onClick={()=>esportaExcel(s)}>XLS</button>{" "}
                        <button className="btn danger sm" onClick={()=>rimuovi(s)}>×</button>
                      </td>
                    </tr>
                  );
                })}</tbody>
              </table></div>}
        </div>

        <div className="card">
          <div className="card-h"><h3>Tasso di presenza</h3></div>
          {stats.length===0 || stats[0].tot===0
            ? <Vuoto titolo="Ancora nulla da contare" testo="Le percentuali compaiono dopo il primo allenamento registrato." />
            : <div className="card-b">
                {stats.map(({g,p,tot,pct})=>(
                  <div key={g.id} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                      <span><strong>{g.cognome}</strong> <span style={{color:"var(--muted)"}}>{g.nome}</span></span>
                      <span className="mono" style={{color: pct>=75?"var(--mint)":pct>=50?"var(--amber)":"var(--coral)", fontWeight:700}}>{pct}% <span style={{color:"var(--muted)",fontWeight:400}}>({p}/{tot})</span></span>
                    </div>
                    <div className="bar"><i style={{width:pct+"%", background: pct>=75?"var(--mint)":pct>=50?"var(--amber)":"var(--coral)"}}></i></div>
                  </div>
                ))}
              </div>}
        </div>
      </div>

      {modale && (
        <Modale titolo={modale.id?"Piano di allenamento":"Nuovo allenamento"} onChiudi={()=>setModale(null)} onSalva={conferma} salvaLabel="Salva" larghezza={720}>
          <div className="row g3">
            <Campo label="Data"><input type="date" value={modale.data} onChange={e=>setModale(m=>({...m,data:e.target.value}))} /></Campo>
            <Campo label="Ora"><input type="time" value={modale.ora} onChange={e=>setModale(m=>({...m,ora:e.target.value}))} /></Campo>
            <Campo label="Tipo"><select value={modale.tipo} onChange={e=>setModale(m=>({...m,tipo:e.target.value}))}><option>Allenamento</option><option>Riunione</option></select></Campo>
          </div>
          <Campo label="Luogo"><input value={modale.luogo} onChange={e=>setModale(m=>({...m,luogo:e.target.value}))} /></Campo>

          <div className="divider"></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h4 style={{fontSize:12,textTransform:"uppercase",letterSpacing:".07em",color:"var(--muted)"}}>
              Esercizi <span className="mono" style={{color:"var(--court)",marginLeft:6}}>{totMin}' totali</span>
            </h4>
            <button className="btn ghost sm" onClick={aggiungiEs}>+ Esercizio</button>
          </div>
          {(modale.esercizi||[]).length===0 && <div className="hint" style={{marginBottom:10}}>Nessun esercizio. Aggiungi il primo per costruire la seduta.</div>}
          {(modale.esercizi||[]).map((e,i)=>(
            <div key={e.id} className="es-row">
              <input placeholder={"Esercizio "+(i+1)} value={e.nome} onChange={ev=>setEs(e.id,"nome",ev.target.value)} />
              <input type="number" min="0" placeholder="min" value={e.durata} onChange={ev=>setEs(e.id,"durata",ev.target.value)} />
              <input className="es-note" placeholder="Note (serie, obiettivo…)" value={e.note} onChange={ev=>setEs(e.id,"note",ev.target.value)} />
              <div style={{display:"flex",gap:3}}>
                <button className="btn ghost sm" title="Su" onClick={()=>spostaEs(i,-1)} disabled={i===0}>↑</button>
                <button className="btn ghost sm" title="Giù" onClick={()=>spostaEs(i,1)} disabled={i===(modale.esercizi.length-1)}>↓</button>
                <button className="btn danger sm" onClick={()=>rimuoviEs(e.id)}>×</button>
              </div>
            </div>
          ))}

          <div className="divider"></div>
          <Campo label="Note della seduta"><textarea rows="2" value={modale.note} onChange={e=>setModale(m=>({...m,note:e.target.value}))} /></Campo>
          {modale.id && (
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button className="btn ghost sm" onClick={()=>esportaPDF(modale)}>Esporta PDF</button>
              <button className="btn ghost sm" onClick={()=>esportaExcel(modale)}>Esporta Excel</button>
            </div>
          )}
        </Modale>
      )}

      {presenze && (
        <Modale titolo={`Presenze — ${dataIT(presenze.data)}`} onChiudi={()=>setPresenze(null)}>
          <div className="hint" style={{marginBottom:12}}>Ogni tocco salva subito. {(presenze.presenti||[]).length} su {giocatori.length}.</div>
          <div className="grid g2">
            {giocatori.map(g=>{
              const on = (presenze.presenti||[]).includes(g.id);
              return (
                <label key={g.id} className={"chk "+(on?"on":"")}>
                  <input type="checkbox" checked={on} onChange={()=>toggle(g.id)} />
                  <span><strong>{g.cognome}</strong> {g.nome}</span>
                </label>
              );
            })}
          </div>
          {giocatori.length===0 && <Vuoto titolo="Nessun giocatore attivo" testo="Aggiungili dalla sezione Rosa." />}
        </Modale>
      )}
    </div>
  );
}

/* ==================================================================
   9b. CALENDARIO
   ================================================================== */
const EVENTO_VUOTO = { data:oggi(), ora:"21:00", tipo:"Partita", luogo:"", note:"", avversario:"", casa:true, competizione:"Campionato", giornata:"" };

function Calendario({allenamenti, toast, vai}){
  const now = new Date();
  const [anno,setAnno] = useState(now.getFullYear());
  const [mese,setMese] = useState(now.getMonth());
  const [modale,setModale] = useState(null);

  const perGiorno = useMemo(()=>{
    const map = {};
    allenamenti.forEach(e=>{ (map[e.data] = map[e.data]||[]).push(e); });
    Object.values(map).forEach(a=>a.sort((x,y)=>(x.ora||"").localeCompare(y.ora||"")));
    return map;
  },[allenamenti]);

  const settimane = useMemo(()=>grigliaMese(anno,mese),[anno,mese]);

  const cambiaMese = d => {
    let m = mese+d, a = anno;
    if(m<0){ m=11; a--; } if(m>11){ m=0; a++; }
    setMese(m); setAnno(a);
  };
  const vaiOggi = () => { setMese(now.getMonth()); setAnno(now.getFullYear()); };

  const set = (k,v)=>setModale(m=>({...m,[k]:v}));
  const conferma = async () => {
    const {id, ...dati} = modale;
    if(!dati.data) return toast("Serve la data");
    if(isMatch(dati.tipo) && !dati.avversario.trim()) return toast("Indica l'avversario");
    await salva(COL.allenamenti, id, dati);
    setModale(null); toast("Evento salvato");
  };
  const rimuovi = async () => {
    if(confirm(`Elimini l'evento del ${dataIT(modale.data)}?`)){ await elimina(COL.allenamenti, modale.id); setModale(null); toast("Evento eliminato"); }
  };

  const esportaExcel = () => {
    const righe = [
      ["Data","Ora","Tipo","Competizione","Avversario","Campo","Luogo","Note"],
      ...[...allenamenti].sort((a,b)=>(a.data+a.ora).localeCompare(b.data+b.ora)).map(e=>[
        dataIT(e.data), e.ora||"", e.tipo, isMatch(e.tipo)?(e.competizione||""):"",
        isMatch(e.tipo)?(e.avversario||""):"", isMatch(e.tipo)?(e.casa?"Casa":"Trasferta"):"", e.luogo||"", e.note||""
      ])
    ];
    scaricaExcel([{nome:"Calendario", righe}], `calendario_${SQUADRA.toLowerCase().replace(/ /g,"_")}.xlsx`);
  };
  const esportaPDF = () => {
    const ord = [...allenamenti].filter(e=>e.data>=oggi()).sort((a,b)=>(a.data+a.ora).localeCompare(b.data+b.ora));
    const rows = ord.map(e=>{
      const dett = isMatch(e.tipo) ? `${esc(e.competizione)} · ${e.casa?"vs":"@"} ${esc(e.avversario)}` : esc(e.luogo);
      return `<tr><td class="r">${dataIT(e.data)}</td><td>${esc(e.ora)}</td><td>${esc(e.tipo)}</td><td>${dett}</td></tr>`;
    }).join("");
    stampaPDF("Calendario "+SQUADRA,
      `<h1>Calendario</h1><div class="meta">Eventi in programma dal ${dataIT(oggi())}</div>`+
      `<table><thead><tr><th class="r">Data</th><th>Ora</th><th>Tipo</th><th>Dettaglio</th></tr></thead>`+
      `<tbody>${rows||'<tr><td colspan="4">Nessun evento in programma</td></tr>'}</tbody></table>`);
  };

  const inMese = allenamenti.filter(e=>e.data.startsWith(`${anno}-${String(mese+1).padStart(2,"0")}`)).length;

  return (
    <div className="section">
      <div className="card">
        <div className="card-h">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button className="btn ghost sm" onClick={()=>cambiaMese(-1)}>←</button>
            <h3 style={{minWidth:150,textAlign:"center"}}>{MESI[mese]} {anno}</h3>
            <button className="btn ghost sm" onClick={()=>cambiaMese(1)}>→</button>
            <button className="btn ghost sm" onClick={vaiOggi}>Oggi</button>
            <span style={{fontSize:12,color:"var(--muted)"}}>{inMese} eventi</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn ghost sm" onClick={esportaPDF}>PDF</button>
            <button className="btn ghost sm" onClick={esportaExcel}>Excel</button>
            <button className="btn sm" onClick={()=>setModale({...EVENTO_VUOTO})}>+ Evento</button>
          </div>
        </div>
        <div className="card-b">
          <div className="cal-head">{GIORNI_SETT.map(g=><span key={g}>{g}</span>)}</div>
          {settimane.map((sett,wi)=>(
            <div className="cal-grid" key={wi} style={{marginBottom:6}}>
              {sett.map((d,di)=>{
                if(!d) return <div key={di} className="cal-cell empty"></div>;
                const evs = perGiorno[d]||[];
                return (
                  <div key={di} className={"cal-cell"+(d===oggi()?" oggi":"")} onClick={()=>setModale({...EVENTO_VUOTO, data:d, tipo:"Allenamento", ora:"21:00"})}>
                    <span className="cal-daynum">{+d.slice(-2)}</span>
                    {evs.map(e=>(
                      <div key={e.id} className="cal-ev" style={{background:coloreEvento(e.tipo)}}
                        onClick={ev=>{ev.stopPropagation(); setModale({...EVENTO_VUOTO, ...e});}}
                        title={`${e.ora||""} ${e.tipo}${isMatch(e.tipo)?" · "+(e.avversario||""):""}`}>
                        {e.ora?e.ora+" ":""}{isMatch(e.tipo)?(e.casa?"vs ":"@ ")+(e.avversario||e.tipo):e.tipo}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          ))}
          <div style={{display:"flex",gap:16,marginTop:12,fontSize:11,color:"var(--muted)",flexWrap:"wrap"}}>
            {[["Allenamento","var(--mint)"],["Partita","var(--coral)"],["Amichevole","var(--amber)"],["Riunione","var(--muted)"]].map(([l,c])=>(
              <span key={l}><i style={{display:"inline-block",width:9,height:9,background:c,borderRadius:2,marginRight:5}}></i>{l}</span>
            ))}
          </div>
        </div>
      </div>

      {modale && (
        <Modale titolo={modale.id?"Modifica evento":"Nuovo evento"} onChiudi={()=>setModale(null)} onSalva={conferma}>
          <div className="row g3">
            <Campo label="Data"><input type="date" value={modale.data} onChange={e=>set("data",e.target.value)} /></Campo>
            <Campo label="Ora"><input type="time" value={modale.ora} onChange={e=>set("ora",e.target.value)} /></Campo>
            <Campo label="Tipo"><select value={modale.tipo} onChange={e=>set("tipo",e.target.value)}>{TIPI_ALLENAMENTO.map(t=><option key={t}>{t}</option>)}</select></Campo>
          </div>
          {isMatch(modale.tipo) ? (
            <>
              <div className="row g3">
                <Campo label="Competizione"><select value={modale.competizione} onChange={e=>set("competizione",e.target.value)}>{COMPETIZIONI.map(c=><option key={c}>{c}</option>)}</select></Campo>
                <Campo label="Campo"><select value={modale.casa?"casa":"trasferta"} onChange={e=>set("casa",e.target.value==="casa")}><option value="casa">Casa</option><option value="trasferta">Trasferta</option></select></Campo>
                <Campo label="Giornata"><input value={modale.giornata} onChange={e=>set("giornata",e.target.value)} placeholder="es. 5ª" /></Campo>
              </div>
              <Campo label="Avversario"><input value={modale.avversario} onChange={e=>set("avversario",e.target.value)} /></Campo>
            </>
          ) : null}
          <Campo label="Luogo"><input value={modale.luogo} onChange={e=>set("luogo",e.target.value)} /></Campo>
          <Campo label="Note"><textarea rows="2" value={modale.note} onChange={e=>set("note",e.target.value)} /></Campo>
          {isMatch(modale.tipo) && modale.id && (
            <div className="hint">Il risultato e i marcatori si inseriscono nella sezione <button className="btn ghost sm" onClick={()=>{setModale(null);vai("risultati");}}>Risultati</button></div>
          )}
          {modale.id && (
            <div style={{marginTop:12}}><button className="btn danger sm" onClick={rimuovi}>Elimina evento</button></div>
          )}
        </Modale>
      )}
    </div>
  );
}

/* ==================================================================
   9c. RISULTATI
   ================================================================== */
function Risultati({allenamenti, membri, toast}){
  const [modale,setModale] = useState(null);

  const giocatori = membri.filter(m=>m.tipo==="Giocatore").sort((a,b)=>(a.cognome||"").localeCompare(b.cognome||""));
  const nomeG = id => { const m=membri.find(x=>x.id===id); return m?`${m.cognome} ${m.nome}`:"—"; };

  const partite = useMemo(()=>allenamenti.filter(e=>isMatch(e.tipo))
    .sort((a,b)=>(b.data+b.ora).localeCompare(a.data+a.ora)),[allenamenti]);

  const daCompilare = partite.filter(p=>!p.giocata && p.data<=oggi());
  const giocate = partite.filter(p=>p.giocata);
  const inProgramma = partite.filter(p=>!p.giocata && p.data>oggi());

  // classifiche
  const cls = useMemo(()=>{
    const gol={}, ass={}, gialli={}, rossi={};
    let v=0,n=0,s=0,gf=0,gsub=0;
    giocate.forEach(p=>{
      const nostri=Number(p.golNostri)||0, loro=Number(p.golLoro)||0;
      gf+=nostri; gsub+=loro;
      if(nostri>loro)v++; else if(nostri===loro)n++; else s++;
      (p.marcatori||[]).forEach(m=>{ if(m.giocatoreId){gol[m.giocatoreId]=(gol[m.giocatoreId]||0)+1;} if(m.assistId){ass[m.assistId]=(ass[m.assistId]||0)+1;} });
      (p.cartellini||[]).forEach(c=>{ if(c.tipo==="Rosso")rossi[c.giocatoreId]=(rossi[c.giocatoreId]||0)+1; else gialli[c.giocatoreId]=(gialli[c.giocatoreId]||0)+1; });
    });
    const top = o => Object.entries(o).sort((a,b)=>b[1]-a[1]);
    return {gol:top(gol), ass:top(ass), gialli, rossi, v,n,s,gf,gsub};
  },[giocate]);

  const apri = p => setModale({
    golNostri:"", golLoro:"", marcatori:[], cartellini:[], ...p,
    golNostri: p.golNostri ?? "", golLoro: p.golLoro ?? "",
    marcatori: p.marcatori||[], cartellini: p.cartellini||[]
  });

  const set = (k,v)=>setModale(m=>({...m,[k]:v}));
  const addMarc = ()=>setModale(m=>({...m,marcatori:[...m.marcatori,{id:uid(),giocatoreId:"",assistId:"",minuto:""}]}));
  const setMarc = (id,k,v)=>setModale(m=>({...m,marcatori:m.marcatori.map(x=>x.id===id?{...x,[k]:v}:x)}));
  const delMarc = id=>setModale(m=>({...m,marcatori:m.marcatori.filter(x=>x.id!==id)}));
  const addCart = ()=>setModale(m=>({...m,cartellini:[...m.cartellini,{id:uid(),giocatoreId:"",tipo:"Giallo",minuto:""}]}));
  const setCart = (id,k,v)=>setModale(m=>({...m,cartellini:m.cartellini.map(x=>x.id===id?{...x,[k]:v}:x)}));
  const delCart = id=>setModale(m=>({...m,cartellini:m.cartellini.filter(x=>x.id!==id)}));

  const salvaReferto = async () => {
    const {id, ...d} = modale;
    d.golNostri = Number(d.golNostri)||0;
    d.golLoro = Number(d.golLoro)||0;
    d.giocata = true;
    await salva(COL.allenamenti, id, d);
    setModale(null); toast("Referto salvato");
  };

  const scoreLabel = p => {
    if(!p.giocata) return "—";
    const nostri=Number(p.golNostri)||0, loro=Number(p.golLoro)||0;
    return p.casa ? `${nostri}–${loro}` : `${loro}–${nostri}`;
  };
  const esito = p => {
    if(!p.giocata) return null;
    const nostri=Number(p.golNostri)||0, loro=Number(p.golLoro)||0;
    if(nostri>loro) return {t:"V",cls:"p-ok"}; if(nostri===loro) return {t:"N",cls:"p-warn"}; return {t:"P",cls:"p-bad"};
  };

  const esportaExcel = () => {
    const ref = [
      ["Data","Competizione","Casa/Tras.","Avversario","Ris. (noi-loro)","Esito","Marcatori","Cartellini"],
      ...partite.filter(p=>p.giocata).map(p=>[
        dataIT(p.data), p.competizione||"", p.casa?"Casa":"Trasferta", p.avversario||"",
        `${Number(p.golNostri)||0}-${Number(p.golLoro)||0}`,
        (esito(p)||{}).t||"",
        (p.marcatori||[]).map(m=>nomeG(m.giocatoreId)+(m.minuto?` ${m.minuto}'`:"")).join("; "),
        (p.cartellini||[]).map(c=>nomeG(c.giocatoreId)+" "+c.tipo).join("; ")
      ])
    ];
    const marcatori = [["Giocatore","Gol"], ...cls.gol.map(([id,n])=>[nomeG(id),n])];
    const assist = [["Giocatore","Assist"], ...cls.ass.map(([id,n])=>[nomeG(id),n])];
    scaricaExcel([
      {nome:"Referti", righe:ref},
      {nome:"Marcatori", righe:marcatori},
      {nome:"Assist", righe:assist}
    ], `risultati_${SQUADRA.toLowerCase().replace(/ /g,"_")}.xlsx`);
  };

  const Riga = ({p, azione}) => {
    const e = esito(p);
    return (
      <tr>
        <td><strong className="mono">{dataIT(p.data)}</strong><div style={{fontSize:11,color:"var(--muted)"}}>{p.competizione}{p.giornata?` · ${p.giornata}`:""}</div></td>
        <td>{p.casa? <span><strong>{SQUADRA}</strong> <span style={{color:"var(--muted)"}}>vs</span> {p.avversario}</span>
                    : <span>{p.avversario} <span style={{color:"var(--muted)"}}>vs</span> <strong>{SQUADRA}</strong></span>}</td>
        <td className="score">{scoreLabel(p)}</td>
        <td>{e && <span className={"pill "+e.cls}>{e.t}</span>}</td>
        <td style={{whiteSpace:"nowrap"}}>{azione}</td>
      </tr>
    );
  };

  return (
    <div className="section">
      <div className="grid g4" style={{marginBottom:14}}>
        <Stat k="Bilancio" v={`${cls.v}V ${cls.n}N ${cls.s}P`} s={`${giocate.length} gare giocate`} />
        <Stat k="Gol fatti" v={cls.gf} s={`${cls.gsub} subiti`} tono="mint" />
        <Stat k="Differenza reti" v={(cls.gf-cls.gsub>=0?"+":"")+(cls.gf-cls.gsub)} tono={cls.gf-cls.gsub>=0?"mint":"coral"} />
        <Stat k="Da compilare" v={daCompilare.length} s="partite giocate senza referto" tono={daCompilare.length?"amber":null} />
      </div>

      {daCompilare.length>0 && (
        <div className="card" style={{marginBottom:14}}>
          <div className="card-h"><h3>Da compilare</h3></div>
          <div className="tw"><table><tbody>
            {daCompilare.map(p=><Riga key={p.id} p={p} azione={<button className="btn sm" onClick={()=>apri(p)}>Inserisci risultato</button>} />)}
          </tbody></table></div>
        </div>
      )}

      <div className="grid" style={{gridTemplateColumns:"1.7fr 1fr"}}>
        <div className="card">
          <div className="card-h">
            <h3>Referti — {giocate.length}</h3>
            <button className="btn ghost sm" onClick={esportaExcel}>Excel</button>
          </div>
          {giocate.length===0
            ? <Vuoto titolo="Nessun referto" testo="Le partite le crei nel Calendario; qui inserisci risultati e marcatori." />
            : <div className="tw"><table>
                <thead><tr><th>Data</th><th>Partita</th><th>Ris.</th><th></th><th></th></tr></thead>
                <tbody>{giocate.map(p=><Riga key={p.id} p={p} azione={<button className="btn ghost sm" onClick={()=>apri(p)}>Dettaglio</button>} />)}</tbody>
              </table></div>}

          {inProgramma.length>0 && <>
            <div className="card-h" style={{borderTop:"1px solid var(--line)"}}><h3>In programma</h3></div>
            <div className="tw"><table><tbody>
              {inProgramma.map(p=>(
                <tr key={p.id}>
                  <td><strong className="mono">{dataIT(p.data)}</strong><div style={{fontSize:11,color:"var(--muted)"}}>{p.competizione}</div></td>
                  <td>{p.casa?"vs ":"@ "}{p.avversario}</td>
                  <td style={{color:"var(--muted)",fontSize:12}}>{p.ora}</td>
                </tr>
              ))}
            </tbody></table></div>
          </>}
        </div>

        <div className="card">
          <div className="card-h"><h3>Classifica marcatori</h3></div>
          {cls.gol.length===0
            ? <Vuoto titolo="Nessun gol" testo="Compare dopo il primo referto." />
            : <div className="card-b">
                {cls.gol.slice(0,12).map(([id,n],i)=>(
                  <div key={id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #F0F3F1",fontSize:13}}>
                    <span><span className="mono" style={{color:"var(--muted)",marginRight:8}}>{i+1}</span>{nomeG(id)}</span>
                    <strong className="mono">{n}</strong>
                  </div>
                ))}
                {cls.ass.length>0 && <>
                  <h4 style={{fontSize:11,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",margin:"14px 0 6px"}}>Assist</h4>
                  {cls.ass.slice(0,8).map(([id,n])=>(
                    <div key={id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontSize:13}}>
                      <span>{nomeG(id)}</span><strong className="mono">{n}</strong>
                    </div>
                  ))}
                </>}
              </div>}
        </div>
      </div>

      {modale && (
        <Modale titolo={`Referto — ${modale.avversario||"partita"}`} onChiudi={()=>setModale(null)} onSalva={salvaReferto} salvaLabel="Salva referto" larghezza={680}>
          <div style={{textAlign:"center",marginBottom:14,fontSize:13,color:"var(--muted)"}}>
            {dataIT(modale.data)} · {modale.competizione}{modale.giornata?` · ${modale.giornata}`:""} · {modale.casa?"in casa":"in trasferta"}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:6}}>
            <div style={{textAlign:"right",flex:1,fontWeight:700}}>{modale.casa?SQUADRA:modale.avversario}</div>
            <input type="number" min="0" style={{width:60,textAlign:"center",fontWeight:700,fontSize:18}} value={modale.casa?modale.golNostri:modale.golLoro}
              onChange={e=>set(modale.casa?"golNostri":"golLoro", e.target.value)} />
            <span style={{color:"var(--muted)"}}>–</span>
            <input type="number" min="0" style={{width:60,textAlign:"center",fontWeight:700,fontSize:18}} value={modale.casa?modale.golLoro:modale.golNostri}
              onChange={e=>set(modale.casa?"golLoro":"golNostri", e.target.value)} />
            <div style={{flex:1,fontWeight:700}}>{modale.casa?modale.avversario:SQUADRA}</div>
          </div>
          <div className="hint" style={{textAlign:"center",marginBottom:14}}>Il riquadro di sinistra è sempre la squadra di casa.</div>

          <div className="divider"></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h4 style={{fontSize:12,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)"}}>Marcatori e assist</h4>
            <button className="btn ghost sm" onClick={addMarc}>+ Gol</button>
          </div>
          {modale.marcatori.length===0 && <div className="hint" style={{marginBottom:8}}>Nessun gol nostro registrato.</div>}
          {modale.marcatori.map(m=>(
            <div key={m.id} style={{display:"grid",gridTemplateColumns:"1.4fr 1.4fr 60px auto",gap:7,marginBottom:7,alignItems:"center"}}>
              <select value={m.giocatoreId} onChange={e=>setMarc(m.id,"giocatoreId",e.target.value)}>
                <option value="">Marcatore…</option>{giocatori.map(g=><option key={g.id} value={g.id}>{g.cognome} {g.nome}</option>)}
              </select>
              <select value={m.assistId} onChange={e=>setMarc(m.id,"assistId",e.target.value)}>
                <option value="">Assist (opz.)</option>{giocatori.map(g=><option key={g.id} value={g.id}>{g.cognome} {g.nome}</option>)}
              </select>
              <input type="number" min="0" placeholder="min" value={m.minuto} onChange={e=>setMarc(m.id,"minuto",e.target.value)} />
              <button className="btn danger sm" onClick={()=>delMarc(m.id)}>×</button>
            </div>
          ))}

          <div className="divider"></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h4 style={{fontSize:12,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)"}}>Cartellini</h4>
            <button className="btn ghost sm" onClick={addCart}>+ Cartellino</button>
          </div>
          {modale.cartellini.length===0 && <div className="hint" style={{marginBottom:8}}>Nessun cartellino.</div>}
          {modale.cartellini.map(c=>(
            <div key={c.id} style={{display:"grid",gridTemplateColumns:"1.8fr 1fr 60px auto",gap:7,marginBottom:7,alignItems:"center"}}>
              <select value={c.giocatoreId} onChange={e=>setCart(c.id,"giocatoreId",e.target.value)}>
                <option value="">Giocatore…</option>{giocatori.map(g=><option key={g.id} value={g.id}>{g.cognome} {g.nome}</option>)}
              </select>
              <select value={c.tipo} onChange={e=>setCart(c.id,"tipo",e.target.value)}>{TIPI_CARTELLINO.map(t=><option key={t}>{t}</option>)}</select>
              <input type="number" min="0" placeholder="min" value={c.minuto} onChange={e=>setCart(c.id,"minuto",e.target.value)} />
              <button className="btn danger sm" onClick={()=>delCart(c.id)}>×</button>
            </div>
          ))}
        </Modale>
      )}
    </div>
  );
}

/* ==================================================================
   10. COSTI E RICAVI
   ================================================================== */
const MOV_VUOTO = { data:oggi(), verso:"Uscita", categoria:"Affitto palestra", descrizione:"", importo:"", metodo:"Contanti", membroId:"", incassato:true };

function Bilancio({movimenti, membri, toast}){
  const [modale,setModale] = useState(null);
  const [anno,setAnno] = useState(new Date().getFullYear().toString());

  const anni = useMemo(()=>{
    const s = new Set(movimenti.map(m=>(m.data||"").slice(0,4)).filter(Boolean));
    s.add(new Date().getFullYear().toString());
    return [...s].sort().reverse();
  },[movimenti]);

  const mov = useMemo(()=>movimenti
    .filter(m=>(m.data||"").startsWith(anno))
    .sort((a,b)=>(b.data||"").localeCompare(a.data||"")),[movimenti,anno]);

  const entrate = mov.filter(m=>m.verso==="Entrata").reduce((s,m)=>s+Number(m.importo||0),0);
  const uscite  = mov.filter(m=>m.verso==="Uscita").reduce((s,m)=>s+Number(m.importo||0),0);
  const saldo   = entrate - uscite;
  const daIncassare = mov.filter(m=>m.verso==="Entrata" && !m.incassato).reduce((s,m)=>s+Number(m.importo||0),0);

  const perMese = useMemo(()=>{
    const map = {};
    mov.forEach(m=>{
      const k = meseKey(m.data);
      if(!map[k]) map[k] = {e:0,u:0};
      map[k][m.verso==="Entrata"?"e":"u"] += Number(m.importo||0);
    });
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  },[mov]);
  const maxMese = Math.max(1, ...perMese.flatMap(([,v])=>[v.e,v.u]));

  const perCategoria = useMemo(()=>{
    const map = {};
    mov.filter(m=>m.verso==="Uscita").forEach(m=>{ map[m.categoria] = (map[m.categoria]||0) + Number(m.importo||0); });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[mov]);

  const set = (k,v)=>setModale(m=>({...m,[k]:v}));
  const conferma = async () => {
    const d = {...modale};
    if(!d.descrizione.trim()) return toast("Serve una descrizione");
    if(!(Number(d.importo)>0)) return toast("L'importo deve essere maggiore di zero");
    d.importo = Number(d.importo);
    const {id,...dati} = d;
    await salva(COL.movimenti,id,dati);
    setModale(null); toast("Movimento registrato");
  };
  const rimuovi = async m => { if(confirm(`Elimini "${m.descrizione}"?`)){ await elimina(COL.movimenti,m.id); toast("Movimento eliminato"); } };

  const esporta = () => scaricaCSV([
    ["Data","Verso","Categoria","Descrizione","Importo","Metodo","Persona","Incassato"],
    ...mov.map(m=>[dataIT(m.data),m.verso,m.categoria,m.descrizione,String(m.importo).replace(".",","),m.metodo,
      (membri.find(x=>x.id===m.membroId)||{}).cognome||"",m.incassato?"Sì":"No"])
  ], `movimenti_${anno}.csv`);

  const cat = modale?.verso==="Entrata" ? CAT_ENTRATA : CAT_USCITA;

  return (
    <div className="section">
      <div className="grid g4" style={{marginBottom:14}}>
        <Stat k="Entrate" v={eur(entrate)} s={anno} tono="mint" />
        <Stat k="Uscite" v={eur(uscite)} s={anno} tono="coral" />
        <Stat k="Saldo" v={eur(saldo)} s={saldo>=0?"in attivo":"in passivo"} tono={saldo>=0?"mint":"coral"} />
        <Stat k="Da incassare" v={eur(daIncassare)} s="quote e crediti aperti" tono={daIncassare?"amber":null} />
      </div>

      <div className="grid" style={{gridTemplateColumns:"1.6fr 1fr", marginBottom:14}}>
        <div className="card">
          <div className="card-h"><h3>Andamento mensile</h3></div>
          <div className="card-b">
            {perMese.length===0
              ? <Vuoto titolo="Nessun movimento" testo={`Non c'è ancora nulla registrato nel ${anno}.`} />
              : <div style={{display:"flex",gap:10,alignItems:"flex-end",height:170,overflowX:"auto",paddingBottom:4}}>
                  {perMese.map(([k,v])=>(
                    <div key={k} style={{minWidth:44,textAlign:"center",flex:1}}>
                      <div style={{display:"flex",gap:3,alignItems:"flex-end",height:130,justifyContent:"center"}}>
                        <div title={"Entrate "+eur(v.e)} style={{width:"42%",height:Math.max(2,v.e/maxMese*130)+"px",background:"var(--mint)",borderRadius:"3px 3px 0 0"}}></div>
                        <div title={"Uscite "+eur(v.u)} style={{width:"42%",height:Math.max(2,v.u/maxMese*130)+"px",background:"var(--coral)",borderRadius:"3px 3px 0 0"}}></div>
                      </div>
                      <div style={{fontSize:10,color:"var(--muted)",marginTop:6,textTransform:"uppercase",letterSpacing:".04em"}}>{nomeMese(k)}</div>
                    </div>
                  ))}
                </div>}
            <div style={{display:"flex",gap:16,marginTop:12,fontSize:11,color:"var(--muted)"}}>
              <span><i style={{display:"inline-block",width:9,height:9,background:"var(--mint)",borderRadius:2,marginRight:5}}></i>Entrate</span>
              <span><i style={{display:"inline-block",width:9,height:9,background:"var(--coral)",borderRadius:2,marginRight:5}}></i>Uscite</span>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-h"><h3>Uscite per categoria</h3></div>
          <div className="card-b">
            {perCategoria.length===0
              ? <Vuoto titolo="Nessuna uscita" testo="" />
              : perCategoria.map(([c,v])=>(
                  <div key={c} style={{marginBottom:11}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                      <span>{c}</span><span className="mono" style={{fontWeight:600}}>{eur(v)}</span>
                    </div>
                    <div className="bar"><i style={{width:(v/uscite*100)+"%",background:"var(--coral)"}}></i></div>
                  </div>
                ))}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h">
          <h3>Movimenti — {mov.length}</h3>
          <div style={{display:"flex",gap:8}}>
            <select style={{width:110}} value={anno} onChange={e=>setAnno(e.target.value)}>{anni.map(a=><option key={a}>{a}</option>)}</select>
            <button className="btn ghost sm" onClick={esporta}>CSV</button>
            <button className="btn sm" onClick={()=>setModale({...MOV_VUOTO})}>+ Registra</button>
          </div>
        </div>
        {mov.length===0
          ? <Vuoto titolo="Registro vuoto" testo="Registra quote, sponsor, affitto palestra e trasferte." />
          : <div className="tw"><table>
              <thead><tr><th>Data</th><th>Descrizione</th><th>Categoria</th><th>Persona</th><th>Metodo</th><th className="num">Importo</th><th></th></tr></thead>
              <tbody>{mov.map(m=>{
                const e = m.verso==="Entrata";
                const p = membri.find(x=>x.id===m.membroId);
                return (
                  <tr key={m.id}>
                    <td className="mono" style={{whiteSpace:"nowrap"}}>{dataIT(m.data)}</td>
                    <td>
                      <strong>{m.descrizione}</strong>
                      {e && !m.incassato && <span className="pill p-warn" style={{marginLeft:6}}>da incassare</span>}
                    </td>
                    <td style={{fontSize:12,color:"var(--muted)"}}>{m.categoria}</td>
                    <td style={{fontSize:12}}>{p ? `${p.cognome} ${p.nome}` : "—"}</td>
                    <td style={{fontSize:12,color:"var(--muted)"}}>{m.metodo}</td>
                    <td className="num" style={{color: e?"var(--mint)":"var(--coral)", fontWeight:700, whiteSpace:"nowrap"}}>
                      {e?"+":"−"} {eur(m.importo).replace("€","").trim()}
                    </td>
                    <td style={{whiteSpace:"nowrap"}}>
                      <button className="btn ghost sm" onClick={()=>setModale({...MOV_VUOTO,...m})}>Modifica</button>{" "}
                      <button className="btn danger sm" onClick={()=>rimuovi(m)}>×</button>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table></div>}
      </div>

      {modale && (
        <Modale titolo={modale.id?"Modifica movimento":"Registra movimento"} onChiudi={()=>setModale(null)} onSalva={conferma}>
          <div className="row g3">
            <Campo label="Verso">
              <select value={modale.verso} onChange={e=>{
                const v = e.target.value;
                setModale(m=>({...m, verso:v, categoria: v==="Entrata" ? CAT_ENTRATA[0] : CAT_USCITA[0]}));
              }}>
                <option>Uscita</option><option>Entrata</option>
              </select>
            </Campo>
            <Campo label="Data"><input type="date" value={modale.data} onChange={e=>set("data",e.target.value)} /></Campo>
            <Campo label="Importo €"><input type="number" step="0.01" min="0" value={modale.importo} onChange={e=>set("importo",e.target.value)} /></Campo>
          </div>
          <Campo label="Descrizione"><input value={modale.descrizione} onChange={e=>set("descrizione",e.target.value)} placeholder={modale.verso==="Entrata"?"Quota associativa 2026/27":"Affitto palestra — settembre"} /></Campo>
          <div className="row g2">
            <Campo label="Categoria"><select value={modale.categoria} onChange={e=>set("categoria",e.target.value)}>{cat.map(c=><option key={c}>{c}</option>)}</select></Campo>
            <Campo label="Metodo">
              <select value={modale.metodo} onChange={e=>set("metodo",e.target.value)}>
                <option>Contanti</option><option>Bonifico</option><option>Carta</option><option>Satispay</option><option>Altro</option>
              </select>
            </Campo>
          </div>
          <div className="row g2">
            <Campo label="Persona collegata (opzionale)">
              <select value={modale.membroId} onChange={e=>set("membroId",e.target.value)}>
                <option value="">Nessuna</option>
                {membri.map(m=><option key={m.id} value={m.id}>{m.cognome} {m.nome}</option>)}
              </select>
            </Campo>
            {modale.verso==="Entrata" && (
              <Campo label="Stato">
                <select value={modale.incassato?"si":"no"} onChange={e=>set("incassato",e.target.value==="si")}>
                  <option value="si">Incassato</option><option value="no">Da incassare</option>
                </select>
              </Campo>
            )}
          </div>
        </Modale>
      )}
    </div>
  );
}

/* ==================================================================
   11. DASHBOARD
   ================================================================== */
function Dashboard({membri, documenti, allenamenti, movimenti, vai}){
  const attivi = membri.filter(m=>m.attivo!==false);
  const giocatori = attivi.filter(m=>m.tipo==="Giocatore");
  const dirigenti = attivi.filter(m=>m.tipo==="Dirigente");
  const tesserati = attivi.filter(m=>m.statoTesseramento==="Tesserato").length;

  const allerte = attivi
    .map(m=>({m, v:statoVisita(m)}))
    .filter(({v})=> v.cls==="p-bad" || v.cls==="p-warn")
    .sort((a,b)=>(a.v.g ?? -999) - (b.v.g ?? -999));

  const entrate = movimenti.filter(m=>m.verso==="Entrata").reduce((s,m)=>s+Number(m.importo||0),0);
  const uscite  = movimenti.filter(m=>m.verso==="Uscita").reduce((s,m)=>s+Number(m.importo||0),0);
  const saldo = entrate - uscite;

  const prossime = [...allenamenti].filter(s=>s.data>=oggi()).sort((a,b)=>(a.data+a.ora).localeCompare(b.data+b.ora)).slice(0,5);

  return (
    <div className="section">
      <div className="grid g4" style={{marginBottom:14}}>
        <Stat k="Giocatori" v={giocatori.length} s={`${dirigenti.length} dirigenti`} />
        <Stat k="Tesserati" v={`${tesserati}/${attivi.length}`} s="pratiche chiuse" tono={tesserati===attivi.length && attivi.length ? "mint":"amber"} />
        <Stat k="Visite da sistemare" v={allerte.length} s="scadute o in scadenza" tono={allerte.length?"coral":"mint"} />
        <Stat k="Saldo cassa" v={eur(saldo)} s={`${eur(entrate)} entrate · ${eur(uscite)} uscite`} tono={saldo>=0?"mint":"coral"} />
      </div>

      <div className="grid g2">
        <div className="card">
          <div className="card-h">
            <h3>Visite mediche da sistemare</h3>
            <button className="btn ghost sm" onClick={()=>vai("rosa")}>Vai alla rosa</button>
          </div>
          {allerte.length===0
            ? <Vuoto titolo="Tutto in regola" testo="Nessuna visita scaduta o in scadenza nei prossimi 30 giorni." />
            : <div className="tw"><table>
                <tbody>{allerte.map(({m,v})=>(
                  <tr key={m.id}>
                    <td><strong>{m.cognome} {m.nome}</strong><div style={{fontSize:11,color:"var(--muted)"}}>{m.ruolo}</div></td>
                    <td className="mono" style={{fontSize:12}}>{m.scadenzaVisita ? dataIT(m.scadenzaVisita) : "—"}</td>
                    <td style={{textAlign:"right"}}><span className={"pill "+v.cls}>{v.txt}</span></td>
                  </tr>
                ))}</tbody>
              </table></div>}
        </div>

        <div className="card">
          <div className="card-h">
            <h3>Prossimi appuntamenti</h3>
            <button className="btn ghost sm" onClick={()=>vai("calendario")}>Calendario</button>
          </div>
          {prossime.length===0
            ? <Vuoto titolo="Calendario libero" testo="Nessun allenamento o partita in programma." />
            : <div className="tw"><table>
                <tbody>{prossime.map(s=>(
                  <tr key={s.id}>
                    <td style={{width:90}}>
                      <div className="mono" style={{fontWeight:700}}>{dataIT(s.data)}</div>
                      <div className="mono" style={{fontSize:11,color:"var(--muted)"}}>{s.ora}</div>
                    </td>
                    <td><span className={"pill "+(s.tipo==="Partita"?"p-warn":"p-ok")}>{s.tipo}</span></td>
                    <td style={{fontSize:12,color:"var(--muted)"}}>{s.luogo}</td>
                  </tr>
                ))}</tbody>
              </table></div>}
        </div>
      </div>
    </div>
  );
}

/* ==================================================================
   12. LOGIN + APP
   ================================================================== */
function Login({toast}){
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [busy,setBusy] = useState(false);

  const entra = async () => {
    setBusy(true);
    try{ await auth.signInWithEmailAndPassword(email.trim(), pw); }
    catch(e){ toast(e.code==="auth/invalid-credential" ? "Email o password non corretti" : e.message); }
    setBusy(false);
  };

  return (
    <div className="gate">
      <div style={{textAlign:"center",marginBottom:22}}>
        <h1 style={{fontSize:26,fontWeight:800,textTransform:"uppercase",letterSpacing:".02em"}}>Gestione Futsal</h1>
        <div style={{fontSize:11,letterSpacing:".14em",textTransform:"uppercase",color:"var(--muted)",marginTop:4}}>A.S.D. Futsal Fabbrico</div>
      </div>
      <div className="card"><div className="card-b">
        <Campo label="Email"><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entra()} /></Campo>
        <Campo label="Password"><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entra()} /></Campo>
        <button className="btn" style={{width:"100%",justifyContent:"center"}} onClick={entra} disabled={busy}>
          {busy ? "Accesso in corso…" : "Accedi"}
        </button>
        <div className="hint" style={{textAlign:"center",marginTop:10}}>Gli account si creano dalla console Firebase.</div>
      </div></div>
    </div>
  );
}

const TAB = [
  ["dashboard","Cruscotto"],
  ["rosa","Rosa"],
  ["calendario","Calendario"],
  ["allenamenti","Allenamenti"],
  ["risultati","Risultati"],
  ["documenti","Documenti"],
  ["tesseramenti","Tesseramenti"],
  ["bilancio","Costi e ricavi"]
];

function App(){
  const [utente,setUtente] = useState(null);
  const [pronto,setPronto] = useState(false);
  const [tab,setTab] = useState("dashboard");
  const [msg,setMsg] = useState(null);

  const toast = useCallback(t=>{ setMsg(t); setTimeout(()=>setMsg(null), 2600); },[]);

  useEffect(()=>{
    if(!CONFIGURATA){ setPronto(true); return; }
    return auth.onAuthStateChanged(u=>{ setUtente(u); setPronto(true); });
  },[]);

  const ok = !!utente;
  const [membri]      = useCollection(COL.membri, ok);
  const [documenti]   = useCollection(COL.documenti, ok);
  const [allenamenti] = useCollection(COL.allenamenti, ok);
  const [movimenti]   = useCollection(COL.movimenti, ok);

  if(!CONFIGURATA) return (
    <div className="gate">
      <div className="card"><div className="card-b">
        <h3 style={{marginBottom:8}}>Manca la configurazione</h3>
        <p style={{color:"var(--muted)",fontSize:13}}>
          Apri il file, cerca <code>FIREBASE_CONFIG</code> in cima allo script e incolla i dati del tuo progetto
          (Console Firebase → Impostazioni progetto → Le tue app → Web).
        </p>
      </div></div>
    </div>
  );

  if(!pronto) return <div className="empty" style={{paddingTop:"20vh"}}>Caricamento…</div>;
  if(!utente) return (<><Login toast={toast} />{msg && <div className="toast">{msg}</div>}</>);

  return (
    <>
      <div className="topbar">
        <div className="topbar-in">
          <div className="userbar">
            <span>{utente.email}</span>
            <button className="btn ghost sm" onClick={()=>auth.signOut()}>Esci</button>
          </div>
          <div className="brand">
            <h1>Gestione Futsal</h1>
            <span>A.S.D. Futsal Fabbrico</span>
          </div>
          <nav className="tabs">
            {TAB.map(([k,l])=>(
              <button key={k} className={"tab "+(tab===k?"on":"")} onClick={()=>setTab(k)}>{l}</button>
            ))}
          </nav>
        </div>
      </div>

      <div className="shell">
        {tab==="dashboard"    && <Dashboard membri={membri} documenti={documenti} allenamenti={allenamenti} movimenti={movimenti} vai={setTab} />}
        {tab==="rosa"         && <Rosa membri={membri} toast={toast} />}
        {tab==="documenti"    && <Documenti documenti={documenti} membri={membri} toast={toast} />}
        {tab==="tesseramenti" && <Tesseramenti membri={membri} documenti={documenti} toast={toast} />}
        {tab==="calendario"   && <Calendario allenamenti={allenamenti} toast={toast} vai={setTab} />}
        {tab==="allenamenti"  && <Allenamenti allenamenti={allenamenti} membri={membri} toast={toast} />}
        {tab==="risultati"    && <Risultati allenamenti={allenamenti} membri={membri} toast={toast} />}
        {tab==="bilancio"     && <Bilancio movimenti={movimenti} membri={membri} toast={toast} />}
      </div>

      {msg && <div className="toast">{msg}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
