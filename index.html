function PageMovimenti({ conti, movimenti, stagione, categorie, onToast }) {
  const [filterTipo, setFilterTipo] = useState("");
  const [filterMese, setFilterMese] = useState("");
  const [filterBu, setFilterBu] = useState("");
  const [filterText, setFilterText] = useState("");
  const [filterOrigine, setFilterOrigine] = useState("");
  const [editing, setEditing] = useState(null);
  const [tab, setTab] = useState("lista"); // lista | audit

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // === Audit: anomalie nei movimenti ===
  const anomalie = useMemo(() => {
    const result = [];
    movimenti.forEach(m => {
      if (m.apertura) return;          // le scritture di apertura al 01/09 non sono anomalie
      if (m.tipo === "giroconto") return;
      const motivi = [];
      let suggerito = null;
      const cat = (m.categoria || "").toUpperCase();
      const desc = m.descrizione || "";

      if (m.contoPdC === 20) motivi.push("Conto 20 SPESE DIVERSE è generico");
      if (m.contoPdC === 35) motivi.push("Conto 35 SOPRAVVENIENZE ATTIVE è generico");

      if (/SPONSOR/i.test(desc) && m.contoPdC !== 69) {
        motivi.push("Descrizione contiene 'sponsor' ma conto ≠ 69 SPONSOR FUTSAL");
        suggerito = 69;
      }
      if (/(CSI|CARTELLINI)/i.test(desc) && m.contoPdC !== 66) {
        motivi.push("Descrizione menziona CSI/cartellini ma conto ≠ 66 ONERI CSI");
        suggerito = 66;
      }
      if (/(PALESTRA|PALAZZETTO)/i.test(desc) && m.contoPdC !== 77 && m.tipo === "uscita") {
        motivi.push("Descrizione menziona palestra ma conto ≠ 77 PALESTRA C/SPESE");
        suggerito = 77;
      }
      if (/PALLONI/i.test(desc) && m.contoPdC !== 62 && m.contoPdC !== 13) {
        motivi.push("Descrizione menziona palloni ma conto inadatto");
        suggerito = 62;
      }
      if (/COMMERCIALISTA/i.test(desc) && m.contoPdC !== 26) {
        motivi.push("Descrizione menziona commercialista ma conto ≠ 26");
        suggerito = 26;
      }
      if (/(COMMISSIONI|TENUTA CONTO|SPESE BANCA)/i.test(desc) && m.contoPdC !== 21 && m.tipo === "uscita") {
        motivi.push("Descrizione bancaria ma conto ≠ 21 ONERI VS BANCA");
        suggerito = 21;
      }
      if (/QUOT[AE]/i.test(desc) && m.contoPdC !== 71 && m.tipo === "entrata") {
        motivi.push("Descrizione menziona 'quote' ma conto ≠ 71 GIOCATORI C/QUOTA");
        suggerito = 71;
      }
      if (/(EVENTO|TORNEO|SERATA|IDEA VERDE)/i.test(desc)) {
        if (m.tipo === "entrata" && m.contoPdC !== 28 && m.contoPdC !== 41) {
          motivi.push("Descrizione menziona evento/torneo ma conto inadatto");
          suggerito = 41;
        }
        if (m.tipo === "uscita" && m.contoPdC !== 76 && m.contoPdC !== 12) {
          motivi.push("Descrizione menziona evento/torneo ma conto inadatto");
          suggerito = 76;
        }
      }
      if (/CONTRIBUT/i.test(desc) && m.contoPdC !== 22) {
        motivi.push("Descrizione menziona contributo ma conto ≠ 22");
        suggerito = 22;
      }
      if (cat === "ALTRO" && !motivi.length) {
        motivi.push("Categoria libera generica ('ALTRO')");
      }
      if (cat === "SPESE DIVERSE" && m.contoPdC === 20) {
        motivi.push("Categoria + conto entrambi 'SPESE DIVERSE': da specificare");
      }
      if (!desc.trim()) {
        motivi.push("Descrizione vuota");
      }

      if (motivi.length > 0) result.push({ ...m, motivi, suggerito });
    });
    return result;
  }, [movimenti]);

  // Riepilogo riapertura: verifica che il conto 60 Bilancio di Apertura si azzeri
  const riepilogoApertura = useMemo(() => {
    const isApertura = m => m.apertura === true || m.categoria === "APERTURA" || (m.descrizione || "").trim().toLowerCase().startsWith("apertura:");
    const ap = movimenti.filter(isApertura);
    if (!ap.length) return null;
    // una scrittura di apertura "punta al 60" se è marcata apertura, o ha 60 come conto/contropartita
    const puntaA60 = m => m.apertura === true || Number(m.contoPdC) === 60 || Number(m.contoContropartita) === 60;
    const daCorreggere = ap.filter(m => !puntaA60(m));
    // netting teorico (a correzione fatta): uscite -> 60 DARE, entrate -> 60 AVERE
    const dare = ap.filter(m => m.tipo === "uscita").reduce((s, m) => s + (m.importo || 0), 0);
    const avere = ap.filter(m => m.tipo === "entrata").reduce((s, m) => s + (m.importo || 0), 0);
    // residuo attuale sul 60 = importi delle aperture mal contropartita (uscite +, entrate -)
    const residuo = daCorreggere.reduce((s, m) => s + (m.tipo === "uscita" ? (m.importo || 0) : -(m.importo || 0)), 0);
    return { n: ap.length, dare, avere, saldo: dare - avere, data: ap[0].data, daCorreggere, residuo };
  }, [movimenti]);

  const correggiAperture = async () => {
    const list = riepilogoApertura ? riepilogoApertura.daCorreggere : [];
    if (!list.length) return;
    const righe = list.map(m => `• ${m.tipo === "uscita" ? "AVERE" : "DARE"}  ${(contiMap[m.contoPdC]?.nome || m.contoPdC).toString().trim()}  ${fmtEuro(m.importo || 0)}`).join("\n");
    if (!confirm(`Correggo ${list.length} scritture di apertura puntandole al conto 60 · Bilancio di Apertura:\n\n${righe}\n\nDopo la correzione il conto 60 chiuderà a zero e "DA ASSEGNARE" si svuoterà. Procedere?`)) return;
    try {
      const updates = {};
      list.forEach(m => {
        updates[`${m._id}/apertura`] = true;
        updates[`${m._id}/contoContropartita`] = 60;
      });
      await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
      onToast(`${list.length} scritture di apertura corrette (contropartita → 60)`);
    } catch (e) { onToast("Errore nella correzione: " + e.message); }
  };

  const applicaSuggerimento = async (mov, contoNuovo) => {
    if (!confirm(`Cambiare conto P.d.C. di "${mov.descrizione || mov.categoria}" a ${contoNuovo} ${contiMap[contoNuovo]?.nome.trim() || ""}?`)) return;
    try {
      await db.ref(`stagioni/${stagione}/movimenti/${mov._id}`).update({
        contoPdC: Number(contoNuovo),
        modificatoIl: new Date().toISOString()
      });
      onToast("Conto aggiornato");
    } catch(e) { alert("Errore: " + e.message); }
  };

  const filtered = useMemo(() => {
    return movimenti
      .filter(m => !filterTipo || m.tipo === filterTipo)
      .filter(m => !filterMese || m.mese === filterMese)
      .filter(m => !filterBu || m.bu === filterBu)
      .filter(m => !filterOrigine || (filterOrigine === "imp" ? m.importato : !m.importato))
      .filter(m => {
        if (!filterText) return true;
        const t = filterText.toLowerCase();
        return (m.descrizione || "").toLowerCase().includes(t)
          || (m.categoria || "").toLowerCase().includes(t);
      })
      .sort((a,b) => {
        // ordinamento primario: data decrescente
        const dataCmp = (b.data || "").localeCompare(a.data || "");
        if (dataCmp !== 0) return dataCmp;
        // ordinamento secondario: creatoIl ascendente (cronologia inserimento)
        return (a.creatoIl || "").localeCompare(b.creatoIl || "");
      });
  }, [movimenti, filterTipo, filterMese, filterBu, filterText, filterOrigine]);

  const handleEdit = async (payload) => {
    try {
      // doppia conferma se è un movimento importato
      if (editing.importato) {
        if (!confirm(`Stai modificando un movimento IMPORTATO dallo sheet (€${editing.importo}). Procedere?`)) return;
      }
      // Pulisco i campi undefined prima del set (Firebase li rifiuta)
      const dati = {...payload, importato: editing.importato || false};
      Object.keys(dati).forEach(k => { if (dati[k] === undefined) dati[k] = null; });
      await db.ref(`stagioni/${stagione}/movimenti/${editing._id}`).set(dati);
      onToast("Movimento aggiornato");
      setEditing(null);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const handleDelete = async (id) => {
    const mov = movimenti.find(m => m._id === id);
    if (mov?.importato) {
      if (!confirm(`⚠️ Questo è un movimento IMPORTATO dallo sheet:\n\n${mov.descrizione || mov.categoria} · €${mov.importo}\n\nEliminarlo definitivamente?`)) return;
      if (!confirm("Sei davvero sicuro? Questa operazione non può essere annullata.")) return;
    } else {
      if (!confirm("Eliminare definitivamente questo movimento?")) return;
    }
    try {
      await db.ref(`stagioni/${stagione}/movimenti/${id}`).remove();
      onToast("Movimento eliminato");
    } catch(e) { alert("Errore: " + e.message); }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Movimenti</h2>
          <div className="sub">{tab === "lista" ? `${filtered.length} di ${movimenti.length} movimenti` : `${anomalie.length} movimenti da revisionare`}</div>
        </div>
      </div>

      <div className="tipo-switch" style={{maxWidth:480, marginBottom:18}}>
        <button type="button" className={tab === "lista" ? "active entrata" : ""} onClick={() => setTab("lista")}>≡ Lista completa ({movimenti.length})</button>
        <button type="button" className={tab === "audit" ? "active uscita" : ""} onClick={() => setTab("audit")}>⚠ Da revisionare ({anomalie.length})</button>
      </div>

      {tab === "lista" && <>

      {riepilogoApertura && (() => {
        const ok = riepilogoApertura.daCorreggere.length === 0;
        return (
        <div className="card" style={{ marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12,
             borderColor: ok ? "#c8d8ce" : "var(--danger)", background: ok ? "var(--accent-soft)" : "#fbecec" }}>
          <div>
            <div style={{ fontWeight:600 }}>Riapertura al {fmtDate(riepilogoApertura.data)} · conto 60 Bilancio di Apertura</div>
            <div style={{ fontSize:12.5, color:"var(--ink-2)", marginTop:2 }}>
              {riepilogoApertura.n} scritture di apertura · Dare {fmtEuro(riepilogoApertura.dare)} · Avere {fmtEuro(riepilogoApertura.avere)}
            </div>
            {!ok && (
              <div style={{ fontSize:12.5, color:"var(--danger)", marginTop:4, fontWeight:600 }}>
                {riepilogoApertura.daCorreggere.length} scritture puntano a "DA ASSEGNARE" invece che al conto 60 · residuo {fmtEuro(riepilogoApertura.residuo)}
              </div>
            )}
          </div>
          <div style={{ textAlign:"right", fontWeight:700, display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8 }}>
            {ok
              ? <span style={{ color:"var(--accent-ink)" }}>✓ Tutte puntano al 60 — Bilancio di Apertura a zero</span>
              : <>
                  <span style={{ color:"var(--danger)" }}>⚠ Il Bilancio di Apertura non chiude a zero</span>
                  <button className="btn accent" onClick={correggiAperture}>Correggi aperture → conto 60</button>
                </>}
          </div>
        </div>
        );
      })()}

      <div className="filters">
        <span className="label">Filtri:</span>
        <select value={filterTipo} onChange={e => setFilterTipo(e.target.value)}>
          <option value="">Tutti i tipi</option>
          <option value="entrata">Entrate</option>
          <option value="uscita">Uscite</option>
          <option value="giroconto">Giroconti</option>
        </select>
        <select value={filterMese} onChange={e => setFilterMese(e.target.value)}>
          <option value="">Tutti i mesi</option>
          {MESI.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filterBu} onChange={e => setFilterBu(e.target.value)}>
          <option value="">Tutte le BU</option>
          {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        <select value={filterOrigine} onChange={e => setFilterOrigine(e.target.value)}>
          <option value="">Tutti (imp. + nuovi)</option>
          <option value="new">Solo nuovi</option>
          <option value="imp">Solo importati</option>
        </select>
        <input type="text" placeholder="cerca testo…" value={filterText} onChange={e => setFilterText(e.target.value)} />
        {(filterTipo || filterMese || filterBu || filterText || filterOrigine) && (
          <button className="btn ghost sm" onClick={() => { setFilterTipo(""); setFilterMese(""); setFilterBu(""); setFilterText(""); setFilterOrigine(""); }}>Reset</button>
        )}
      </div>

      <div className="tbl-wrap">
        {filtered.length === 0 ? (
          <div className="empty-state">Nessun movimento{movimenti.length>0 ? " corrispondente ai filtri" : " registrato. Inserisci il primo dal menu →"}</div>
        ) : (
          <table className="tbl">
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Data</th>
                <th>Conto liquidità</th>
                <th>Contropartita</th>
                <th>Descrizione</th>
                <th>BU</th>
                <th className="num">Importo</th>
                <th style={{width:90}}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(m => {
                const liq = contiMap[m.contoLiquidita];
                const ctrp = m.tipo === "giroconto"
                  ? `→ ${contiMap[m.contoLiquiditaDest]?.nome.trim() || "?"}`
                  : contiMap[m.contoPdC] ? `${m.contoPdC.toString().padStart(2,"0")} ${contiMap[m.contoPdC].nome.trim()}` : "?";
                return (
                  <tr key={m._id}>
                    <td>
                      {m.apertura
                        ? <span className="pill" style={{background:"#f4ebd7", borderColor:"#e6d5a8", color:"#7a5a1d"}}>apertura</span>
                        : <span className={"pill " + m.tipo}>{m.tipo}</span>}
                      {m.importato && !m.apertura && <span className="pill" style={{marginLeft:4, fontSize:9.5, background:"#f5f0e6", borderColor:"#e6d5a8", color:"#7a5a1d"}}>imp.</span>}
                      {m.nonMonetario && !m.apertura && <span className="pill" style={{marginLeft:4, fontSize:9.5, background:"#f0eaff", borderColor:"#d8c8f0", color:"#5a3da8"}}>n.m.</span>}
                    </td>
                    <td>{fmtDate(m.data)}</td>
                    <td>{liq?.nome.trim() || <span style={{color:"var(--ink-3)"}}>{(m.nonMonetario || m.apertura) ? "—" : "?"}</span>}</td>
                    <td>
                      <div>{ctrp}</div>
                      {m.apertura && m.contoPdC !== 60
                        ? <div style={{fontSize:11, color:"var(--ink-3)", marginTop:2}}>↳ contropartita 60 · Bilancio di Apertura</div>
                        : (m.categoria && <div style={{fontSize:11, color:"var(--ink-3)", marginTop:2}}>{m.categoria}</div>)}
                    </td>
                    <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>—</span>}</td>
                    <td><span className="pill">{m.bu || "—"}</span></td>
                    <td className={"num " + (m.apertura ? "" : m.tipo === "uscita" ? "neg" : m.tipo === "entrata" ? "pos" : "")}>
                      {m.apertura ? "" : m.tipo === "uscita" ? "−" : m.tipo === "entrata" ? "+" : "⇄"} {fmt(m.importo)}
                    </td>
                    <td>
                      <div style={{display:"flex", gap:4}}>
                        <button className="btn ghost sm" onClick={() => setEditing(m)}>✎</button>
                        <button className="btn danger sm" onClick={() => handleDelete(m._id)}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
      </>}

      {tab === "audit" && (
        <div>
          {anomalie.length === 0 ? (
            <div className="card" style={{textAlign:"center", padding:40, background:"var(--accent-soft)", borderColor:"#c8d8ce"}}>
              <h3 className="card-title" style={{color:"var(--accent-ink)"}}>✓ Nessuna anomalia rilevata</h3>
              <p style={{fontSize:13, color:"var(--ink-2)", margin:0}}>Tutti i movimenti hanno conti P.d.C. e descrizioni coerenti.</p>
            </div>
          ) : (
            <>
              <div style={{marginBottom:14, padding:"12px 16px", background:"#fdf5e6", border:"1px solid #e6d5a8", borderRadius:8, fontSize:12.5, color:"#7a5a1d"}}>
                <strong>💡 Come funziona.</strong> Sono elencati i movimenti che mostrano possibili incongruenze tra descrizione, categoria e conto P.d.C. Per ciascuno trovi il <strong>motivo</strong> e, dove possibile, un <strong>conto suggerito</strong>: clicca ✓ per applicarlo direttamente, oppure ✎ per aprire il form di modifica completo.
              </div>

              <div className="tbl-wrap">
                <table className="tbl">
                  <thead>
                    <tr>
                      <th>Tipo</th>
                      <th>Data</th>
                      <th>Descrizione / Categoria</th>
                      <th>Conto attuale</th>
                      <th className="num">Importo</th>
                      <th>Motivi</th>
                      <th>Suggerito</th>
                      <th style={{width:90}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {anomalie.sort((a,b) => (b.importo || 0) - (a.importo || 0)).map(m => (
                      <tr key={m._id}>
                        <td><span className={"pill " + m.tipo}>{m.tipo}</span></td>
                        <td>{fmtDate(m.data)}</td>
                        <td>
                          <div style={{fontWeight:500}}>{m.descrizione || <span style={{color:"var(--ink-3)"}}>(vuota)</span>}</div>
                          <div style={{fontSize:10.5, color:"var(--ink-3)"}}>{m.categoria || "—"}</div>
                        </td>
                        <td>
                          {m.contoPdC ? (
                            <div>
                              <span className="mono" style={{fontWeight:600}}>{String(m.contoPdC).padStart(2,"0")}</span>{" "}
                              <span style={{fontSize:12}}>{contiMap[m.contoPdC]?.nome.trim() || "?"}</span>
                            </div>
                          ) : <span style={{color:"var(--ink-3)"}}>—</span>}
                        </td>
                        <td className={"num " + (m.tipo === "entrata" ? "pos" : "neg")}>
                          {m.tipo === "entrata" ? "+" : "−"} {fmt(m.importo)}
                        </td>
                        <td>
                          {m.motivi.map((motivo, i) => (
                            <div key={i} style={{fontSize:11, color:"var(--warn)", marginBottom:2}}>• {motivo}</div>
                          ))}
                        </td>
                        <td>
                          {m.suggerito ? (
                            <div style={{fontSize:11.5}}>
                              <div className="mono" style={{fontWeight:600, color:"var(--accent)"}}>{String(m.suggerito).padStart(2,"0")}</div>
                              <div style={{color:"var(--ink-2)"}}>{contiMap[m.suggerito]?.nome.trim() || ""}</div>
                            </div>
                          ) : <span style={{color:"var(--ink-3)", fontSize:11}}>—</span>}
                        </td>
                        <td>
                          <div style={{display:"flex", gap:4}}>
                            {m.suggerito && (
                              <button className="btn accent sm" title="Applica suggerimento" onClick={() => applicaSuggerimento(m, m.suggerito)}>✓</button>
                            )}
                            <button className="btn ghost sm" title="Modifica completa" onClick={() => setEditing(m)}>✎</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{marginTop:18, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:11.5, color:"var(--ink-3)"}}>
                <strong>Criteri di rilevazione:</strong> Conto 20 (SPESE DIVERSE) generico · Conto 35 (SOPRAVVENIENZE) generico · Parole chiave nella descrizione (SPONSOR, CSI, PALESTRA, PALLONI, COMMERCIALISTA, COMMISSIONI, QUOTE, EVENTO, CONTRIBUTI) non coerenti col conto · Categoria "ALTRO" o "SPESE DIVERSE" · Descrizione vuota.
              </div>
            </>
          )}
        </div>
      )}

      {editing && (
        <div className="modal-bg" onClick={() => setEditing(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Modifica movimento</h3>
              <button className="btn ghost sm" onClick={() => setEditing(null)}>✕</button>
            </div>
            <div className="modal-body">
              <MovimentoForm conti={conti} mov={editing} categorie={categorie} onSave={handleEdit} onCancel={() => setEditing(null)} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// UTILITY CONTABILI: genera Libro Giornale da movimenti
// ============================================================
function generaLibroGiornale(movimenti, saldiIniziali, contiMap) {
  const scritture = [];

  // Scrittura di apertura: BILANCIO DI APERTURA in AVERE, conti liquidità in DARE
  const totApertura = Object.values(saldiIniziali).reduce((s, v) => s + (v || 0), 0);
  if (totApertura > 0) {
    const righeApertura = [];
    Object.entries(saldiIniziali).forEach(([cod, v]) => {
      if (v && v !== 0) {
        const c = contiMap[cod];
        righeApertura.push({
          codice: Number(cod),
          nome: c?.nome || `Conto ${cod}`,
          dare: v > 0 ? v : 0,
          avere: v < 0 ? -v : 0,
        });
      }
    });
    righeApertura.push({
      codice: 60,
      nome: "BILANCIO DI APERTURA",
      dare: 0,
      avere: totApertura,
    });
    scritture.push({
      data: "2025-09-01",
      descrizione: "Riapertura saldi iniziali",
      righe: righeApertura,
      auto: true,
      origine: "apertura",
      bu: null, // aggregato di più BU: non filtrabile per singola BU
    });
  }

  // Per ogni movimento → scrittura partita doppia
  // PRIMA: raggruppo i movimenti che fanno parte di una scrittura composta
  const composteMap = {};
  const movSemplici = [];
  movimenti.forEach(m => {
    if (m.scritturaComposta && m.scritturaId) {
      if (!composteMap[m.scritturaId]) composteMap[m.scritturaId] = [];
      composteMap[m.scritturaId].push(m);
    } else {
      movSemplici.push(m);
    }
  });

  // Emetto scritture composte come UN'UNICA scrittura con N righe
  Object.entries(composteMap).forEach(([scritturaId, righeMov]) => {
    if (righeMov.length === 0) return;
    const primo = righeMov[0];
    const righeOrdinate = [...righeMov].sort((a, b) => {
      // Dare prima, poi Avere; entro ognuno per codice conto
      const aDare = (a.dare || 0) > 0;
      const bDare = (b.dare || 0) > 0;
      if (aDare !== bDare) return aDare ? -1 : 1;
      return (a.contoPdC || 0) - (b.contoPdC || 0);
    });
    scritture.push({
      data: primo.data,
      descrizione: primo.descrizione || "Scrittura composta",
      righe: righeOrdinate.map(r => ({
        codice: r.contoPdC,
        nome: contiMap[r.contoPdC]?.nome || "?",
        dare: r.dare || 0,
        avere: r.avere || 0,
      })),
      auto: false,
      origine: "composta",
      scritturaId,
      composta: true,
      nonMonetario: true,
      bu: primo.bu || "GENERAL",
    });
  });

  movSemplici.forEach(m => {
    const liq = m.contoLiquidita ? contiMap[m.contoLiquidita] : null;
    // Se non c'è conto liquidità e non è un giroconto: scrittura "non monetaria"
    // serve almeno un secondo conto. Per ora usiamo categoria → conto di contropartita generico
    // o se mancante, saltiamo
    if (m.tipo === "entrata" && m.contoPdC) {
      if (!liq) {
        // Apertura: contropartita = 60 BILANCIO DI APERTURA
        // Altrimenti: contropartita ESPLICITA scelta dall'utente; se assente → DA ASSEGNARE
        // (non si usa più 35 SOPRAVVENIENZE di default)
        let ctrCodice, ctrNome;
        if (m.apertura) {
          ctrCodice = 60; ctrNome = "BILANCIO DI APERTURA";
        } else if (m.contoContropartita) {
          ctrCodice = Number(m.contoContropartita);
          ctrNome = contiMap[ctrCodice]?.nome || `Conto ${ctrCodice}`;
        } else {
          ctrCodice = 0; ctrNome = "⚠ DA ASSEGNARE";
        }
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || (m.apertura ? "Apertura conto" : `Entrata non monetaria ${m.categoria || ''}`.trim()),
          righe: [
            { codice: m.contoPdC, nome: contiMap[m.contoPdC]?.nome || "?", dare: m.importo, avere: 0 },
            { codice: ctrCodice, nome: ctrNome, dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id, nonMonetario: true, apertura: m.apertura, bu: m.bu || "GENERAL",
        });
      } else {
        const pdc = contiMap[m.contoPdC];
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || `Entrata ${m.categoria || ''}`.trim(),
          righe: [
            { codice: m.contoLiquidita, nome: liq.nome || "?", dare: m.importo, avere: 0 },
            { codice: m.contoPdC, nome: pdc?.nome || "?", dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id, bu: m.bu || "GENERAL",
        });
      }
    } else if (m.tipo === "uscita" && m.contoPdC) {
      if (!liq) {
        // Apertura: contropartita = 60 BILANCIO DI APERTURA
        // Ammortamenti: contropartita = fondo amm.to
        // Altrimenti: contropartita ESPLICITA; se assente → DA ASSEGNARE
        // (non si usa più 60 BILANCIO DI APERTURA come default generico)
        let contropartitaCod, contropartitaNome;
        if (m.apertura) {
          contropartitaCod = 60; contropartitaNome = "BILANCIO DI APERTURA";
        } else {
          const ammoMap = {44:52, 45:53, 46:54, 47:55, 48:56, 49:57, 50:58, 51:59};
          if (ammoMap[m.contoPdC]) {
            contropartitaCod = ammoMap[m.contoPdC];
            contropartitaNome = contiMap[contropartitaCod]?.nome || "FONDO AMM.TO";
          } else if (m.contoContropartita) {
            contropartitaCod = Number(m.contoContropartita);
            contropartitaNome = contiMap[contropartitaCod]?.nome || `Conto ${contropartitaCod}`;
          } else {
            contropartitaCod = 0; contropartitaNome = "⚠ DA ASSEGNARE";
          }
        }
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || (m.apertura ? "Apertura conto" : `Scrittura non monetaria ${m.categoria || ''}`.trim()),
          righe: [
            { codice: contropartitaCod, nome: contropartitaNome, dare: m.importo, avere: 0 },
            { codice: m.contoPdC, nome: contiMap[m.contoPdC]?.nome || "?", dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id, nonMonetario: true, apertura: m.apertura, bu: m.bu || "GENERAL",
        });
      } else {
        const pdc = contiMap[m.contoPdC];
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || `Uscita ${m.categoria || ''}`.trim(),
          righe: [
            { codice: m.contoPdC, nome: pdc?.nome || "?", dare: m.importo, avere: 0 },
            { codice: m.contoLiquidita, nome: liq.nome || "?", dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id, bu: m.bu || "GENERAL",
        });
      }
    } else if (m.tipo === "giroconto") {
      const dest = contiMap[m.contoLiquiditaDest];
      scritture.push({
        data: m.data,
        descrizione: m.descrizione || "Giroconto",
        righe: [
          { codice: m.contoLiquiditaDest, nome: dest?.nome || "?", dare: m.importo, avere: 0 },
          { codice: m.contoLiquidita, nome: liq?.nome || "?", dare: 0, avere: m.importo },
        ],
        auto: true, origine: m._id || "mov", movId: m._id, bu: m.bu || "GENERAL",
      });
    }
  });

  // Ordina per data
  scritture.sort((a, b) => {
    const dataCmp = (a.data || "").localeCompare(b.data || "");
    if (dataCmp !== 0) return dataCmp;
    // a parità data: ordino per creatoIl ascendente
    const movA = movimenti.find(m => m._id === a.movId);
    const movB = movimenti.find(m => m._id === b.movId);
    return (movA?.creatoIl || "").localeCompare(movB?.creatoIl || "");
  });
  return scritture;
}

// Calcola mastrini (somma DARE/AVERE per conto)
function calcolaMastrini(scritture) {
  const m = {};
  scritture.forEach(s => {
    s.righe.forEach(r => {
      if (!m[r.codice]) m[r.codice] = { codice: r.codice, nome: r.nome, dare: 0, avere: 0 };
      m[r.codice].dare += r.dare || 0;
      m[r.codice].avere += r.avere || 0;
    });
  });
  return Object.values(m).map(x => ({...x, saldo: x.dare - x.avere}));
}

// Effetto "nascosto" sulla liquidità: righe di scritture libere/composte o rettifiche
// non monetarie il cui conto è un conto di liquidità. Questi movimenti hanno
// contoLiquidita = null (il conto sta in contoPdC), quindi i calcoli di cassa
// basati su contoLiquidita non li vedrebbero. Restituisce {codice, delta} con
// convenzione DARE = +liquidità, AVERE = -liquidità (oppure null).
const CODICI_LIQUIDITA = [1, 3, 4, 5, 9, 10];
function effettoLiquiditaNascosto(m) {
  if (!m) return null;
  // Scrittura composta / libera: ogni riga porta contoPdC + dare/avere
  if (m.scritturaComposta && CODICI_LIQUIDITA.includes(Number(m.contoPdC))) {
    const delta = (Number(m.dare) || 0) - (Number(m.avere) || 0);
    return delta !== 0 ? { codice: Number(m.contoPdC), delta } : null;
  }
  // Rettifica non monetaria semplice (nessun conto liquidità "monetario") su un conto di liquidità
  if (!m.scritturaComposta && !m.contoLiquidita && m.tipo !== "giroconto" && CODICI_LIQUIDITA.includes(Number(m.contoPdC))) {
    const delta = (m.tipo === "entrata" ? 1 : -1) * (Number(m.importo) || 0);
    return delta !== 0 ? { codice: Number(m.contoPdC), delta } : null;
  }
  return null;
}

// ============================================================
// RIAPERTURA DI INIZIO ANNO
// Dai movimenti della stagione che si chiude calcola i saldi finali,
// riporta i conti PATRIMONIALI (prospetto SP) come apertura del nuovo anno
// (contropartita 60 BILANCIO DI APERTURA) e chiude il risultato d'esercizio
// (utile/perdita dei conti CE) a RISERVA UTILE (14). Il conto 60 si azzera.
// ============================================================
function generaRiapertura(movimenti, saldiIniziali, conti, annoY1) {
  const cM = {}; (conti || []).forEach(c => { cM[c.codice] = c; });
  const r2 = n => Math.round((Number(n) || 0) * 100) / 100;
  const mastrini = calcolaMastrini(generaLibroGiornale(movimenti || [], saldiIniziali || {}, cM));
  const isSP = c => cM[c] && cM[c].prospetto === "SP";
  const isRes = c => cM[c] && (cM[c].prospetto === "CE" || cM[c].prospetto === "SP/CE");
  const utile = r2(mastrini.filter(m => isRes(m.codice)).reduce((s, m) => s + (m.avere - m.dare), 0));
  const LIQ = [1, 3, 4, 5, 9, 10];
  const data = `${annoY1}-09-01`;
  const now = new Date().toISOString();
  const ap = [];
  let totAttivo = 0, totLiab = 0, nConti = 0;
  const push = (o) => ap.push(Object.assign({
    data, mese: "settembre", categoria: "APERTURA", apertura: true, importato: true,
    nonMonetario: true, contoLiquidita: null, contoLiquiditaDest: null, contoContropartita: null,
    creatoIl: now, modificatoIl: now,
  }, o));

  mastrini.forEach(m => {
    if (m.codice === 60 || !isSP(m.codice)) return;
    const s = r2(m.saldo);
    if (Math.abs(s) < 0.005) return;
    nConti++;
    if (s > 0) totAttivo += s; else totLiab += -s;
    const nome = (m.nome || "").trim();
    const isLiq = LIQ.includes(m.codice);
    if (isLiq) {
      if (s > 0) push({ tipo: "entrata", contoLiquidita: m.codice, contoPdC: 60, nonMonetario: false, importo: s, bu: "GENERAL", descrizione: `Riapertura: ${nome}` });
      else       push({ tipo: "uscita",  contoLiquidita: m.codice, contoPdC: 60, nonMonetario: false, importo: -s, bu: "GENERAL", descrizione: `Riapertura: ${nome}` });
    } else {
      if (s > 0) push({ tipo: "entrata", contoPdC: m.codice, importo: s, bu: "GENERAL", descrizione: `Riapertura: ${nome}` });
      else       push({ tipo: "uscita",  contoPdC: m.codice, importo: -s, bu: "GENERAL", descrizione: `Riapertura: ${nome}` });
    }
  });

  // risultato d'esercizio precedente a Riserva Utile (14)
  if (Math.abs(utile) >= 0.005) {
    if (utile > 0) push({ tipo: "uscita", contoPdC: 14, importo: utile, bu: "GENERAL", descrizione: "Riapertura: utile es. precedente a Riserva Utile" });
    else           push({ tipo: "entrata", contoPdC: 14, importo: -utile, bu: "GENERAL", descrizione: "Riapertura: perdita es. precedente a Riserva Utile" });
  }

  const totPassivo = r2(totLiab + utile);
  // residuo di controllo del conto transitorio (dovrebbe essere ~0)
  const c60 = mastrini.find(m => m.codice === 60);
  const residuo60 = c60 ? r2(c60.saldo) : 0;
  return { aperture: ap, utile, totAttivo: r2(totAttivo), totPassivo, nConti, residuo60 };
}

// ============================================================
// PAGINA: LIBRO GIORNALE (con tab Cronologico e Mastrini)
// ============================================================
function PageLibroGiornale({ conti, movimenti, saldiIniziali }) {
  const [tab, setTab] = useState("cron"); // cron | mastrino
  const [contoMastrino, setContoMastrino] = useState("");
  const [filterBu, setFilterBu] = useState(""); // "" = tutte le BU

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const scritture = useMemo(
    () => generaLibroGiornale(movimenti, saldiIniziali, contiMap),
    [movimenti, saldiIniziali, contiMap]
  );

  // BU presenti nelle scritture (escluso l'aggregato di apertura con bu null)
  const buDisponibili = useMemo(() => {
    const set = new Set();
    scritture.forEach(s => { if (s.bu) set.add(s.bu); });
    return [...set].sort();
  }, [scritture]);

  // Scritture filtrate per BU: filtro scritture INTERE (entrambe le righe
  // condividono la stessa BU), così il giornale resta quadrato dentro la BU.
  // L'apertura (bu null) viene mostrata solo quando non c'è filtro attivo.
  const scrittureView = useMemo(
    () => filterBu ? scritture.filter(s => s.bu === filterBu) : scritture,
    [scritture, filterBu]
  );

  // Verifica chiusura evento: saldo residuo sui conti transitori 74/75 per la BU.
  // A fine evento devono essere chiusi (saldo ≈ 0).
  const CONTI_DA_CHIUDERE = [74, 75];
  const verificaChiusura = useMemo(() => {
    if (!filterBu) return null;
    return CONTI_DA_CHIUDERE.map(cod => {
      let dare = 0, avere = 0;
      scrittureView.forEach(s => s.righe.forEach(r => {
        if (r.codice === cod) { dare += r.dare || 0; avere += r.avere || 0; }
      }));
      const saldo = dare - avere;
      return { codice: cod, nome: contiMap[cod]?.nome || `Conto ${cod}`, saldo, chiuso: Math.abs(saldo) < 0.01, attivo: (dare + avere) > 0 };
    });
  }, [filterBu, scrittureView, contiMap]);

  const totD = scrittureView.reduce((s, sc) => s + sc.righe.reduce((sr, r) => sr + (r.dare || 0), 0), 0);
  const totA = scrittureView.reduce((s, sc) => s + sc.righe.reduce((sr, r) => sr + (r.avere || 0), 0), 0);
  const quadrato = Math.abs(totD - totA) < 0.01;

  // Conti che hanno movimenti, per popolare il dropdown
  const contiConMovimenti = useMemo(() => {
    const set = new Set();
    scrittureView.forEach(s => s.righe.forEach(r => set.add(r.codice)));
    return [...set].map(c => contiMap[c] || {codice: c, nome: `Conto ${c}`}).sort((a,b) => a.codice - b.codice);
  }, [scrittureView, contiMap]);

  // Mastrino del conto selezionato, raggruppato per mese
  const mastrinoPerMese = useMemo(() => {
    if (!contoMastrino) return null;
    const cod = Number(contoMastrino);
    const righe = []; // tutte le righe del conto, con data e descrizione
    scrittureView.forEach(s => {
      s.righe.forEach(r => {
        if (r.codice === cod) {
          righe.push({
            data: s.data,
            descrizione: s.descrizione,
            dare: r.dare || 0,
            avere: r.avere || 0,
            origine: s.origine,
            apertura: s.origine === "apertura",
          });
        }
      });
    });
    // Ordino per data
    righe.sort((a,b) => (a.data || "").localeCompare(b.data || ""));
    // Raggruppo per mese (uso MESI con anno settembre-dicembre 2025, gen-ago 2026)
    const gruppi = {};
    MESI.forEach((m, i) => {
      const anno = i <= 3 ? 2025 : 2026;
      const mNum = i <= 3 ? i + 9 : i - 3;
      const key = `${anno}-${String(mNum).padStart(2,"0")}`;
      gruppi[key] = { mese: m, anno, key, righe: [], totDare: 0, totAvere: 0 };
    });
    righe.forEach(r => {
      const key = r.data ? r.data.slice(0,7) : "?";
      if (!gruppi[key]) {
        // fuori range, lo aggiungo a parte
        gruppi[key] = { mese: "—", anno: "?", key, righe: [], totDare: 0, totAvere: 0 };
      }
      gruppi[key].righe.push(r);
      gruppi[key].totDare += r.dare;
      gruppi[key].totAvere += r.avere;
    });

    // Saldo progressivo
    let saldoProg = 0;
    const gruppiArr = Object.values(gruppi).sort((a,b) => a.key.localeCompare(b.key));
    gruppiArr.forEach(g => {
      g.righe.forEach(r => {
        saldoProg += (r.dare - r.avere);
        r.saldoProg = saldoProg;
      });
      g.saldoFineMese = saldoProg;
    });

    const totDare = gruppiArr.reduce((s,g) => s + g.totDare, 0);
    const totAvere = gruppiArr.reduce((s,g) => s + g.totAvere, 0);

    return { gruppi: gruppiArr, totDare, totAvere, saldoFinale: totDare - totAvere };
  }, [contoMastrino, scrittureView]);

  return (
    <div>
      <div className="page-head">

          <h2>Libro Giornale</h2>

        </div>
        <div style={{display:"flex", gap:8, alignItems:"baseline"}}>
          <span className="mono" style={{fontSize:12.5, color:"var(--ink-3)"}}>
            Σ DARE {fmt(totD)} · Σ AVERE {fmt(totA)}
          </span>
          <span className="pill" style={{background: quadrato ? "var(--accent-soft)" : "var(--danger-soft)", borderColor: quadrato ? "#c8d8ce" : "#f1d6d6", color: quadrato ? "var(--accent-ink)" : "var(--danger)"}}>
            {quadrato ? "✓ Quadrato" : "✗ Sbilanciato"}
          </span>
        </div>
      </div>

      <div className="tipo-switch" style={{maxWidth:420, marginBottom:18}}>
        <button type="button" className={tab === "cron" ? "active entrata" : ""} onClick={() => setTab("cron")}>▤ Cronologico</button>
        <button type="button" className={tab === "mastrino" ? "active entrata" : ""} onClick={() => setTab("mastrino")}>▦ Mastrini per conto</button>
      </div>

      <div className="filters" style={{marginBottom:14}}>
        <span className="label">Business Unit:</span>
        <select value={filterBu} onChange={e => setFilterBu(e.target.value)} style={{maxWidth:280}}>
          <option value="">Tutte le BU</option>
          {buDisponibili.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        {filterBu && (
          <button className="btn ghost sm" onClick={() => setFilterBu("")}>Reset BU</button>
        )}
        {filterBu && (
          <span className="mono" style={{fontSize:12, color:"var(--ink-3)", marginLeft:"auto"}}>
            Σ DARE {fmt(totD)} · Σ AVERE {fmt(totA)} · {quadrato ? "✓ quadrato" : "✗ sbilanciato"}
          </span>
        )}
      </div>

      {verificaChiusura && (
        <div style={{
          marginBottom:18, padding:"14px 18px", borderRadius:"var(--radius-lg)",
          border:"1px solid var(--rule)", borderLeft:"4px solid var(--gold)",
          background:"var(--panel-2)", boxShadow:"var(--shadow-sm)",
        }}>
          <div style={{fontSize:12.5, fontWeight:600, color:"var(--ink-2)", marginBottom:10, textTransform:"uppercase", letterSpacing:"0.04em"}}>
            Verifica chiusura evento · {filterBu}
          </div>
          <div style={{display:"flex", flexWrap:"wrap", gap:18}}>
            {verificaChiusura.map(v => (
              <div key={v.codice} style={{display:"flex", alignItems:"center", gap:10}}>
                <span className="mono" style={{fontSize:12, color:"var(--ink-3)"}}>{String(v.codice).padStart(2,"0")}</span>
                <span style={{fontSize:13, color:"var(--ink-2)"}}>{v.nome.trim()}</span>
                {!v.attivo ? (
                  <span className="pill" style={{background:"var(--bg)", borderColor:"var(--rule-2)", color:"var(--ink-3)"}}>
                    nessun movimento
                  </span>
                ) : (
                  <span className="pill" style={{
                    fontWeight:600,
                    background: v.chiuso ? "var(--accent-soft)" : "var(--danger-soft)",
                    borderColor: v.chiuso ? "#c8d8ce" : "#f1d6d6",
                    color: v.chiuso ? "var(--accent-ink)" : "var(--danger)",
                  }}>
                    {v.chiuso ? "✓ chiuso" : `⚠ residuo ${fmt(Math.abs(v.saldo))} ${v.saldo > 0 ? "D" : "A"}`}
                  </span>
                )}
              </div>
            ))}
          </div>
          <div className="hint" style={{marginTop:10, fontSize:11.5, color:"var(--ink-3)"}}>
            A fine evento questi conti transitori devono risultare chiusi. Un residuo segnala una scrittura di storno/giroconto mancante.
          </div>
        </div>
      )}

      {tab === "cron" && (
        <div className="tbl-wrap" style={{maxHeight:"calc(100vh - 280px)", overflowY:"auto"}}>
          <table className="tbl">
            <thead>
              <tr>
                <th style={{width:90}}>Data</th>

                <th>Conto</th>
                <th>Descrizione</th>
                <th className="num" style={{width:110}}>Dare</th>
                <th className="num" style={{width:110}}>Avere</th>

            </thead>
            <tbody>
              {scrittureView.map((s, idx) => (
                <React.Fragment key={idx}>
                  {s.righe.map((r, ri) => (
                    <tr key={`${idx}-${ri}`} style={ri === 0 ? {borderTop: s.composta ? "2px solid #7c3aed" : "2px solid var(--rule-2)"} : {}}>

                      <td>{r.nome.trim()}</td>

                          <>
                            {s.descrizione}

                      </td>
                      <td className="num">{r.dare > 0 ? fmt(r.dare) : ""}</td>
                      <td className="num">{r.avere > 0 ? fmt(r.avere) : ""}</td>
                    </tr>
                  ))}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab === "mastrino" && (

            <select value={contoMastrino} onChange={e => setContoMastrino(e.target.value)} style={{maxWidth:480}}>
              <option value="">— seleziona un conto —</option>
              {(() => {

                const ordineCat = [

                  "RETTIFICA ATTIVO", "DEBITI", "PN",
                  "RICAVI", "COSTI", "COSTI/RICAVI", "CONTO TRANSITORIO", "ALTRO"
                ];

                  if (!gruppi[cat]) gruppi[cat] = [];
                  gruppi[cat].push(c);
                });

                  </div>

                        <th style={{background:"transparent"}}>Descrizione</th>

                    <tbody>
                      {g.righe.map((r, i) => (
                        <tr key={i} style={r.apertura ? {background:"#fdf8e6"} : {}}>
                          <td>{fmtDate(r.data)}</td>
                          <td>{r.descrizione}{r.apertura && <span className="pill" style={{marginLeft:8, fontSize:10, background:"#f4ebd7", borderColor:"#e6d5a8", color:"#7a5a1d"}}>apertura</span>}</td>
                          <td className="num">{r.dare > 0 ? fmt(r.dare) : ""}</td>
                          <td className="num">{r.avere > 0 ? fmt(r.avere) : ""}</td>
                          <td className={"num " + (r.saldoProg < 0 ? "neg" : r.saldoProg > 0 ? "pos" : "")} style={{fontWeight:500}}>
                            {fmt(Math.abs(r.saldoProg))} {r.saldoProg < 0 ? "A" : r.saldoProg > 0 ? "D" : ""}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// PAGINA: SNAPSHOT MENSILI (chiusure)
// ============================================================
function PageSnapshot({ conti, movimenti, saldiIniziali, stagione, onToast }) {
  const [snapshots, setSnapshots] = useState([]);
  const [viewing, setViewing] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Carica snapshot da Firebase
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`stagioni/${stagione}/snapshots`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setSnapshots(v ? Object.entries(v).map(([k,s]) => ({...s, _key: k})).sort((a,b) => (b.key || "").localeCompare(a.key || "")) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  // Lista dei mesi con movimenti
  const mesiDisponibili = useMemo(() => {
    const set = new Set();
    movimenti.forEach(m => { if (m.data) set.add(m.data.slice(0,7)); });
    return [...set].sort();
  }, [movimenti]);

  const giaChiusi = useMemo(() => new Set(snapshots.map(s => s.key)), [snapshots]);
  const daChiudere = mesiDisponibili.filter(m => !giaChiusi.has(m));

  const calcolaSaldiAlla = (yearMonth) => {
    // Movimenti fino e incluso il mese yearMonth (YYYY-MM)
    const movsFiltered = movimenti.filter(m => m.data && m.data.slice(0,7) <= yearMonth);
    const scritture = generaLibroGiornale(movsFiltered, saldiIniziali, contiMap);

    const liq = {};
    CONTI_LIQUIDITA.forEach(c => { liq[c.codice] = saldiIniziali[c.codice] || 0; });
    movsFiltered.forEach(m => {
      if (m.tipo === "entrata" && liq[m.contoLiquidita] !== undefined) liq[m.contoLiquidita] += m.importo;
      else if (m.tipo === "uscita" && liq[m.contoLiquidita] !== undefined) liq[m.contoLiquidita] -= m.importo;
      else if (m.tipo === "giroconto") {
        if (liq[m.contoLiquidita] !== undefined) liq[m.contoLiquidita] -= m.importo;
        if (liq[m.contoLiquiditaDest] !== undefined) liq[m.contoLiquiditaDest] += m.importo;
      }
      const eff = effettoLiquiditaNascosto(m);
      if (eff && liq[eff.codice] !== undefined) liq[eff.codice] += eff.delta;
    });

    // mastrini di tutti i conti
    const mastrini = calcolaMastrini(scritture).filter(m => m.dare > 0 || m.avere > 0);

    // KPI CE
    const ricavi = mastrini.filter(m => contiMap[m.codice]?.categoria === "RICAVI").reduce((s,m) => s + m.avere - m.dare, 0);
    const costi = mastrini.filter(m => ["COSTI","COSTI/RICAVI"].includes(contiMap[m.codice]?.categoria)).reduce((s,m) => s + m.dare - m.avere, 0);

    return {
      liquidita: liq,
      totaleLiquidita: Object.values(liq).reduce((s,v) => s + v, 0),
      ricavi, costi, utile: ricavi - costi,
      nMovimenti: movsFiltered.length,
      mastrini: mastrini.map(m => ({ codice: m.codice, nome: m.nome, dare: m.dare, avere: m.avere, saldo: m.dare - m.avere })),
    };
  };

  const creaSnapshot = async (yearMonth) => {
    if (!confirm(`Creare lo snapshot al ${yearMonth}? Verranno salvati i saldi correnti come fotografia.`)) return;
    try {
      const dati = calcolaSaldiAlla(yearMonth);
      const snapshot = {
        key: yearMonth,
        anno: Number(yearMonth.slice(0,4)),
        mese: Number(yearMonth.slice(5,7)),
        creatoIl: new Date().toISOString(),
        ...dati,
      };
      await db.ref(`stagioni/${stagione}/snapshots/snap_${yearMonth}`).set(snapshot);
      onToast(`Snapshot ${yearMonth} creato`);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const ricreaSnapshot = async (snap) => {
    if (!confirm(`Ricalcolare lo snapshot ${snap.key} con i dati attuali? Verrà sovrascritto.`)) return;
    try {
      const dati = calcolaSaldiAlla(snap.key);
      const updated = { ...snap, ...dati, creatoIl: new Date().toISOString() };
      delete updated._key;
      await db.ref(`stagioni/${stagione}/snapshots/${snap._key}`).set(updated);
      onToast(`Snapshot ${snap.key} aggiornato`);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const eliminaSnapshot = async (snap) => {
    if (!confirm(`Eliminare lo snapshot ${snap.key}?`)) return;
    await db.ref(`stagioni/${stagione}/snapshots/${snap._key}`).remove();
    onToast("Snapshot eliminato");
  };

  const fmtYM = (ym) => {
    if (!ym) return "—";
    const [y,m] = ym.split("-");
    const mesi = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
    return `${mesi[Number(m)-1]} ${y}`;
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Snapshot mensili</h2>
          <div className="sub">Fotografia dei saldi a fine mese · {snapshots.length} chiusure salvate</div>
        </div>
      </div>

      {daChiudere.length > 0 && (
        <div className="card" style={{marginBottom:20}}>
          <h3 className="card-title">📸 Crea nuovo snapshot</h3>
          <p style={{fontSize:13, color:"var(--ink-2)", margin:"0 0 12px"}}>Mesi con movimenti ma non ancora chiusi:</p>
          <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
            {daChiudere.map(ym => (
              <button key={ym} className="btn ghost sm" onClick={() => creaSnapshot(ym)}>
                + {fmtYM(ym)}
              </button>
            ))}
          </div>
        </div>
      )}

      {snapshots.length === 0 ? (
        <div className="empty-state" style={{padding:60}}>
          Nessuno snapshot ancora salvato. Crea il primo selezionando un mese qui sopra.
        </div>
      ) : (
        <>
          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"0 0 12px"}}>Storico chiusure</h3>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Mese</th>
                  <th className="num">Liquidità tot.</th>
                  {CONTI_LIQUIDITA.map(c => <th key={c.codice} className="num" style={{fontSize:9.5}}>{c.nome.trim().slice(0,10)}</th>)}
                  <th className="num">Ricavi</th>
                  <th className="num">Costi</th>
                  <th className="num">Utile</th>
                  <th>Creato</th>
                  <th style={{width:120}}></th>
                </tr>
              </thead>
              <tbody>
                {snapshots.map(s => (
                  <tr key={s._key}>
                    <td style={{fontWeight:600, textTransform:"capitalize"}}>{fmtYM(s.key)}</td>
                    <td className="num" style={{fontWeight:600}}>{fmt(s.totaleLiquidita)}</td>
                    {CONTI_LIQUIDITA.map(c => (
                      <td key={c.codice} className="num">{s.liquidita?.[c.codice] ? fmt(s.liquidita[c.codice]) : "—"}</td>
                    ))}
                    <td className="num pos">{fmt(s.ricavi)}</td>
                    <td className="num neg">{fmt(s.costi)}</td>
                    <td className={"num " + (s.utile < 0 ? "neg" : "pos")} style={{fontWeight:600}}>{fmt(s.utile)}</td>
                    <td style={{fontSize:11, color:"var(--ink-3)"}}>{s.creatoIl ? new Date(s.creatoIl).toLocaleDateString("it-IT") : "—"}</td>
                    <td>
                      <div style={{display:"flex", gap:4}}>
                        <button className="btn ghost sm" onClick={() => setViewing(s)} title="Vedi dettaglio">👁</button>
                        <button className="btn ghost sm" onClick={() => ricreaSnapshot(s)} title="Ricalcola">↻</button>
                        <button className="btn danger sm" onClick={() => eliminaSnapshot(s)} title="Elimina">🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      <div style={{marginTop:18, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12, color:"var(--ink-2)"}}>
        <strong>💡 Cosa fa lo snapshot.</strong> Cattura una fotografia di tutti i saldi (liquidità, mastrini, ricavi/costi/utile) al termine di un dato mese. Non blocca i movimenti: se modifichi qualcosa, puoi premere ↻ per ricalcolare lo snapshot con i nuovi dati. Utile per confronti mese-su-mese e per allineare la contabilità ai bilanci ufficiali.
      </div>

      {viewing && (() => {
        // calcolo SP/CE sintetico
        const mastrini = viewing.mastrini || [];
        const spVoci = mastrini.filter(m => {
          const cat = contiMap[m.codice]?.categoria || "";
          const pros = contiMap[m.codice]?.prospetto || "";
          return pros === "SP" || pros === "SP/CE";
        });
        const ceVoci = mastrini.filter(m => {
          const pros = contiMap[m.codice]?.prospetto || "";
          return pros === "CE" || pros === "SP/CE";
        });
        const attivo = spVoci.filter(m => m.saldo > 0).reduce((s,m) => s+m.saldo, 0);
        const passivo = spVoci.filter(m => m.saldo < 0).reduce((s,m) => s-m.saldo, 0); // positivo
        const totD = mastrini.reduce((s,m) => s + m.dare, 0);
        const totA = mastrini.reduce((s,m) => s + m.avere, 0);
        const quadrato = Math.abs(totD - totA) < 0.01;

        return (
        <div className="modal-bg" onClick={() => setViewing(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:1000}}>
            <div className="modal-head">
              <div>
                <h3>Bilancino · <span style={{textTransform:"capitalize"}}>{fmtYM(viewing.key)}</span></h3>
                <div style={{fontSize:11, color:"var(--ink-3)", marginTop:2}}>
                  Fotografia al termine del mese · {viewing.nMovimenti} movimenti cumulati ·
                  <span className="pill" style={{marginLeft:6, fontSize:10, background: quadrato ? "var(--accent-soft)" : "var(--danger-soft)", borderColor: quadrato ? "#c8d8ce" : "#f1d6d6", color: quadrato ? "var(--accent-ink)" : "var(--danger)"}}>
                    {quadrato ? "✓ Quadrato" : "✗ Sbilanciato"}
                  </span>
                </div>
              </div>
              <button className="btn ghost sm" onClick={() => setViewing(null)}>✕</button>
            </div>
            <div className="modal-body">

              {/* KPI riepilogativi */}
              <div className="kpi-grid">
                <div className="kpi accent">
                  <div className="label">Liquidità totale</div>
                  <div className="value">{fmtEuro(viewing.totaleLiquidita)}</div>
                </div>
                <div className="kpi">
                  <div className="label">Ricavi cumulati</div>
                  <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(viewing.ricavi)}</div>
                </div>
                <div className="kpi">
                  <div className="label">Costi cumulati</div>
                  <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(viewing.costi)}</div>
                </div>
                <div className="kpi">
                  <div className="label">Utile/Perdita</div>
                  <div className={"value " + (viewing.utile < 0 ? "neg" : "")}>{fmtEuro(viewing.utile)}</div>
                </div>
              </div>

              {/* Saldi liquidità in card */}
              <h4 className="serif" style={{fontWeight:500, fontSize:16, margin:"24px 0 10px"}}>Saldi liquidità a fine {fmtYM(viewing.key)}</h4>
              <div className="liq-grid">
                {CONTI_LIQUIDITA.map(c => {
                  const v = viewing.liquidita?.[c.codice] || 0;
                  return (
                    <div key={c.codice} className="liq-card" style={{padding:"12px 14px"}}>
                      <div className="head" style={{marginBottom:4}}>
                        <span className="name" style={{fontSize:10.5}}>{c.nome.trim()}</span>
                      </div>
                      <div className={"saldo " + (v < 0 ? "neg" : "")} style={{fontSize:18}}>{fmtEuro(v)}</div>
                    </div>
                  );
                })}
              </div>

              {/* Bilancio di Verifica completo (tutti i conti CoGe) */}
              <h4 className="serif" style={{fontWeight:500, fontSize:16, margin:"24px 0 10px"}}>
                Bilancio di Verifica al {fmtYM(viewing.key)}
                <span style={{fontSize:11, color:"var(--ink-3)", fontWeight:400, marginLeft:8}}>· {mastrini.length} conti movimentati</span>
              </h4>
              <div className="tbl-wrap" style={{maxHeight:380, overflowY:"auto"}}>
                <table className="tbl">
                  <thead>
                    <tr>
                      <th style={{width:50}}>Cod.</th>
                      <th>Conto</th>
                      <th>Categoria</th>
                      <th style={{width:55}}>Prosp.</th>
                      <th className="num" style={{width:110}}>Dare</th>
                      <th className="num" style={{width:110}}>Avere</th>
                      <th className="num" style={{width:110}}>Saldo</th>
                    </tr>
                  </thead>
                  <tbody>
                    {mastrini.sort((a,b)=>a.codice-b.codice).map(m => (
                      <tr key={m.codice}>
                        <td className="mono" style={{fontWeight:600}}>{String(m.codice).padStart(2,"0")}</td>
                        <td>{m.nome.trim()}</td>
                        <td><span className="pill">{contiMap[m.codice]?.categoria || "—"}</span></td>
                        <td>{contiMap[m.codice]?.prospetto || "—"}</td>
                        <td className="num">{m.dare > 0 ? fmt(m.dare) : ""}</td>
                        <td className="num">{m.avere > 0 ? fmt(m.avere) : ""}</td>
                        <td className={"num " + (m.saldo < 0 ? "neg" : m.saldo > 0 ? "pos" : "")} style={{fontWeight:500}}>
                          {fmt(Math.abs(m.saldo))} {m.saldo < 0 ? "A" : m.saldo > 0 ? "D" : ""}
                        </td>
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                      <td colSpan={4} style={{fontFamily:"'Fraunces',serif", fontSize:13}}>TOTALI</td>
                      <td className="num">{fmt(totD)}</td>

                      <td className="num">{quadrato ? "✓" : fmt(totD-totA)}</td>

              </div>

              {/* SP / CE affiancati */}
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginTop:24}}>
                <div>

                  </h4>
                  <div className="tbl-wrap">
                    <table className="tbl">
                      <thead><tr><th>Voce</th><th className="num">Importo</th></tr></thead>
                      <tbody>
                        {spVoci.filter(m => m.saldo !== 0).sort((a,b)=>a.codice-b.codice).map(m => (
                          <tr key={m.codice}>

                              {m.nome.trim()}

                          <td className="num">{fmt(attivo - passivo)}</td>

                      </tbody>
                    </table>
                  </div>
                </div>
                <div>
                  <h4 className="serif" style={{fontWeight:500, fontSize:15, margin:"0 0 8px"}}>
                    Conto Economico <span style={{fontSize:11, color:"var(--ink-3)", fontWeight:400}}>· {ceVoci.filter(m=>m.saldo!==0).length} voci</span>
                  </h4>
                  <div className="tbl-wrap">
                    <table className="tbl">
                      <thead><tr><th>Voce</th><th className="num">Importo</th></tr></thead>
                      <tbody>
                        {ceVoci.filter(m => m.saldo !== 0).sort((a,b)=>a.codice-b.codice).map(m => {
                          const isRicavo = contiMap[m.codice]?.categoria === "RICAVI";
                          const val = isRicavo ? (m.avere - m.dare) : (m.dare - m.avere);
                          return (
                            <tr key={m.codice}>
                              <td>
                                <span style={{fontSize:11, color:"var(--ink-3)"}}>{String(m.codice).padStart(2,"0")}</span>{" "}
                                {m.nome.trim()}
                                <div style={{fontSize:10.5, color:"var(--ink-3)"}}>{contiMap[m.codice]?.categoria || ""}</div>
                              </td>
                              <td className={"num " + (isRicavo ? "pos" : "neg")}>{isRicavo ? "+" : "−"}{fmt(val)}</td>
                            </tr>
                          );
                        })}
                        <tr style={{borderTop:"2px solid var(--ink)", fontWeight:600, background:"var(--panel-2)"}}>
                          <td style={{fontFamily:"'Fraunces',serif"}}>Risultato d'esercizio</td>
                          <td className={"num " + (viewing.utile < 0 ? "neg" : "pos")} style={{fontWeight:700}}>{fmt(viewing.utile)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
        );
      })()}
    </div>
  );
}

// PAGINA: BILANCIO DI VERIFICA + SP/CE
// ============================================================
function PageBilancio({ conti, movimenti, saldiIniziali }) {
  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const scritture = useMemo(
    () => generaLibroGiornale(movimenti, saldiIniziali, contiMap),
    [movimenti, saldiIniziali, contiMap]
  );

  const mastrini = useMemo(() => {
    const m = calcolaMastrini(scritture);
    // arricchisco con i metadati del piano dei conti
    return m.map(x => ({
      ...x,
      prospetto: contiMap[x.codice]?.prospetto || "",
      categoria: contiMap[x.codice]?.categoria || "",
    })).sort((a, b) => a.codice - b.codice);
  }, [scritture, contiMap]);

  const totD = mastrini.reduce((s, m) => s + m.dare, 0);
  const totA = mastrini.reduce((s, m) => s + m.avere, 0);

  // SP / CE sintetico
  const spVoci = mastrini.filter(m => m.prospetto === "SP" || m.prospetto === "SP/CE");
  const ceVoci = mastrini.filter(m => m.prospetto === "CE" || m.prospetto === "SP/CE");

  // SP: attivo (DARE-eccedenza) - passivo (AVERE-eccedenza)
  const attivita = spVoci.filter(m => m.saldo > 0).reduce((s,m)=> s+m.saldo, 0);
  const passivita = spVoci.filter(m => m.saldo < 0).reduce((s,m)=> s+m.saldo, 0); // negativo
  // CE: ricavi (AVERE) - costi (DARE)
  const ricavi = ceVoci.filter(m => m.categoria === "RICAVI").reduce((s,m)=> s + m.avere - m.dare, 0);
  const costi = ceVoci.filter(m => ["COSTI","COSTI/RICAVI"].includes(m.categoria)).reduce((s,m)=> s + m.dare - m.avere, 0);
  const utile = ricavi - costi;

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Bilancio di Verifica & SP/CE</h2>
          <div className="sub">Saldi progressivi · {mastrini.filter(m => m.dare > 0 || m.avere > 0).length} conti attivi</div>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="label">Ricavi</div>
          <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(ricavi)}</div>
          <div className="hint">Conto Economico</div>
        </div>
        <div className="kpi">
          <div className="label">Costi</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(costi)}</div>
          <div className="hint">Conto Economico</div>
        </div>
        <div className="kpi accent">
          <div className="label">Utile / Perdita</div>
          <div className="value">{fmtEuro(utile)}</div>
          <div className="hint">{utile >= 0 ? "Utile" : "Perdita"} d'esercizio</div>
        </div>
        <div className="kpi">
          <div className="label">Attivo SP</div>
          <div className="value">{fmtEuro(attivita)}</div>
          <div className="hint">Stato Patrimoniale</div>
        </div>
      </div>

      <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"28px 0 12px"}}>Bilancio di Verifica</h3>
      <div className="tbl-wrap" style={{maxHeight:600, overflowY:"auto"}}>
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width:50}}>Cod.</th>
              <th>Conto</th>
              <th>Categoria</th>
              <th style={{width:55}}>Prosp.</th>
              <th className="num" style={{width:110}}>Dare</th>
              <th className="num" style={{width:110}}>Avere</th>
              <th className="num" style={{width:110}}>Saldo</th>

// Unione tra categorie gestite (categorieRF) e categorie già presenti nei movimenti.
// Restituisce { entrate:[...], uscite:[...] } ordinate e senza duplicati: così il
// menu a tendina mostra sempre le opzioni previste + quelle già usate nei dati.
function mergeCategorie(categorieRF, movimenti) {
  const setE = new Set((categorieRF && categorieRF.entrate) || []);
  const setU = new Set((categorieRF && categorieRF.uscite) || []);
  (movimenti || []).forEach(m => {
    const cat = (m.categoria || "").trim();
    if (!cat) return;
    if (m.tipo === "entrata") setE.add(cat);
    else if (m.tipo === "uscita") setU.add(cat);
  });
  const ord = (s) => Array.from(s).sort((a,b)=>a.localeCompare(b));
  return { entrate: ord(setE), uscite: ord(setU) };
}

// ============================================================
// Riconosce una scrittura di APERTURA in modo robusto: flag esplicito, oppure categoria
// "APERTURA", oppure descrizione che inizia con "apertura:". Serve perché nei dati reali
// alcune aperture possono avere solo la categoria e non il flag.
function isAperturaMov(m) {
  return m.apertura === true
    || (m.categoria || "").trim().toUpperCase() === "APERTURA"
    || (m.descrizione || "").trim().toLowerCase().startsWith("apertura:");
}

// HELPER: costruzione Rendiconto Finanziario (schema unico)
// ============================================================
// Schema ispirato al foglio "RF NEW": un solo prospetto verticale con
// DISP. INIZIALI -> ENTRATE OPERATIVE (per categoria) -> TOTALE -> USCITE
// OPERATIVE -> TOTALE -> SALDO OPERATIVO (A-B) -> INVESTIMENTI -> TOTALE ->
// DISP. FINALI -> VARIAZIONE %. Le categorie sono quelle dei movimenti.
// Gli investimenti = uscite su conti immobilizzazione (IMM. *).
function buildRendiconto(movimenti, conti, saldiIniziali, investSet) {
  const cMap = {};
  (conti || []).forEach(c => { cMap[c.codice] = c; });
  // Una categoria è "investimento" se è nell'elenco gestito; se l'elenco è vuoto,
  // di default consideriamo investimento la categoria "INVESTIMENTI".
  const hasSet = investSet && investSet.size > 0;
  const isInvestCat = (cat) => hasSet ? investSet.has(cat) : ((cat || "").toUpperCase() === "INVESTIMENTI");
  const isInvest = (m) => isInvestCat(m.categoria || "(senza categoria)");

  const entrate = {}, usciteOp = {}, investimenti = {};
  const addTo = (mappa, cat, mese, v) => {
    if (!mappa[cat]) mappa[cat] = {};
    mappa[cat][mese] = (mappa[cat][mese] || 0) + v;
  };
  (movimenti || []).forEach(m => {
    if (isAperturaMov(m)) return;        // le aperture NON sono flussi del periodo: non pesano sul rendiconto
    if (m.nonMonetario) return;          // i movimenti non monetari (ammortamenti) non incidono sulla liquidità
    const cat = m.categoria || "(senza categoria)";
    const mese = m.mese || "?";
    if (m.tipo === "entrata") addTo(entrate, cat, mese, m.importo);
    else if (m.tipo === "uscita") addTo(isInvest(m) ? investimenti : usciteOp, cat, mese, m.importo);
    // i giroconti sono trasferimenti interni: netti zero sulla liquidità totale -> esclusi
  });

  const sumMese = (mappa) => {
    const t = {}; MESI.forEach(x => t[x] = 0);
    Object.values(mappa).forEach(r => Object.entries(r).forEach(([mm, v]) => { if (t[mm] !== undefined) t[mm] += v; }));
    return t;
  };
  const totEntrate = sumMese(entrate);
  const totUsciteOp = sumMese(usciteOp);
  const totInvest = sumMese(investimenti);
  const saldoOp = {}; MESI.forEach(m => saldoOp[m] = totEntrate[m] - totUsciteOp[m]);

  // Base di partenza (DISP. INIZIALI) = SOLO i conti di liquidità:
  // saldi iniziali liquidità (di norma 0) + aperture MONETARIE registrate sui conti di liquidità.
  // Le aperture degli altri conti (crediti, debiti, capitale, cespiti, fondi…) NON entrano nel rendiconto.
  const liqSet = new Set(CONTI_LIQUIDITA.map(c => c.codice));
  let openingTot = CONTI_LIQUIDITA.reduce((s, c) => s + (Number(saldiIniziali && saldiIniziali[c.codice]) || 0), 0);
  (movimenti || []).forEach(m => {
    if (!isAperturaMov(m) || m.contoLiquidita == null || !liqSet.has(Number(m.contoLiquidita))) return;
    openingTot += (m.tipo === "entrata" ? 1 : m.tipo === "uscita" ? -1 : 0) * (Number(m.importo) || 0);
  });
  const dispIniz = {}, dispFin = {}, variaz = {};
  let running = openingTot;
  MESI.forEach(m => {
    dispIniz[m] = running;
    const net = totEntrate[m] - totUsciteOp[m] - totInvest[m];
    dispFin[m] = running + net;
    variaz[m] = Math.abs(dispIniz[m]) > 0.001 ? net / dispIniz[m] : 0;
    running = dispFin[m];
  });

  const grandEntrate = MESI.reduce((s, m) => s + totEntrate[m], 0);
  const grandUsciteOp = MESI.reduce((s, m) => s + totUsciteOp[m], 0);
  const grandInvest = MESI.reduce((s, m) => s + totInvest[m], 0);
  const grandSaldoOp = grandEntrate - grandUsciteOp;
  const closing = openingTot + grandEntrate - grandUsciteOp - grandInvest;
  const variazTot = Math.abs(openingTot) > 0.001 ? (closing - openingTot) / openingTot : 0;

  return {
    entrate, usciteOp, investimenti,
    totEntrate, totUsciteOp, totInvest, saldoOp,
    dispIniz, dispFin, variaz, openingTot, closing,
    grandEntrate, grandUsciteOp, grandInvest, grandSaldoOp, variazTot,
    isInvest,
  };
}

// Matrice del Rendiconto per gli export (PDF/Excel): righe ordinate dello schema unico.
function rendicontoMatrix(rf) {
  const rows = [];
  const valuesOf = (mappa) => MESI.map(m => mappa[m] || 0);
  rows.push({ type:"disp", label:"DISP. INIZIALI", values: valuesOf(rf.dispIniz), tot: rf.openingTot });
  rows.push({ type:"header", label:"RIEPILOGO ENTRATE" });
  Object.keys(rf.entrate).sort((a,b)=>a.localeCompare(b)).forEach(cat =>
    rows.push({ type:"cat", label: cat, values: valuesOf(rf.entrate[cat]), tot: MESI.reduce((s,m)=>s+(rf.entrate[cat][m]||0),0) }));
  rows.push({ type:"total", label:"TOTALE ENTRATE OPERATIVE (A)", values: valuesOf(rf.totEntrate), tot: rf.grandEntrate });
  rows.push({ type:"header", label:"RIEPILOGO USCITE" });
  Object.keys(rf.usciteOp).sort((a,b)=>a.localeCompare(b)).forEach(cat =>
    rows.push({ type:"cat", label: cat, values: valuesOf(rf.usciteOp[cat]), tot: MESI.reduce((s,m)=>s+(rf.usciteOp[cat][m]||0),0) }));
  rows.push({ type:"total", label:"TOTALE USCITE OPERATIVE (B)", values: valuesOf(rf.totUsciteOp), tot: rf.grandUsciteOp });
  rows.push({ type:"total", label:"SALDO OPERATIVO (A - B)", values: valuesOf(rf.saldoOp), tot: rf.grandSaldoOp });
  rows.push({ type:"header", label:"RIEPILOGO INVESTIMENTI" });
  Object.keys(rf.investimenti).sort((a,b)=>a.localeCompare(b)).forEach(cat =>
    rows.push({ type:"cat", label: cat, values: valuesOf(rf.investimenti[cat]), tot: MESI.reduce((s,m)=>s+(rf.investimenti[cat][m]||0),0) }));
  rows.push({ type:"total", label:"TOTALE INVESTIMENTI", values: valuesOf(rf.totInvest), tot: rf.grandInvest });
  rows.push({ type:"disp", label:"DISP. FINALI", values: valuesOf(rf.dispFin), tot: rf.closing });
  rows.push({ type:"pct", label:"VARIAZIONE %", values: MESI.map(m => rf.variaz[m]), tot: rf.variazTot });
  return rows;
}

// ============================================================
// PAGINA: RENDICONTO FINANZIARIO
// ============================================================
function PageRendiconto({ conti, movimenti, saldiIniziali, stagione, categorieRF, onToast }) {
  const [filterBu, setFilterBu] = useState("");
  const [drillDown, setDrillDown] = useState(null); // { sezione, tipo, categoria, mese, movs }
  const [vista, setVista] = useState("mensile"); // mensile | totali
  const [collapsed, setCollapsed] = useState({ entrate: false, uscite: false, investimenti: false });
  const [gestApri, setGestApri] = useState(false);

  const toggleSez = (k) => setCollapsed(c => ({ ...c, [k]: !c[k] }));
  const mostraMesi = vista === "mensile";

  const investSet = useMemo(() => new Set((categorieRF && categorieRF.investimenti) || []), [categorieRF]);
  const filtered = useMemo(() => movimenti.filter(m => !filterBu || m.bu === filterBu), [movimenti, filterBu]);
  const rf = useMemo(() => buildRendiconto(filtered, conti, saldiIniziali, investSet), [filtered, conti, saldiIniziali, investSet]);

  // Mostro solo i mesi che hanno almeno un movimento (così la tabella sta in pagina)
  const mesiAttivi = MESI.filter(m => (rf.totEntrate[m] || 0) !== 0 || (rf.totUsciteOp[m] || 0) !== 0 || (rf.totInvest[m] || 0) !== 0);
  const mesiVis = mostraMesi ? (mesiAttivi.length ? mesiAttivi : MESI) : [];
  const nCols = mesiVis.length + 2;

  const fmtPct = (v) => (v >= 0 ? "+" : "−") + Math.abs(v * 100).toFixed(1) + "%";

  const apriDrill = (sezione, categoria, mese) => {
    const movs = filtered.filter(m => {
      if ((m.categoria || "(senza categoria)") !== categoria || m.nonMonetario || isAperturaMov(m)) return false;
      if (mese !== "__tot__" && m.mese !== mese) return false;
      if (sezione === "entrate") return m.tipo === "entrata";
      if (sezione === "uscite") return m.tipo === "uscita" && !rf.isInvest(m);
      if (sezione === "investimenti") return m.tipo === "uscita" && rf.isInvest(m);
      return false;
    });
    setDrillDown({ sezione, categoria, mese, movs });
  };

  // Celle dei valori mensili (mostrate solo in vista "mensile")
  const celleMesi = (mappa, classCol, onCell) => mostraMesi ? mesiVis.map(m => (
    <td key={m} className={"num " + (classCol||"")}
        style={onCell && mappa[m] ? {cursor:"pointer", textDecoration:"underline dotted"} : {}}
        onClick={() => onCell && mappa[m] && onCell(m)} title={onCell && mappa[m] ? "Click per dettagli" : ""}>
      {mappa[m] ? fmt(mappa[m]) : ""}
    </td>
  )) : null;

  const RigaCat = ({ sezione, cat, mesi, classCol }) => {
    const totRiga = MESI.reduce((s, m) => s + (mesi[m] || 0), 0);
    return (
      <tr>
        <td style={{position:"sticky", left:0, background:"var(--panel)", paddingLeft:22}}>{cat}</td>
        {celleMesi(mesi, classCol, (m) => apriDrill(sezione, cat, m))}
        <td className={"num " + classCol} style={totRiga ? {fontWeight:600, cursor:"pointer", textDecoration:"underline dotted"} : {fontWeight:600}}
            onClick={() => totRiga && apriDrill(sezione, cat, "__tot__")} title={totRiga ? "Click per dettagli" : ""}>
          {totRiga ? fmt(totRiga) : ""}
        </td>
      </tr>
    );
  };

  // Intestazione di sezione, cliccabile per collassare/espandere (come il raggruppamento Excel)
  const RigaHeader = ({ label, sezKey }) => (
    <tr style={{background:"var(--panel-2)", cursor:"pointer"}} onClick={() => toggleSez(sezKey)}>
      <td colSpan={nCols} style={{position:"sticky", left:0, fontWeight:700, fontSize:11.5, letterSpacing:".04em",
           textTransform:"uppercase", color:"var(--ink-2)", background:"var(--panel-2)"}}>
        <span style={{display:"inline-block", width:16}}>{collapsed[sezKey] ? "▸" : "▾"}</span>{label}
        {collapsed[sezKey] && <span style={{fontWeight:400, textTransform:"none", color:"var(--ink-3)", marginLeft:8}}>(raggruppato)</span>}
      </td>
    </tr>
  );

  const RigaTotale = ({ label, perMese, tot, strong, classCol }) => (
    <tr style={strong ? {fontWeight:700, background:"var(--panel-2)", borderTop:"1.5px solid var(--ink)"} : {fontWeight:600}}>
      <td style={{position:"sticky", left:0, background:"var(--panel-2)", fontFamily: strong ? "'Fraunces',serif" : undefined}}>{label}</td>
      {mostraMesi && mesiVis.map(m => <td key={m} className={"num " + (classCol||"")}>{perMese[m] ? fmt(perMese[m]) : ""}</td>)}
      <td className="num">{fmt(tot)}</td>
    </tr>
  );

  const RigaVuota = ({ label }) => (
    <tr><td style={{position:"sticky", left:0, background:"var(--panel)", paddingLeft:22, color:"var(--ink-3)"}}>{label}</td>
      {mostraMesi && mesiVis.map(m=><td key={m}></td>)}<td></td></tr>
  );

  const catEntrate = Object.keys(rf.entrate).sort((a,b)=>a.localeCompare(b));
  const catUscite = Object.keys(rf.usciteOp).sort((a,b)=>a.localeCompare(b));
  const catInvest = Object.keys(rf.investimenti).sort((a,b)=>a.localeCompare(b));
  const flussoNetto = rf.closing - rf.openingTot;

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Rendiconto Finanziario</h2>
          <div className="sub">Prospetto unico dei flussi di liquidità · click su una cella per i dettagli</div>
        </div>
      </div>

      <CategorieManager stagione={stagione} categorieRF={categorieRF} movimenti={movimenti}
        aperto={gestApri} onToggle={() => setGestApri(o => !o)} onToast={onToast} />

      <div className="filters" style={{marginTop:14}}>
        <span className="label">Filtra:</span>
        <select value={filterBu} onChange={e => setFilterBu(e.target.value)}>
          <option value="">Tutte le BU</option>
          {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        <span className="label">Vista:</span>
        <select value={vista} onChange={e => setVista(e.target.value)}>
          <option value="mensile">Per mese</option>
          <option value="totali">Solo totali</option>
        </select>
        <button className="btn ghost sm" onClick={() => setCollapsed({entrate:true, uscite:true, investimenti:true})}>Raggruppa tutto</button>
        <button className="btn ghost sm" onClick={() => setCollapsed({entrate:false, uscite:false, investimenti:false})}>Espandi tutto</button>
      </div>

      <div className="kpi-grid">
        <div className="kpi"><div className="label">Entrate operative</div><div className="value" style={{color:"var(--accent)"}}>{fmtEuro(rf.grandEntrate)}</div></div>
        <div className="kpi"><div className="label">Uscite operative</div><div className="value" style={{color:"var(--danger)"}}>{fmtEuro(rf.grandUsciteOp)}</div></div>
        <div className="kpi"><div className="label">Investimenti</div><div className="value" style={{color:"var(--danger)"}}>{fmtEuro(rf.grandInvest)}</div></div>
