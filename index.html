<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilità · Futsal Fabbrico ASD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  :root {
    --bg: #f7f6f2;
    --panel: #ffffff;
    --panel-2: #fbfaf6;
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a82;
    --rule: #e8e6df;
    --rule-2: #d8d5cc;
    --accent: #2d5e3e;       /* verde campo, sobrio */
    --accent-soft: #e8efe9;
    --accent-ink: #1a3d27;
    --gold: #b8954b;
    --danger: #b54343;
    --danger-soft: #fbecec;
    --success: #2d5e3e;
    --warn: #c08020;
    --shadow-sm: 0 1px 2px rgba(20,20,20,0.04), 0 0 0 1px rgba(20,20,20,0.04);
    --shadow-md: 0 4px 16px rgba(20,20,20,0.06), 0 0 0 1px rgba(20,20,20,0.04);
    --shadow-lg: 0 20px 50px rgba(20,20,20,0.12);
    --radius: 6px;
    --radius-lg: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .serif { font-family: 'Fraunces', Georgia, serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; }

  /* === LAYOUT === */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    background: var(--ink);
    color: #f0eee7;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid #000;
  }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .topbar h1 .sub {
    color: #a8a59a;
    margin-left: 12px;
    font-size: 13px;
    font-style: italic;
  }
  .topbar .badge {
    background: #2d2d2d;
    border: 1px solid #3a3a3a;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #c9c7be;
  }
  .topbar select {
    background: #2d2d2d;
    color: #f0eee7;
    border: 1px solid #3a3a3a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .topbar select:hover { border-color: #555; }
  .topbar button.icon-btn {
    background: transparent;
    color: #c9c7be;
    border: 1px solid #3a3a3a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
  }
  .topbar button.icon-btn:hover { background: #2d2d2d; }

  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .sidebar {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    padding: 24px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    margin: 18px 14px 6px;
    font-weight: 600;
  }
  .sidebar .section-label:first-child { margin-top: 0; }
  .navlink {
    background: transparent;
    border: none;
    text-align: left;
    padding: 8px 14px;
    border-radius: 4px;
    color: var(--ink-2);
    font-size: 13.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.12s;
  }
  .navlink:hover { background: var(--bg); color: var(--ink); }
  .navlink.active {
    background: var(--ink);
    color: #f0eee7;
  }
  .navlink .ico {
    font-size: 14px;
    width: 16px;
    text-align: center;
    opacity: 0.7;
  }
  .navlink.active .ico { opacity: 1; }

  .main {
    flex: 1;
    min-width: 0;
    padding: 32px 36px;
    overflow-y: auto;
  }

  .page-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .page-head h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .page-head .sub {
    color: var(--ink-3);
    font-size: 13px;
  }

  /* === BUTTONS === */
  .btn {
    background: var(--ink);
    color: #f0eee7;
    border: 1px solid var(--ink);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: #000; }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule-2);
  }
  .btn.ghost:hover { background: var(--bg); border-color: var(--ink-3); }
  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn.accent:hover { background: var(--accent-ink); }
  .btn.danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--rule-2);
  }
  .btn.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }

  /* === CARDS === */
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .card.flat { box-shadow: var(--shadow-sm); }
  .card .card-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 14px;
  }

  /* === KPI === */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi.accent { background: var(--ink); color: #f0eee7; border-color: var(--ink); }
  .kpi .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .kpi.accent .label { color: #a8a59a; }
  .kpi .value {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .kpi .value.neg { color: var(--danger); }
  .kpi .hint {
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--ink-3);
  }

  /* === TABLE === */
  .tbl-wrap {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.tbl th {
    text-align: left;
    padding: 11px 14px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
    background: var(--panel-2);
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
  }
  table.tbl td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  table.tbl tr:last-child td { border-bottom: none; }
  table.tbl tr:hover td { background: var(--panel-2); }
  table.tbl td.num, table.tbl th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12.5px; }
  table.tbl td.neg { color: var(--danger); }
  table.tbl td.pos { color: var(--success); }
  table.tbl .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ink-2);
  }
  table.tbl .pill.entrata { background: var(--accent-soft); border-color: #c8d8ce; color: var(--accent-ink); }
  table.tbl .pill.uscita { background: var(--danger-soft); border-color: #f1d6d6; color: var(--danger); }
  table.tbl .pill.giroconto { background: #f4ebd7; border-color: #e6d5a8; color: #7a5a1d; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; background: var(--bg); border: 1px solid var(--rule); color: var(--ink-2); }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--ink-3);
    font-style: italic;
  }

  /* === FORM === */
  .form-grid {
    display: grid;
    gap: 14px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    align-items: center;
    gap: 16px;
  }
  .form-row label {
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .form-row .req { color: var(--danger); }
  input[type=text], input[type=number], input[type=date], input[type=password], select, textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--ink);
    transition: border 0.12s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { resize: vertical; min-height: 60px; }

  .tipo-switch {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tipo-switch button {
    background: var(--panel);
    color: var(--ink-2);
    border: none;
    border-right: 1px solid var(--rule);
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
  }
  .tipo-switch button:last-child { border-right: none; }
  .tipo-switch button:hover { background: var(--bg); }
  .tipo-switch button.active.entrata { background: var(--accent); color: #fff; }
  .tipo-switch button.active.uscita { background: var(--danger); color: #fff; }
  .tipo-switch button.active.giroconto { background: var(--gold); color: #fff; }

  /* === FILTERS === */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }
  .filters input, .filters select {
    padding: 6px 10px;
    font-size: 12.5px;
    max-width: 200px;
  }
  .filters .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
  }

  /* === LOGIN === */
  .login-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(at 20% 30%, var(--accent-soft) 0px, transparent 50%),
      radial-gradient(at 80% 70%, #f4ebd7 0px, transparent 50%),
      var(--bg);
    padding: 24px;
  }
  .login-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 40px 44px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .login-card .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .login-card .tag {
    color: var(--ink-3);
    font-size: 12.5px;
    margin-bottom: 28px;
    font-style: italic;
  }
  .login-card .field { margin-bottom: 14px; }
  .login-card .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin-bottom: 5px;
    font-weight: 600;
  }
  .login-card .err {
    color: var(--danger);
    background: var(--danger-soft);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 12.5px;
    margin-bottom: 12px;
  }
  .login-card .btn { width: 100%; justify-content: center; padding: 11px; }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--panel);
    border-radius: var(--radius-lg);
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-head {
    padding: 18px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    margin: 0;
    font-size: 18px;
  }
  .modal-body { padding: 22px 24px; }
  .modal-foot {
    padding: 14px 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 18px;
    background: var(--ink);
    color: #f0eee7;
    border-radius: var(--radius);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    animation: slideUp 0.2s ease-out;
  }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* === LIQUIDITY BARS === */
  .liq-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .liq-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
  }
  .liq-card .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .liq-card .name {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
  }
  .liq-card .saldo {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .liq-card .saldo.neg { color: var(--danger); }
  .liq-card .delta {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .liq-card .delta .pos { color: var(--success); }
  .liq-card .delta .neg { color: var(--danger); }

  /* === SCROLLBARS === */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

  /* === MOBILE: bottone menu hamburger === */
  .menu-btn {
    display: none;
    background: transparent;
    color: #f0eee7;
    border: 1px solid #3a3a3a;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    padding: 0;
  }
  .menu-btn:hover { background: #2d2d2d; }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.4);
    z-index: 90;
    animation: fadeIn 0.15s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* === RESPONSIVE: mobile === */
  @media (max-width: 768px) {
    body { font-size: 14px; }

    .topbar {
      padding: 10px 14px;
      gap: 10px;
      flex-wrap: nowrap;
    }
    .topbar h1 {
      font-size: 15px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar h1 .sub { display: none; }
    .topbar .badge { display: none; }
    .topbar select {
      font-size: 13px;
      padding: 6px 8px;
      max-width: 110px;
    }
    .topbar button.icon-btn {
      font-size: 11px;
      padding: 5px 8px;
    }
    .topbar .desktop-only { display: none; }
    .menu-btn { display: inline-flex; }

    /* Sidebar diventa drawer */
    .layout { flex-direction: column; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 75%;
      max-width: 280px;
      z-index: 100;
      flex-direction: column;
      flex-wrap: nowrap;
      padding: 20px 14px;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform 0.22s ease-out;
      box-shadow: 0 0 30px rgba(0,0,0,0.15);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar.open ~ .sidebar-backdrop { display: block; }
    .sidebar .section-label { display: block; margin-top: 14px; }
    .sidebar .section-label:first-child { margin-top: 0; }
    .navlink {
      padding: 10px 14px;
      font-size: 14px;
    }

    /* Main */
    .main {
      padding: 14px;
      width: 100%;
    }

    /* Page head */
    .page-head {
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 18px;
    }
    .page-head h2 { font-size: 22px; }
    .page-head .sub { font-size: 12px; }

    /* KPI grid: 2 colonne su mobile */
    .kpi-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .kpi {
      padding: 12px 14px;
    }
    .kpi .label { font-size: 9.5px; margin-bottom: 4px; }
    .kpi .value { font-size: 20px; }
    .kpi .hint { font-size: 10.5px; }

    /* Liquidità grid: 2 colonne */
    .liq-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .liq-card { padding: 12px 14px; }
    .liq-card .saldo { font-size: 18px; }
    .liq-card .name { font-size: 10px; }
    .liq-card .delta { font-size: 10px; }

    /* Form: una colonna, label sopra */
    .form-row {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .form-row label { font-size: 12px; font-weight: 600; color: var(--ink); }
    input, select, textarea {
      font-size: 16px !important;  /* iOS no-zoom su focus */
      padding: 10px 12px;
    }

    /* Tipo switch */
    .tipo-switch button { font-size: 12px; padding: 9px 6px; }

    /* Filtri: full-width stack */
    .filters {
      gap: 8px;
    }
    .filters input, .filters select {
      max-width: none;
      width: 100%;
      font-size: 13.5px !important;
    }
    .filters .label { width: 100%; margin-bottom: -4px; }

    /* Tabelle: scroll fluido, font più compatto */
    .tbl-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
    }
    table.tbl { font-size: 12px; min-width: 600px; }
    table.tbl th { padding: 8px 10px; font-size: 9.5px; }
    table.tbl td { padding: 8px 10px; }

const fmt = (n, dec = 2) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Number(n).toLocaleString("it-IT", { minimumFractionDigits: dec, maximumFractionDigits: dec });
};
const fmtEuro = (n) => "€ " + fmt(n);
const fmtDate = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric" });
};
const todayISO = () => new Date().toISOString().slice(0,10);
const meseDaData = (iso) => {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return MESI[(d.getMonth() + 4) % 12]; // settembre=0
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// FIREBASE DATA HOOK
// ============================================================
function useFirebaseData(stagione) {
  const [conti, setConti] = useState([]);
  const [movimenti, setMovimenti] = useState([]);
  const [cespiti, setCespiti] = useState([]);
  const [saldiIniziali, setSaldiIniziali] = useState({});
  const [categorieRF, setCategorieRF] = useState({ entrate: [], uscite: [], investimenti: [] });
  const [bu, setBu] = useState([...BUSINESS_UNITS_DEFAULT]);
  const [loading, setLoading] = useState(true);
  const [seedingDone, setSeedingDone] = useState(false);

  useEffect(() => {
    if (!firebaseReady || !stagione) { setLoading(false); return; }
    setLoading(true);
    const refs = [
      db.ref(`stagioni/${stagione}/conti`),
      db.ref(`stagioni/${stagione}/movimenti`),
      db.ref(`stagioni/${stagione}/cespiti`),
      db.ref(`stagioni/${stagione}/saldiIniziali`),
      db.ref(`stagioni/${stagione}/businessUnits`),
      db.ref(`stagioni/${stagione}/categorieRF`),
    ];
    const cbs = [
      refs[0].on("value", snap => setConti(snap.val() ? Object.values(snap.val()) : [])),
      refs[1].on("value", snap => {
        const v = snap.val();
        setMovimenti(v ? Object.entries(v).map(([k,m]) => ({...m, _id: k})) : []);
      }),
      refs[2].on("value", snap => setCespiti(snap.val() ? Object.values(snap.val()) : [])),
      refs[3].on("value", snap => {
        setSaldiIniziali(snap.val() || {});
        setLoading(false);
      }),
      refs[4].on("value", snap => {
        const v = snap.val();
        const list = v ? Object.values(v).map(b => b.nome).sort() : [...BUSINESS_UNITS_DEFAULT];
        setBu(list);
        BUSINESS_UNITS = list; // aggiorna la variabile globale per backward compat
      }),
      refs[5].on("value", snap => {
        const v = snap.val() || {};
        const arr = (x) => Array.isArray(x) ? x.filter(Boolean) : (x ? Object.values(x).filter(Boolean) : []);
        setCategorieRF({
          entrate: arr(v.entrate),
          uscite:  arr(v.uscite),
          investimenti: arr(v.investimenti),
        });
      }),
    ];
    return () => refs.forEach((r,i) => r.off("value", cbs[i]));
  }, [stagione]);

  // Seed iniziale se la stagione è vuota
  const seedStagione = useCallback(async () => {
    if (!firebaseReady || !stagione) return;
    const contiSnap = await db.ref(`stagioni/${stagione}/conti`).once("value");
    if (contiSnap.exists()) return;
    // seed
    const contiObj = {};
    SEED_CONTI.forEach(c => { contiObj[`c${c.codice}`] = c; });
    const cespitiObj = {};
    SEED_CESPITI.forEach((c, i) => { cespitiObj[`cesp_${i}`] = c; });
    // i movimenti del seed vengono caricati direttamente in /movimenti, marcati come "importati"
    const movsObj = {};
    // PRIMA: movimenti di apertura al 01/09 (in cima)
    APERTURA_MOVIMENTI.forEach((m, i) => {
      movsObj[`apertura_${String(i).padStart(4,'0')}`] = m;
    });
    // POI: movimenti operativi dello sheet
    SEED_MOVIMENTI.forEach((m, i) => {
      movsObj[`seed_${String(i).padStart(4,'0')}`] = {
        ...m,
        importato: true,
        creatoIl: new Date().toISOString()
      };
    });
    await db.ref(`stagioni/${stagione}`).update({
      conti: contiObj,
      cespiti: cespitiObj,
      movimenti: movsObj,
      // Saldi iniziali a 0: i saldi reali vengono dalla scrittura di apertura
      saldiIniziali: { 1: 0, 3: 0, 4: 0, 5: 0, 9: 0, 10: 0 },
      businessUnits: BUSINESS_UNITS_DEFAULT.reduce((acc, b, i) => {
        acc[`bu_${i}`] = { nome: b, ordine: i };
        return acc;
      }, {}),
      meta: { stagione, creataIl: new Date().toISOString(), version: APP_VERSION }
    });
    setSeedingDone(true);
  }, [stagione]);

  return { conti, movimenti, cespiti, saldiIniziali, categorieRF, bu, loading, seedStagione };
}

function MovimentoForm({ conti, onSave, onCancel, mov = null, categorie = { entrate: [], uscite: [] } }) {
  const [tipo, setTipo] = useState(mov?.tipo || "uscita");
  const [data, setData] = useState(mov?.data || todayISO());
  const [contoLiquidita, setContoLiquidita] = useState(mov?.contoLiquidita ?? "");
  const [contoLiquiditaDest, setContoLiquiditaDest] = useState(mov?.contoLiquiditaDest ?? "");
  const [contoPdC, setContoPdC] = useState(mov?.contoPdC ?? "");
  const [categoria, setCategoria] = useState(mov?.categoria || "");
  const [bu, setBu] = useState(mov?.bu || "GENERAL");
  const [importo, setImporto] = useState(mov?.importo || "");
  const [descrizione, setDescrizione] = useState(mov?.descrizione || "");
  // Contropartita esplicita per movimenti NON monetari (no conto liquidità):
  // evita che l'app usi di default 60/35. Vuota = "da assegnare".
  const [contoContropartita, setContoContropartita] = useState(mov?.contoContropartita ?? "");

  // === Scrittura libera multi-riga ===
  const [righe, setRighe] = useState([
    { conto: "", dare: "", avere: "" },
    { conto: "", dare: "", avere: "" },
  ]);

  const totDare = useMemo(() => righe.reduce((s,r) => s + (Number(r.dare) || 0), 0), [righe]);
  const totAvere = useMemo(() => righe.reduce((s,r) => s + (Number(r.avere) || 0), 0), [righe]);
  const diff = totDare - totAvere;
  const quadra = Math.abs(diff) < 0.005 && totDare > 0;

  const addRiga = () => setRighe([...righe, { conto: "", dare: "", avere: "" }]);
  const removeRiga = (i) => {
    if (righe.length <= 2) return alert("Una scrittura deve avere almeno 2 righe");
    setRighe(righe.filter((_,idx) => idx !== i));
  };
  const updateRiga = (i, field, value) => {
    setRighe(righe.map((r, idx) => {
      if (idx !== i) return r;
      const nr = {...r, [field]: value};
      // Auto-clear dell'opposto: se inserisco dare, azzero avere e viceversa
      if (field === "dare" && value !== "") nr.avere = "";
      if (field === "avere" && value !== "") nr.dare = "";
      return nr;
    }));
  };

  // Conti filtrati per tipo: in entrata vedo conti AVERE (ricavi/crediti), in uscita conti DARE (costi/imm)
  // Se non monetario (= scrittura di rettifica/apertura/ammortamento), mostro TUTTI i conti perché serve flessibilità
  const contiPdCFiltrati = useMemo(() => {
    // Se non c'è conto liquidità → movimento non monetario → mostro tutto
    if (!contoLiquidita) {
      return conti;
    }
    if (tipo === "entrata") {
      return conti.filter(c =>
        ["RICAVI", "CREDITI", "DEBITI", "PN", "COSTI/RICAVI", "CONTO TRANSITORIO", "RETTIFICA ATTIVO"].includes(c.categoria)
      );
    }
    if (tipo === "uscita") {
      return conti.filter(c =>
        ["COSTI", "IMM. MATERIALI", "IMM. IMMATERIALI", "DEBITI", "CREDITI", "COSTI/RICAVI", "CONTO TRANSITORIO", "RETTIFICA ATTIVO", "PN"].includes(c.categoria)
      );
    }
    return [];
  }, [conti, tipo, contoLiquidita]);

  const submit = (e) => {
    e.preventDefault();

    // === Scrittura libera composta ===
    if (tipo === "composta") {
      // Validazioni
      const righeValide = righe.filter(r => r.conto && (Number(r.dare) > 0 || Number(r.avere) > 0));
      if (righeValide.length < 2) return alert("Servono almeno 2 righe valide");
      if (!quadra) return alert(`La scrittura non quadra: DARE ${totDare.toFixed(2)} ≠ AVERE ${totAvere.toFixed(2)} (Δ ${diff.toFixed(2)})`);
      if (!descrizione.trim()) return alert("Aggiungi una descrizione alla scrittura");

      // Genero scritturaId unico per legare le righe
      const scritturaId = "scr_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7);

      // Costruisco N "movimenti" — uno per riga
      // Convenzione:
      //   Riga in DARE → tipo "uscita" non monetaria su quel conto (DARE PdC / AVERE bilancio)
      //   Riga in AVERE → tipo "entrata" non monetaria su quel conto (DARE bilancio / AVERE PdC)
      // MA poiché sono in scrittura composta, il libro giornale dovrà raggruppare per scritturaId
      const movimenti = righeValide.map(r => {
        const isDare = Number(r.dare) > 0;
        const importo = isDare ? Number(r.dare) : Number(r.avere);
        return {
          tipo: isDare ? "uscita" : "entrata",
          data,
          contoLiquidita: null,
          contoLiquiditaDest: null,
          contoPdC: Number(r.conto),
          categoria: categoria || "SCRITTURA COMPOSTA",
          bu: bu || "GENERAL",
          importo,
          descrizione: descrizione || "",
          mese: meseDaData(data),
          nonMonetario: true,
          scritturaComposta: true,
          scritturaId,
          dare: isDare ? importo : 0,
          avere: isDare ? 0 : importo,
          creatoIl: new Date().toISOString(),
          modificatoIl: new Date().toISOString()
        };
      });
      onSave({ composta: true, movimenti });
      return;
    }

    if (!importo || Number(importo) <= 0) return alert("Importo non valido");
    if (tipo === "giroconto") {
      if (!contoLiquidita) return alert("Seleziona conto liquidità origine");
      if (!contoLiquiditaDest) return alert("Seleziona conto destinazione");
      if (contoLiquidita === contoLiquiditaDest) return alert("I conti devono essere diversi");
    } else {
      if (!contoPdC) return alert("Seleziona conto del Piano dei Conti");
    }

    const nonMonetario = tipo !== "giroconto" && !contoLiquidita;

    // Per i movimenti non monetari (rettifiche/chiusure) la contropartita va scelta
    // a mano. Ammortamenti (conti 44-51) e aperture hanno la loro logica dedicata.
    const ammoCodici = [44,45,46,47,48,49,50,51];
    const serveContropartita = nonMonetario && !mov?.apertura && !ammoCodici.includes(Number(contoPdC));
    if (serveContropartita && !contoContropartita) {
      const ok = confirm("Movimento non monetario senza conto di contropartita: verrà segnato come \"DA ASSEGNARE\" nel libro giornale finché non lo correggi. Vuoi procedere comunque?\n\n(Consiglio: scegli la contropartita qui sopra, oppure usa \"Scrittura libera\" per scegliere entrambi i conti.)");
      if (!ok) return;
    }

    const payload = {
      tipo,
      data,
      contoLiquidita: contoLiquidita ? Number(contoLiquidita) : null,
      contoLiquiditaDest: tipo === "giroconto" ? Number(contoLiquiditaDest) : null,
      contoPdC: tipo !== "giroconto" ? Number(contoPdC) : null,
      contoContropartita: serveContropartita && contoContropartita ? Number(contoContropartita) : null,
      categoria: categoria || "",
      bu: bu || "GENERAL",
      importo: Number(importo),
      descrizione: descrizione || "",
      mese: meseDaData(data),
      nonMonetario,
      creatoIl: mov?.creatoIl || new Date().toISOString(),
      modificatoIl: new Date().toISOString()
    };
    onSave(payload);
  };

  return (
    <form onSubmit={submit} className="form-grid">
      <div className="form-row">
        <label>Tipo movimento <span className="req">*</span></label>
        <div className="tipo-switch">
          <button type="button" className={tipo === "entrata" ? "active entrata" : ""} onClick={() => setTipo("entrata")}>↓ Entrata</button>
          <button type="button" className={tipo === "uscita" ? "active uscita" : ""} onClick={() => setTipo("uscita")}>↑ Uscita</button>
          <button type="button" className={tipo === "giroconto" ? "active giroconto" : ""} onClick={() => setTipo("giroconto")}>⇄ Giroconto</button>
          <button type="button" className={tipo === "composta" ? "active" : ""}
                  style={tipo === "composta" ? {background:"#7c3aed", color:"white", borderColor:"#7c3aed"} : {}}
                  onClick={() => setTipo("composta")}>📓 Scrittura libera</button>
        </div>
      </div>
      <div className="form-row">
        <label>Data <span className="req">*</span></label>
        <input type="date" value={data} onChange={e => setData(e.target.value)} required />
      </div>

      {tipo === "composta" ? (
        <>
          <div className="form-row">
            <label>Descrizione <span className="req">*</span></label>
            <textarea value={descrizione} onChange={e => setDescrizione(e.target.value)}
                      placeholder="Es: 'Fattura Ghidoni n.45 con IVA al 22%' o 'Distribuzione utile esercizio 24-25'"
                      style={{minHeight:60}} required />
          </div>
          <div className="form-row">
            <label>BU (opzionale)</label>
            <select value={bu} onChange={e => setBu(e.target.value)}>
              <option value="">— nessuna —</option>
              {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>

          <div style={{marginTop:8, padding:"12px 14px", background:"#f5f0ff", border:"1px solid #d4c4f7", borderRadius:8, fontSize:12.5, color:"#5b3aa3"}}>
            <strong>📓 Scrittura in partita doppia.</strong> Inserisci almeno 2 righe. Per ogni riga: scegli il conto e indica l'importo in DARE oppure in AVERE (non entrambi). Il totale DARE deve coincidere con il totale AVERE.
          </div>

          <div className="form-row">
            <label>Righe della scrittura <span className="req">*</span></label>
            <div style={{border:"1px solid var(--rule)", borderRadius:8, overflow:"hidden"}}>
              <table className="tbl" style={{margin:0, fontSize:13}}>
                <thead>
                  <tr style={{background:"#f5f0ff"}}>
                    <th style={{width:"50%"}}>Conto</th>
                    <th className="num" style={{width:"22%"}}>Dare €</th>
                    <th className="num" style={{width:"22%"}}>Avere €</th>
                    <th style={{width:40}}></th>
                  </tr>
                </thead>
                <tbody>
                  {righe.map((r, i) => (
                    <tr key={i}>
                      <td>
                        <select value={r.conto} onChange={e => updateRiga(i, "conto", e.target.value)}
                                style={{width:"100%", padding:"5px 8px", border:"1px solid var(--rule)", borderRadius:4, fontSize:13}}>
                          <option value="">— seleziona conto —</option>
                          {(() => {
                            const ordineCat = ["DISP. LIQUIDE", "CREDITI", "IMM. MATERIALI", "IMM. IMMATERIALI",
                              "RETTIFICA ATTIVO", "DEBITI", "PN", "RICAVI", "COSTI", "COSTI/RICAVI", "CONTO TRANSITORIO"];
                            const gruppi = {};
                            conti.forEach(c => {
                              const cat = c.categoria || "ALTRO";
                              if (!gruppi[cat]) gruppi[cat] = [];
                              gruppi[cat].push(c);
                            });
                            const categorieOrdinate = Object.keys(gruppi).sort((a, b) => {
                              const ia = ordineCat.indexOf(a);
                              const ib = ordineCat.indexOf(b);
                              if (ia === -1 && ib === -1) return a.localeCompare(b);
                              if (ia === -1) return 1;
                              if (ib === -1) return -1;
                              return ia - ib;
                            });
                            return categorieOrdinate.map(cat => (
                              <optgroup key={cat} label={cat}>
                                {gruppi[cat].sort((a,b) => a.codice - b.codice).map(c => (
                                  <option key={c.codice} value={c.codice}>
                                    {String(c.codice).padStart(2,"0")} · {c.nome.trim()}
                                  </option>
                                ))}
                              </optgroup>
                            ));
                          })()}
                        </select>
                      </td>
                      <td className="num">
                        <input type="number" inputMode="decimal" step="0.01" min="0" value={r.dare}
                               onChange={e => updateRiga(i, "dare", e.target.value)}
                               placeholder="—"
                               style={{width:"100%", padding:"5px 8px", border:"1px solid var(--rule)", borderRadius:4, textAlign:"right", fontSize:13,
                                       background: Number(r.dare) > 0 ? "#fef3c7" : "white"}}/>
                      </td>
                      <td className="num">
                        <input type="number" inputMode="decimal" step="0.01" min="0" value={r.avere}
                               onChange={e => updateRiga(i, "avere", e.target.value)}
                               placeholder="—"
                               style={{width:"100%", padding:"5px 8px", border:"1px solid var(--rule)", borderRadius:4, textAlign:"right", fontSize:13,
                                       background: Number(r.avere) > 0 ? "#dbeafe" : "white"}}/>
                      </td>
                      <td>
                        <button type="button" onClick={() => removeRiga(i)}
                                disabled={righe.length <= 2}
                                style={{background:"transparent", border:"none", color:"var(--neg)", cursor:righe.length <= 2 ? "not-allowed":"pointer", opacity: righe.length <= 2 ? 0.3 : 1, fontSize:16}}
                                title="Rimuovi riga">✕</button>
                      </td>
                    </tr>
                  ))}
                  <tr style={{background:"var(--panel-2)", fontWeight:700}}>
                    <td style={{paddingLeft:14}}>
                      <button type="button" onClick={addRiga}
                              style={{background:"transparent", border:"1px dashed var(--accent-ink)", color:"var(--accent-ink)", padding:"3px 10px", borderRadius:4, cursor:"pointer", fontSize:12}}>
                        + Aggiungi riga
                      </button>
                    </td>
                    <td className="num">{fmt(totDare)}</td>
                    <td className="num">{fmt(totAvere)}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div style={{marginTop:10, padding:"8px 12px",
                         background: quadra ? "#dcfce7" : Math.abs(diff) < 0.005 ? "var(--panel-2)" : "#fee2e2",
                         color: quadra ? "#166534" : Math.abs(diff) < 0.005 ? "var(--ink-3)" : "#991b1b",
                         border: "1px solid " + (quadra ? "#86efac" : Math.abs(diff) < 0.005 ? "var(--rule)" : "#fca5a5"),
                         borderRadius: 6, fontSize: 13, fontWeight: 600}}>
              {totDare === 0 && totAvere === 0 ? "Inserisci gli importi nelle righe" :
               quadra ? `✓ Scrittura quadrata: DARE = AVERE = ${fmt(totDare)} €` :
               `✗ Sbilancio: DARE ${fmt(totDare)} − AVERE ${fmt(totAvere)} = ${diff > 0 ? "+" : ""}${fmt(diff)} €`}
            </div>
          </div>

          <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
            <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
            <button type="submit" className="btn accent" disabled={!quadra}
                    style={!quadra ? {opacity:0.5, cursor:"not-allowed"} : {}}>
              Salva scrittura
            </button>
          </div>
        </>
      ) : (
        <>
      <div className="form-row">
        <label>{tipo === "giroconto" ? "Conto origine" : "Conto liquidità"} {tipo === "giroconto" ? <span className="req">*</span> : <span style={{color:"var(--ink-3)",fontSize:11}}>(opzionale)</span>}</label>
        <select value={contoLiquidita} onChange={e => setContoLiquidita(e.target.value)} required={tipo === "giroconto"}>
          <option value="">{tipo === "giroconto" ? "— seleziona —" : "— nessuno (movimento non monetario) —"}</option>
          {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
        </select>
      </div>
      {tipo === "giroconto" && (
        <div className="form-row">
          <label>Conto destinazione <span className="req">*</span></label>
          <select value={contoLiquiditaDest} onChange={e => setContoLiquiditaDest(e.target.value)} required>
            <option value="">— seleziona —</option>
            {CONTI_LIQUIDITA.filter(c => c.codice !== Number(contoLiquidita)).map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
          </select>
        </div>
      )}
      {tipo !== "giroconto" && (
        <div className="form-row">
          <label>Conto Piano dei Conti <span className="req">*</span></label>
          <select value={contoPdC} onChange={e => setContoPdC(e.target.value)} required>
            <option value="">— seleziona —</option>
            {(() => {
              // Raggruppo per categoria
              const grouped = {};
              contiPdCFiltrati.sort((a,b) => a.codice - b.codice).forEach(c => {
                const cat = c.categoria || "ALTRO";
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(c);
              });
              // Ordine preferito delle categorie per tipo
              const ordineEntrata = ["RICAVI", "CREDITI", "DEBITI", "PN", "COSTI/RICAVI", "CONTO TRANSITORIO"];
              const ordineUscita = ["COSTI", "COSTI/RICAVI", "IMM. MATERIALI", "IMM. IMMATERIALI", "DEBITI", "CREDITI", "CONTO TRANSITORIO"];
              const ordine = tipo === "entrata" ? ordineEntrata : ordineUscita;
              const catsOrdinate = [
                ...ordine.filter(c => grouped[c]),
                ...Object.keys(grouped).filter(c => !ordine.includes(c)).sort()
              ];
              return catsOrdinate.map(cat => (
                <optgroup key={cat} label={`── ${cat} ──`}>
                  {grouped[cat].map(c => (
                    <option key={c.codice} value={c.codice}>
                      {c.codice.toString().padStart(2,"0")} · {c.nome.trim()}
                    </option>
                  ))}
                </optgroup>
              ));
            })()}
          </select>
        </div>
      )}
      {tipo !== "giroconto" && !contoLiquidita && ![44,45,46,47,48,49,50,51].includes(Number(contoPdC)) && (
        <div className="form-row">
          <label>Conto di contropartita <span style={{color:"var(--ink-3)", fontWeight:400}}>(movimento non monetario)</span></label>
          <select value={contoContropartita} onChange={e => setContoContropartita(e.target.value)}>
            <option value="">— da assegnare (sconsigliato) —</option>
            {[...conti].sort((a,b) => a.codice - b.codice).map(c => (
              <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome.trim()}</option>
            ))}
          </select>
          <div style={{fontSize:11.5, color:"var(--ink-3)", marginTop:4}}>
            Niente conto liquidità ⇒ scrittura non monetaria. Scegli qui l'altro conto della partita doppia (es. per chiudere un conto transitorio). Se lo lasci vuoto finirà su "DA ASSEGNARE", così non sporca Bilancio di Apertura o Sopravvenienze.
          </div>
        </div>
      )}
      {tipo !== "giroconto" && (
        <>
          <div className="form-row">
            <label>Categoria (rendiconto) <span className="req">*</span></label>
            {(() => {
              const opts = (tipo === "entrata" ? categorie.entrate : categorie.uscite) || [];
              const lista = categoria && !opts.includes(categoria) ? [categoria, ...opts] : opts;
              return (
                <select value={categoria} onChange={e => setCategoria(e.target.value)}>
                  <option value="">— seleziona categoria —</option>
                  {lista.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              );
            })()}
            <div style={{fontSize:11.5, color:"var(--ink-3)", marginTop:4}}>
              Le categorie si gestiscono nella sezione <strong>Rendiconto Finanziario</strong>.
            </div>
          </div>
          <div className="form-row">
            <label>Business Unit</label>
            <select value={bu} onChange={e => setBu(e.target.value)}>
              {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>
        </>
      )}
      <div className="form-row">
        <label>Importo €  <span className="req">*</span></label>
        <input type="number" inputMode="decimal" step="0.01" min="0" value={importo} onChange={e => setImporto(e.target.value)} required />
      </div>
      <div className="form-row">
        <label>Descrizione</label>
        <textarea value={descrizione} onChange={e => setDescrizione(e.target.value)} placeholder="Motivo / dettaglio operazione" />
      </div>
      <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
        <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
        <button type="submit" className="btn accent">Salva movimento</button>
      </div>
        </>
      )}
    </form>
  );
}

// ============================================================
// PAGINA: DASHBOARD
// ============================================================
function PageDashboard({ conti, movimenti, saldiIniziali, stagione }) {
  const [drillLiq, setDrillLiq] = useState(null); // conto liquidità selezionato per il dettaglio

  const contiMap = useMemo(() => {
    const m = {};
    (conti || []).forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Movimenti per ciascun conto di liquidità (con segno relativo al conto)
  // Una entrata aumenta il conto, un'uscita lo diminuisce; per i giroconti il
  // conto di partenza diminuisce e quello di destinazione aumenta.
  const movPerLiquidita = useMemo(() => {
    const map = {};
    CONTI_LIQUIDITA.forEach(c => { map[c.codice] = []; });
    movimenti.forEach(m => {
      if (map[m.contoLiquidita]) {
        let segno = 0;
        if (m.tipo === "entrata") segno = 1;
        else if (m.tipo === "uscita") segno = -1;
        else if (m.tipo === "giroconto") segno = -1; // esce dal conto di partenza
        if (segno !== 0) map[m.contoLiquidita].push({ ...m, _segno: segno });
      }
      if (m.tipo === "giroconto" && map[m.contoLiquiditaDest]) {
        map[m.contoLiquiditaDest].push({ ...m, _segno: 1, _giroIn: true });
      }
      // scritture libere/composte e rettifiche non monetarie su un conto di liquidità
      const eff = effettoLiquiditaNascosto(m);
      if (eff && map[eff.codice]) {
        map[eff.codice].push({ ...m, importo: Math.abs(eff.delta), _segno: eff.delta > 0 ? 1 : -1, _composta: true });
      }
    });
    return map;
  }, [movimenti]);

  // Calcola saldi per ogni conto liquidità
  const saldi = useMemo(() => {
    const map = {};
    CONTI_LIQUIDITA.forEach(c => {
      map[c.codice] = {
        iniziale: saldiIniziali[c.codice] || 0,
        entrate: 0,
        uscite: 0,
        entrate_nuove: 0,
        uscite_nuove: 0,
      };
    });
    movimenti.forEach(m => {
      const e = map[m.contoLiquidita];
      if (e) {
        if (m.tipo === "entrata") {
          e.entrate += m.importo;
          if (!m.importato) e.entrate_nuove += m.importo;
        } else if (m.tipo === "uscita") {
          e.uscite += m.importo;
          if (!m.importato) e.uscite_nuove += m.importo;
        } else if (m.tipo === "giroconto") {
          e.uscite += m.importo;
          if (!m.importato) e.uscite_nuove += m.importo;
        }
      }
      if (m.tipo === "giroconto" && map[m.contoLiquiditaDest]) {
        map[m.contoLiquiditaDest].entrate += m.importo;
        if (!m.importato) map[m.contoLiquiditaDest].entrate_nuove += m.importo;
      }
      // scritture libere/composte e rettifiche non monetarie su un conto di liquidità
      const eff = effettoLiquiditaNascosto(m);
      if (eff && map[eff.codice]) {
        if (eff.delta > 0) { map[eff.codice].entrate += eff.delta; if (!m.importato) map[eff.codice].entrate_nuove += eff.delta; }
        else { map[eff.codice].uscite += -eff.delta; if (!m.importato) map[eff.codice].uscite_nuove += -eff.delta; }
      }
    });
    return map;
  }, [movimenti, saldiIniziali]);

  // KPI: nuove = solo movimenti registrati dall'utente, totale = inclusi gli importati
  const totEntrateNuove = movimenti.filter(m => m.tipo === "entrata" && !m.importato).reduce((s,m) => s + m.importo, 0);
  const totUsciteNuove = movimenti.filter(m => m.tipo === "uscita" && !m.importato).reduce((s,m) => s + m.importo, 0);
  const totEntrate = movimenti.filter(m => m.tipo === "entrata").reduce((s,m) => s + m.importo, 0);
  const totUscite = movimenti.filter(m => m.tipo === "uscita").reduce((s,m) => s + m.importo, 0);
  const liquiditaTotale = Object.values(saldi).reduce((s,v) => s + v.iniziale + v.entrate - v.uscite, 0);

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Dashboard</h2>
          <div className="sub">Disponibilità reali, entrate e uscite della stagione</div>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi accent">
          <div className="label">Liquidità totale</div>
          <div className="value">{fmtEuro(liquiditaTotale)}</div>
          <div className="hint">Tutti i conti aggregati</div>
        </div>
        <div className="kpi">
          <div className="label">Entrate stagione</div>
          <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(totEntrate)}</div>
          <div className="hint">{totEntrateNuove > 0 ? `di cui ${fmtEuro(totEntrateNuove)} nuove` : `${movimenti.filter(m=>m.tipo==="entrata").length} movimenti`}</div>
        </div>
        <div className="kpi">
          <div className="label">Uscite stagione</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(totUscite)}</div>
          <div className="hint">{totUsciteNuove > 0 ? `di cui ${fmtEuro(totUsciteNuove)} nuove` : `${movimenti.filter(m=>m.tipo==="uscita").length} movimenti`}</div>
        </div>
        <div className="kpi">
          <div className="label">Saldo stagione</div>
          <div className={"value " + (totEntrate-totUscite < 0 ? "neg" : "")}>{fmtEuro(totEntrate - totUscite)}</div>
          <div className="hint">Entrate − Uscite</div>
        </div>
      </div>

      <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"24px 0 12px"}}>Disponibilità per conto</h3>
      <div className="liq-grid">
        {CONTI_LIQUIDITA.map(c => {
          const s = saldi[c.codice];
          const saldoFinale = s.iniziale + s.entrate - s.uscite;
          const nMov = (movPerLiquidita[c.codice] || []).length;
          return (
            <div key={c.codice} className="liq-card row-click" style={{cursor:"pointer"}}
                 onClick={() => setDrillLiq(c)}
                 title="Click per il dettaglio dei movimenti">
              <div className="head">
                <span className="name">{c.nome.trim()}</span>
                <span style={{fontSize:11, color:"var(--ink-3)"}}>{nMov} mov.</span>
              </div>
              <div className={"saldo " + (saldoFinale < 0 ? "neg" : "")}>{fmtEuro(saldoFinale)}</div>
              <div className="delta">
                Iniziale {fmt(s.iniziale)} ·
                <span className="pos"> +{fmt(s.entrate)}</span> ·
                <span className="neg"> -{fmt(s.uscite)}</span>
              </div>
            </div>
          );
        })}
      </div>

      {drillLiq && (() => {
        const s = saldi[drillLiq.codice] || { iniziale: 0, entrate: 0, uscite: 0 };
        const saldoFinale = s.iniziale + s.entrate - s.uscite;
        const movs = (movPerLiquidita[drillLiq.codice] || [])
          .slice()
          .sort((a, b) => (b.data || "").localeCompare(a.data || ""));
        return (
          <div className="modal-bg" onClick={() => setDrillLiq(null)}>
            <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:820}}>
              <div className="modal-head">
                <h3>{drillLiq.nome.trim()} <span style={{color:"var(--ink-3)", fontSize:13, fontWeight:400}}>· resoconto movimenti</span></h3>
                <button className="btn ghost sm" onClick={() => setDrillLiq(null)}>✕</button>
              </div>
              <div className="modal-body">
                <div className="kpi-grid" style={{marginBottom:16}}>
                  <div className="kpi"><div className="label">Saldo iniziale</div><div className="value">{fmtEuro(s.iniziale)}</div></div>
                  <div className="kpi"><div className="label">Entrate</div><div className="value" style={{color:"var(--accent)"}}>{fmtEuro(s.entrate)}</div></div>
                  <div className="kpi"><div className="label">Uscite</div><div className="value" style={{color:"var(--danger)"}}>{fmtEuro(s.uscite)}</div></div>
                  <div className="kpi accent"><div className="label">Saldo finale</div><div className={"value " + (saldoFinale < 0 ? "neg" : "")}>{fmtEuro(saldoFinale)}</div></div>
                </div>
                {movs.length === 0 ? (
                  <div className="empty-state">Nessun movimento su questo conto</div>
                ) : (
                  <table className="tbl">
                    <thead>
                      <tr>
                        <th style={{width:90}}>Data</th>
                        <th>Descrizione</th>
                        <th>Contropartita</th>
                        <th style={{width:80}}>BU</th>
                        <th className="num" style={{width:110}}>Importo</th>
                      </tr>
                    </thead>
                    <tbody>
                      {movs.map((m, i) => {
                        const isGiro = m.tipo === "giroconto";
                        let contropartita;
                        if (isGiro) {
                          const altro = m._giroIn ? m.contoLiquidita : m.contoLiquiditaDest;
                          contropartita = "Giroconto · " + ((contiMap[altro]?.nome || "conto " + altro).trim());
                        } else {
                          contropartita = (contiMap[m.contoPdC]?.nome || "—").trim();
                        }
                        return (
                          <tr key={m._id || i}>
                            <td>{fmtDate(m.data)}{m.importato && <span className="pill" style={{marginLeft:6, fontSize:9.5}}>imp</span>}</td>
                            <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>(senza descrizione)</span>}</td>
                            <td style={{fontSize:12}}>{contropartita}</td>
                            <td style={{fontSize:11, color:"var(--ink-3)"}}>{m.bu || "—"}</td>
                            <td className={"num " + (m._segno > 0 ? "pos" : "neg")}>{m._segno > 0 ? "+" : "−"}{fmt(m.importo)}</td>
                          </tr>
                        );
                      })}
                      <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                        <td colSpan={4}>SALDO FINALE</td>
                        <td className={"num " + (saldoFinale < 0 ? "neg" : "pos")}>{saldoFinale < 0 ? "−" + fmt(Math.abs(saldoFinale)) : fmt(saldoFinale)}</td>
                      </tr>
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      <div style={{marginTop:24, padding:"16px 20px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:10, fontSize:12.5, color:"var(--ink-2)"}}>
        <strong>Nota.</strong> I saldi iniziali (al 01/09/2025) provengono dalla riapertura dello sheet originale. I movimenti importati dai fogli ENTRATE NEW / USCITE NEW sono già presenti nella lista <em>Movimenti</em> (badge "importato"). I nuovi movimenti che inserirai si sommano sopra.
      </div>

      <ManutenzioneBox stagione={stagione} />
    </div>
  );
}

// ============================================================
// COMPONENTE: BOX MANUTENZIONE
// ============================================================
function ManutenzioneBox({ stagione }) {
  const [running, setRunning] = useState(false);

  const runMigrationChecks = async () => {
    if (!firebaseReady || !stagione) {
      alert("Firebase non disponibile o stagione non selezionata.");
      return;
    }
    setRunning(true);
    try {
      const movsSnap = await db.ref(`stagioni/${stagione}/movimenti`).once("value");
      const movs = movsSnap.exists() ? Object.values(movsSnap.val()) : [];
      const importati = movs.filter(m => m.importato);

      // ===== Check apertura =====
      const hasApertura = importati.some(m => m.apertura === true);

      // ===== Check migration 3.13 =====
      const contiSnap = await db.ref(`stagioni/${stagione}/conti`).once("value");
      const contiVal = contiSnap.val() || {};
      const has80 = Object.values(contiVal).some(c => c.codice === 80);
      const hasStampante = Object.values(contiVal).some(c => c.codice === 78);
      const hasTreppiede = Object.values(contiVal).some(c => c.codice === 79);

      const cespitiSnap = await db.ref(`stagioni/${stagione}/cespiti`).once("value");
      const cespitiVal = cespitiSnap.val() || {};
      const cespitiList = Object.entries(cespitiVal).map(([k,c]) => ({...c, _key: k}));

      const hasSpeakerNuovo = cespitiList.some(c =>
        (c.conto || "").toUpperCase().includes("SPEAKER") && Math.abs((c.costo_storico || 0) - 2338.83) < 0.5
      );
      const hasMaterialeAggiornato = cespitiList.some(c =>
        (c.conto || "").toUpperCase().includes("MATERIALE ALLENAMENTO") && Math.abs((c.costo_storico || 0) - 137.95) < 0.5
      );
      const hasStampanteCespite = cespitiList.some(c => (c.conto || "").toUpperCase().includes("STAMPANTE"));
      const hasTreppiedeCespite = cespitiList.some(c => (c.conto || "").toUpperCase().includes("TREPPIEDE"));
      const oldLavagnetta = cespitiList.find(c => (c.conto || "").trim().toUpperCase() === "LAVAGNETTA");
      const oldTelecamera = cespitiList.find(c => (c.conto || "").trim().toUpperCase() === "TELECAMERA PER FUTSAL");
      const oldCostiImpianto = cespitiList.find(c => (c.conto || "").trim().toUpperCase() === "COSTI IMPIANTO");

      const rimborsiDaSpostare = Object.entries(movsSnap.val() || {}).filter(([k, m]) => {
        if (m.contoPdC !== 36) return false;
        if (m.tipo !== "uscita") return false;
        const cat = (m.categoria || "").toUpperCase();
        const desc = (m.descrizione || "").toUpperCase();
        return cat.includes("RIMBORSO") || desc.includes("RIMBORSO") || desc.includes("RIMBORSI");
      });

      const lines = [];
      if (!hasApertura) lines.push("• Inserire scrittura di APERTURA al 01/09/2025 (25 movimenti)");
      if (!has80) lines.push("• Aggiungere conto 80 RIMBORSI SPESE SOCI");
      if (!hasSpeakerNuovo) lines.push("• Aggiungere cespite SPEAKER nuovo 2.338,83 €");
      if (!hasMaterialeAggiornato) lines.push("• Aggiornare MATERIALE ALLENAMENTO FUTSAL a 137,95 €");
      if (hasStampante && !hasStampanteCespite) lines.push("• Aggiungere cespite STAMPANTE SCONTRINI 70 €");
      if (hasTreppiede && !hasTreppiedeCespite) lines.push("• Aggiungere cespite TREPPIEDE 35 €");
      if (oldLavagnetta) lines.push("• Rinominare LAVAGNETTA → LAVAGNETTA FUTSAL");
      if (oldTelecamera) lines.push("• Rinominare TELECAMERA PER FUTSAL → TELECAMERA FUTSAL");
      if (oldCostiImpianto) lines.push("• Rinominare COSTI IMPIANTO → COSTI DI IMPIANTO");
      if (rimborsiDaSpostare.length > 0) lines.push(`• Riclassificare ${rimborsiDaSpostare.length} rimborsi spese (€${rimborsiDaSpostare.reduce((s,[,m])=>s+(m.importo||0),0).toFixed(2)}) da conto 36 a conto 80`);

      if (lines.length === 0) {
        alert("✓ Nessun disallineamento rilevato. Tutto è già aggiornato.");
        setRunning(false);
        return;
      }

      if (!confirm("Operazioni da eseguire:\n\n" + lines.join("\n") + "\n\nProcedere?")) {
        setRunning(false);
        return;
      }

      // ===== ESEGUI =====
      // Apertura
      if (!hasApertura) {
        await db.ref(`stagioni/${stagione}/saldiIniziali`).set({ 1: 0, 3: 0, 4: 0, 5: 0, 9: 0, 10: 0 });
        const apertureObj = {};
        APERTURA_MOVIMENTI.forEach((m, i) => {
          apertureObj[`apertura_${String(i).padStart(4,'0')}`] = m;
        });
        await db.ref(`stagioni/${stagione}/movimenti`).update(apertureObj);
      }

      // Conto 80
      if (!has80) {
        await db.ref(`stagioni/${stagione}/conti/c80`).set({
          codice: 80, nome: "RIMBORSI SPESE SOCI", eccedenza: "DARE", prospetto: "CE", categoria: "COSTI"
        });
      }

      // Cespiti
      if (!hasSpeakerNuovo) {
        await db.ref(`stagioni/${stagione}/cespiti`).push({
          conto: "SPEAKER", classe: "IMMOBILIZZAZIONI MATERIALI",
          n_beni: 1, costo_unitario: 2338.83, anno_inizio: 2026,
          costo_storico: 2338.83, aliquota: 0, quota_esercizio: 0, fondo_ammortamento: 0,
        });
      }
      if (hasStampante && !hasStampanteCespite) {
        await db.ref(`stagioni/${stagione}/cespiti`).push({
          conto: "STAMPANTE SCONTRINI", classe: "IMMOBILIZZAZIONI MATERIALI",
          n_beni: 1, costo_unitario: 70, anno_inizio: 2026,
          costo_storico: 70, aliquota: 0, quota_esercizio: 0, fondo_ammortamento: 0,
        });
      }
      if (hasTreppiede && !hasTreppiedeCespite) {
        await db.ref(`stagioni/${stagione}/cespiti`).push({
          conto: "TREPPIEDE", classe: "IMMOBILIZZAZIONI MATERIALI",
          n_beni: 1, costo_unitario: 35, anno_inizio: 2026,
          costo_storico: 35, aliquota: 0, quota_esercizio: 0, fondo_ammortamento: 0,
        });
      }
      if (!hasMaterialeAggiornato) {
        const matCesp = cespitiList.find(c => (c.conto || "").toUpperCase().includes("MATERIALE ALLENAMENTO"));
        if (matCesp) {
          await db.ref(`stagioni/${stagione}/cespiti/${matCesp._key}`).update({
            costo_storico: 137.95, costo_unitario: 137.95, n_beni: 1,
          });
        }
      }
      if (oldLavagnetta) await db.ref(`stagioni/${stagione}/cespiti/${oldLavagnetta._key}`).update({ conto: "LAVAGNETTA FUTSAL" });
      if (oldTelecamera) await db.ref(`stagioni/${stagione}/cespiti/${oldTelecamera._key}`).update({ conto: "TELECAMERA FUTSAL" });
      if (oldCostiImpianto) await db.ref(`stagioni/${stagione}/cespiti/${oldCostiImpianto._key}`).update({ conto: "COSTI DI IMPIANTO" });

      // Rimborsi → conto 80
      for (const [movKey, m] of rimborsiDaSpostare) {
        await db.ref(`stagioni/${stagione}/movimenti/${movKey}`).update({
          contoPdC: 80, modificatoIl: new Date().toISOString()
        });
      }

      alert("✓ Migration completata.\n\nLa pagina si ricarica per applicare i cambiamenti.");
      window.location.reload();
    } catch (e) {
      console.error("Migration error:", e);
      alert("Errore durante la migration: " + e.message);
    } finally {
      setRunning(false);
    }
  };

  return (
    <div style={{marginTop:18, padding:"14px 18px", background:"#fef9e7", border:"1px solid #f0d860", borderRadius:10, fontSize:13}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:14, flexWrap:"wrap"}}>
        <div>
          <strong style={{color:"#7a5d00"}}>🔧 Manutenzione contabilità</strong>
          <div style={{fontSize:12, color:"#7a5d00", marginTop:2}}>Verifica e applica eventuali aggiornamenti pendenti (cespiti, conti, riclassificazioni).</div>
        </div>
        <button className="btn" disabled={running} onClick={runMigrationChecks}
                style={{background:"#f0d860", color:"#7a5d00", border:"1px solid #d4ba30", fontWeight:600}}>
          {running ? "Verifica in corso..." : "Verifica e applica"}
        </button>
      </div>
    </div>
  );
}

function PageNuovo({ conti, stagione, categorie, onSaved, onCancel }) {
  const [cespitoFromMov, setCespitoFromMov] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    return m;
  }, [conti]);

  const handleSave = async (payload) => {
    if (!firebaseReady) return alert("Firebase non configurato");
    try {
      // === Caso scrittura composta: salvo N movimenti in batch ===
      if (payload.composta && Array.isArray(payload.movimenti)) {
        const updates = {};
        payload.movimenti.forEach((m, i) => {
          // Pulisco undefined
          const dati = {...m};
          Object.keys(dati).forEach(k => { if (dati[k] === undefined) dati[k] = null; });
          const key = db.ref(`stagioni/${stagione}/movimenti`).push().key;
          updates[key] = dati;
        });
        await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
        onSaved(`Scrittura composta registrata (${payload.movimenti.length} righe)`);
        return;
      }

      // === Caso movimento semplice ===
      // Pulisco undefined (Firebase li rifiuta)
      const dati = {...payload};
      Object.keys(dati).forEach(k => { if (dati[k] === undefined) dati[k] = null; });
      const ref = db.ref(`stagioni/${stagione}/movimenti`).push();
      await ref.set(dati);

      // Detect immobilizzazione: se è un'uscita su conto categoria IMM.MATERIALI o IMM.IMMATERIALI
      const conto = contiMap[payload.contoPdC];
      const isImm = payload.tipo === "uscita" && conto &&
                    ["IMM. MATERIALI", "IMM. IMMATERIALI"].includes(conto.categoria);
      if (isImm) {
        // Apro modale per aggiungere al libro cespiti
        setCespitoFromMov({
          conto: conto.nome.trim(),
          classe: conto.categoria === "IMM. MATERIALI" ? "IMMOBILIZZAZIONI MATERIALI" : "IMMOBILIZZAZIONI IMMATERIALI",
          n_beni: 1,
          anno_inizio: payload.data ? new Date(payload.data).getFullYear() : new Date().getFullYear(),
          costo_storico: payload.importo,
          aliquota: 0.10,
          quota_esercizio: 0,
          fondo_ammortamento: 0,
          descrizione_origine: payload.descrizione || "",
        });
      } else {
        onSaved("Movimento registrato");
      }
    } catch(e) {
      alert("Errore: " + e.message);
    }
  };

  const handleSaveCespite = async (datiCespite) => {
    try {
      // Pulisco undefined
      const cleaned = {...datiCespite};
      Object.keys(cleaned).forEach(k => { if (cleaned[k] === undefined) cleaned[k] = null; });
      // Calcolo quota esercizio = costo * aliquota
      cleaned.quota_esercizio = (cleaned.costo_storico || 0) * (cleaned.aliquota || 0);
      // Push come nuovo cespite
      const ref = db.ref(`stagioni/${stagione}/cespiti`).push();
      await ref.set(cleaned);
      setCespitoFromMov(null);
      onSaved("Movimento e cespite registrati");
    } catch(e) { alert("Errore cespite: " + e.message); }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Nuovo movimento</h2>
          <div className="sub">Registra un'entrata, un'uscita o un giroconto tra conti</div>
        </div>
      </div>
      <div className="card" style={{maxWidth:760}}>
        <MovimentoForm conti={conti} categorie={categorie} onSave={handleSave} onCancel={onCancel} />
      </div>

      {cespitoFromMov && (
        <div className="modal-bg" onClick={() => { setCespitoFromMov(null); onSaved("Movimento registrato"); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>✨ Aggiungi al Libro Cespiti?</h3>
              <button className="btn ghost sm" onClick={() => { setCespitoFromMov(null); onSaved("Movimento registrato"); }}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{marginBottom:14, padding:"10px 14px", background:"var(--accent-soft)", border:"1px solid #c8d8ce", borderRadius:8, fontSize:12.5, color:"var(--accent-ink)"}}>
                Hai registrato un'uscita su un conto immobilizzazione. Vuoi aggiungerlo anche al Libro Cespiti (per ammortamento)? I campi sono pre-compilati col movimento appena registrato — verifica e modifica se serve.
              </div>
              <CespiteFormQuick cespite={cespitoFromMov} onSave={handleSaveCespite} onSkip={() => { setCespitoFromMov(null); onSaved("Movimento registrato (cespite non aggiunto)"); }} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Form rapido per aggiungere cespite dopo movimento
function CespiteFormQuick({ cespite, onSave, onSkip }) {
  const [data, setData] = useState({
    conto: cespite.conto,
    classe: cespite.classe,
    n_beni: cespite.n_beni,
    costo_unitario: cespite.costo_storico, // unit = costo totale all'inizio (n=1)
    anno_inizio: cespite.anno_inizio,
    costo_storico: cespite.costo_storico,
    aliquota: cespite.aliquota,
    quota_esercizio: 0,
    fondo_ammortamento: 0,
  });
  const [lastChange, setLastChange] = useState("totale");

  // Auto-calcolo costo unitario / totale in base a cosa cambia
  useEffect(() => {
    const n = Number(data.n_beni) || 1;
    if (lastChange === "unit") {
      setData(d => ({...d, costo_storico: Math.round(Number(d.costo_unitario) * n * 100) / 100}));
    } else if (lastChange === "totale") {
      setData(d => ({...d, costo_unitario: n > 0 ? Math.round(Number(d.costo_storico) / n * 100) / 100 : 0}));
    } else if (lastChange === "n") {
      setData(d => ({...d, costo_storico: Math.round(Number(d.costo_unitario) * n * 100) / 100}));
    }
  // eslint-disable-next-line
  }, [data.costo_unitario, data.costo_storico, data.n_beni]);

  const submit = (e) => {
    e.preventDefault();
    onSave({
      ...data,
      n_beni: Number(data.n_beni),
      anno_inizio: Number(data.anno_inizio),
      costo_unitario: Number(data.costo_unitario) || 0,
      costo_storico: Number(data.costo_storico),
      aliquota: Number(data.aliquota)
    });
  };
  return (
    <form onSubmit={submit} className="form-grid">
      <div className="form-row">
        <label>Conto / Nome bene</label>
        <input type="text" value={data.conto} onChange={e => setData({...data, conto: e.target.value})} required/>
      </div>
      <div className="form-row">
        <label>Classe</label>
        <input type="text" value={data.classe} onChange={e => setData({...data, classe: e.target.value})}/>
      </div>
      <div className="form-row" style={{gridTemplateColumns: "1fr 1fr 1fr", gap: 10}}>
        <div>
          <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>N° beni</label>
          <input type="number" inputMode="decimal" min="1" step="1" value={data.n_beni}
            onChange={e => { setData({...data, n_beni: e.target.value}); setLastChange("n"); }}/>
        </div>
        <div>
          <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Costo unitario €</label>
          <input type="number" inputMode="decimal" step="0.01" value={data.costo_unitario}
            onChange={e => { setData({...data, costo_unitario: e.target.value}); setLastChange("unit"); }}/>
        </div>
        <div>
          <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Costo totale €</label>
          <input type="number" inputMode="decimal" step="0.01" value={data.costo_storico}
            onChange={e => { setData({...data, costo_storico: e.target.value}); setLastChange("totale"); }}
            style={{background:"var(--panel-2)", fontWeight:600}}/>
        </div>
      </div>
      <div style={{fontSize:11, color:"var(--ink-3)", padding:"2px 0 8px"}}>
        💡 Se hai più beni con costo unitario, inserisci N° beni e Costo unitario: il totale si aggiorna in automatico.
      </div>
      <div className="form-row" style={{gridTemplateColumns: "1fr 1fr", gap: 10}}>
        <div>
          <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Anno inizio</label>
          <input type="number" inputMode="decimal" value={data.anno_inizio} onChange={e => setData({...data, anno_inizio: e.target.value})}/>
        </div>
        <div>
          <label style={{fontSize:11, color:"var(--ink-3)", fontWeight:600, textTransform:"uppercase"}}>Aliquota (0.10 = 10%)</label>
          <input type="number" inputMode="decimal" step="0.01" min="0" max="1" value={data.aliquota} onChange={e => setData({...data, aliquota: e.target.value})}/>
        </div>
      </div>
      <div style={{fontSize:11, color:"var(--ink-3)", padding:"6px 0"}}>
        Quota ammortamento esercizio (auto): {(Number(data.costo_storico || 0) * Number(data.aliquota || 0)).toFixed(2)} €
      </div>
      <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
        <button type="button" className="btn ghost" onClick={onSkip}>Non aggiungere</button>
        <button type="submit" className="btn accent">Aggiungi cespite</button>
      </div>
    </form>
  );
}
