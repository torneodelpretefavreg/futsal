/* ============================================================
   PAGINA: IMPORT MOVIMENTI (estratto conto / lista -> scritture)
   Formato atteso (intestazioni, ordine libero):
   Data | Conto | Tipo | Contropartita | Categoria | BU | Descrizione | Importo
   - Conto        = conto liquidità (FUTSAL C/C, CASSA, POS C/C, PAYPAL, SATISPAY, "TIZIO")
   - Tipo         = Entrata / Uscita / Giroconto (se manca, dedotto dal segno)
   - Contropartita= conto del Piano dei Conti (codice o nome). Per i Giroconti = conto liquidità di destinazione
   - Categoria    = etichetta libera; propone in automatico la contropartita (mappatura ricordata)
   - BU           = business unit (default GENERAL)
   - Importo      = numero positivo (il verso lo dà il Tipo)
   Crea un movimento per riga con la STESSA struttura di "Nuovo movimento".
   ============================================================ */
function normKimp(v){
  return String(v == null ? "" : v).toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/["'.]/g,"").replace(/[\s\-\/]+/g," ").trim();
}
const r2imp = (n) => Math.round((Number(n) || 0) * 100) / 100;

// alias comodi per riconoscere i conti liquidità da estratto conto / POS
const LIQ_ALIAS_IMP = {
  "FUTSAL C C":1, "FUTSAL":1, "CONTO":1, "C C":1, "BANCA":1, "BONIFICO":1,
  "CASSA":3, "CONTANTI":3, "CONTANTE":3,
  "TIZIO C C":4, "TIZIO":4,
  "POS C C":5, "POS":5, "SUMUP":5, "NEXI":5,
  "PAYPAL C C":9, "PAYPAL":9,
  "SATISPAY C C":10, "SATISPAY":10,
};
function resolveLiqImp(v){
  if (v == null || v === "") return "";
  if (typeof v === "number" && [1,3,4,5,9,10].includes(v)) return v;
  const k = normKimp(v);
  if (/^\d+$/.test(k)) { const n = Number(k); return [1,3,4,5,9,10].includes(n) ? n : ""; }
  if (LIQ_ALIAS_IMP[k] != null) return LIQ_ALIAS_IMP[k];
  for (const a in LIQ_ALIAS_IMP){ if (k === a || k.includes(a) || a.includes(k)) return LIQ_ALIAS_IMP[a]; }
  return "";
}
function parseDataImp(v){
  if (v instanceof Date && !isNaN(v)) {
    const y=v.getFullYear(), m=String(v.getMonth()+1).padStart(2,"0"), d=String(v.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  if (typeof v === "number") { const d = new Date(Math.round((v-25569)*86400*1000)); if(!isNaN(d)) return d.toISOString().slice(0,10); }
  const s = String(v||"").trim();
  let m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if (m){ let[_,d,mo,y]=m; if(y.length===2) y="20"+y; return `${y}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`; }
  m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if (m){ return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`; }
  return "";
}
function parseImportoImp(raw){
  if (raw == null || raw === "") return NaN;
  if (typeof raw === "number") return raw;
  let str = String(raw).replace(/[€\s]/g,"").trim();
  if (str.includes(",")) str = str.replace(/\./g,"").replace(",",".");   // 1.234,56 -> 1234.56
  return parseFloat(str);
}

function PageImportMovimenti({ conti, bu, movimenti, stagione, onToast, onDone }){
  const [rows, setRows] = useState([]);
  const [fileName, setFileName] = useState("");
  const [sheets, setSheets] = useState([]);
  const [wbRef, setWbRef] = useState(null);
  const [mappa, setMappa] = useState({});      // normKey(categoria) -> contoPdC
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  const buList = (bu && bu.length ? bu : BUSINESS_UNITS_DEFAULT);

  // mappa nome/codice PdC -> codice
  const pdcByKey = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[normKimp(c.nome)] = c.codice; });
    return m;
  }, [conti]);
  const contiMap = useMemo(() => { const m={}; conti.forEach(c=>m[c.codice]=c); return m; }, [conti]);
  const contiPdC = useMemo(() => conti.filter(c => c.categoria !== "DISP. LIQUIDE"), [conti]);

  function resolvePdCImp(v){
    if (v == null || v === "") return "";
    if (typeof v === "number") return contiMap[v] ? v : "";
    const k = normKimp(v);
    if (/^\d+$/.test(k)) { const n = Number(k); return contiMap[n] ? n : ""; }
    if (pdcByKey[k] != null) return pdcByKey[k];
    // match parziale sul nome
    for (const c of conti){ const nk = normKimp(c.nome); if (nk === k || nk.includes(k) || k.includes(nk)) return c.codice; }
    return "";
  }

  // carico mappatura categoria->conto ricordata dagli import precedenti
  useEffect(() => {
    if (!firebaseReady || !stagione) return;
    db.ref(`stagioni/${stagione}/mappaImport`).once("value")
      .then(s => { if (s.exists()) setMappa(s.val() || {}); })
      .catch(() => {});
  }, [stagione]);

  // quando arriva la mappa, propongo la contropartita alle righe che non ce l'hanno
  useEffect(() => {
    if (!Object.keys(mappa).length) return;
    setRows(rs => rs.map(r => (!r.pdc && r.tipo !== "G" && r.cat && mappa[normKimp(r.cat)] != null)
      ? { ...r, pdc: mappa[normKimp(r.cat)] } : r));
  }, [mappa]);

  function detect(headers){
    const H = headers.map(h => normKimp(h));
    const used = new Set();
    const find = (cands) => {
      const C = cands.map(c => normKimp(c));
      // 1° giro: match esatto
      for (let i=0;i<H.length;i++){ if(!used.has(i) && C.includes(H[i])){ used.add(i); return i; } }
      // 2° giro: contiene
      for (let i=0;i<H.length;i++){ if(!used.has(i) && C.some(c => H[i].includes(c) || c.includes(H[i]))){ used.add(i); return i; } }
      return -1;
    };
    // i più specifici prima, così "CONTO PDC" non viene preso da "conto"
    const data  = find(["data","date","giorno","valuta","data valuta","data contabile"]);
    const importo = find(["importo","amount","valore","euro","saldo","dare avere"]);
    const tipo  = find(["tipo","segno","entrata uscita","movimento","causale abi"]);
    const pdc   = find(["contropartita","conto pdc","pdc","conto contabile","conto contropartita","contro"]);
    const cat   = find(["categoria","category","causale contabile"]);
    const bu    = find(["bu","business unit","centro di costo","centro","unita","area"]);
    const descr = find(["descrizione","causale","dettaglio","operazione","note","note contabili","motivo"]);
    const conto = find(["conto liquidita","liquidita","conto","metodo","banca","cassa"]);
    return { data, importo, tipo, pdc, cat, bu, descr, conto };
  }

  function parseSheet(wb, name){
    try{
      const ws = wb.Sheets[name];
      const aoa = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:"" });
      if (aoa.length < 2){ onToast("Foglio vuoto o senza dati"); setRows([]); return; }
      const col = detect(aoa[0]);
      if (col.importo < 0 || col.data < 0){ onToast("Nel foglio mancano le colonne Data e/o Importo"); setRows([]); return; }
      const buKeys = {}; buList.forEach(b => buKeys[normKimp(b)] = b);
      const out = [];
      for (let i=1;i<aoa.length;i++){
        const r = aoa[i]; if (!r || r.every(c => c===""||c==null)) continue;
        const imp = parseImportoImp(r[col.importo]);
        if (isNaN(imp) || imp === 0) continue;
        // tipo
        let tipo;
        if (col.tipo >= 0){
          const t = normKimp(r[col.tipo]);
          if (t.includes("GIRO")) tipo = "G";
          else if (t.startsWith("E") || t.includes("ENTRAT") || t.includes("ACCRED") || t.includes("INCASS") || t === "DARE" || t === "+") tipo = "E";
          else if (t.startsWith("U") || t.includes("USCIT") || t.includes("ADDEB") || t.includes("PAGAM") || t === "AVERE" || t === "-") tipo = "U";
          else tipo = imp < 0 ? "U" : "E";
        } else tipo = imp < 0 ? "U" : "E";
        // contropartita / dest
        const rawContro = col.pdc >= 0 ? r[col.pdc] : "";
        let pdc = tipo === "G" ? resolveLiqImp(rawContro) : resolvePdCImp(rawContro);
        const cat = col.cat >= 0 ? String(r[col.cat]||"").trim() : "";
        if (!pdc && tipo !== "G" && cat && mappa[normKimp(cat)] != null) pdc = mappa[normKimp(cat)];
        // bu
        let buVal = "GENERAL";
        if (col.bu >= 0){ const bk = normKimp(r[col.bu]); if (buKeys[bk]) buVal = buKeys[bk]; else if (String(r[col.bu]||"").trim()) buVal = String(r[col.bu]).trim().toUpperCase(); }
        out.push({
          data: parseDataImp(r[col.data]),
          cod: col.conto >= 0 ? resolveLiqImp(r[col.conto]) : "",
          tipo, pdc, cat, bu: buVal,
          descr: col.descr >= 0 ? String(r[col.descr]||"").trim() : "",
          importo: r2imp(Math.abs(imp)),
        });
      }
      setRows(out);
      onToast(`${out.length} movimenti letti da "${name}"`);
    } catch(err){ console.error(err); onToast("Errore nella lettura del foglio"); }
  }

  function onFile(e){
    const f = e.target.files && e.target.files[0]; if (!f) return;
    if (typeof XLSX === "undefined"){ onToast("Libreria Excel non caricata. Ricarica la pagina."); return; }
    setFileName(f.name); setRows([]); setSheets([]); setWbRef(null);
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array", cellDates:true });
        setWbRef(wb); setSheets(wb.SheetNames);
        if (wb.SheetNames.length === 1) parseSheet(wb, wb.SheetNames[0]);
      } catch(err){ console.error(err); onToast("Errore nella lettura del file"); }
    };
    reader.readAsArrayBuffer(f);
    e.target.value = "";
  }

  const setRow = (i,k,v) => setRows(rs => rs.map((r,j) => j===i ? {...r,[k]:v} : r));
  const delRow = (i) => setRows(rs => rs.filter((_,j) => j!==i));

  const isValid = (r) => {
    if (!r.data || !r.cod || r.importo <= 0) return false;
    if (r.tipo === "G") return r.pdc && r.pdc !== r.cod;
    return (r.tipo === "E" || r.tipo === "U") && !!r.pdc;
  };
  const validi = rows.filter(isValid);
  const incompleti = rows.length - validi.length;
  const totE = validi.filter(r=>r.tipo==="E").reduce((s,r)=>s+r.importo,0);
  const totU = validi.filter(r=>r.tipo==="U").reduce((s,r)=>s+r.importo,0);

  async function importa(){
    if (!firebaseReady){ onToast("Firebase non configurato"); return; }
    if (validi.length === 0){ onToast("Nessuna riga completa da importare"); return; }
    if (!confirm(`Registrare ${validi.length} movimenti nella stagione ${stagione}?\n\nEntrate: ${fmtEuro(totE)} · Uscite: ${fmtEuro(totU)}`)) return;
    setBusy(true);
    try{
      const nowISO = new Date().toISOString();
      const updates = {};
      validi.forEach(r => {
        const base = {
          data: r.data,
          contoLiquidita: Number(r.cod),
          categoria: (r.cat || "").trim() || (r.tipo === "G" ? "GIROCONTO" : ""),
          bu: r.bu || "GENERAL",
          importo: r2imp(r.importo),
          descrizione: (r.descr || "").trim() || (r.tipo === "E" ? "Entrata" : r.tipo === "U" ? "Uscita" : "Giroconto"),
          mese: meseDaData(r.data),
          nonMonetario: false,
          importato: true,
          creatoIl: nowISO,
          modificatoIl: nowISO,
        };
        let payload;
        if (r.tipo === "G"){
          payload = { ...base, tipo: "giroconto", contoLiquiditaDest: Number(r.pdc), contoPdC: null, contoContropartita: null };
        } else {
          payload = { ...base, tipo: r.tipo === "E" ? "entrata" : "uscita", contoLiquiditaDest: null, contoPdC: Number(r.pdc), contoContropartita: null };
        }
        const key = db.ref(`stagioni/${stagione}/movimenti`).push().key;
        updates[key] = payload;
      });
      await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
      // memorizzo la mappatura categoria -> contropartita per i prossimi import
      const nuovaMappa = { ...(mappa || {}) };
      validi.forEach(r => { if (r.tipo !== "G" && r.cat && r.pdc) nuovaMappa[normKimp(r.cat)] = Number(r.pdc); });
      await db.ref(`stagioni/${stagione}/mappaImport`).set(nuovaMappa);
      setMappa(nuovaMappa);
      onToast(`${validi.length} movimenti importati`);
      setRows([]); setFileName(""); setSheets([]); setWbRef(null);
      if (onDone) onDone();
    } catch(e){ console.error(e); onToast("Errore durante l'import: " + e.message); }
    finally { setBusy(false); }
  }

  function scaricaModello(){
    if (typeof XLSX === "undefined"){ onToast("Libreria non caricata"); return; }
    const aoa = [
      ["Data","Conto","Tipo","Contropartita","Categoria","BU","Descrizione","Importo"],
      ["2026-06-05","POS C/C","Entrata","ENTRATE SERATE TORNEO","INCASSI SERATE TDP","TDP","Incasso serata 1",850.00],
      ["2026-06-08","FUTSAL C/C","Uscita","ONERI VS BANCA","SPESE TENUTA CONTO","GENERAL","Commissioni bonifico",1.00],
      ["2026-06-12","CASSA","Uscita","PERDITE DA EVENTI","PAGAMENTI PER EVENTI","TDP","Pagamento fornitore serata",120.00],
      ["2026-06-20","POS C/C","Giroconto","CASSA","","GENERAL","Prelievo POS in cassa",500.00],
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), "Movimenti");
    // foglio legenda con conti validi
    const legLiq = [["CONTI LIQUIDITÀ (colonna \"Conto\")"],["Codice","Nome"]];
    conti.filter(c=>c.categoria==="DISP. LIQUIDE").forEach(c=>legLiq.push([c.codice,c.nome]));
    legLiq.push([]); legLiq.push(["TIPI VALIDI"],["Entrata"],["Uscita"],["Giroconto (Contropartita = conto destinazione)"]);
    legLiq.push([]); legLiq.push(["BUSINESS UNIT (colonna \"BU\")"]); buList.forEach(b=>legLiq.push([b]));
    legLiq.push([]); legLiq.push(["CONTI PIANO DEI CONTI (colonna \"Contropartita\": codice o nome)"],["Codice","Nome","Tipo"]);
    conti.filter(c=>c.categoria!=="DISP. LIQUIDE").sort((a,b)=>a.codice-b.codice).forEach(c=>legLiq.push([c.codice,c.nome,c.categoria]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(legLiq), "Legenda");
    XLSX.writeFile(wb, `Modello_import_movimenti_${stagione}.xlsx`);
  }

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Import movimenti</h2>
          <div className="sub">Carica un Excel (estratto conto, POS, lista spese) e registra le scritture in blocco · stagione {stagione}</div>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button className="btn ghost" onClick={scaricaModello}>↓ Scarica modello</button>
          <button className="btn accent" onClick={() => fileRef.current && fileRef.current.click()}>↑ Carica Excel</button>
          <input type="file" ref={fileRef} accept=".xlsx,.xls,.csv" style={{ display:"none" }} onChange={onFile}/>
        </div>
      </div>

      {sheets.length > 1 &&
        <div className="card" style={{ marginBottom:14, display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
          <span style={{ fontSize:13, color:"var(--ink-2)" }}><b>{fileName}</b> · {sheets.length} fogli. Scegli quale importare:</span>
          <select onChange={e => { if (e.target.value !== "") parseSheet(wbRef, e.target.value); else setRows([]); }} defaultValue="">
            <option value="">— seleziona foglio —</option>
            {sheets.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>}

      {rows.length === 0 && sheets.length <= 1 &&
        <div className="card">
          <h3 className="card-title">Formato del foglio</h3>
          <p style={{ color:"var(--ink-2)", fontSize:13, marginTop:0 }}>Serve una riga di intestazione con queste colonne (l'ordine è libero, i nomi sono riconosciuti anche con piccole varianti):</p>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
            {["Data","Conto","Tipo","Contropartita","Categoria","BU","Descrizione","Importo"].map(c =>
              <span key={c} style={{ fontSize:12, padding:"3px 9px", borderRadius:20, background:"var(--bg)", border:"1px solid var(--line)", color:"var(--ink-2)" }}>{c}</span>)}
          </div>
          <ul style={{ color:"var(--ink-2)", fontSize:13, lineHeight:1.7, marginBottom:0 }}>
            <li><b>Conto</b>: il conto di liquidità (FUTSAL C/C, CASSA, POS C/C, PAYPAL, SATISPAY, "TIZIO").</li>
            <li><b>Tipo</b>: Entrata, Uscita o Giroconto. Se manca, viene dedotto dal segno dell'importo.</li>
            <li><b>Contropartita</b>: conto del Piano dei Conti (codice es. <span className="mono">28</span> o nome es. <span className="mono">ENTRATE DA EVENTI</span>). Per i <b>Giroconti</b> è il conto liquidità di destinazione.</li>
            <li><b>Categoria</b>: etichetta libera; propone in automatico la contropartita (la scelta viene ricordata per gli import successivi).</li>
            <li><b>Importo</b>: numero positivo (il verso lo dà il Tipo). Accetta il formato italiano <span className="mono">1.234,56</span>.</li>
          </ul>
          <div style={{ fontSize:12.5, color:"var(--ink-3)", marginTop:10 }}>Usa <b>Scarica modello</b> per ottenere il file pronto, con un foglio <b>Legenda</b> che elenca tutti i conti validi.</div>
        </div>}

      {rows.length > 0 && <>
        <div className="card" style={{ marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <div style={{ fontSize:13, color:"var(--ink-2)" }}>
            <b>{fileName}</b> · {rows.length} movimenti · <span style={{ color:"var(--accent-ink,#2e7d32)" }}>{validi.length} pronti</span>
            {incompleti>0 && <span style={{ color:"var(--danger)" }}> · {incompleti} da completare (assegna la contropartita)</span>}
            <span style={{ marginLeft:10 }}>Entrate {fmtEuro(totE)} · Uscite {fmtEuro(totU)}</span>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn ghost" onClick={() => { setRows([]); setFileName(""); setSheets([]); setWbRef(null); }}>Annulla</button>
            <button className="btn accent" onClick={importa} disabled={busy || validi.length===0}>{busy ? "Registro…" : `Importa ${validi.length} movimenti`}</button>
          </div>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr>
              <th>Data</th><th>Conto liquidità</th><th>Tipo</th><th>Contropartita</th><th>Categoria</th><th>BU</th><th>Descrizione</th><th className="num">Importo</th><th></th>
            </tr></thead>
            <tbody>
              {rows.map((r,i) => (
                <tr key={i} style={isValid(r) ? {} : { background:"#fbf6e8" }}>
                  <td><input type="date" value={r.data} onChange={e=>setRow(i,"data",e.target.value)} style={{ minWidth:130 }}/></td>
                  <td>
                    <select value={r.cod} onChange={e=>setRow(i,"cod",e.target.value===""?"":Number(e.target.value))}>
                      <option value="">— scegli —</option>
                      {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
                    </select>
                  </td>
                  <td>
                    <select value={r.tipo} onChange={e=>setRow(i,"tipo",e.target.value)}>
                      <option value="E">Entrata</option><option value="U">Uscita</option><option value="G">Giroconto</option>
                    </select>
                  </td>
                  <td>
                    {r.tipo === "G" ? (
                      <select value={r.pdc} onChange={e=>setRow(i,"pdc",e.target.value===""?"":Number(e.target.value))}>
                        <option value="">— conto dest. —</option>
                        {CONTI_LIQUIDITA.filter(c=>c.codice!==Number(r.cod)).map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
                      </select>
                    ) : (
                      <select value={r.pdc} onChange={e=>setRow(i,"pdc",e.target.value===""?"":Number(e.target.value))} style={{ minWidth:170 }}>
                        <option value="">— assegna conto —</option>
                        {contiPdC.map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
                      </select>
                    )}
                  </td>
                  <td><input type="text" value={r.cat} onChange={e=>setRow(i,"cat",e.target.value)} style={{ minWidth:130 }} placeholder="—"/></td>
                  <td>
                    <select value={r.bu} onChange={e=>setRow(i,"bu",e.target.value)}>
                      {(buList.includes(r.bu) ? buList : [r.bu, ...buList]).map(b => <option key={b} value={b}>{b}</option>)}
                    </select>
                  </td>
                  <td><input type="text" value={r.descr} onChange={e=>setRow(i,"descr",e.target.value)} style={{ minWidth:170 }}/></td>
                  <td className="num"><input type="number" step="0.01" value={r.importo} onChange={e=>setRow(i,"importo",r2imp(e.target.value))} style={{ width:90, textAlign:"right" }}/></td>
                  <td><button className="btn ghost" style={{ padding:"4px 8px" }} onClick={()=>delRow(i)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ fontSize:12, color:"var(--ink-3)", marginTop:10, fontStyle:"italic" }}>Le righe evidenziate non hanno ancora un conto di contropartita valido e non verranno importate finché non lo scegli. La scelta per categoria viene ricordata per gli import successivi.</div>
      </>}
    </div>
  );
}


/* ============================================================
   PAGINA: CHIUSURA MENSILE
   Stato dei conti a fine mese, filtrabile per Business Unit.
   Due modalità:
     - Progressivo: saldi da inizio stagione fino a fine mese scelto
     - Solo mese: solo i movimenti del mese scelto (variazioni del periodo)
   Export Excel e PDF.
   ============================================================ */
function PageChiusuraMensile({ conti, movimenti, saldiIniziali, stagione, bu, categorieRF, onToast }){
  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const idxMese = (m) => MESI.indexOf(m.mese || meseDaData(m.data));
  const mesiConDati = useMemo(() => {
    const s = new Set();
    movimenti.forEach(m => { const nm = m.mese || meseDaData(m.data); if (nm) s.add(nm); });
    return s;
  }, [movimenti]);
  const meseDefault = useMemo(() => {
    for (let i = MESI.length - 1; i >= 0; i--) if (mesiConDati.has(MESI[i])) return MESI[i];
    return MESI[(new Date().getMonth() + 4) % 12];
  }, [mesiConDati]);

  const [mese, setMese] = useState(meseDefault);
  const [modo, setModo] = useState("progressivo");
  const [buFilter, setBuFilter] = useState("ALL");
  const [busy, setBusy] = useState(false);
  useEffect(() => { setMese(meseDefault); }, [meseDefault]);

  const buOptions = useMemo(() => {
    const set = new Set((bu && bu.length ? bu : BUSINESS_UNITS_DEFAULT));
    movimenti.forEach(m => { if (m.bu) set.add(m.bu); });
    return [...set];
  }, [bu, movimenti]);

  const investSet = useMemo(() => new Set((categorieRF && categorieRF.investimenti) || []), [categorieRF]);
  const meseCap = (m) => m.charAt(0).toUpperCase() + m.slice(1);
  const modoLabel = modo === "mese" ? "Solo mese" : "Progressivo";
  const buLabel = buFilter === "ALL" ? "Tutte le BU" : buFilter;
  const safe = (s) => String(s).replace(/[^A-Za-z0-9]+/g, "-");

  // effetto di un movimento su un conto liquidità (include scritture libere e giroconti)
  const liqDelta = (m, code) => {
    let d = 0;
    if (m.contoLiquidita === code) { if (m.tipo === "entrata") d += m.importo; else if (m.tipo === "uscita") d -= m.importo; else if (m.tipo === "giroconto") d -= m.importo; }
    if (m.tipo === "giroconto" && m.contoLiquiditaDest === code) d += m.importo;
    const eff = effettoLiquiditaNascosto(m); if (eff && eff.codice === code) d += eff.delta;
    return d;
  };

  const dati = useMemo(() => {
    const meseIdx = MESI.indexOf(mese);
    const movsBU = buFilter === "ALL" ? movimenti : movimenti.filter(m => m.bu === buFilter);

    // ---- scritture / mastrini (CE, SP, dettaglio conti) ----
    let scr;
    if (modo === "mese") {
      scr = generaLibroGiornale(movsBU.filter(m => idxMese(m) === meseIdx), {}, contiMap)
        .filter(s => !s.apertura && s.origine !== "apertura");
    } else {
      scr = generaLibroGiornale(movsBU.filter(m => idxMese(m) <= meseIdx), saldiIniziali, contiMap);
    }
    const mastrini = calcolaMastrini(scr).map(x => ({
      ...x, categoria: contiMap[x.codice]?.categoria || "", prospetto: contiMap[x.codice]?.prospetto || "",
    })).sort((a, b) => a.codice - b.codice).filter(m => Math.abs(m.dare) > 0.001 || Math.abs(m.avere) > 0.001);

    const totD = mastrini.reduce((s, m) => s + m.dare, 0);
    const totA = mastrini.reduce((s, m) => s + m.avere, 0);

    // ---- CONTO ECONOMICO ----
    const ceRicavi = mastrini.filter(m => m.categoria === "RICAVI").map(m => ({ ...m, val: m.avere - m.dare })).filter(m => Math.abs(m.val) > 0.001);
    const ceCosti  = mastrini.filter(m => ["COSTI","COSTI/RICAVI"].includes(m.categoria)).map(m => ({ ...m, val: m.dare - m.avere })).filter(m => Math.abs(m.val) > 0.001);
    const totRicavi = ceRicavi.reduce((s, m) => s + m.val, 0);
    const totCosti  = ceCosti.reduce((s, m) => s + m.val, 0);
    const utile = totRicavi - totCosti;

    // ---- STATO PATRIMONIALE ----
    const spVoci = mastrini.filter(m => (m.prospetto === "SP" || m.prospetto === "SP/CE") && Math.abs(m.saldo) > 0.001);
    const attivo = spVoci.filter(m => m.saldo > 0).map(m => ({ ...m, val: m.saldo }));
    const passivo = spVoci.filter(m => m.saldo < 0).map(m => ({ ...m, val: -m.saldo }));
    const totAttivo = attivo.reduce((s, m) => s + m.val, 0);
    const totPassivo = passivo.reduce((s, m) => s + m.val, 0);
    const liquidita = mastrini.filter(m => contiMap[m.codice]?.categoria === "DISP. LIQUIDE").reduce((s, m) => s + m.saldo, 0);

    // ---- RENDICONTO FINANZIARIO (sul periodo) ----
    const rfFull = buildRendiconto(movsBU, conti, saldiIniziali, investSet);
    const monthsIn = modo === "mese" ? [MESI[meseIdx]] : MESI.slice(0, meseIdx + 1);
    const aggCat = (mappa) => {
      const out = {};
      Object.entries(mappa).forEach(([cat, perMese]) => {
        let s = 0; monthsIn.forEach(mm => s += perMese[mm] || 0);
        if (Math.abs(s) > 0.001) out[cat] = s;
      });
      return out;
    };
    const rfEntrate = aggCat(rfFull.entrate), rfUscite = aggCat(rfFull.usciteOp), rfInvest = aggCat(rfFull.investimenti);
    const rfTotEntrate = Object.values(rfEntrate).reduce((s, v) => s + v, 0);
    const rfTotUscite = Object.values(rfUscite).reduce((s, v) => s + v, 0);
    const rfTotInvest = Object.values(rfInvest).reduce((s, v) => s + v, 0);
    const rfDispIniz = modo === "mese" ? rfFull.dispIniz[MESI[meseIdx]] : rfFull.openingTot;
    const rfDispFin = rfFull.dispFin[MESI[meseIdx]];
    const rf = {
      entrate: rfEntrate, uscite: rfUscite, invest: rfInvest,
      totEntrate: rfTotEntrate, totUscite: rfTotUscite, totInvest: rfTotInvest,
      saldoOp: rfTotEntrate - rfTotUscite, dispIniz: rfDispIniz, dispFin: rfDispFin,
      variaz: Math.abs(rfDispIniz) > 0.001 ? (rfDispFin - rfDispIniz) / rfDispIniz : 0,
    };

    // ---- DASHBOARD LIQUIDITÀ (sempre progressivo + mensile) ----
    const saldoAlMese = (code, upTo) => {
      let s = saldiIniziali[code] || 0;
      movsBU.forEach(m => { if (m.apertura || idxMese(m) <= upTo) s += liqDelta(m, code); });
      return s;
    };
    const liqDash = CONTI_LIQUIDITA.map(c => {
      const iniz = saldoAlMese(c.codice, -1);
      const prec = saldoAlMese(c.codice, meseIdx - 1);
      const fine = saldoAlMese(c.codice, meseIdx);
      return { codice: c.codice, nome: c.nome, iniz, prec, fine, varMese: fine - prec, varProg: fine - iniz };
    }).filter(x => Math.abs(x.iniz) > 0.001 || Math.abs(x.fine) > 0.001 || Math.abs(x.varMese) > 0.001);
    const liqTot = liqDash.reduce((a, x) => ({
      iniz: a.iniz + x.iniz, prec: a.prec + x.prec, fine: a.fine + x.fine, varMese: a.varMese + x.varMese, varProg: a.varProg + x.varProg,
    }), { iniz: 0, prec: 0, fine: 0, varMese: 0, varProg: 0 });

    return {
      mastrini, totD, totA, ceRicavi, ceCosti, totRicavi, totCosti, utile,
      attivo, passivo, totAttivo, totPassivo, liquidita, rf, liqDash, liqTot,
      scritture: scr, movsBU, monthsIn,
    };
  }, [mese, modo, buFilter, movimenti, saldiIniziali, contiMap, conti, investSet]);

  const contesto = `${meseCap(mese)} ${stagione} · ${modoLabel} · ${buLabel}`;
  const quadra = Math.abs(dati.totD - dati.totA) < 0.01;

  // ---- Dettaglio voce (pop-up con i movimenti che compongono il saldo) ----
  const [dettaglio, setDettaglio] = useState(null);
  const investCat = (cat) => (investSet && investSet.size > 0) ? investSet.has(cat) : String(cat || "").toUpperCase() === "INVESTIMENTI";

  const apriConto = (cod, titolo, verso) => {
    // verso: 'ricavo' -> valore = avere-dare ; altrimenti dare-avere
    const righe = [];
    (dati.scritture || []).forEach(s => (s.righe || []).forEach(r => {
      if (r.codice !== cod) return;
      if (Math.abs(r.dare) < 0.005 && Math.abs(r.avere) < 0.005) return;
      const contro = (s.righe || []).filter(x => x.codice !== cod).map(x => contiMap[x.codice]?.nome?.trim() || x.codice).join(", ");
      righe.push({ data: s.data, descrizione: s.descrizione || s.categoria || "", bu: s.bu || "", dare: r.dare || 0, avere: r.avere || 0, contro });
    }));
    righe.sort((a, b) => (a.data || "").localeCompare(b.data || ""));
    const tot = righe.reduce((s, r) => s + (verso === "ricavo" ? (r.avere - r.dare) : (r.dare - r.avere)), 0);
    setDettaglio({ kind: "conto", titolo, verso, righe, tot });
  };

  const apriRF = (cat, bucket, titolo) => {
    const isEnt = bucket === "entrate";
    const righe = (dati.movsBU || []).filter(m =>
      !m.nonMonetario &&
      (m.categoria || "(senza categoria)") === cat &&
      (dati.monthsIn || []).includes(m.mese || meseDaData(m.data)) &&
      (isEnt ? m.tipo === "entrata" : (m.tipo === "uscita" && (bucket === "invest" ? investCat(m.categoria) : !investCat(m.categoria))))
    ).map(m => ({
      data: m.data, descrizione: m.descrizione || "", bu: m.bu || "",
      liq: contiMap[m.contoLiquidita]?.nome?.trim() || "—", importo: m.importo || 0,
      contro: contiMap[m.contoPdC]?.nome?.trim() || "",
    })).sort((a, b) => (a.data || "").localeCompare(b.data || ""));
    const tot = righe.reduce((s, r) => s + r.importo, 0);
    setDettaglio({ kind: "rf", titolo, righe, tot });
  };

  // ===================== EXPORT: builders di righe (aoa) =====================
  const ceAoa = () => {
    const a = [["CONTO ECONOMICO"], [contesto], [], ["", "Codice", "Voce", "Importo"], ["RICAVI"]];
    dati.ceRicavi.forEach(m => a.push(["", m.codice, m.nome.trim(), r2imp(m.val)]));
    a.push(["", "", "TOTALE RICAVI", r2imp(dati.totRicavi)], [], ["COSTI"]);
    dati.ceCosti.forEach(m => a.push(["", m.codice, m.nome.trim(), r2imp(m.val)]));
    a.push(["", "", "TOTALE COSTI", r2imp(dati.totCosti)], []);
    a.push(["", "", dati.utile >= 0 ? "UTILE D'ESERCIZIO" : "PERDITA D'ESERCIZIO", r2imp(dati.utile)]);
    return a;
  };
  const spAoa = () => {
    const a = [["STATO PATRIMONIALE"], [contesto], [], ["ATTIVO", "", "PASSIVO E NETTO", ""]];
    const nA = dati.attivo.length, nP = dati.passivo.length + 1; // +1 per risultato d'esercizio
    const rows = Math.max(nA, nP);
    const passRows = dati.passivo.map(m => [m.nome.trim(), r2imp(m.val)]);
    passRows.push([dati.utile >= 0 ? "Risultato d'esercizio (utile)" : "Risultato d'esercizio (perdita)", r2imp(dati.utile)]);
    for (let i = 0; i < rows; i++) {
      const A = dati.attivo[i] ? [dati.attivo[i].nome.trim(), r2imp(dati.attivo[i].val)] : ["", ""];
      const P = passRows[i] || ["", ""];
      a.push([A[0], A[1], P[0], P[1]]);
    }
    a.push(["TOTALE ATTIVO", r2imp(dati.totAttivo), "TOTALE PASSIVO E NETTO", r2imp(dati.totPassivo + dati.utile)]);
    return a;
  };
  const rfAoa = () => {
    const a = [["RENDICONTO FINANZIARIO"], [contesto], [], ["Voce", "Importo"]];
    a.push(["DISPONIBILITÀ INIZIALI", r2imp(dati.rf.dispIniz)], [], ["ENTRATE OPERATIVE"]);
    Object.keys(dati.rf.entrate).sort().forEach(c => a.push([c, r2imp(dati.rf.entrate[c])]));
    a.push(["Totale entrate operative (A)", r2imp(dati.rf.totEntrate)], [], ["USCITE OPERATIVE"]);
    Object.keys(dati.rf.uscite).sort().forEach(c => a.push([c, r2imp(dati.rf.uscite[c])]));
    a.push(["Totale uscite operative (B)", r2imp(dati.rf.totUscite)]);
    a.push(["Saldo operativo (A - B)", r2imp(dati.rf.saldoOp)], [], ["INVESTIMENTI"]);
    Object.keys(dati.rf.invest).sort().forEach(c => a.push([c, r2imp(dati.rf.invest[c])]));
    a.push(["Totale investimenti", r2imp(dati.rf.totInvest)], []);
    a.push(["DISPONIBILITÀ FINALI", r2imp(dati.rf.dispFin)]);
    a.push(["Variazione %", Math.round(dati.rf.variaz * 1000) / 10 + "%"]);
    return a;
  };
  const liqAoa = () => {
    const a = [["LIQUIDITÀ — STATO E VARIAZIONI"], [contesto], [], ["Conto", "Saldo iniziale", "Fine mese prec.", "Fine mese", "Var. mese", "Var. da inizio"]];
    dati.liqDash.forEach(x => a.push([x.nome.trim(), r2imp(x.iniz), r2imp(x.prec), r2imp(x.fine), r2imp(x.varMese), r2imp(x.varProg)]));
    a.push(["TOTALE", r2imp(dati.liqTot.iniz), r2imp(dati.liqTot.prec), r2imp(dati.liqTot.fine), r2imp(dati.liqTot.varMese), r2imp(dati.liqTot.varProg)]);
    return a;
  };
  const contiAoa = () => {
    const a = [["DETTAGLIO CONTI (bilancio di verifica)"], [contesto], [], ["Codice", "Conto", "Categoria", "Prospetto", "Dare", "Avere", "Saldo", "D/A"]];
    dati.mastrini.forEach(m => a.push([m.codice, m.nome.trim(), m.categoria, m.prospetto, r2imp(m.dare), r2imp(m.avere), r2imp(Math.abs(m.saldo)), m.saldo < 0 ? "A" : m.saldo > 0 ? "D" : ""]));
    a.push(["", "TOTALI", "", "", r2imp(dati.totD), r2imp(dati.totA), quadra ? 0 : r2imp(dati.totD - dati.totA), quadra ? "OK" : "SBIL."]);
    return a;
  };

  const saveWb = (sheets, fname) => {
    const wb = XLSX.utils.book_new();
    sheets.forEach(([name, aoa, cols]) => {
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      if (cols) ws["!cols"] = cols.map(w => ({ wch: w }));
      XLSX.utils.book_append_sheet(wb, ws, name);
    });
    XLSX.writeFile(wb, fname);
  };
  const fn = (what) => `Chiusura_${what}_${safe(mese)}_${modo}_${safe(buLabel)}_${stagione}`;

  function exportExcel(kind){
    if (typeof XLSX === "undefined"){ onToast("Libreria Excel non caricata"); return; }
    setBusy(true);
    try{
      if (kind === "ce") saveWb([["Conto Economico", ceAoa(), [4, 8, 40, 14]]], fn("CE") + ".xlsx");
      else if (kind === "sp") saveWb([["Stato Patrimoniale", spAoa(), [34, 14, 34, 14]]], fn("SP") + ".xlsx");
      else if (kind === "rf") saveWb([["Rendiconto", rfAoa(), [40, 16]]], fn("RF") + ".xlsx");
      else saveWb([
        ["Liquidità", liqAoa(), [26, 14, 14, 14, 14, 14]],
        ["Conto Economico", ceAoa(), [4, 8, 40, 14]],
        ["Stato Patrimoniale", spAoa(), [34, 14, 34, 14]],
        ["Rendiconto", rfAoa(), [40, 16]],
        ["Dettaglio Conti", contiAoa(), [8, 34, 18, 10, 12, 12, 12, 6]],
      ], fn("completa") + ".xlsx");
      onToast("Esportazione Excel completata");
    } catch(e){ onToast("Errore Excel: " + e.message); }
    finally { setBusy(false); }
  }

  // ---- PDF helpers ----
  const pdfHead = (doc, titolo) => {
    const W = doc.internal.pageSize.width;
    doc.setFont("helvetica", "bold"); doc.setFontSize(15);
    doc.text("FUTSAL FABBRICO ASD", W/2, 16, { align: "center" });
    doc.setFontSize(11); doc.setFont("helvetica", "normal");
    doc.text(titolo, W/2, 23, { align: "center" });
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text(contesto, W/2, 29, { align: "center" });
    doc.setTextColor(0);
    return 34;
  };
  const pdfCE = (doc, y) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.text("CONTO ECONOMICO", 14, y);
    doc.autoTable({ startY: y + 2,
      head: [["Cod.","Ricavi","Importo"]],
      body: [...dati.ceRicavi.map(m => [String(m.codice).padStart(2,"0"), m.nome.trim(), m.val.toFixed(2)]),
        [{ content:"Totale Ricavi", colSpan:2, styles:{fontStyle:"bold"} }, { content: dati.totRicavi.toFixed(2), styles:{fontStyle:"bold", fillColor:[230,240,232]} }]],
      styles:{ fontSize:8.5, cellPadding:1.6 }, headStyles:{ fillColor:[45,94,62], textColor:240 },
      columnStyles:{ 0:{cellWidth:14, halign:"center"}, 2:{cellWidth:32, halign:"right"} } });
    let y2 = doc.lastAutoTable.finalY + 6;
    doc.autoTable({ startY: y2,
      head: [["Cod.","Costi","Importo"]],
      body: [...dati.ceCosti.map(m => [String(m.codice).padStart(2,"0"), m.nome.trim(), m.val.toFixed(2)]),
        [{ content:"Totale Costi", colSpan:2, styles:{fontStyle:"bold"} }, { content: dati.totCosti.toFixed(2), styles:{fontStyle:"bold", fillColor:[251,236,236]} }]],
      styles:{ fontSize:8.5, cellPadding:1.6 }, headStyles:{ fillColor:[181,67,67], textColor:240 },
      columnStyles:{ 0:{cellWidth:14, halign:"center"}, 2:{cellWidth:32, halign:"right"} } });
    let y3 = doc.lastAutoTable.finalY + 8; const W = doc.internal.pageSize.width;
    doc.setFillColor(26,26,26); doc.rect(14, y3 - 5, W - 28, 9, "F");
    doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text(dati.utile >= 0 ? "UTILE D'ESERCIZIO" : "PERDITA D'ESERCIZIO", 16, y3 + 1);
    doc.text(fmtEuro(dati.utile), W - 16, y3 + 1, { align: "right" });
    doc.setTextColor(0);
    return y3 + 10;
  };
  const pdfSP = (doc, y) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.text("STATO PATRIMONIALE", 14, y);
    const passBody = dati.passivo.map(m => [m.nome.trim(), m.val.toFixed(2)]);
    passBody.push([dati.utile >= 0 ? "Risultato d'esercizio (utile)" : "Risultato d'esercizio (perdita)", dati.utile.toFixed(2)]);
    doc.autoTable({ startY: y + 2, head: [["ATTIVO","Importo"]],
      body: [...dati.attivo.map(m => [m.nome.trim(), m.val.toFixed(2)]), [{content:"TOTALE ATTIVO", styles:{fontStyle:"bold"}}, {content: dati.totAttivo.toFixed(2), styles:{fontStyle:"bold"}}]],
      styles:{ fontSize:8.5, cellPadding:1.6 }, headStyles:{ fillColor:[26,26,26], textColor:240 },
      columnStyles:{ 1:{halign:"right"} }, tableWidth: (doc.internal.pageSize.width - 28) / 2 - 3, margin:{ left:14 } });
    const yTop = y + 2;
    doc.autoTable({ startY: yTop, head: [["PASSIVO E NETTO","Importo"]],
      body: [...passBody, [{content:"TOTALE PASSIVO E NETTO", styles:{fontStyle:"bold"}}, {content:(dati.totPassivo + dati.utile).toFixed(2), styles:{fontStyle:"bold"}}]],
      styles:{ fontSize:8.5, cellPadding:1.6 }, headStyles:{ fillColor:[26,26,26], textColor:240 },
      columnStyles:{ 1:{halign:"right"} }, tableWidth: (doc.internal.pageSize.width - 28) / 2 - 3, margin:{ left: doc.internal.pageSize.width/2 + 3 } });
    return doc.lastAutoTable.finalY + 8;
  };
  const pdfRF = (doc, y) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.text("RENDICONTO FINANZIARIO", 14, y);
    const body = [];
    body.push([{ content:"Disponibilità iniziali", styles:{fontStyle:"bold"} }, { content: dati.rf.dispIniz.toFixed(2), styles:{fontStyle:"bold", halign:"right"} }]);
    body.push([{ content:"ENTRATE OPERATIVE", colSpan:2, styles:{fontStyle:"bold", fillColor:[236,240,236]} }]);
    Object.keys(dati.rf.entrate).sort().forEach(c => body.push([c, { content: dati.rf.entrate[c].toFixed(2), styles:{halign:"right"} }]));
    body.push([{content:"Totale entrate (A)", styles:{fontStyle:"bold"}}, {content: dati.rf.totEntrate.toFixed(2), styles:{fontStyle:"bold", halign:"right"}}]);
    body.push([{ content:"USCITE OPERATIVE", colSpan:2, styles:{fontStyle:"bold", fillColor:[248,236,236]} }]);
    Object.keys(dati.rf.uscite).sort().forEach(c => body.push([c, { content: dati.rf.uscite[c].toFixed(2), styles:{halign:"right"} }]));
    body.push([{content:"Totale uscite (B)", styles:{fontStyle:"bold"}}, {content: dati.rf.totUscite.toFixed(2), styles:{fontStyle:"bold", halign:"right"}}]);
    body.push([{content:"Saldo operativo (A - B)", styles:{fontStyle:"bold"}}, {content: dati.rf.saldoOp.toFixed(2), styles:{fontStyle:"bold", halign:"right"}}]);
    if (Object.keys(dati.rf.invest).length){
      body.push([{ content:"INVESTIMENTI", colSpan:2, styles:{fontStyle:"bold", fillColor:[240,238,230]} }]);
      Object.keys(dati.rf.invest).sort().forEach(c => body.push([c, { content: dati.rf.invest[c].toFixed(2), styles:{halign:"right"} }]));
      body.push([{content:"Totale investimenti", styles:{fontStyle:"bold"}}, {content: dati.rf.totInvest.toFixed(2), styles:{fontStyle:"bold", halign:"right"}}]);
    }
    body.push([{content:"Disponibilità finali", styles:{fontStyle:"bold", fillColor:[26,26,26], textColor:255}}, {content: dati.rf.dispFin.toFixed(2), styles:{fontStyle:"bold", halign:"right", fillColor:[26,26,26], textColor:255}}]);
    doc.autoTable({ startY: y + 2, body, styles:{ fontSize:8.5, cellPadding:1.6 }, columnStyles:{ 1:{cellWidth:36} } });
    return doc.lastAutoTable.finalY + 8;
  };

  function exportPDF(kind){
    if (!window.jspdf){ onToast("Libreria PDF non caricata"); return; }
    setBusy(true);
    try{
      const { jsPDF } = window.jspdf;
      if (kind === "ce"){ const doc = new jsPDF(); pdfCE(doc, pdfHead(doc, "Conto Economico")); doc.save(fn("CE") + ".pdf"); }
      else if (kind === "sp"){ const doc = new jsPDF(); pdfSP(doc, pdfHead(doc, "Stato Patrimoniale")); doc.save(fn("SP") + ".pdf"); }
      else if (kind === "rf"){ const doc = new jsPDF(); pdfRF(doc, pdfHead(doc, "Rendiconto Finanziario")); doc.save(fn("RF") + ".pdf"); }
      else {
        const doc = new jsPDF();
        let y = pdfHead(doc, "Chiusura mensile — CE · SP · RF");
        y = pdfCE(doc, y);
        if (y > 210){ doc.addPage(); y = 18; }
        y = pdfSP(doc, y);
        doc.addPage(); pdfRF(doc, 18);
        doc.save(fn("completa") + ".pdf");
      }
      onToast("Esportazione PDF completata");
    } catch(e){ onToast("Errore PDF: " + e.message); }
    finally { setBusy(false); }
  }

  const signCol = (v) => v > 0.001 ? "pos" : v < -0.001 ? "neg" : "";
  const signStr = (v) => (v > 0 ? "+" : v < 0 ? "−" : "") + fmt(Math.abs(v));

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Chiusura mensile</h2>
          <div className="sub">Liquidità, Conto Economico, Stato Patrimoniale e Rendiconto · {contesto}</div>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button className="btn ghost" disabled={busy} onClick={() => exportExcel("all")}>↧ Excel (tutto)</button>
          <button className="btn accent" disabled={busy} onClick={() => exportPDF("all")}>↧ PDF (tutto)</button>
        </div>
      </div>

      {/* Controlli */}
      <div className="card" style={{ marginBottom:16, display:"flex", gap:18, flexWrap:"wrap", alignItems:"flex-end" }}>
        <div>
          <label style={{ display:"block", fontSize:11, textTransform:"uppercase", letterSpacing:".04em", color:"var(--ink-3)", marginBottom:5 }}>Mese di chiusura</label>
          <select value={mese} onChange={e => setMese(e.target.value)}>
            {MESI.map(m => <option key={m} value={m}>{meseCap(m)}{mesiConDati.has(m) ? "" : " · (nessun dato)"}</option>)}
          </select>
        </div>
        <div>
          <label style={{ display:"block", fontSize:11, textTransform:"uppercase", letterSpacing:".04em", color:"var(--ink-3)", marginBottom:5 }}>Modalità (CE / SP / RF)</label>
          <div className="tipo-switch">
            <button type="button" className={modo === "progressivo" ? "active entrata" : ""} onClick={() => setModo("progressivo")}>Progressivo</button>
            <button type="button" className={modo === "mese" ? "active entrata" : ""} onClick={() => setModo("mese")}>Solo mese</button>
          </div>
        </div>
        <div>
          <label style={{ display:"block", fontSize:11, textTransform:"uppercase", letterSpacing:".04em", color:"var(--ink-3)", marginBottom:5 }}>Business Unit</label>
          <select value={buFilter} onChange={e => setBuFilter(e.target.value)}>
            <option value="ALL">Tutte le BU</option>
            {buOptions.map(b => <option key={b} value={b}>{b}</option>)}
          </select>
        </div>
      </div>

      {/* DASHBOARD LIQUIDITÀ */}
      <h3 className="serif" style={{ fontWeight:500, fontSize:18, margin:"4px 0 12px" }}>Stato liquidità — {meseCap(mese)}</h3>
      <div className="kpi-grid" style={{ marginBottom:10 }}>
        <div className="kpi accent">
          <div className="label">Liquidità totale a fine mese</div>
          <div className="value">{fmtEuro(dati.liqTot.fine)}</div>
          <div className="hint">{dati.liqDash.length} conti</div>
        </div>
        <div className="kpi">
          <div className="label">Variazione nel mese</div>
          <div className={"value" + (dati.liqTot.varMese < 0 ? " neg" : "")}>{signStr(dati.liqTot.varMese)}</div>
          <div className="hint">rispetto a fine {MESI[(MESI.indexOf(mese)+11)%12]}</div>
        </div>
        <div className="kpi">
          <div className="label">Variazione da inizio</div>
          <div className={"value" + (dati.liqTot.varProg < 0 ? " neg" : "")}>{signStr(dati.liqTot.varProg)}</div>
          <div className="hint">rispetto ai saldi iniziali</div>
        </div>
        <div className="kpi">
          <div className="label">Liquidità iniziale</div>
          <div className="value">{fmtEuro(dati.liqTot.iniz)}</div>
          <div className="hint">inizio stagione</div>
        </div>
      </div>
      <div className="tbl-wrap" style={{ marginBottom:8 }}>
        <table className="tbl">
          <thead><tr>
            <th>Conto liquidità</th>
            <th className="num">Saldo iniziale</th>
            <th className="num">Fine mese prec.</th>
            <th className="num">Fine mese</th>
            <th className="num">Var. mese</th>
            <th className="num">Var. da inizio</th>
          </tr></thead>
          <tbody>
            {dati.liqDash.map(x => (
              <tr key={x.codice}>
                <td>{x.nome.trim()}</td>
                <td className="num">{fmt(x.iniz)}</td>
                <td className="num">{fmt(x.prec)}</td>
                <td className="num" style={{ fontWeight:600 }}>{fmt(x.fine)}</td>
                <td className={"num " + signCol(x.varMese)}>{signStr(x.varMese)}</td>
                <td className={"num " + signCol(x.varProg)}>{signStr(x.varProg)}</td>
              </tr>
            ))}
            <tr style={{ borderTop:"2px solid var(--ink)", fontWeight:600, background:"var(--panel-2)" }}>
              <td>TOTALE</td>
              <td className="num">{fmt(dati.liqTot.iniz)}</td>
              <td className="num">{fmt(dati.liqTot.prec)}</td>
              <td className="num">{fmt(dati.liqTot.fine)}</td>
              <td className={"num " + signCol(dati.liqTot.varMese)}>{signStr(dati.liqTot.varMese)}</td>
              <td className={"num " + signCol(dati.liqTot.varProg)}>{signStr(dati.liqTot.varProg)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      {/* CONTO ECONOMICO */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"26px 0 12px", flexWrap:"wrap", gap:8 }}>
        <h3 className="serif" style={{ fontWeight:500, fontSize:18, margin:0 }}>Conto Economico <span style={{ fontSize:13, color:"var(--ink-3)", fontFamily:"inherit" }}>({modoLabel})</span></h3>
        <div style={{ display:"flex", gap:6 }}>
          <button className="btn ghost" style={{ padding:"5px 10px", fontSize:12 }} disabled={busy} onClick={() => exportExcel("ce")}>↧ Excel</button>
          <button className="btn ghost" style={{ padding:"5px 10px", fontSize:12 }} disabled={busy} onClick={() => exportPDF("ce")}>↧ PDF</button>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18 }}>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Ricavi</th><th className="num">Importo</th></tr></thead>
            <tbody>
              {dati.ceRicavi.map(m => <tr key={m.codice} style={{ cursor:"pointer" }} title="Vedi i movimenti" onClick={() => apriConto(m.codice, `${String(m.codice).padStart(2,"0")} ${m.nome.trim()}`, "ricavo")}><td><span style={{ fontSize:11, color:"var(--ink-3)" }}>{String(m.codice).padStart(2,"0")}</span> {m.nome.trim()}</td><td className="num">{fmt(m.val)}</td></tr>)}
              <tr style={{ fontWeight:700, background:"var(--accent-soft)" }}><td>Totale Ricavi</td><td className="num">{fmt(dati.totRicavi)}</td></tr>
            </tbody>
          </table>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Costi</th><th className="num">Importo</th></tr></thead>
            <tbody>
              {dati.ceCosti.map(m => <tr key={m.codice} style={{ cursor:"pointer" }} title="Vedi i movimenti" onClick={() => apriConto(m.codice, `${String(m.codice).padStart(2,"0")} ${m.nome.trim()}`, "costo")}><td><span style={{ fontSize:11, color:"var(--ink-3)" }}>{String(m.codice).padStart(2,"0")}</span> {m.nome.trim()}</td><td className="num">{fmt(m.val)}</td></tr>)}

// ============================================================
// PAGINA: CREDITI
// Registro dei crediti v/clienti con scadenze e stato d'incasso.
// - Si aggancia ai conti di categoria CREDITI del Piano dei Conti (43, 74, ...)
// - Permette di inserire crediti a mano e di generare la scrittura quando si vuole:
//     RILEVAZIONE: DARE credito / AVERE ricavo   (scrittura composta, non monetaria)
//     INCASSO:     DARE liquidità / AVERE credito (movimento entrata)
//   Se il credito non è mai stato rilevato, l'incasso va direttamente al conto ricavo.
// - Riconcilia il registro con il saldo contabile del conto crediti.
// ============================================================
const giorniA = (iso) => {
  if (!iso) return null;
  const oggi = new Date(todayISO() + "T00:00:00");
  const d = new Date(iso + "T00:00:00");
  return Math.round((d - oggi) / 86400000);
};

function PageCrediti({ conti, movimenti, saldiIniziali, stagione, bu, onToast }) {
  const [crediti, setCrediti] = useState([]);
  const [editing, setEditing] = useState(null);
  const [incassando, setIncassando] = useState(null);
  const [filtro, setFiltro] = useState("aperti"); // aperti | tutti | riscossi | scaduti

  const contiMap = useMemo(() => {
    const m = {};
    (conti || []).forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const contiCredito = useMemo(() => (conti || []).filter(c => c.categoria === "CREDITI"), [conti]);
  const contiRicavo = useMemo(() => (conti || []).filter(c => c.categoria === "RICAVI" || c.categoria === "COSTI/RICAVI"), [conti]);
  const buList = useMemo(() => (bu && bu.length ? bu : BUSINESS_UNITS_DEFAULT), [bu]);

  // --- Firebase: registro crediti ---
  useEffect(() => {
    if (!firebaseReady || !stagione) return;
    const ref = db.ref(`stagioni/${stagione}/crediti`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setCrediti(v ? Object.entries(v).map(([k, c]) => ({ ...c, _key: k })) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  // --- Contabilità: saldo e movimenti dei conti CREDITI ---
  const contab = useMemo(() => {
    const codici = new Set(contiCredito.map(c => c.codice));
    if (!codici.size) return { saldo: 0, righe: [], perConto: [] };
    const scritture = generaLibroGiornale(movimenti, saldiIniziali || {}, contiMap);
    const acc = {};
    const righe = [];
    scritture.forEach(s => {
      (s.righe || []).forEach(r => {
        if (!codici.has(r.codice)) return;
        if (!acc[r.codice]) acc[r.codice] = { codice: r.codice, dare: 0, avere: 0 };
        acc[r.codice].dare += r.dare || 0;
        acc[r.codice].avere += r.avere || 0;
        righe.push({
          data: s.data, descrizione: s.descrizione || s.categoria || "", bu: s.bu || "",
          codice: r.codice, dare: r.dare || 0, avere: r.avere || 0,
          movId: s.movId || null, scritturaId: s.scritturaId || null, apertura: !!s.apertura,
        });
      });
    });
    const perConto = Object.values(acc).map(c => ({
      ...c, nome: contiMap[c.codice]?.nome?.trim() || `Conto ${c.codice}`, saldo: c.dare - c.avere,
    })).sort((a, b) => a.codice - b.codice);
    const saldo = perConto.reduce((s, c) => s + c.saldo, 0);
    righe.sort((a, b) => (a.data || "").localeCompare(b.data || ""));
    return { saldo, righe, perConto };
  }, [movimenti, saldiIniziali, contiMap, contiCredito]);

  // Crediti già presenti in contabilità (righe in DARE) ma non ancora classificati nel registro.
  // Non tocchiamo la scrittura: la agganciamo soltanto tramite movId / scritturaId.
  const daClassificare = useMemo(() => {
    const linkedMov = new Set(crediti.map(c => c.movRilevazioneId).filter(Boolean));
    const linkedScr = new Set(crediti.map(c => c.scritturaId).filter(Boolean));
    return contab.righe
      .filter(r => (r.dare || 0) > 0.005)
      .filter(r => !(r.movId && linkedMov.has(r.movId)) && !(r.scritturaId && linkedScr.has(r.scritturaId)))
      .map(r => ({ ...r, _rk: r.movId || `${r.scritturaId}_${r.codice}` }));
  }, [contab.righe, crediti]);

  // --- Derivati registro ---
  const arricchiti = useMemo(() => crediti.map(c => {
    const gg = c.stato === "riscosso" ? null : giorniA(c.scadenza);
    let stadio = "ok";
    if (c.stato === "riscosso") stadio = "riscosso";
    else if (gg == null) stadio = "senza-scadenza";
    else if (gg < 0) stadio = "scaduto";
    else if (gg <= 30) stadio = "in-scadenza";
    return { ...c, gg, stadio };
  }).sort((a, b) => {
    if (a.stato !== b.stato) return a.stato === "riscosso" ? 1 : -1;
    return (a.scadenza || "9999").localeCompare(b.scadenza || "9999");
  }), [crediti]);

  const kpi = useMemo(() => {
    const aperti = arricchiti.filter(c => c.stato !== "riscosso");
    const tot = aperti.reduce((s, c) => s + (c.importo || 0), 0);
    const scaduti = aperti.filter(c => c.stadio === "scaduto");
    const inScad = aperti.filter(c => c.stadio === "in-scadenza");
    const riscossi = arricchiti.filter(c => c.stato === "riscosso").reduce((s, c) => s + (c.importo || 0), 0);
    // solo i crediti RILEVATI in contabilità impattano il conto 43
    const apertiRilevati = aperti.filter(c => c.rilevato).reduce((s, c) => s + (c.importo || 0), 0);
    const apertiNonRilevati = tot - apertiRilevati;
    return {
      tot, nAperti: aperti.length,
      scaduti: scaduti.reduce((s, c) => s + (c.importo || 0), 0), nScaduti: scaduti.length,
      inScad: inScad.reduce((s, c) => s + (c.importo || 0), 0), nInScad: inScad.length,
      riscossi, apertiRilevati, apertiNonRilevati,
      diff: contab.saldo - apertiRilevati,
    };
  }, [arricchiti, contab.saldo]);

  const visibili = useMemo(() => {
    if (filtro === "tutti") return arricchiti;
    if (filtro === "riscossi") return arricchiti.filter(c => c.stato === "riscosso");
    if (filtro === "scaduti") return arricchiti.filter(c => c.stadio === "scaduto");
    return arricchiti.filter(c => c.stato !== "riscosso");
  }, [arricchiti, filtro]);

  // --- Azioni ---
  const salva = async (data, key) => {
    try {
      const payload = {
        cliente: (data.cliente || "").trim(),
        descrizione: (data.descrizione || "").trim(),
        importo: Math.round((Number(data.importo) || 0) * 100) / 100,
        dataEmissione: data.dataEmissione || todayISO(),
        scadenza: data.scadenza || null,
        bu: data.bu || "GENERAL",
        contoCredito: Number(data.contoCredito) || 43,
        contoRicavo: Number(data.contoRicavo) || null,
        note: (data.note || "").trim() || null,
        stato: data.stato || "aperto",
        rilevato: data.rilevato || false,
        origine: data.origine || "manuale",
        movRilevazioneId: data.movRilevazioneId || null,
        scritturaId: data.scritturaId || null,
        movIncassoId: data.movIncassoId || null,
        dataIncasso: data.dataIncasso || null,
        contoLiquiditaIncasso: data.contoLiquiditaIncasso || null,
        creatoIl: data.creatoIl || new Date().toISOString(),
        modificatoIl: new Date().toISOString(),
      };
      if (key) await db.ref(`stagioni/${stagione}/crediti/${key}`).update(payload);
      else await db.ref(`stagioni/${stagione}/crediti`).push().set(payload);
      onToast(key ? "Credito aggiornato" : "Credito aggiunto");
      setEditing(null);
    } catch (e) { onToast("Errore: " + e.message); }
  };

  // Rilevazione: DARE credito / AVERE ricavo (scrittura composta non monetaria)
  const rileva = async (c) => {
    if (!c.contoRicavo) { onToast("Imposta prima il conto di ricavo"); setEditing(c); return; }
    const nomeCred = contiMap[c.contoCredito]?.nome?.trim() || c.contoCredito;
    const nomeRic = contiMap[c.contoRicavo]?.nome?.trim() || c.contoRicavo;
    if (!confirm(`Rilevare il credito in contabilità?\n\nDARE  ${nomeCred}  ${fmtEuro(c.importo)}\nAVERE ${nomeRic}  ${fmtEuro(c.importo)}\n\nData: ${fmtDate(c.dataEmissione)}`)) return;
    try {
      const scritturaId = "scr_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
      const now = new Date().toISOString();
      const comune = {
        data: c.dataEmissione, contoLiquidita: null, contoLiquiditaDest: null,
        categoria: "CREDITI", bu: c.bu || "GENERAL",
        descrizione: `Credito ${c.cliente}${c.descrizione ? " · " + c.descrizione : ""}`,
        mese: meseDaData(c.dataEmissione), nonMonetario: true,
        scritturaComposta: true, scritturaId, importo: c.importo,
        creatoIl: now, modificatoIl: now,
      };
      const updates = {};
      const k1 = db.ref(`stagioni/${stagione}/movimenti`).push().key;
      updates[k1] = { ...comune, tipo: "uscita", contoPdC: Number(c.contoCredito), dare: c.importo, avere: 0 };
      const k2 = db.ref(`stagioni/${stagione}/movimenti`).push().key;
      updates[k2] = { ...comune, tipo: "entrata", contoPdC: Number(c.contoRicavo), dare: 0, avere: c.importo };
      await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
      await db.ref(`stagioni/${stagione}/crediti/${c._key}`).update({ rilevato: true, scritturaId, modificatoIl: now });
      onToast("Credito rilevato in contabilità");
    } catch (e) { onToast("Errore: " + e.message); }
  };

  // Incasso: DARE liquidità / AVERE credito (o ricavo se mai rilevato)
  const incassa = async (c, dataIncasso, contoLiq) => {
    const contropartita = c.rilevato ? Number(c.contoCredito) : Number(c.contoRicavo);
    if (!contropartita) { onToast("Manca il conto di contropartita"); return; }
    try {
      const now = new Date().toISOString();
      const mov = {
        tipo: "entrata", data: dataIncasso, contoLiquidita: Number(contoLiq), contoLiquiditaDest: null,
        contoPdC: contropartita, categoria: c.rilevato ? "INCASSO CREDITI" : "CREDITI",
        bu: c.bu || "GENERAL", importo: c.importo,
        descrizione: `Incasso credito ${c.cliente}${c.descrizione ? " · " + c.descrizione : ""}`,
        mese: meseDaData(dataIncasso), nonMonetario: false, creatoIl: now, modificatoIl: now,
      };
      const ref = db.ref(`stagioni/${stagione}/movimenti`).push();
      await ref.set(mov);
      await db.ref(`stagioni/${stagione}/crediti/${c._key}`).update({
        stato: "riscosso", dataIncasso, contoLiquiditaIncasso: Number(contoLiq),
        movIncassoId: ref.key, modificatoIl: now,
      });
      onToast("Incasso registrato");
      setIncassando(null);
    } catch (e) { onToast("Errore: " + e.message); }
  };

  const annullaIncasso = async (c) => {
    if (!confirm(`Annullare l'incasso di "${c.cliente}"?\n\nIl movimento di incasso verrà eliminato e il credito tornerà aperto.`)) return;
    try {
      if (c.movIncassoId) await db.ref(`stagioni/${stagione}/movimenti/${c.movIncassoId}`).remove();
      await db.ref(`stagioni/${stagione}/crediti/${c._key}`).update({
        stato: "aperto", dataIncasso: null, contoLiquiditaIncasso: null, movIncassoId: null, modificatoIl: new Date().toISOString(),
      });
      onToast("Incasso annullato");
    } catch (e) { onToast("Errore: " + e.message); }
  };

  const elimina = async (c) => {
    const avvisi = [];
    if (c.rilevato) avvisi.push("• la scrittura di rilevazione resterà in contabilità");
    if (c.movIncassoId) avvisi.push("• il movimento di incasso resterà in contabilità");
    if (!confirm(`Eliminare il credito "${c.cliente}" dal registro?${avvisi.length ? "\n\n" + avvisi.join("\n") : ""}`)) return;
    await db.ref(`stagioni/${stagione}/crediti/${c._key}`).remove();
    onToast("Credito eliminato dal registro");
  };

  function exportExcel() {
    if (typeof XLSX === "undefined") { onToast("Libreria Excel non caricata"); return; }
    const aoa = [
      ["FUTSAL FABBRICO ASD — Registro Crediti", "", "", "", "", "", "", ""],
      [`Stagione ${stagione}`, `Generato il ${new Date().toLocaleString("it-IT")}`],
      [],
      ["Cliente", "Descrizione", "Emissione", "Scadenza", "Importo", "Stato", "Rilevato", "BU", "Data incasso"],
    ];
    arricchiti.forEach(c => aoa.push([
      c.cliente, c.descrizione || "", c.dataEmissione || "", c.scadenza || "",
      c.importo || 0, c.stato === "riscosso" ? "Riscosso" : (c.stadio === "scaduto" ? "Scaduto" : "Aperto"),
      c.rilevato ? "Sì" : "No", c.bu || "", c.dataIncasso || "",
    ]));
    aoa.push([]);
    aoa.push(["Totale crediti aperti", "", "", "", kpi.tot]);
    aoa.push(["di cui scaduti", "", "", "", kpi.scaduti]);
    aoa.push(["Saldo contabile conti CREDITI", "", "", "", contab.saldo]);
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"] = [{ wch: 26 }, { wch: 34 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 11 }, { wch: 9 }, { wch: 14 }, { wch: 12 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Crediti");
    XLSX.writeFile(wb, `Crediti_${stagione}.xlsx`);
    onToast("Registro crediti esportato");
  }

  const badge = (c) => {
    if (c.stato === "riscosso") return <span className="pill" style={{ background: "var(--accent-soft)", borderColor: "#c8d8ce", color: "var(--accent-ink)" }}>riscosso</span>;
    if (c.stadio === "scaduto") return <span className="pill" style={{ background: "#fbecec", borderColor: "#e2b8b8", color: "var(--danger)" }}>scaduto {Math.abs(c.gg)}g</span>;
    if (c.stadio === "in-scadenza") return <span className="pill" style={{ background: "#fdf5e6", borderColor: "#e6d5a8", color: "#7a5a1d" }}>tra {c.gg}g</span>;
    if (c.stadio === "senza-scadenza") return <span className="pill">senza scadenza</span>;
    return <span className="pill">aperto</span>;
  };

  const quadra = Math.abs(kpi.diff) < 0.01;

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Crediti</h2>
          <div className="sub">Registro crediti v/clienti · scadenze, incassi e collegamento con la contabilità</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="btn ghost" onClick={exportExcel}>↧ Excel</button>
          <button className="btn accent" onClick={() => setEditing({ nuovo: true, contoCredito: 43, dataEmissione: todayISO(), bu: "GENERAL" })}>+ Nuovo credito</button>
        </div>
      </div>

      {/* KPI */}
      <div className="kpi-grid">
        <div className="kpi accent">
          <div className="label">Crediti aperti</div>
          <div className="value">{fmtEuro(kpi.tot)}</div>
          <div className="hint">{kpi.nAperti} posizioni</div>
        </div>
        <div className="kpi">
          <div className="label">Scaduti</div>
          <div className={"value" + (kpi.scaduti > 0 ? " neg" : "")}>{fmtEuro(kpi.scaduti)}</div>
          <div className="hint">{kpi.nScaduti} posizioni</div>
        </div>
        <div className="kpi">
          <div className="label">In scadenza (30 gg)</div>
          <div className="value">{fmtEuro(kpi.inScad)}</div>
          <div className="hint">{kpi.nInScad} posizioni</div>
        </div>
        <div className="kpi">
          <div className="label">Incassati nella stagione</div>
          <div className="value">{fmtEuro(kpi.riscossi)}</div>
          <div className="hint">totale riscosso</div>
        </div>
      </div>

      {/* Riconciliazione con la contabilità */}
      <div className="card" style={{
        marginTop: 16, marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12,
        borderColor: quadra ? "#c8d8ce" : "#e6d5a8", background: quadra ? "var(--accent-soft)" : "#fdf5e6"
      }}>
        <div>
          <div style={{ fontWeight: 600 }}>Riconciliazione registro ↔ contabilità</div>
          <div style={{ fontSize: 12.5, color: "var(--ink-2)", marginTop: 3 }}>
            Saldo contabile conti CREDITI <b>{fmtEuro(contab.saldo)}</b> · registro rilevati e non incassati <b>{fmtEuro(kpi.apertiRilevati)}</b>
            {kpi.apertiNonRilevati > 0.005 && <> · non ancora rilevati <b>{fmtEuro(kpi.apertiNonRilevati)}</b></>}
          </div>
          {contab.perConto.length > 0 && (
            <div style={{ fontSize: 11.5, color: "var(--ink-3)", marginTop: 4 }}>
              {contab.perConto.map(c => `${String(c.codice).padStart(2, "0")} ${c.nome}: ${fmt(c.saldo)}`).join(" · ")}
            </div>
          )}
        </div>
        <div style={{ textAlign: "right", fontWeight: 700 }}>
          {quadra
            ? <span style={{ color: "var(--accent-ink)" }}>✓ Il registro quadra con il conto crediti</span>
            : <span style={{ color: "#7a5a1d" }}>⚠ Differenza {fmtEuro(kpi.diff)}</span>}
        </div>
      </div>

      {/* Crediti in contabilità non ancora classificati */}
      {daClassificare.length > 0 && (
        <div className="card" style={{ marginBottom: 16, background: "#fdf5e6", borderColor: "#e6d5a8" }}>
          <h3 className="card-title" style={{ color: "#7a5a1d" }}>
            Crediti in contabilità da classificare ({daClassificare.length})
          </h3>
          <p style={{ fontSize: 12.5, color: "var(--ink-2)", margin: "0 0 12px" }}>
            Queste righe risultano già a bilancio sui conti crediti. Classificarle aggiunge controparte, scadenza e note nel registro
            <b> senza modificare la scrittura contabile</b>. La scrittura di incasso la genererai dopo, quando vuoi.
          </p>
          <div className="tbl-wrap" style={{ background: "transparent" }}>
            <table className="tbl" style={{ background: "transparent" }}>
              <thead>
                <tr>
                  <th style={{ background: "transparent" }}>Data</th>
                  <th style={{ background: "transparent" }}>Conto</th>
                  <th style={{ background: "transparent" }}>Descrizione</th>
                  <th style={{ background: "transparent" }}>BU</th>
                  <th className="num" style={{ background: "transparent" }}>Importo</th>
                  <th style={{ width: 120, background: "transparent" }}></th>
                </tr>
              </thead>
              <tbody>
                {daClassificare.map(r => (
                  <tr key={r._rk}>
                    <td>{fmtDate(r.data)}</td>
                    <td className="mono" style={{ fontSize: 11.5 }}>{String(r.codice).padStart(2, "0")} {contiMap[r.codice]?.nome?.trim()}</td>
                    <td style={{ fontSize: 12.5 }}>{r.descrizione}{r.apertura && <span className="pill" style={{ marginLeft: 6, fontSize: 9.5 }}>apertura</span>}</td>
                    <td style={{ fontSize: 11.5 }}>{r.bu}</td>
                    <td className="num" style={{ fontWeight: 600 }}>{fmt(r.dare)}</td>
                    <td>
                      <button className="btn accent sm" onClick={() => setEditing({
                        nuovo: true, origine: "contabilita", rilevato: true,
                        movRilevazioneId: r.movId || null, scritturaId: r.scritturaId || null,
                        cliente: "", descrizione: r.descrizione || "",
                        importo: r.dare, dataEmissione: r.data, scadenza: "",
                        bu: r.bu || "GENERAL", contoCredito: r.codice, contoRicavo: "",
                      })}>Classifica</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Filtri */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {[["aperti", "Aperti"], ["scaduti", "Scaduti"], ["riscossi", "Riscossi"], ["tutti", "Tutti"]].map(([k, label]) => (
          <button key={k} className={"btn " + (filtro === k ? "accent" : "ghost")} style={{ padding: "5px 12px", fontSize: 12.5 }} onClick={() => setFiltro(k)}>{label}</button>
        ))}
      </div>

      {/* Tabella registro */}
      {visibili.length === 0 ? (
        <div className="empty-state">Nessun credito {filtro === "tutti" ? "" : filtro} nel registro. Usa “+ Nuovo credito” per aggiungerne uno.</div>
      ) : (
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Descrizione</th>
                <th>Emissione</th>
                <th>Scadenza</th>
                <th className="num">Importo</th>
                <th>Stato</th>
                <th>Contabilità</th>
                <th>BU</th>
                <th style={{ width: 190 }}></th>
              </tr>
            </thead>
            <tbody>
              {visibili.map(c => (
                <tr key={c._key} style={c.stadio === "scaduto" ? { background: "#fdf4f4" } : undefined}>
                  <td style={{ fontWeight: 600 }}>{c.cliente}</td>
                  <td style={{ fontSize: 12.5, color: "var(--ink-2)" }}>{c.descrizione || "—"}</td>
                  <td>{fmtDate(c.dataEmissione)}</td>
                  <td>{c.scadenza ? fmtDate(c.scadenza) : "—"}</td>
                  <td className="num" style={{ fontWeight: 600 }}>{fmt(c.importo)}</td>
                  <td>{badge(c)}</td>
                  <td style={{ fontSize: 11.5 }}>
                    {c.rilevato
                      ? <span style={{ color: "var(--accent-ink)" }}>{c.origine === "contabilita" ? "✓ da contabilità" : "✓ rilevato"}</span>
                      : <span style={{ color: "var(--ink-3)" }}>solo registro</span>}
                    {c.stato === "riscosso" && c.dataIncasso && <div style={{ color: "var(--ink-3)" }}>incasso {fmtDate(c.dataIncasso)}</div>}
                  </td>
                  <td style={{ fontSize: 11.5 }}>{c.bu}</td>
                  <td>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {c.stato !== "riscosso" && !c.rilevato &&
                        <button className="btn ghost sm" title="Crea la scrittura DARE credito / AVERE ricavo" onClick={() => rileva(c)}>Rileva</button>}
                      {c.stato !== "riscosso" &&
                        <button className="btn accent sm" onClick={() => setIncassando(c)}>Incassa</button>}
                      {c.stato === "riscosso" &&
                        <button className="btn ghost sm" onClick={() => annullaIncasso(c)}>Annulla incasso</button>}
                      <button className="btn ghost sm" onClick={() => setEditing(c)}>✎</button>
                      <button className="btn danger sm" onClick={() => elimina(c)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Movimenti contabili sui conti crediti */}
      <details style={{ marginTop: 24 }}>
        <summary style={{ cursor: "pointer", fontWeight: 600, color: "var(--ink-2)", padding: "6px 0" }}>
          Movimenti contabili sui conti CREDITI ({contab.righe.length}) · saldo {fmt(contab.saldo)}
        </summary>
        <div className="tbl-wrap" style={{ marginTop: 10, maxHeight: 420, overflowY: "auto" }}>
          <table className="tbl">
            <thead><tr><th>Data</th><th>Conto</th><th>Descrizione</th><th>BU</th><th className="num">Dare</th><th className="num">Avere</th></tr></thead>
            <tbody>
              {contab.righe.map((r, i) => (
                <tr key={i}>
                  <td>{fmtDate(r.data)}</td>
                  <td className="mono" style={{ fontSize: 11.5 }}>{String(r.codice).padStart(2, "0")} {contiMap[r.codice]?.nome?.trim()}</td>
                  <td style={{ fontSize: 12.5 }}>{r.descrizione}</td>
                  <td style={{ fontSize: 11.5 }}>{r.bu}</td>
                  <td className="num pos">{r.dare > 0 ? fmt(r.dare) : ""}</td>
                  <td className="num neg">{r.avere > 0 ? fmt(r.avere) : ""}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 8, fontStyle: "italic" }}>
          Il saldo in Dare rappresenta i crediti ancora da incassare secondo la contabilità. Se non coincide con il registro, un credito è stato incassato senza aggiornare il registro (o viceversa).
        </div>
      </details>

      {editing && (
        <div className="modal-bg" onClick={() => setEditing(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>{editing.nuovo ? "Nuovo credito" : `Modifica credito`}</h3>
              <button className="btn ghost sm" onClick={() => setEditing(null)}>✕</button>
            </div>
            <div className="modal-body">
              <CreditoForm credito={editing} contiCredito={contiCredito} contiRicavo={contiRicavo} buList={buList}
                onSave={(d) => salva(d, editing.nuovo ? null : editing._key)} onCancel={() => setEditing(null)} />
            </div>
          </div>
        </div>
      )}

      {incassando && (
        <div className="modal-bg" onClick={() => setIncassando(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Registra incasso</h3>
              <button className="btn ghost sm" onClick={() => setIncassando(null)}>✕</button>
            </div>
            <div className="modal-body">
              <IncassoForm credito={incassando} contiMap={contiMap} onSave={(d, l) => incassa(incassando, d, l)} onCancel={() => setIncassando(null)} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CreditoForm({ credito, contiCredito, contiRicavo, buList, onSave, onCancel }) {
  const [f, setF] = useState({
    cliente: credito.cliente || "",
    descrizione: credito.descrizione || "",
    importo: credito.importo || "",
    dataEmissione: credito.dataEmissione || todayISO(),
    scadenza: credito.scadenza || "",
    bu: credito.bu || "GENERAL",
    contoCredito: credito.contoCredito || 43,
    contoRicavo: credito.contoRicavo || "",
    note: credito.note || "",
  });
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  const submit = (e) => {
    e.preventDefault();
    if (!f.cliente.trim()) return alert("Il cliente è obbligatorio");
    if (!(Number(f.importo) > 0)) return alert("Importo non valido");
    onSave({ ...credito, ...f });
  };
  const bloccato = credito.rilevato;
  return (
    <form onSubmit={submit} className="form-grid">
      <div className="form-row"><label>Cliente *</label>
        <input type="text" value={f.cliente} onChange={e => set("cliente", e.target.value)} placeholder="es. Casa Olivari" required autoFocus /></div>
      <div className="form-row"><label>Descrizione</label>
        <input type="text" value={f.descrizione} onChange={e => set("descrizione", e.target.value)} placeholder="es. Sponsor 3ª tranche" /></div>
      <div className="form-row"><label>Importo *</label>
        <input type="number" step="0.01" min="0" value={f.importo} onChange={e => set("importo", e.target.value)} required disabled={bloccato} /></div>
      <div className="form-row"><label>Data emissione</label>
        <input type="date" value={f.dataEmissione} onChange={e => set("dataEmissione", e.target.value)} disabled={bloccato} /></div>
      <div className="form-row"><label>Scadenza</label>
        <input type="date" value={f.scadenza} onChange={e => set("scadenza", e.target.value)} /></div>
      <div className="form-row"><label>Conto credito</label>
        <select value={f.contoCredito} onChange={e => set("contoCredito", e.target.value)} disabled={bloccato}>
          {contiCredito.map(c => <option key={c.codice} value={c.codice}>{String(c.codice).padStart(2, "0")} · {c.nome.trim()}</option>)}
        </select></div>
      <div className="form-row"><label>Conto ricavo (contropartita)</label>
        <select value={f.contoRicavo} onChange={e => set("contoRicavo", e.target.value)} disabled={bloccato}>
          <option value="">— scegli —</option>
          {contiRicavo.map(c => <option key={c.codice} value={c.codice}>{String(c.codice).padStart(2, "0")} · {c.nome.trim()}</option>)}
        </select></div>
      <div className="form-row"><label>Business Unit</label>
        <select value={f.bu} onChange={e => set("bu", e.target.value)}>
          {buList.map(b => <option key={b} value={b}>{b}</option>)}
        </select></div>
      <div className="form-row"><label>Note</label>
        <input type="text" value={f.note} onChange={e => set("note", e.target.value)} /></div>
      {bloccato && <div style={{ fontSize: 11.5, color: "#7a5a1d", background: "#fdf5e6", padding: "8px 10px", borderRadius: 6 }}>
        {credito.origine === "contabilita"
          ? <>Questo credito esiste già in contabilità: <b>la scrittura non viene toccata</b>. Qui classifichi solo controparte, scadenza, BU e note. L'incasso lo registrerai dopo, dal registro.</>
          : <>Il credito è già rilevato in contabilità: importo, data e conti non sono modificabili. Elimina la scrittura dai Movimenti se devi correggerli.</>}
      </div>}
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12, paddingTop: 14, borderTop: "1px solid var(--rule)" }}>
        <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
        <button type="submit" className="btn accent">Salva</button>
      </div>
    </form>
  );
}

function IncassoForm({ credito, contiMap, onSave, onCancel }) {
  const [data, setData] = useState(todayISO());
  const [liq, setLiq] = useState(1);
  const submit = (e) => { e.preventDefault(); if (!liq) return alert("Scegli il conto di liquidità"); onSave(data, liq); };
  const contro = credito.rilevato ? credito.contoCredito : credito.contoRicavo;
  const nomeContro = contiMap[contro]?.nome?.trim() || "—";
  return (
    <form onSubmit={submit} className="form-grid">
      <div style={{ fontSize: 13, color: "var(--ink-2)" }}>
        <b>{credito.cliente}</b> · {fmtEuro(credito.importo)}
        {credito.descrizione && <div style={{ fontSize: 12, color: "var(--ink-3)" }}>{credito.descrizione}</div>}
      </div>
      <div className="form-row"><label>Data incasso</label>
        <input type="date" value={data} onChange={e => setData(e.target.value)} required /></div>
      <div className="form-row"><label>Conto di accredito</label>
        <select value={liq} onChange={e => setLiq(Number(e.target.value))}>
          {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{String(c.codice).padStart(2, "0")} · {c.nome.trim()}</option>)}
        </select></div>
