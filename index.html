          // chiudo sidebar quando si clicca un navlink (mobile)
          if (e.target.tagName === "BUTTON" && e.target.classList.contains("navlink")) {
            setSidebarOpen(false);
          }
        }}>
          <div className="section-label">Operatività</div>
          <button className={"navlink " + (page==="dashboard"?"active":"")} onClick={() => setPage("dashboard")}><span className="ico">◆</span> Dashboard</button>
          <button className={"navlink " + (page==="nuovo"?"active":"")} onClick={() => setPage("nuovo")}><span className="ico">+</span> Nuovo movimento</button>
          <button className={"navlink " + (page==="import"?"active":"")} onClick={() => setPage("import")}><span className="ico">↑</span> Import movimenti</button>
          <button className={"navlink " + (page==="movimenti"?"active":"")} onClick={() => setPage("movimenti")}><span className="ico">≡</span> Movimenti</button>

          <div className="section-label">Anagrafiche</div>
          <button className={"navlink " + (page==="conti"?"active":"")} onClick={() => setPage("conti")}><span className="ico">▦</span> Piano dei Conti</button>
          <button className={"navlink " + (page==="bu"?"active":"")} onClick={() => setPage("bu")}><span className="ico">⊟</span> Business Units</button>

          <div className="section-label">Reports contabili</div>
          <button className={"navlink " + (page==="libro"?"active":"")} onClick={() => setPage("libro")}><span className="ico">▤</span> Libro Giornale</button>
          <button className={"navlink " + (page==="bilancio"?"active":"")} onClick={() => setPage("bilancio")}><span className="ico">⚖</span> Bilancio Verifica</button>
          <button className={"navlink " + (page==="chiusura"?"active":"")} onClick={() => setPage("chiusura")}><span className="ico">🗓</span> Chiusura mensile</button>
          <button className={"navlink " + (page==="rf"?"active":"")} onClick={() => setPage("rf")}><span className="ico">≋</span> Rendiconto Fin.</button>
          <button className={"navlink " + (page==="pivot"?"active":"")} onClick={() => setPage("pivot")}><span className="ico">⊞</span> Pivot Conti</button>
          <button className={"navlink " + (page==="controller"?"active":"")} onClick={() => setPage("controller")}><span className="ico">🎯</span> Controller</button>
          <button className={"navlink " + (page==="budget"?"active":"")} onClick={() => setPage("budget")}><span className="ico">🎚</span> Budget</button>
          <button className={"navlink " + (page==="snapshot"?"active":"")} onClick={() => setPage("snapshot")}><span className="ico">📸</span> Snapshot mensili</button>
          <button className={"navlink " + (page==="export"?"active":"")} onClick={() => setPage("export")}><span className="ico">↧</span> Export</button>

          <div className="section-label">Gestione</div>
          <button className={"navlink " + (page==="cespiti"?"active":"")} onClick={() => setPage("cespiti")}><span className="ico">▣</span> Cespiti</button>
          <button className={"navlink " + (page==="crediti"?"active":"")} onClick={() => setPage("crediti")}><span className="ico">🧾</span> Crediti</button>
          <button className={"navlink " + (page==="ammortamenti"?"active":"")} onClick={() => setPage("ammortamenti")}><span className="ico">⊟</span> Ammortamenti</button>
          <button className={"navlink " + (page==="cassa"?"active":"")} onClick={() => setPage("cassa")}><span className="ico">💵</span> Composizione Cassa</button>
          <button className={"navlink " + (page==="iscrizioni"?"active":"")} onClick={() => setPage("iscrizioni")}><span className="ico">🧾</span> Iscrizioni TdP</button>
          <button className={"navlink " + (page==="torneo"?"active":"")} onClick={() => setPage("torneo")}><span className="ico">★</span> Torneo</button>
        </nav>
        {sidebarOpen && <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)}></div>}

        <main className="main">
          {loading ? (
            <div className="empty-state">Caricamento dati…</div>
          ) : (
            <>
              {page === "dashboard" && <PageDashboard conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} />}
              {page === "nuovo" && <PageNuovo conti={conti} stagione={stagione} categorie={categorieOpzioni} onSaved={(msg) => { showToast(msg); setPage("movimenti"); }} onCancel={() => setPage("dashboard")} />}
              {page === "import" && <PageImportMovimenti conti={conti} bu={bu} movimenti={movimenti} stagione={stagione} onToast={showToast} onDone={() => setPage("movimenti")} />}
              {page === "movimenti" && <PageMovimenti conti={conti} movimenti={movimenti} stagione={stagione} categorie={categorieOpzioni} onToast={showToast} />}
              {page === "conti" && <PagePianoConti conti={conti} stagione={stagione} onToast={showToast} />}
              {page === "bu" && <PageBU bu={bu} conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} onToast={showToast} />}
              {page === "crediti" && <PageCrediti conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} bu={bu} onToast={showToast} />}
              {page === "libro" && <PageLibroGiornale conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "bilancio" && <PageBilancio conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "chiusura" && <PageChiusuraMensile conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} bu={bu} categorieRF={categorieRF} onToast={showToast} />}
              {page === "rf" && <PageRendiconto conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} categorieRF={categorieRF} onToast={showToast} />}
              {page === "pivot" && <PagePivotConti conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "controller" && <PageController conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} onToast={showToast} />}
              {page === "budget" && <PageBudget conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} bu={bu} stagione={stagione} onToast={showToast} />}
              {page === "snapshot" && <PageSnapshot conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} onToast={showToast} />}
              {page === "export" && <PageExport conti={conti} movimenti={movimenti} cespiti={cespiti} saldiIniziali={saldiIniziali} stagione={stagione} categorieRF={categorieRF} />}
              {page === "cespiti" && <PageCespiti cespiti={cespiti} stagione={stagione} onToast={showToast} />}
              {page === "ammortamenti" && <PageAmmortamenti cespiti={cespiti} movimenti={movimenti} conti={conti} stagione={stagione} onToast={showToast} />}
              {page === "cassa" && <PageCassa stagione={stagione} saldiCalcolati={{}} movimenti={movimenti} saldiIniziali={saldiIniziali} onToast={showToast} />}
              {page === "iscrizioni" && <PageIscrizioniTdP stagione={stagione} conti={conti} onToast={showToast} />}
              {page === "torneo" && <PageTorneo stagione={stagione} onToast={showToast} />}
            </>
          )}
        </main>
      </div>

      {toast && <div className={"toast " + (toast.type || "")}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
